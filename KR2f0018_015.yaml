body:
  text: 王端毅奏議巻十五明王恕撰吏部議致仕尚書胡拱辰請給誥命奏狀驗封清吏司案呈准禮部儀制清吏司手本奉本部連送該本司案呈奉本部送禮科抄出南京工部致仕尚書胡拱辰奏云云等因具本奏奉聖㫖該衙門知道欽此欽遵抄出送司案呈到部看得本官所奏除乞恩入監本部另行外所據乞賜誥命係𨽻别部掌行合就連送仰行吏部該司呈堂徑自施行等因到司案呈到部查得成化二十二年三月内該本官奏為乞恩休致事本部查得本官歴官中外四十八年始終清慎年巳七十例該致仕題奉憲宗皇帝聖㫖胡拱辰既歴官清慎不准致仕著用心辦事欽此成化二十三年正月南京尚書等官被劾者五員餘皆冠帶閑住獨胡拱辰得致仕於此有以見先帝知本官之清慎故其所以優之者與衆不同也况本官致仕止因年老别無異議觀此奏詞則其雖老不衰可知又况本官歴任中外五十餘年始終一節有功無過是亦聖世希有之人爾兼且本官陞正二品俸二十五箇月有餘陞尚書又三十一箇月有餘止因尚書欠三箇半月未滿一考未曽請給誥命榮及先世以歴二品俸論之實滿一考又多二十餘箇月今本官懇乞聖恩憐憫給賜尚書誥命欲恩及其父祖以滿臣子之至願縁係致仕大臣乞恩請給誥命事理臣等未敢擅便定奪伏乞聖裁𢎞治五年六月二十日具題次日奉聖㫖與他欽此議都御史髙崧乞全體統奏狀文選清吏司案呈奉本部送吏科抄出巡撫貴州都察院右僉都御史髙崧奏云云等因具奏奉聖㫖吏部知道欽此欽遵抄出送司案呈到部洪惟我朝太祖髙皇帝創業垂統内設五府六部都察院等衙門外設都布按三司以及府衛等衙門即周官所謂六卿分職各率其屬以倡九牧阜成兆民之制内外體統豈容紊亂又大明律有曰凡奉制命出使而官吏毆之杖一百徒三年罵詈杖一百盖以上命為重初不計其官之崇卑也以體統論之都御史則統攝乎布政而布政固其屬也以奉使論之都御史奉命出使布政職守一方當致敬盡禮况都御史髙崧齎捧璽書巡撫貴州而其境内官無大小皆當受其約束政無鉅細皆當聴其處分今布政劉元自恃小才罔知大體乃敢輕侮都御史髙崧言語不遜則是壊朝廷之紀綱亂内外之體統本當叅究但事在革前欲將劉元改調别任縁今地方多事合無姑且不動本部𩔖行貴州布政司轉行左布政劉元今後務要改過自新安分守禮敬脩職業毋得越禮犯分眇視制使自速罪愆仍行都察院轉行都御史髙崧亦要振肅紀綱以禮自防行事之際尤當顧天體毋得避小嫌今後劉元如仍侮慢自賢不聴約束阻壊行事明白奏來以憑拏問縁奉欽依吏部知道事理未敢擅便𢎞治五年六月二十五日具題次日奉聖㫖是欽此議給事中王綸汰冗官以除民蠧奏狀考功清吏司案呈奉本部送禮科抄出本科給事中王綸題云云等因具題奉聖㫖該部知道欽此欽遵抄出送司案呈到部看得在外有司官員中間奉公守法盡心所事者少貪婪不才老懦無為者多誠如給事中王綸所言但各該巡撫巡按等官問發為民及考察黜退者日不足而月有餘物之不齊物之情也在人亦然黜退一畨後來者未必皆得人亦不過如此况今朝覲在邇又該考察地方灾傷之際固宜祛民蠧除民害尤當節民財省民力若又行令巡撫巡按考察官員雖欲不驚擾自有所不免矧送往迎來送舊迎新未免勞費合無不必行各該巡撫巡按官員考察候朝覲之日照例本部㑹同都察院從公考察大明黜陟惟復依王綸所言行被灾地方巡撫等官㑹同考察量為黜罷縁係陳言處置灾荒及奉欽依該部知道事理未敢擅便𢎞治五年八月十五日具題次日奉聖㫖是這考察不必行欽此論太監黄瓉乞留弟在京辦事奏狀文選清吏司案呈奉本部送内府抄出内官監太監黄瓉題云云等因具題奉聖㫖吏部看了來說欽此欽遵隨該吏科叅看得先該吏部題奉聖㫖是今後一應人員不許營求内外權要冒濫陞職違了的治罪不饒欽此欽遵外今泉州府陰陽學正術黄碧公差到京乃敢夤縁太監黄瓉奏求京職事屬有違宜從抄行通行送司案呈到部叅照福建泉州府陰陽學正術黄碧解紙到京太監黄瓉奏要對品存留在京辦事該吏科叅出前因臣等竊惟朝無倖位則食之者寡此先儒之格言經國之要務也且内外百執事俱有定員缺一員補一員則事體不紊禄不虚費如或額外濫設則萬民惟正之供不足以充國用多取之則民必困民惟邦本豈可使之困乎向時冗官滿朝皆無事而食禄中外洶洶為之不平皇上灼見其弊從廷議而革罷之由是仕途頗清廩禄頗省公道乃行民情大恱即今革罷之徒欲求復進者朝探夕聴東奔西走不得其門而入今太監黄瓉奏要留伊弟黄碧在京辦事其事雖小若一允之則倖門從此大開不能復閉豈有不壊平明之治况又有前項欽依事例臣等不敢不言不敢不遵欲將黄碧拏送法司究問以塞弊源縁奉欽依吏部看了來說事理未敢擅便𢎞治五年十月初五日具題次日奉聖㫖黄碧准改欽天監漏刻博士帶俸不為例欽此乞貸御史李興處死奏狀臣伏聞太祖髙皇帝諭羣臣有曰忠臣愛君讜言為國盖愛君者有過必諫諫而不切非忠也為國者遇事必言言而不直非忠也比來朕每發言但唯唯而巳其間豈無是非得失而無直言者雖不善無由以聞自今宜盡忠讜以匡朕不逮欽此大哉皇言乎一哉皇心乎其所以察言用中以隆聖子神孫萬萬世太平之基本乎仰惟陛下履太祖髙皇帝之位體太祖髙皇帝之心於凡發號施令無非寛仁慈愛惟恐傷人害物是以中外臣民無不感戴祝願欲聖壽億萬年使斯世斯民享億萬年太平之福邇者御史李興巡按陜西因公毆死一十三命刑部㑹多官問擬徒罪發遣為民今陛下欲處以死是惡其用刑太重欲懲一戒百以重人命是以肅殺而行春育也臣不佞但李興之在陜西克盡憲職所至秋毫無犯貪官汚吏强軍豪民聞風歛跡不敢縦横其有益於地方良民多矣今其所傷雖有此數人盖欲懲治奸頑初非有意挾私法該徒罪今若處之以死臣恐天下後世以為陛下用刑任情不以法豈不有累至仁至明之聖徳且天下貪官汚吏强軍豪民所忌憚者惟御史今若此是使御史垂首喪氣而貪汚豪强者無所忌憚欲小民獲安四方晏然難矣臣痛惜此事欲言而不敢者累日今臣偶思太祖髙皇帝之聖諭是以終不敢黙黙者盖為陛下聖徳惜而不為李興一小官惜也伏望聖慈上體天地生物之心欽恤祖宗立法之意垂莫大之恩宥李興之死重加發遣以正國法以全聖徳天下幸甚臣稽首頓首俯伏待罪𢎞治五年十月二十八日具題本月三十日奉聖㫖李興打死人命數多本當處死你每既這等說饒死還著實打一百連當房家小押發極邊煙瘴地面永逺充軍今後出差御史務要遵依憲綱而行不許分外生事敢有酷暴如李興的必處死不饒欽此乞休致奏狀臣係陜西西安府三原縣人蚤以民間髫齓之童選備邑庠生徒之數二十有六而膺鄉薦三十有三而中春闈始被選為庶吉士初授職作評事俄選本寺寺副繼拜揚州知府擢右布政於江西轉左布政於河南疊陞右左副都御史連遷三部左侍郎至于右都御史尚書太子少保撫治荆州襄陽南陽三府流民巡撫河南雲南南直𨽻三處地方或總理河道或提督巡江或叅賛機務不一其差委或職司國計或主典刑獄或脩明軍政不一其任用雖不能盡其職分禆補萬一如以一線之㣲引千鈞之重兢兢業業于四十年之間惟恐有失未嘗一日放此心也幸而行年七十有一荷䝉先帝聖恩賜臣致仕歸田雖棲身衡門之下亦未嘗時刻有忘國家不意誤䝉聖明以臣多厯年所起至於京處以保傅之位寄以銓選之司自惟徒抱忠貞之志而無匡輔之猷况值衰暮之年而寡知人之哲深恐負托不效有負聖恩是以辭謝至再而不獲命乞休不一而不得去臣嘗聞昔何曽位極台司不能直諫有誤國事史書其不忠臣既䝉聖恩委任苟不盡職盡忠何以逃其罪乎是以有所見聞無不盡心言之雖犯顔逆耳觸忤左右荷䝉聖明優容亦不加罪此臣之所以日夜感激欲報無由豈肯假為退托遽欲舎去但臣犬馬之年巳至七十有八血氣衰憊趨走孔艱跪拜喫力委實勉强不去豈敢妄言况今大朝考察官員在邇觀其各處巡撫巡按等官開來揭帖中間老疾罷輭不能任事等項官員頗多若不黜退委實誤事使臣考察退之是以老之大者而退老之小者不責巳而責人人將謂何又况臣任事日久積怨必多若不及早迴避大恐不能保終伏望聖恩憐臣衰老放臣歸田另選碩徳重望之人而任用之庶幾天工不至久曠殘喘得以茍延考察之際人亦無得而議矣臣無任冰兢之至𢎞治五年十二月二十二日具奏二十四日奉聖㫖卿老成重望委任方隆豈可以年老求退所辭不允欽此再乞休致奏狀臣昨伏思猥以庸材劣行誤䝉列聖知遇歴任四十餘年至于崇階顯秩不能上報聖徳萬一今巳年老力衰乞歸田里奏奉聖㫖卿老成重望委任方隆豈可以年老求退所辭不允欽此臣何人仰荷聖恩奬諭眷留若此雖隕首捐軀莫能報酬使臣未至老耄筋强力健每日出入金門瞻望清光退而坐髙堂食厚禄率屬供職夫何為而不願比之歸田之後出入閭里鄉疃無禄而食無僕代勞所見者不過農夫野叟而巳夫何樂之有豈肯舎此而就彼哉但臣委實年老氣衰步履艱辛跪拜喫力勉强不去伏望聖恩曲加矜憫容臣解印綬歸田里杜門謝客静以待盡豈勝感激臣無任瞻望懇乞之至𢎞治五年十二月二十四日具奏本月二十七日奉聖㫖卿年雖老筋力未衰朕已勉留何乃復請不允欽此議給事中王欽拾補治道奏狀文選清吏司案呈奉本部送准禮部咨儀制清吏司案呈奉本部送禮科抄出刑科給事中王欽題前事等因開坐題奉聖㫖該部看了來說欽此欽遵抄出送司案呈到部看得本官所題廣邊儲以防不虞等事係𨽻吏戸二部掌行擬合通行開单移咨煩為徑自施行等因送司案呈到部今將本官所言逐一議擬開立前件伏乞聖裁縁奉欽依該部看了來說事理未敢擅便𢎞治五年十一月十九日具題二十一日奉聖㫖准議欽此一臣等㑹同都察院右都御史白昂等查得自宣徳年來至今都察院同僉書管事都御史或一員或二員多不過三員未嘗有四五員同僉書管事者正統末景泰初都御史陳鎰王文輪流鎮守陜西囘則在院管事其餘各處巡撫并賛理軍務都御史缺一員則推舉一員其所推舉者多係曽經歴練老成之人少有不稱厥職者今給事中王欽題要照依諸司職掌原設左右副都御史二員左右僉都御史四員選補充足在院協同管事以練達刑名如有巡撫員缺就便挨次差遣一莭其意無非欲巡撫官之得人且祖宗之定官制都察院雖設左右都御史各一員左右副都御史各一員左右僉都御史四員共八員想當時在院管事并公差在外者不過此八員而巳今在院管事并公差在外巡撫等項常有二十二三員不為不多若再補足員數在院管事以備巡撫差用非惟管事之際議論紛紜政不歸一抑且輿𨽻廩禄難以供贍似為未便今都察院見有右都御史白昂右副都御史翟瑄又有左僉都御史李介守制將滿儘可了事合無不必照依額數添除官員今後遇有巡撫都御史員缺本部仍照例㑹推相應人員請㫖簡用如此則官無冗設而法有定守矣一伏覩各處提調學校御史副使等官節該欽奉勅諭内有曰一學校無成皆由師道不立今之教官賢否不齊先須察其徳行考其文學果所行所學皆善須禮待之若一次考驗學問疎淺及怠於訓誨者姑誡勵之令其進學改過若再考無進不改送吏部别用欽此今給事中王欽題稱前因無非愛惜人才崇重師儒之意合無行移都察院轉行各處提學御史副使等官今後考驗教官務遵原奉勅諭内事理當禮待者禮待之當誡勵者誡勵之當起送别用者起送之不許徇私偏執將一次考驗不中者一概起送别用如此則勸懲不至輕易而師儒知所奮勵矣一查得先該廣平府知府王衡等奏稱納銀聴叅吏典不諳刑名行移不通楷書筭法既以納財為出身之階必以貪財為營家之計奏要今後或遇災傷荒歉先事預防臨期賑䘏凡百長䇿任其施為不許再擬納財叅吏永杜貪利之門等因本部訪得永樂宣徳正統年間天下亦有災傷各邊亦有軍馬當時未嘗舉行納糧草納銀兩為監生吏典等項事例糧草不聞不足軍民不聞困斃近年以來各邊并腹裏少有災傷所在守土等官止圖目前分寸之利不為國家長久之謀輒便奏開生員吏典人等納糧草納銀兩等項事例彼此效尤遂為長䇿殊不思祖宗教養生員叅充吏役良法美意各有攸在且如生員選於民間俊秀子弟教養於學校成材者科貢入監不成材者充吏為民未嘗不别賢否一概濫進也其吏役亦必於農民之中選其識字能書者充之令其書辦文案及其兩考役滿赴部辦事數年纔撥京考滿日考中纔得冠帶不中者發囘為民未嘗不論能否一概入選也近來因有前例是以在學無志生員及未學富家子弟揑作生員名色不分賢否有無學識一概入監以圖出身將來入仕不知為政之道豈不誤事殃民一切小民不分能書與不能書不論市民與農民一概聴缺充吏不惟官司不得伊書辦文案且於舊制有違及其三考役滿又免考驗一概照依資格出身所以多不稱職比先年間監生止由科貢吏典亦循年資别無雜進之徒是以聴選之人不多選法不至壅滯任用亦多得人自有此例雜進者日多一日以致正途監生吏典因而壅滯不得出身多者十七八年少者不下十五六年纔得選用年巳向衰誰肯盡心幹事不謀歸計甚至聴選年老例不入選只與冠帶閑住又况此等雜途所進中間多有負債破産頑鈍無耻之輩今日既知以財進身他日豈肯以廉律巳欲不貪財害民天下治安何由可得欲將納銀納糧草等項事例限本年四月以裏通行停止今後遇有災傷及邊方糧草不足不許再行奏開前項生員吏典人等納糧等項事例貽患將來等因𢎞治元年三月初四日具題奉聖㫖是欽此續該四川布政司奏要令陜西等布政司一考兩考吏典定與則例出納銀兩或免其考試就撥京考或給與冠帶各照資格選用等因戸部明知題准今後不許再行奏開前例却乃不令本部知㑹朦朧題准行移四川陜西雲南貴州四布政司招納去後𢎞治二年六月内該四川布政司奏稱年嵗豐稔本部查照前項禁革事例具題行移該布政司將納銀事例限七月二十日以裏停止今後諸司衙門敢有再行奏開前例許本部叅奏或科道官糾劾治罪題奉聖㫖是欽此巳經節次通行欽遵外近該巡撫山東左僉都御史王霽巡撫南直𨽻左副都御史佀鍾各明知本部題准再不許奏開吏典人等納銀事例乃敢故違王霽既開端於前佀鍾又接踵於後户部亦不查照輒便題准是使後來雜進人多選法壅滯以致正途循資而進者皓首不得出身歸怨吏部未必不由此也且吏部掌天下官吏選授之政令戸部掌天下戸口田糧之政令選法不清吏部之責錢糧不足戸部之責兹欲補錢糧之不足遂令選法之不清是自欲迯其責而使人任其咎也况其所得銀物不及一貴族所積濟人不多壊事實大且使詔㫖不信於天下其為聖政之累夫豈小哉今給事中王欽所言前因誠可謂深知其弊所宜禁止合無通行各布政司并直𨽻府州各行所屬衙門除已留在官聴缺知印承差吏典挨次叅補外以後遇有名缺預先三箇月以裏行屬照例於良善農民内揀選身家無過人物端莊諳曉書寫者不必納銀就令叅充其山東南直𨽻今次奏准納銀事例合無於𢎞治六年五月麥熟之時就便停止今後各處災傷任從巡撫等官多方區畫措置再不許奏開吏典納銀事例如違許本部并科道官糾劾治罪若該部不行查照朦朧覆奏准行亦聴科道官糾劾如此則典吏進身不縁納賄他年入仕亦必廉能書算文移州縣收臂指之効撥京考滿冠帶無頑鈍之徒斯吏胥不虞雜進而銓選不致壅滯矣引疾乞休致奏狀臣昨於本月十八日引選囘家夜半時候忽感風疾頭目昏暈痰氣上壅不省人事者累時巳而少蘇四肢麻木不能展轉已將原掌印信咨送本部收掌本部題奉聖㫖印還着王恕掌欽此臣有以見聖恩優待大臣之體面無故不棄之盛心且吏部印信臣非不欲掌也一品俸禄臣非不欲食也聖明在上臣非不欲事也天地大徳臣非不欲報也但臣年巳耄矣時巳過矣命巳衰矣病巳作矣譛毁者日益至矣禍患恐不免矣是以不得不退避也伏望聖慈俯察愚衷曲賜矜憫俾臣早歸田里不致狼狽則是聖恩保全老臣有始有終老臣感戴聖恩無窮無盡也臣無任涕泣懇禱之至𢎞治六年二月二十二日具奏次日奉聖㫖卿朝廷老臣偶有疾宜善調理不允休致欽此再引疾乞休致奏狀臣昨因遘疾具本懇乞休致奉聖㫖卿朝廷老臣偶有疾宜善調理不允休致欽此伏念臣本凡品庸流仰荷聖明起用至此五六年來拜沐殊恩異數多矣非不欲調理疾痊圖報萬一但臣年幾八十血氣巳衰百病侵尋如腰腿疼痛耳目昏瞶等疾非醫藥所能治療且銓衡之司人才進退所繫天下治忽所闗非才識明敏徳望過人者焉能勝任而服衆臣以老耄昏聵之人乆居此地有妨賢路其所進退之人又未必一一皆當欲其服衆心而無怨謗得乎然聖恩留臣是乃朝廷禮貌大臣之體面臣非不知也使臣不速去其位誠恐積毁日深獲罪愈重斯時也聖恩雖欲留臣亦恐不可得使臣狼狽而歸有何顔面復見鄉邦故人豈若今日之去之為美也伏望聖慈俯賜矜察容臣歸田使臣無憂無懼茍延殘喘數日其視今日留臣之恩豈不尤為大乎臣無任感仰之至𢎞治六年二月二十四日奏二十六日奉聖㫖卿引疾求退巳有㫖勉留不必固辭欽此乞休致奏狀臣先任太子少保南京兵部尚書叅賛機務致仕之時年巳七十有一退居田里嵗且將周誤䝉聖恩召至京師陞吏部尚書加太子太保俾之視事時巳七十有三矣茲又食保傅之禄典銓選之政將及六載累䝉殊恩異數難以備述雖捐軀隕首莫能報酬萬一但血氣日衰桑榆景迫任既重而勢必危功未成而謗即至深惟保晚節之難將恐為平生之累是以五六年來乞休二十餘次俱䝉聖恩勉留不允其去今舊患腰腿疼痛兩足浮腫等疾未瘳而新染心疼氣急驚悸不寧之證益劇有若風燭晨星豈能長乆伏望聖恩憐臣年垂八十歴事四朝雖無竒勲異績亦嘗宣力効勞容臣致仕歸田全其始終非惟臣一身感恩於無窮而在廷大小臣僚亦相勸勉願輔太平之治於無窮矣臣無任悚懼之至𢎞治六年閏五月十三日具奏次日奉聖㫖卿既稱有疾且加調理不允休致該部知道欽此再乞休致奏狀臣昨以自召用以來五六年間乞休二十餘次俱䝉聖恩勉留今舊疾未瘳新疾又作恐不能長久伏望聖恩憐憫容臣致仕用全始終仰惟皇上雖憐其老疾亦不忍遽舎其去乃降温詔令臣且加調理此乃聖帝明王愛物之仁不棄故舊之盛心也臣雖昏愚豈不知感但臣之獲此疾也非一日矣雖少且壯者亦難為調理今臣老且衰死將至矣豈醫藥所能療乎伏望聖慈矜其愚憐其老哀其死將至容臣歸田有始有終其為感激寧有窮乎臣無任隕涕懇禱之至𢎞治六年閏五月二十一日具奏次日奉聖㫖卿既懇辭准致仕著馳驛去還著有司月給食米二石嵗撥人夫二名應用該衙門知道欽此王端毅奏議巻十五
