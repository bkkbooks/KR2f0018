  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0018_WYG_004-1a, image: WYG0427/WYG0427-0518a.png}
body:
  text: 王端毅奏議巻四明王恕撰前叅賛機務囬報守備太監黄賜到任奏狀節該欽奉勑今命太監黄賜與爾等一同守備凡事必須與之恊和計議停當而行欽此欽遵本官已於成化十四年十二月十二日到任管事外謹具題知覆議定襄伯乞増操江官軍奏狀准兵部咨該南京前軍都督府掌府事定襄伯郭嵩題内開一件軍務事查得新江口永樂五年設立操江官軍一萬七千員名後將數内浙江二千一百四十七員名放囬景㤗年間又選去神機營習學銃手并大小教塲浦子口操練官軍共一千二百四十一員名及運粮屯種并發遣貴州等衞共四千五百五十員名及事故不補一千二十員名查㸃見在官軍八千八百四十二員名軍士數少委的不敷調用乞𠡠南京守備内外官員將原選去神機營習學銃手并直𨽻安慶滁宣州三衞官軍照數撥還江口操守便益等因行令臣等勘議前項官軍何年送在神機營習學銃手并直𨽻安慶宣滁三衞官軍何年因何事例放囬原衞只今應否取囬備禦事體有無相應勘議停當徑自囬奏定奪等因備咨准此臣等㑹同南京守備太監安寧等勘議得景㤗元年因設立神機營選撥前項操江官軍并所選大小教塲官軍俱送本營習學銃手天順元年為因南京各營官軍差調數多缺少操備該前守備内外官員奏准取調直𨽻安慶建陽滁州宣州鎮江五衞官軍共三千員名輪班前来南京分撥各營操備内建陽衞官軍五百員名分撥新江口操守成化十年該把總操江定西安侯蔣因操江官軍事故數多又奏撥鎮江衞官軍七百員名見今操江外其安慶宣滁三衞官軍原係先年分撥大小教塲之數並無放囬原衞至今輪班操練行之年久况大小教塲神機營見操官軍數皆不多若又改撥操江不無此重彼輕事體不均合無仍令前項三衛官軍照舊大小教塲操練庻幾事不紛更營伍安妥縁係勘議停當徑自回奏定奪事理未敢擅便具題南京長安右門外木厰内失火叅工部官奏狀成化十四年二月初九日已時分忽見長安右門外榜房後南京工部堆垜木料厰房失火臣等親詣木厰督令五城兵馬帶領地方火甲人等救護因風猛火熾誠恐延及守衞直房當將榜房八間拽倒令人搬救各項木料用水澆潑息滅續據本部西安厰看守木料辦事官髙儼呈報本日已時分有班匠吳成等在於守宿蘆蓆房内煑飯食後不覺竈内有火一時失於仔細被風吹起火星燒燬各工拆卸還官并餘剩杉松條木竹片麻索松杉栢板軟篾水膠姜黄蘆蓆共三萬一千三百四十八根條叚塊斤片及蘆蓆厰房二連小瓦房六間拽倒板榜房八間及救出見在杉松條木猫竹竹片共四千五十四根叚片行間又據南京東城兵馬指揮司亦呈前事臣等㑹同南京守備太監安寧等議得厰房係是堆積官物以致看厰辦事官縱容班匠在内煑飯因而失火燒毁官物俱合查䆒縁係燒毁厰房查提京官事理未敢擅便具題太廟内樹木被風吹倒奏狀准南京守備太監安寧等掲帖准南京神宫監印信掲帖開太廟前靣樹木内有年乆枯朽栢樹并冬青等樹為因連日隂雨地土濕爛根科欹斜於成化十四年八月十八日夜被風雨驟急吹倒八株准此臣等㑹同南京守備太監安寧等并南京工部署部事郎中黄㑹恭詣本處相看是實縁係太廟處所吹倒樹株理宜選擇吉日起除如䝉准題乞𠡠該部轉行南京工部摘差匠作及臣等内外守備量撥官軍行令南京欽天監選擇良利日時起除修整便益為此具本謹題請㫖覆奏南京六科陳言弭災事奏狀准本府咨准南京兵部咨呈准兵部咨准禮部咨禮科抄出南京兵科等科給事中鄭宏等奏内一件防奸細備開内府各衙門軍民匠役人等數多又有借撥旗軍力士約有七千餘名俱由東安西安北安等門早晚出入縱横自如多少不知其數雖有無藉之軰姦細之人詐冐出入竊窺他故者豈能知其姦弊等因該兵部議擬奉欽依内事理移咨南京兵部㑹同内外守備叅賛等官計議酌量處置照依各門官軍門簿事例置立精㣲出入門簿各一扇南京兵部用印鈐記送赴守備官處取具内府各衙門上工人等花名填註分送各門守衛官軍收掌照名平明㸃入未晚㸃出不許錯亂逐日將㸃過出入數目開送守備官處查考務在闗防嚴宻事無紛擾等因准此臣等内外守備叅賛等官㑹同取勘内府各監局等衙門軍民匠役人等一萬四千餘名分豁各門進出名數置立簿籍附寫完備南京兵部用印鈐記已令各該守門内官公同守衛官員收掌朝暮㸃驗去後續據談昭張保兒董榮等連名告係南京内府各監局上工人匠狀告各役常日進内上工天未大明俱到西安等門伺候開放㸃驗牌面進至該管衙門㸃卯已畢隨即赴工直至申末酉初歇作散匠捜檢放出派定工程日逐比較不敢遲延即今䝉令守衛官軍平明㸃進未晚㸃出毎早到於各門挨次擺立逐一唱名㸃驗放進巳末時分纔到監局㸃卯已過方得闗食早飯用工未及二箇時辰又要伺候未晚㸃出只得收工赴門聼候仍前挨次逐一㸃驗直至更初方纔㸃畢各匠數中多有城外住者不得出門路眠野宿風雨饑餓未免失所工不能辦又被責併實是人難行門隨據南京内織染局署局事司設監左少監温善等呈開本局工程皆係節奉欽依織造上用供用各王用并賞賜預備等用各項叚疋及欽差送染刻限守取絹布并年例織造赴京文武品官照出等項數該五萬六千有餘皆是𦂳要工程及據南京内官監左少監楊忠等亦呈本監造作係是供應薦新進用各項器皿并欽取竹器家火扇骨及装盛應用箱櫃木桶等件毎年依時起運赴京工難停緩又據南京兵仗局右副使李誠等呈稱本局成造軍器火器數多并前厰按季成造軍器共一萬九千七百餘件上庫收貯預備軍需匠作工程刻期完報各稱上工人匠出入門禁遵依舊制懸帶牌靣照驗闗防赴工散匠立定時刻造作限期逐時比較猶恐遲延今令守衛官軍㸃驗日至已末纔方進入到作不久告要收工伺候晚㸃計其一日止得午未二時動作較驗常日工程虧欠中半其實妨悞累罪不便等因又據西安等門守門奉御等官許敬等并守衛把總指揮杜敏等呈䝉發到精㣲簿籍將各衙門上工人匠平明㸃入未晚㸃出依奉挨次唱名逐一㸃檢毎日自平明㸃至巳時方止自未時㸃至更初纔得事畢縁皇城門禁鎻閉遲晚恐難闗防等因臣等㑹同南京守備太監安寧等議得内府各衙門上工人匠委的數多毎日早晚㸃檢出入皆在皇城禁門裏外聚集喧攘况各項造作工程皆係𦂳要委的妨悞不便合無令上工人匠照舊懸帶牌靣各門照驗出入不必早晚唱名㸃驗庻免稽悞工作除聼候外縁係便益事理未敢擅便謹題請㫖駁議聼選官王瓉建言江北五衛免赴京操奏狀准兵部咨禮科抄出吏部聼選官王瓉建言南京應天龍虎横海和陽武德五衛俱在江北浦子口所有官軍除差撥屯種運粮守城操備外其餘分撥南京新江口大小教塲差操縁隔楊子大江人馬往来多遭渰溺切照浦子口僻居江北城市偏虗擬合用人固守要將江北應天等五衛原撥南京各營差操官軍放回本處浦子口守城操備庻免警急風波之患等因該禮部抄出合同各部都察院通政使司大理寺六科給事中等官㑹議奏奉欽依行移南京兵部轉行南京守備官勘議前項江北五衛官軍應否免撥過江操練徑自定奪回奏等因備咨准此臣等㑹同南京守備太監安寧等計議照得江北應天等衛官軍自永樂年間起一向俱在江南操備續於景泰四年該應天衛經厯姜永奏稱本處城池無人操守奏准將南京見操應天等五衛官軍舍餘數内摘發一千員名委南京旗手衛指揮董貴管領提督在於江北浦子口教場操練守城外天順三年又該南京和陽衛百戶周忠建言江北應天等九衛官軍俱赴南京操備隔江往来風波艱苦各要將本衛官軍俱在江北操守等因奉行該前守備魏國公徐承宗等議得朝廷根本之地操守係干重務馬軍惟當増益若將前項官軍輕易調動萬一有警卒難取用已經奏奉欽依將前項衛分官軍照舊存留南京各營操備今聼選官王瓉未知事體又要將應天等五衛官軍放回本處浦子口操備查得江北應天等九衛見在南京大小教塲并神機營新江口操練官軍舍餘共二千餘員名及查南京各衛見操官軍舍餘中間亦有在於江北屯所居住而赴南京操練者又如直𨽻建陽等衛官軍前来南京輪班操備俱各經過大江比之應天等衙門路程尤逺若令軍士各就近便操備則江南操軍愈見數少將何守備京城而爲居重馭輕之道况江北浦子口見有指揮崔珏在彼守禦各衛見在官軍舍餘亦足以守城操備合無將前項衛所官軍原調南京各營操備者仍令照舊操守保障京師實為良便縁奉欽依勘議定奪明白回奏事理未敢擅便謹題請㫖闗過内府銅錢給賞日本國使臣事畢奏狀節該欽奉𠡠臣等及南京户部禮部今該給日本國正賔并物價銅錢一千六百五萬六千三百九十文𠡠至爾等㑹同太監安寧等轉行南京天財廣惠二庫照數闗出公同差去官員明白給賞事畢之日爾等仍將闗過銅錢數目明白奏報欽此欽遵臣等㑹同南京守備太監安寧等轉行南京户部禮部及南京天財庫照數闗出前項銅錢公同差来行人鄧庠給賞外各夷俱於成化十四年四月十一日起程去訖縁奉𠡠仍將闗過銅錢數目明白奏報事理今將給賞過銅錢數目開坐謹具題知奏解詐偽犯人奏狀據守江東等門指揮李隆等呈開成化十四年九月十六日盤獲男子一名金玉并紅油𠡠書筩黄布包袱等件呈送到官審據金玉供年五十六歳係河南懐慶府河内縣在城第一保民籍於正統八年正月初八日是玉不合私自净身具告本縣起送赴京該通政使司奏送司禮監將玉責打八十發南海子收充净軍成化九年五月内轉發看守皇庒成化十三年七月内爲盗賣官田事被錦衣衞校尉姬剛首送刑部河南清吏司將玉問擬雜犯罪死發吉王府做工該燕山前衞批差軍餘王信等解送成化十四年正月内到府長史司收管着役本年七月内玉因窺見本司紅油描龍筩一箇及有本司據奉祀所典吏曹廸告行原籍蘇州府呉縣優免差役印信公文二紙玉不合偷取在手私將殘缺舊大誥半本装在𠡠書筩内又將玉姓名寫在前項公文之後欲往蘇州圗取銀兩本年九月十六日經過南京又不合進入外城江東門被守門官軍跟至城裏三山門呌同本門官軍將玉盤獲呈送前来據供得此臣等㑹同南京守備太監安寧等議得金玉所供前情未委虛的縁係擅入京城門禁中間恐有隱下别情今將本犯鎻鐐并印封原帶公文等件差舍人王淳管解赴京為此開坐謹題請㫖叅奏南京經紀私與畨使織造違禁紵絲奏狀據南京錦衣衞廵捕委官百户蔡瑛呈據周璋首係南京錦衣衛鎮撫司户籍成化十三年八月初三日暹羅國進貢使臣杜文斌等到於上新河灣泊有經紀韓源陳質等引領鄰人石聦錢鵬等合夥用禮俱赴畨船交結賣過象牙蘇木銀共銀七百三十六兩囬家又憑中人田寛㑹約在城機户陳冔等家織造各様大紅黄并八寳閃色抹絨花様遍地金花幃幔各様叚匹共織一百一十五疋後有中人田寛来與璋説石聰等領銀織造畨使叚疋縁由亦来邀璋前去畨船成交比時有璋不合聽從到船憑田寛領銀五百三十一兩其石聰就行俵發機户陳冔等定織各色違禁叚疋有璋並無分文入已不期又於本年十一月初一日有安南使人裴山到於上新河有彼中人阮福因前成交来與石聰用言説其使要織各様叚疋可去成交有璋又不合與同石聰到於使臣船上承攬織金違禁紗羅叚疋共三百餘疋俱各將象牙作銀交與機户吳斌等寫立合同依様織造待回交付内有各様紙劄該銀三百六十七兩其石聰等因嗔璋在夥設計勒璋自立合同虛受倭人安息油料等香該價銀四十四兩六錢六分餘無分文銀兩與璋收領見有合同存照其石聰等因前懐恨有璋在夥却乃唆令暹羅使人杜文彬於原定織造數内勒璋自立合同領銀一百二十九兩分投開款另認織五彩抹絨幔邊二疋并蠎龍大紅叚疋有璋止收見銀二十九兩依從織叚二疋内銀一百兩亦係石聰等要得侵謀銀兩肥已暗設奸計叱喝伴送畨船官處拘璋到船威治勒寫收銀一百二十九兩供狀在官故令䧟害今思若不狀首委被奸徒石聰等紏衆私結畨船領銀織造𤣥黄宫花様遍地金叚疋事屬違例如䝉准首乞賜行提各犯石聰等到官追䆒私結畨人偽織違禁叚疋欺凌𣲖騙銀兩情由明正其罪庻免日後不致䧟害負損身家性命無辜為此將原領畨銀香貨并織違禁叚疋數目并領象牙逐一開單粘連具狀首告到職隨差廵捕校尉張洪等押發首告人周璋作眼認拏男子十七名到職責據杜林即杜瓉供年二十八歳係福建汀州衞武平守禦千户所軍餘成化十三年四月十六日是瓉告給本衞所文引將帶本錢置買鐵貨装到贑州府河下遇見親人李德報説有你房伯杜文彬先年出外生理不見回家今在暹羅國差来進貢有廣東三司盤過㨂下虛心不堪進貢蘇木一百五十綑并截斷象牙四包付托與我装載前往南京上新河等處發賣有瓉喜信將自已鐵貨一同装載到於南京上新河投托經紀陳質韓源將蘇木一百五十綑共重一萬五百斤陸續共賣銀五百二十五兩截斷象牙四包共重三百一十斤賣銀一百二十四兩共銀六百四十九兩内將銀一十二兩與陳質等作用錢接收各散去訖是瓉一向在彼存住至本年八月初三日有房伯杜文彬進貢畨船方到下闗灣泊有李德引領瓉同到房伯船上拜認説知祖宗名字鄉貫相同方纔識認見有先不知名後知是使臣坤禄羣謝提哪嗒二人辦事一人幹事一人䕶送一人大小通事二人千户一人同房伯奈英必羙亞即杜文彬有瓉同李德就將前項賣牙木銀兩交還伯杜文彬等收訖彼有房伯與瓉言説先於正統十三年間因支塩買賣遭風飄流過海今在暹羅國封為岳坤等官今充為使臣差来進貢後瓉因患痢疾病症復囬經紀家調治有李德在於房伯船上領到原賣牙木銀一百六十兩同未獲識人石聰并今在官石彦璋前去機户陳冔家定織各色叚疋後有李德患病不能動止本年十月内雇搭船隻囬家去訖相托瓉在陳冔家催討原定叚疋又審據林壽供係南京錦衣衛鎮撫司鞍轡局分調軍匠林信户内寄住餘丁成化十三年七月十三日有今在官本衛鎮撫司餘丁周璋到壽家秤銀二十七兩六錢與壽買青拱白錦紵絲二叚紅拱白錦紵絲一叚去訖又審據周珎供係南京錦衣衞鎮撫司女户籍成化十三年八月二十日有暹羅國使臣在於龍江闗遞運所倒換船隻是珎同今在官應天府江寧縣民人唐廉錢鵬將禮同到使臣船上探問承認做叚疋比有使臣約内寫織叚疋手巾銀三百二十八兩九錢止將銀二百八十七兩五錢與珎等三人收訖散與各機房織造叚疋本年九月初四日是珎等到於今在官上元縣民人陳冔家寫立合同將銀六十兩與陳冔接收織造大紅閃緑紵絲八疋先收大紅閃緑紵絲三疋與使臣收訖餘欠閃色紵絲五疋將鴨頭緑素紵絲三疋青紵絲二疋折與使臣收訖本月初六日珎等又到未獲本司餘丁何通家寫立合同將銀三十七兩五錢與何通收訖織造青紅緑各色織金紵絲女襖一十九件交與使臣收訖十一日珎等又到未獲南京留守右衛右所軍匠張義家寫立合同陸續將銀一十八兩與張義接收織造香草麒麟裏外嚮板雲手巾三十四條是珎先收手巾四條與使臣收訖又收手巾一十四條見今在官餘欠手巾一十六條未與十三日珎等到與今在官本司餘丁虞文端家寫立合同將銀六十二兩二錢與文端接收織造織金間道紵絲二疋梹榔袋三箇是珎先收織金間道紵絲一疋梹榔袋二箇與使臣收訖餘欠梹榔袋一箇織金間道紵絲一疋在虞文端家機上因使臣欠銀九兩八錢未織是珎等當日又到上元縣民人陳榮家寫立合同將銀九十兩與陳榮收訖織造白閃紅紵絲十疋緑閃白紵絲十二疋是珎先收陳榮各色紵絲十四疋交與使臣收訖餘有各色紵絲一十八疋因使臣欠銀三十一兩六錢未織本年十月十八日是珎等到於未獲上元縣民人王宣家寫立合同陸續將銀一十九兩八錢與王宣接收織藍紅花各色紵絲一十八叚交與使臣收訖外得使臣用銀五兩六錢又審據虞文端供係南京錦衣衞鎮撫司軍匠虞景户内餘丁成化十三年八月二十四日有本司餘丁周璋到於文端家定織間道抹絨紵絲六疋該銀五十四兩寫立合同陸續將銀二十三兩二錢七分與文端接收先織間道五色抹絨幔邊紵絲三疋與周璋接收去訖又審據石彦璋供係應天府江寧縣民匠成化十三年八月二十四日有未獲福建汀州衞武平守禦千户所餘丁李德前来引領彦璋同未獲兄石聰到於使臣船上有使臣先將銀六十兩付與李德接收同彦璋到於今在官本府上元縣民人陳冔家寫立合同與陳吁接收定織叚疋有李德後又將銀一百兩同彦璋與陳冔接收織造遍地織金紵絲一十五疋閃色紵絲二十一疋是彦璋先討藍小毬門紵絲一疋天青遍地金串枝寳相花紵絲一疋官緑遍地織金寳相花紵絲一疋白遍地雙枝寳相花紵絲一疋青閃色雙枝寳相花紵絲二疋青閃白紵絲一疋白閃藍紵絲一疋是彦璋交與使臣收訖有陳冔將用錢銀三兩二錢與彦璋收接使用餘有陳冔欠合同内銀五十二兩織造未完在機栁黄小毬門紵絲一叚青織金六蓮花紵絲一疋礬紅遍地織金十八雲紵絲一叚官緑閃紅紵絲一叚在陳冔家今被事發捉獲彦璋同陳冔到官追取陳冔機上各色紵絲五叚見在又審據阮福供係南京金吾左衞右千户所役過老軍成化十三年十一月初六日有安南國行人裴凖進貢帶有象牙在船到上新河灣泊是福同今在官南京留守右衞鎮撫帶管老軍塗安在彼買賣因與裴凖答話語音相同認是鄉里比有本人言説我自已帶有象牙在船央福等為中尋人定織叚疋是福聽允不合引領今在官上元縣民人王文到於裴凖船上寫立合同與王文收接有裴凖將象牙六担作銀二百七十兩織造各色羅絹共七十五疋王文聽允收合同是福當日同塗安等引領上元縣民人吳斌到於通事何循船上有何循寫立合同吳斌收訖何循將截斷象牙八担作銀三百二十兩定織各色紵絲共四十二疋吳斌聽允各囬去訖當日是福到於江東門壩邊住人周敬王鐸家與各人説知上新河安南國行人裴凖有象牙與機户王文吳斌家織造叚疋你將小船送與王文吳斌家與你們各人船錢王鐸等聽允比有周敬王鐸言説每牙一担與銀七錢我包褁嚴宻不使門上官軍得知還你停當各允是福囬家本年十二月初四日福又不合引領今在官上元縣民人王信陳榮到於裴凖船上有本人寫立合同與王信接收有裴凖將象牙四担作銀一百九十兩定織各色綾紬紵絲共四十三疋有王信陳榮聽允各人去訖當日是福到於周敬家與本人説知裴凖將象牙與機户王信陳榮織造叚疋你將小船装来放在你家寄放還你船錢周敬依允是福囬家有陳榮等俱各不曽織造叚疋成化十四年正月初八日有王鐸等將截斷象牙八担送到吳斌家將銀五兩六錢與王鐸接收本月十一日有王鐸等又將象牙六担送到王文家本人將銀四兩二錢與王鐸接收本月二十六日致被周璋具狀首發隨差廵捕校尉捉拏王信杜瓉等之時有王宣何通張義周敬王鐸田寛各人知覺逃躱未獲於陳冔名下追出織金栁黄小毬門紵絲一疋青織金六蓮花紵絲一叚礬紅遍地織金十八雲紵絲一叚礬紅織金拱線紵絲一叚官緑閃紅紵絲一叚并又於王文名下追出象牙六石共秤重五百三十六觔吳斌名下追出象牙八石共秤重七百二十八觔王信陳榮名下追出象牙四石共秤重三百八十七觔及周璋原首將銀一十八兩與虞文端織造間道五色抹絨幔邊紵絲二疋并安息香油六十五觔并首未獲石聰原與周璋胷背織金紗蠎龍様一塊及陳冔等名下追出原立合同十一紙俱各見在今將各犯供詞并追出各色叚疋象牙等物理合連人具呈等因據此案照先據鴻臚寺署丞馬全呈有暹羅國差来副使坤禄羣謝提等赴京進貢囬還該禮部奏准給批差全伴送副使坤䘵羣謝提等二十五員名沿途備辦日用飲食到廣東布政司安排茶飯管待成化十四年正月十六日到於龍江闗河下灣泊聽候廪給本職案督不許夷人進城延住數日並無廪給本職催併廪給督令夷人起程隨有副使坤䘵羣謝提等説稱亦無廪給比先彼經過有彼處住人周璋石彦璋錢鵬周珎唐㢘吳節周實承攬交去與本國王織叚疋銀兩成造花素叚疋待我催討完足纔敢囬國見王聽允到今縁無送還本職恐違欽限夷人在彼又係京城去處被周璋等淹留遲滯未便又行嚴督夷人起程亦據副使坤䘵羣謝提等連名具狀告赴本職等因今將暹羅副使坤䘵羣謝提等告狀一紙合行前赴欽差南京守備成國公朱等處呈明行取夷人管送審問乞提周璋等追給夷人銀兩織造叚疋數目發送本職給還夷人乞賜廪給闗賞夷人本職伴送起程庻不有違欽限其周璋等原先係與夷人交易情由乞另定奪明望先行週給叚疋伴送夷人起程庻為便益理合開呈施行有坤䘵羣謝提奈英必羙亞等狀告係暹羅國差来副使等職於成化十二年四月内䝉本國王差来進貢亦因本國為無出産叚疋因中領到國王銀兩前来買辦囬國應用亞等坐駕海船一隻在洋累遭風水至本年八月初二日飄到雷州地方將船打碎呈蒙雷州委官指揮顧雲通判劉鎮等官前来壊船處所體勘是實將方物打撈搬運錦嚢千户所起庫收頓督軍國亞等看守外至本年十二月二十一日䝉欽差鎮守廣東右少監韋眷并三司委官等官前来開盤將蘇木選退水浸虛心朽爛彎節破片不堪進用小木三百五十餘担選退碎象牙俱有破裂痕損刀傷截斷不堪進用碎牙二十餘担彼時三司等官俱欲焚化亞等聞説帶領番衆二百餘人哀情苦告各帶衣幔被水漂失告乞買布度寒當有欽差右少監韋眷并三司委官㑹議相同委見夷人衣單受凍憐憫給還外亞等領囬衆又思議原領國王銀兩買叚其銀船碎失水慮囬本國誠恐有累亞等自雇船隻装至廣東遇見相識簡玉李德二人承攬每木一百觔價銀三兩五錢碎牙每一百觔價銀六兩簡玉承攬蘇木二百五十担碎牙十七担李德攬木一百零五担碎牙三百一十觔其銀約至南京發賣已了交還其價銀二人俱各還足亞等收買各色叚疋囬陪國王免衆後累成化十三年八月内有龍江遞運所住人石彦璋周珍唐㢘錢鵬吳節周璋周實等来亞等船内各立合同文字二家收執為照各包攬價銀替織各色綾叚至十二月終交還於正月十六日囬至龍江驛前周璋同男周實来亞船内攬去官絹一百疋替染虎班絹又攬坤䘵羣謝提官絹一十五疋緑叚長衣一件代染白綿三觔攬户周珍石彦璋等俱還各色叚疋一半止有周璋父子寸絲無還心生謀意揑攀人衆抵搪圖騙國王財本若不狀告追取實被周璋父子負騙夷人財本非止一端反行告衆意要衆人代還亦且周璋非干已之事負騙銀兩反替夷人告衆覊遲時月畨衆無食有違風迅不能囬國恐失下年進貢罪累不便見奉聖㫖沿途備辦日用飲食到今半月餘日並無廪給口粮乞闗存活飬命囬國有此屈抑無伸開單来告等因行間今呈前因臣等㑹同南京守備太監安寧等叅看得周璋所首林壽等所供及使臣坤䘵羣謝提等所告私通外國使臣交易畨貨織造違禁紵絲負騙夷人財本及杜瓉供稱杜文彬即奈英必羙亞係伊房伯先年出外生理不見囬家今在暹羅國差来進貢等情俱係違法重事合當䆒問除行令原差伴送官署丞馬全暫留使臣坤䘵羣謝提等在於龍江驛日逐闗支廪給聽候及將見在人贓送南京刑部問理干礙使臣坤䘵羣謝提等價銀織成未還違禁紵絲等件王文等名下追出安南行人裴凖等原交織造紵絲等物象牙應否給與各使該部徑自奏請定奪外謹具題知乞存留騎操馬匹奏狀據大小教塲神機營新江口馬隊把總都指揮僉事李虎等呈照得天順年間各營騎操馬匹常有一千匹存留下營走陣差撥調用尚且不敷其後為存省京儲事該南京户部奏准每年止存六百匹在城騎操餘皆下塲牧放切縁存留騎操馬匹實是數少非惟走陣不成行列抑且不彀差撥應用即今下塲牧放在邇呈乞多存馬匹在城差操便益等因據此臣等㑹同南京守備太監安寧等議得南京乃祖宗根本重地守備不可不嚴守備之道莫先於軍馬粮草京儲固不可不存省軍威尤不可不振揚近年存留在城騎操馬匹委的數少不彀差操兼且即今京儲存省年久蓄積頗多如䝉乞𠡠該部計議合無將南京各營見在馬匹每遇下塲之時存留一千匹在城騎操聽調照例支給草料喂飬皆要下塲牧放庻使軍威振舉而緩急不致於悞事矣縁係存留騎操馬匹動支草料事理未敢擅便具題王端毅奏議巻四
