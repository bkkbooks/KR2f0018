body:
  text: 王端毅奏議卷八明王恕撰吏部議左都御史馬文升陳言禆益治道奏狀文選清吏司案呈奉本部送準禮部咨儀制清吏司案呈奉本部送禮科抄出都察院左都御史馬文升奏云云等因奏奉聖旨這本所言多切時弊該衙門便看了來説欽此欽遵移咨送司案呈到部看得都察院左都御史馬文升所奏選賢能以任風憲等四事誠如聖諭謹用議擬開立前件伏乞聖裁緣係節奉欽依該衙門便看了來説事理未敢擅便𢎞治元年二月初七日具題初九日奉聖旨準議欽此一查得舊例御史員缺於各衙門辦事半年以上進士及本部聽選舉人監生并行人博士推官知縣教官內選補至成化六年以後拘於正統年間頒降憲綱新進初仕不預選任近該南京禮部精膳清吏司郎中李諒陳言本部議擬今後選用御史於在京各衙門辦事進士與夫曾經一考稱職行人博士及進士舉人出身推官知縣內選年三十以上五十以下人物端莊言語正當操行廉潔才識優長者送都察院理刑半年滿日聽本院考察各注考語連人送部諳曉刑名堪任御史者奏請照缺選補但知縣推官係在外官員訪察未詳合無通行各處巡撫都御史巡按御史各於按屬進士舉人出身知縣推官內從公推舉如前相應之人備開腳色政迹具奏以憑遇缺行取相兼進士行人博士選送理刑不許舉非其人已經題準欽遵外今左都御史馬文升又奏前因誠為選用風憲之良法但恐遇有御史缺多六年以上知縣二年以上進士內相應之人數少必待其有然後選用不無誤事合無通行各處巡撫都御史巡按御史并布按二司官各於所屬曾經一考稱職進士舉人出身推官知縣內推舉年三十以上五十以下人物端莊言語正當操行廉潔才識優長者備開腳色政迹具奏籍記在部遇有御史員缺先儘六年以上行取前來相兼二年以上進士并一考行人博士選送理刑半年滿日聽本院考察各注考語連人送部以憑奏請選用如無相應六年以上知縣推官二年以上進士仍依本部議擬奏準事例於半年以上進士曾經一考稱職推官知縣內選用如此則選用亦可以得人風憲不至於久缺一查得舊例按察司官有缺於法司屬官內推補其知府同知推官知州知縣有原係法司出身及曾在法司辦事者亦得推補如蘇州府知府林鶚推補江西按察使寶坻縣知縣葉淇推補廣西僉事是巳至於斷事理問推官有缺本部臨時斟酌選用而法司辦事進士歷事舉人監生居多但進士及舉人監生俱是挨次取選而舉人監生又係臨選考校或前或後人缺有不相當難以一一照缺對人除補今左都御史馬文升奏稱前因合無今後按察司官有缺先儘法司相應屬官推補其知府同知等官果有諳練刑名政聲卓異者亦得量才推舉斷事理問推官有缺先儘法司辦事進士歷事舉人監生除補次及相應人員所言不許差占斷事理問推官有誤問刑一節係是見行事例但各該官司奉行未至或遇緊急公務往往差遣委的有誤問刑合無行都察院轉行各處巡撫巡按及布按二司今後不分大小公務俱不許違例差遣斷事理問推官妨誤問刑如此則司刑得人刑不枉濫矣一查得舊例知州知縣缺少本部於常選內將該選進士監生及該升官員除補如遇缺多照依大學士李賢奏準事例將聽選監生舉人不分年月逺近揀選考補近該成化二十三年朝覲考察黜退天下知州知縣數多本年四月內於常選外將聽選舉人監生照例揀選考試除補知州知縣共一百九十五員給憑赴任去訖餘有員缺常選陸續除補但州縣數多隨補隨缺未能得完而人民繁夥錢糧浩大去處知州知縣實難其人本部已經題準將成化二十三年第三甲進士取選兼同舉人監生及該升官員通行除補外候員缺數多仍照前例揀選除補所言四川雲南廣西福建路途險逺若待缺到除官不無太遲要行先期除官頂補固為有理若不查勘應否一槩扣缺除補恐前官中間亦有事故一年之上未滿後官將帶家小守候日久不得支俸管事衣食不足求其不為姦民猾吏所餌斯亦難矣合無通行各該巡撫巡按官將所屬州縣正官二考之上九年將滿者按季查奏開具各官歷俸及該滿年月以憑斟酌逺近除補及將新除官員訪察敢有過家留連不即到任者查照成化六年三月內本部奏準選授外任官員過違憑限半年之上不到任者雖有中途患帖不準照例問罪過一年之上者不許到任起送革職為民事例施行若在中途及任所事故去任者所在官司并原任衙門即時具由通行合干上司及徑申本部知會以憑作缺銓補其言布政使按察使知府所係甚大尤宜慎選一節本部遇有前項正官員缺未嘗不廣詢博訪慎擇其人二司正官每員推舉二員請旨簡命一員知府亦精擇一員請旨升用自今以後益當盡心推選以求無負委任如此則正官亦可得人庶務不至廢墜矣一查得舊例兩京各衙門屬官三年六年九年考滿先從本衙門堂上官考核送都察院覆考又送本部覆考從而黜陟以示勸懲近年各司因循茍且所出考語不辨淑慝虛應故事及至覆考得實其平常官員輒便造謗托拾以致考核不行無所勸懲誠如左都御史馬文升所言合無通行兩京各衙門知會今後屬官考滿堂上官務秉至公詢訪得實出與考語善善惡惡定為確論送都察院并本部覆考如原來考語平稱得當續出考語不嫌雷同若有不當聽覆考官從公考核其被考平常之人敢有仍前造謗托拾許御史等官指實劾奏拏問平常者降調外任有贓者罷黜為民若覆考挾私不公一體治罪其有前考平常後考中間能深自懲艾勉於為善者亦宜書稱前考稱職後考中間放肆改節者亦書平常以憑黜陟如此則勸懲無私而官僚知警矣嚴考察以勵庶官奏狀考功清吏司案呈奉本部送吏科抄出南京河南道監察御史吳泰等奏云云等因具本奏奉聖旨這考察事吏部看了來説欽此欽遵抄出到部送司查得成化四年該科道官魏元等奏要考察兩京大小衙門官員本部奏奉憲宗皇帝聖旨是有堂上官的還會堂上掌印官公同考察欽此巳經會官考察外成化十三年又該御史戴縉奏要考察兩京五品以下官員本部查照前例具題節奉憲宗皇帝聖旨還照例會官考察欽此欽遵又經會官考察訖案呈到部看得南京河南等道監察御史吳泰等奏稱兩京堂上官并在外司府州縣官巳經考察獨兩京各衙門五品以下官員年久未經考察其間才行可稱者固多而貪冒茍容者亦有要行兩京吏部會同兩京都察院公同各衙門堂上掌印官從公逐一考察一節臣等竊惟兩京堂上官并在外司府州縣官節經糾劾考察黜退惟兩京五品以下官委的年久未經考察不無賢否混淆誠如吳泰等所言合無準其所奏照依前例在京者本部會同都察院并公同各衙門堂上掌印官將五品以下現任帶俸并丁憂公差養病省祭等項官員從公逐一考察除廉幹公勤才行超卓者遇有內外相應員缺另行具奏擢用職業頗修操履不失者存留辦事外其貪淫酷暴罷軟老疾素行不謹浮躁淺露者開具職名奏請定奪如考察不公仍聽科道糾舉其被黜之人若有造言生事托拾妄奏者治以重罪發遣為民仍行移南京吏部會同南京都察院等衙門一體考察徑自具奏定奪其言要嚴立嵗考之法在京諸司堂上掌印官及在外布按兩司并各府掌印官每遇年終各將本衙門及僚屬官員廉貪能否勤惰得失緣由斟酌的確考語造册三本一本奏繳一本送吏部一本送都察院查照一節仰惟國朝定制內外官員巳有三載考績三考黜陟之典外官又有朝覲考察之例若再更立嵗考之法不無事體紛更難準所擬合無仍照舊例通行在京在外前項衙門堂上掌印官如遇所屬官員三年六年九年考滿之日務要從公嚴加考核所出考語亦要允協公論不許徇情虛應故事以致賢否混淆黜陟不當事發連坐以罪緣係考察官員及奉欽依這考察事吏部看了來説事理未敢擅便𢎞治元年二月十九日具題當日奉聖旨是欽此論釋奠禮奏狀近該禮部儀制清吏司手本內開皇上於今年三月三日幸太學釋奠先師孔子以臣為分獻東哲官榮幸莫大焉竊觀儀注內一段開稱導引官導上詣大成殿陛上典儀唱執事官各司其事執事官各先斟酒於爵候導上至拜位贊就位百官亦各就拜位四配十哲分獻官各詣殿陛東西階下兩廡分獻官各詣廡前俱北向立贊迎神樂作樂止贊上鞠躬拜興拜興平身通贊百官行禮同贊搢圭上搢圭執事官跪進爵樂作上受爵獻畢復授執事官奠於神位前樂止贊出圭上出圭四配十哲兩廡分獻官以次詣神位前奠爵訖仍以次出殿門外東西向立典儀唱送神樂作樂止贊上鞠躬拜興拜興平身通贊陪祀官行禮同導引官導上由中道出分獻官以次退若依此儀注則分獻官始終不拜矣皇上拜陪祀官俱拜獨分獻官始終不拜恐非禮也臣愚以為分獻官拜位當在殿陛之下列於陪祀官之前贊迎神上在殿陛上拜分獻官陪祀官俱在殿陛下拜上獻爵畢分獻官以次詣神位前奠爵訖復退於殿陛下原拜位立定贊送神上拜分獻官陪祀官俱拜似為近禮臣讀禮記文王世子篇有曰凡學春官釋奠於其先師秋冬亦如之此言春官之釋奠主於行禮非報功也故無幣又曰凡始立學者必釋奠於先聖先師及行事必以幣此言立學事重故釋奠必以幣今皇上嗣登大寶初幸太學即所謂始立學也臣愚以為釋奠當用幣爵亦當三獻今儀注內無獻幣之禮是行春官釋奠之禮非始立學釋奠之禮也似為未安或以為舊儀注如此臣以為舊儀注是則當從之或有差誤亦當更之以求合乎宜似不可以訛承訛也如蒙乞下臣言於禮官會同翰林院官議之然後行事則聖明幸學釋奠之禮庶幾合乎宜而可以傳之於後矣臣向奉聖旨事有當言的盡心來説欽此臣隅有所見不敢不言言之當與不當有不遑計也具本𢎞治元年二月二十五日奏奉聖旨禮部看了來説欽此次日禮部覆奏奉聖旨分獻官拜禮準行其餘只照舊欽此論吏典丁憂奏狀稽勳清吏司案呈該刑部陜西清吏司辦事吏姚仲良成化二十一年八月二十三日聞母李氏在家病故告要依例守制該司恐有詐冒拘留不放類行本吏原籍河南查勘來報本吏又行具奏奉憲宗皇帝聖旨吏部知道欽此欽遵抄出送司為無辦事衙門公文送到連人送去該司查理該司又行查催未報間本吏辦事巳滿告撥外考去訖今河南布政司方才勘報前來案呈到部查得諸司職掌內凡內外官吏人等例合丁憂者仍以聞喪月日為始不計閏二十七箇月服滿起復今辦事吏姚仲良成化二十一年八月二十三日聞喪具告刑部該司要回原籍守制該司恐有詐冒類行原籍查勘至今三十箇月有餘才方回報以聞喪日為始扣至成化二十三年十一月二十三日巳該服滿查得本吏於𢎞治元年正月二十一日願撥外考去訖若不令本吏守制則恐自此廢守制之典是使人以不孝也合無自文書到彼日為始就令見役官司給與文引照回原籍依例守制滿日起復仍通行在京各衙門知會今後遇本部該司行查丁憂吏典查無粘帶等項違礙即便送部照例放回本部徑自類行查勘定奪不許似前拘留行查以致遷延嵗月不得依例守制非惟不近人情抑且有傷風化緣係吏役守制事理未敢擅便𢎞治元年二月二十四日具題次日奉聖旨是欽此再論釋奠禮奏狀昨見禮部行來皇上幸太學儀注內開釋奠先師孔子迎神皇上兩拜陪祀官亦兩拜分獻官却各詣大成殿陛東西階下向北立不拜送神皇上兩拜陪祀官亦兩拜分獻官却出殿門外東西向立亦不拜臣以為皇上拜陪祀官亦拜獨分獻官不拜恐非禮也臣又見禮記有曰凡始立學者必釋奠於先聖先師及行事必以幣注云行事謂行釋奠之事必以幣必奠幣為禮也言始立學而行釋奠之禮則用幣四時常奠不用幣也今釋奠儀注止開獻一爵而不奠幣故臣以為釋奠當奠幣爵亦當三獻乞下禮官會議該禮部議奏奉聖旨分獻官拜禮準行其餘只照舊欽此且臣言用幣者是據禮經而言非無稽之言也或以為天子視學不為祀先師孔子只可行釋奠禮不必用幣爵亦不必三獻臣又以為我朝列聖即位各止耕藉田一次幸太學一次若於禮文少有未備後欲更定而行之不可復得雖悔無及臣欲再為陛下言之因見日期促近巳有成命不敢復言心實不安今既阻雨另行擇日行事臣若不言是為自欺非忠也夫釋奠之禮既用牲用樂而獨不用幣既行分獻禮而於先師孔子前止獻一爵豈非缺典又且差官取孔顔孟三氏子孫前來使之觀禮賜紵絲衣每人一套又賜宴又賜國子監祭酒司業紵絲衣羅衣各一套學官三十餘員每人紵絲衣一套又賜在廷大臣宴於奉天門所費頗多何獨於先師孔子而吝幣哉若謂此舉只為幸學不為祀先師孔子且如耕藉田亦只是為耕藉田非為祀先農也如何祀先農奠幣行三獻禮而獨於幸太學釋奠之禮不然况祀先農行各衙門官齋戒太常寺光祿寺又奏省牲而釋奠之禮既不齋戒又不奏省牲何其詳略之不一如此豈未之思乎臣竊惟皇上即位勸農勸學之禮止行一次而不至再至三者惟耕藉田幸太學二事而巳其禮皆當從厚不可有所偏重以貽日後之悔昔太宗皇帝將幸太學命禮部詳議禮儀尚書鄭賜言宋制謁孔子服靴袍再拜太宗皇帝曰見先師禮不可簡必服皮辨行四拜禮其事載諸五倫書人以為太宗皇帝尊師重道之意超越宋之諸君逺矣今陛下釋奠先師禮比祀先農之禮而行之似不為過異日載諸史册傳之千萬世豈不為盛美之事哉如蒙乞敕禮部集議明白奏請定奪而行之以成萬世不刋之典不勝幸甚若臣言妄誕甘受顯戮煩言如此塵瀆聖聽豈勝惶怖之至𢎞治元年三月初三日具題次日奉聖旨這本禮部便會詹事府國子監翰林院春坊官詳議來説欽此該禮部等衙門官會議具題奉聖旨是尊先師當以禮既成化初年有所舉只孔子前加幣用太牢改分獻為分奠其餘儀物俱照永樂年例行欽此議知府王衡陳言停止納財充吏奏狀驗封清吏司案呈奉本部送吏科抄出直𨽻廣平府知府王衡等奏云云等因具本該通政使司官於奉天門奏奉聖旨吏部知道欽此欽遵抄出到部送司查得成化三年十月內該浙江嘉興府知府楊繼宗奏稱納米農民俱係奔競無藉之徒營求請託借債納米若得參充瞞官作弊要乞革去照依洪武年間舊例著落里老呈報相應識字農民參補等情本部已經依擬題準通行天下遵守去後又查得成化二十一等年該陜西山西宣府江西等處巡撫右副都御史等官鄭時等各因地方災傷賑濟軍馬糧草缺乏節次奏準定與則例生員上納銀米入監讀書在京在外吏典承差知印上納銀米草束或免辦事考試就撥當該或免當該考試就與冠帶各照資格出身或聽選不拘年分不次選用除生員事例停止外其餘俱各見行及查得自成化二十一年起至𢎞治元年二月終止吏典人等納過糧草等項巳到部者共二千一百五十餘名生員納過銀米巳入監者共六千餘名通查案呈到部訪得永樂宣德正統年間天下亦有災傷各邊亦有軍馬當時未嘗舉行納糧草納銀兩為監生為吏典等項事例糧草不聞不足兵民不聞困斃近年以來各邊并腹裏小有災傷所在守土等官止圖目前分寸之利不為國家長久之謀輒便奏開生員吏典人等納糧草銀兩等項事例彼此效尤遂為長䇿殊不知祖宗教養生員參充吏役良法美意各有攸在且如生員選於民間俊秀子弟教養於學校成材者科貢入監不成材者充吏為民未嘗不别賢否一槩濫進也其吏役亦必於農民之中選其識字能書者充之令其書辦文案及其兩考役滿赴部辦事數年才撥京考京考滿日考中才得冠帶不中者發回為民亦未嘗不論能否一槩入選也近來因有前例是以在學無志生員及未入學富家子弟揑作生員名色不分賢否有無學識一槩入監以圖出身將來入仕不知為政之道豈不誤事殃民一切小民不分能書與不能書不論市民與農民一槩聽缺充吏不惟官司不得伊書辦文案且於舊制有違及其三考役滿又免考驗一槩照依資格出身所以多不稱職比先年間監生止由科貢吏典亦循年資别無雜進之途是以聽選之人不多選法不致壅滯任用亦多得人自有此例雜進者日多一日以致正途監生吏典因而壅滯不得出身多者十七八年少亦不下十五六年才得選用年已向衰誰肯盡心幹事不謀歸計甚至聽選年老例不入選只與冠帶間住又况此等雜途所進中間多負債破産頑鈍無耻之輩今日既知以財進身他日豈肯以廉律巳欲不貪財害民天下治安何由可得若不早為處置日復一日不但有壞選法而正途有壅滯之苦抑恐官授非人而小民遭無窮之殃誠不可不慮也今廣平府知府等官王衡等奏要今後遇有災傷凡百長䇿任其施為不許再擬納財充吏永杜貪利之門一節實端本澄源之論深為有理方今皇上嗣位之初萬化維新凡此弊政正當除革合無準其所言通將前項陜西山西宣府江西奏行納糧納草等項事例限本年四月以裏通行停止仍行户部并各處巡撫巡按鎮守等官先時預慮多方儲蓄務使緩急有備不致臨期告乏今後遇有災傷及邊方糧草不足不許再行奏開前項生員吏典人等納草等項事例貽患將來其在外補充吏典仍行天下司府等衙門各遵舊制於農民內選充不許一槩濫收如此則非才不得幸進而選法自通任用可以得人而民生自遂實為便益緣係停止納粟等項事例以防後患及奉欽依吏部知道事理未敢擅便𢎞治元年三月初四日具題當日奉聖旨是欽此議評事魯永清均官審録奏狀文選清吏司案呈奉本部送刑科抄出大理寺右寺右評事魯永清奏云云等因具奏奉聖旨該衙門知道欽此欽遵備抄送司案呈到部竊惟官因事設事繁則官多事簡則官少理固然也在前大理寺左寺分管在內文武衙門有犯官吏及各衛所并北直𨽻軍旗南直𨽻軍民罪囚以其事簡故設評事四員審録右寺分管北直𨽻及天下司府州縣衛所官吏軍民罪囚以其事繁故設評事八員審録今右寺該管天下罪囚例不解審而評事員數仍舊委實過多一向無人言及所以未嘗裁減此右評事魯永清所以言之也及查得南京大理寺左右寺寺正寺副評事員數俱與在京大理寺相同其後南京大理寺因是事簡左寺裁減寺副一員評事一員右寺裁減寺副一員評事五員今在京大理寺所審罪囚視南京大理寺頗多合無將大理寺左寺寺正寺副評事照舊不動將右寺評事裁減四員如此則官無冗員事宜不誤似為允當但今右寺評事八員俱全若就裁去四員緣兩京與評事相等七品官員缺數少令其住俸聽選於人情又似不堪合無俱暫留在任管事待其升除事故等項去任四員再不除補似於公誼人情兩不相失緣係裁減官員及奉欽依該衙門知道事理未敢擅便𢎞治元年三月二十一日具題二十三日奉聖旨是欽此議右給事中王珦陳言時務奏狀文選清吏司案呈奉本部送準禮部咨户科右給事中王珦奏云云等因具奏奉聖旨該衙門知道欽此欽遵抄出移咨送司案呈到部查得見行事例監生取選考試舉人監生文理平順者多相應多除府佐知州知縣等官職事嵗貢應例監生文理平順者少相應多除以縣丞主簿等官職事嵗貢應例監生視舉人監生數多但上選之時不得均勻舉人監生有接連五七十名者亦有百十人中舉人不下十數名者若前項府佐州縣正官缺多舉人該選者數少未免將嵗貢應例監生除以府佐州縣正官若前項缺少舉人該選者數多不免將舉人除授縣丞主簿等官例此而行似未停當及查得成化十五年上選南監監生余紹夔起至路魁止百人中有八十二人俱是舉人若欲一例取選一時豈有許多府佐知州知縣不無亦選縣丞主簿等項職事未免有枉才小用之誚今右給事中王珦要將舉人遴選另置一簿遇州縣正官府佐二員缺挨次銓補似為有理但嵗貢應例監生內亦有可用之人若將舉人另置一簿不惟立法太拘抑恐起人爭競况前項選簿資次巳定相傳年逺遽難更動合無將聽選舉人監生照缺斟酌取用如相應員缺數多則量為揀選多取幾人相應員缺數少則少取幾人餘者存留以待下選所取舉人與同嵗貢應例監生一體考試其嵗貢應例監生若有文理平順考在優等者亦授以府佐州縣正官舉人如或文理不通考在中下者亦授縣佐等項職事擬除如此庶幾選法公而得器使之宜人心平而無咨嗟之聲緣奉欽依該衙門知道事理未敢擅便𢎞治元年五月初十日具題十二日奉聖旨是欽此調除官員奏狀文選清吏司案呈照得大理寺缺左少卿一員合行照例具缺推舉等因到部臣等看得前項員缺須得法司出身練逹刑名識見老成之人方可銓補今有南京太僕寺少卿唐章起復待缺論品級相應銓補但唐章不係法司出身體得太僕寺少卿楊謐係御史出身練達刑名堪任大理寺少卿若將楊謐改大理寺少卿將唐章銓補楊謐太僕寺少卿員缺似為允當緣係調官補缺事理臣等未敢擅便定奪伏乞聖裁𢎞治元年五月十三日具題十五日奉聖旨大理寺右少卿李介升本寺左少卿楊謐升大理寺右少卿唐章改太僕寺管事欽此議給經歷張黻誥命奏狀驗封清吏司案呈奉本部送吏科抄出南京左軍都督府經歷司巳故經歷張黻男張琳奏云云等因具本奏奉聖旨吏部知道欽此欽遵抄出送司案查𢎞治元年四月十四日該張琳奏要請給故父張黻誥命為因查無事例已經立案訖今又奏前因查得張黻由進士先任直𨽻鳳陽府宿州知州該巡撫南直𨽻左副都御史張瓚奏保本官持身端謹辦事公勤乞要量加旌異為照本官未曾給由到部考核案候後本官升任後軍都督府經歷司經歷成化二十年九月內刑部署員外郎事主事林俊為劾奏梁方等拏送錦衣衛問降調雲南姚安軍民府姚州判官張黻進本解救林俊亦蒙拏送錦衣衛問調除雲南師宗州知州後蒙憲宗皇帝特旨復林俊張黻之職張黻改除南京左軍都督府經歷司經歷及行準考功清吏司付查得成化二十二年六月內該南京吏部咨開南京左軍都督府經歷司經歷張黻三年考稱緣由前來案候間本官病故未曾引奏復職又查得成化十九年十二月內該太醫院巳故院使張福興男張琰奏稱有父由醫士歷升院使不期身故雖三任京職因未考滿應得誥敕俱未請給等因具本奏奉憲宗皇帝聖旨準他應得誥命給與該衙門知道欽此欽遵本部已經欽遵覆奏給與誥命訖案呈到部看得南京左軍都督府經歷司經歷張黻始由進士任知州任內曾經奏保旌異例該給與誥命為因不曾考滿未得請給後任經歷三年考稱亦該給與誥命為因不曾引奏復職亦未請給今伊男張琳奏要比照院使張福興沒後給授誥命事例請給本官應得誥命切緣張福興係一時特恩難以為例但張黻存日只因救林俊得罪林俊之劾梁方自分必死張黻亦以死自處解救林俊皆可謂直言忠諫不畏死難之臣今林俊已蒙聖恩升用天下稱快張黻未蒙升用而死情實可憐况張黻三年經歷已滿又經考稱當給誥命止因未引復職未曾得請今張黻已死而其父現在欲乞聖恩憐憫合無不為常例特賜本官應得誥命使其父受封於生前而張黻亦瞑目於地下庶可旌忠諫之臣而為天下勸矣緣奉欽依吏部知道事理臣等未敢擅便定奪伏乞聖裁𢎞治元年五月十七日具題次日奉聖旨張黻應得誥命與他欽此王端毅奏議卷八
