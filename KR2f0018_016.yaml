body:
  text: 介菴奏議序古有謨若禹曰克艱臯陶曰知人安民益曰無怠無荒迺臣告君之嘉言爾後之章奏即謨也其紀綱之大體義理之至情政事之要道具於是闗繫大矣哉盖自古人君莫非忠臣弼而朝廷正天下理以經綸大經謀猷大業天工其代股肱倚毘不可相無而相舎故用其言則國福以興棄其言則國禍以亂若龜筮之孚灼然而不誣者然臣必能盡其忠俾君其堯舜君民其堯舜民庶幾無負所任而亦不過為分内也何忠者為麟角為鳳嘴靳靳乎不多見邪忠其難矣乎夫忠者盡其所當然而無歉焉爾盡已則盡物盡物則盡道非循天理弗能也非持大義弗能也非抱貞固弗能也非純誠不欺弗能也非剛直不阿弗能也非大公無私弗能也能焉則政無不舉知無不行陳其善閉其邪利害當機極言無諱巳不求知而自為人不見知而不悔烏有嫌疑窺避哉盡已而已矣若今大司馬陜右王公其人焉公號介菴歴事三朝敡厯中外幾四十載讜論滿朝廷忠名滿天下始評大理平反克允刺揚州吏民赤子布政江西河南長城數千里撫荆襄撫中州總河防撫雲南守陪都撫南畿安危康濟居司寇居司徒居司馬都臺憲佑辟經邦前後章疏餘二百上真大體立於紀綱至情切於義理要道深於政事偉哉言乎古人之心也使今征求息而民力甦權姦伏而士氣作君心明而成憲彰是誰之功歟盖公存心以道始末惟忠蓄有學問本源施為實用其厚如此所以揚翹特立風采凝峻盛徳休望光明正大為國之楨也詩云衮職有缺惟仲山甫補之公其謂歟書曰政貴有恒辭尚體要今公之言忠誠剴切流出肺腑而無縭繪之浮辭可謂深得乎體要者矣將見千載之下讀之者未必不與陸宣公之奏議諸葛武侯之出師二表並稱也耶公懋辱厚公雅敢以荒謭辭謹載拜序其槩成化十八年壬寅十二月吉日無錫陳公懋書書介菴王公奏稿後往在憲宗朝聞三原王公為南京部臺章奏迭至奉㫖施行者固巳録之有司播之四方其留中不報者世莫得而𫝊也公既為今天子簡用復起為吏部有𫝊其家所藏奏稿者盖自為評事為知府為布政凡所嘗陳奏舉劾者皆在焉觀其剖析事理論法㫁獄人或能之至於批鱗苦口排大姦摧巨敵身任天下而不為私謀者則卓乎不可及也夫内告外順見于君陳之命先儒以為此固成王之言非文武之言也中古之世或匿諫草而不以示人甚則焚之世俗相𫝊以為美事議者則以為孔光之徒匿姦釣譽之為者故韓魏公諫垣存稿寧不避賣直之嫌而彰人主従諫之美豈無所見而然哉若王公所諫奏所舉劾盖有削兵權黜侍近而元惡大憝亦有肆諸市朝者則公之忠先帝固鑒之深矣雖有危言極論未暇宣布然亦優而容之未始有譴怒訶責之語盛徳所在亦豈容掩而不彰哉使天下𫝊之後世𫝊之謂公之言如此而先帝之所以容之者如此則未必非是稿之助也𢎞治壬子四月六日中順大夫太常寺少卿兼翰林院侍講學士經筵講官兼修國史長沙李東陽書王端毅奏議後序
