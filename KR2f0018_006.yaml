body:
  text: 王端毅奏議卷六明王恕撰復參贊機務轉南京兵部尚書參贊機務謝恩疏臣向蒙聖恩以兵部尚書兼都察院左副都御史巡撫南直𨽻成化二十年五月十九日欽奉本月初七日敕諭改臣南京兵部尚書參贊機務者臣孤忠少與他技非長罄竭一得之愚巡撫五年之久悃愊屢陳未遂歸休之願焦勞方切忽承簡擢之恩俾掌夏官仍參留務矧南京乃祖宗根本之地尚書實古昔納言之官雅宜妙選竒才詎料仍推衰朽顧難回於成命肯少負於初心爰茲瀝血以輸誠終擬鞠躬而盡瘁除望闕謝恩到任管事外具本専差指揮石文通齎捧稱謝謹具奏聞督修孝陵查算工料數目奏狀成化二十年五月十九日節該欽奉敕命臣同守備太監張本嚴督內外該管官員查勘實在用工官軍匠作毋令空間役占計算在官物料併價銀及支給錢糧毋令冒支妄費仍逐日併工修造早為完備欽此臣謹遵奉聖訓會同守備太監張本并內外守備官恭詣孝陵叩頭訖當同內外管工官太監鄭強隆平侯張祐侍郎劉俊等遍歷工所看得孝陵殿宇門廡碑亭等項俱巳裝修完備惟明樓已抓縛鷹架未曽拆修有鄭強等説稱斗科已造成五十餘座因是原料明梁大楠木三根坐派四川布政司採辦南京工部巳差營繕清吏司主事吳湜前去催儹未到以此不敢拆卸又看得周圍牆垣除修完外止有一千七十丈未完臨及漿糨房牆垣損壞六十五丈未嘗修理各官説稱前牆係是原未計料之數臣等除行南京工部復差虞衡清吏司主事施恕馳驛前去著落四川布按二司官吏併行分巡分守官嚴督該府縣官吏委官量起人夫採打拽運及行四川巡撫都御史孫仁督發併工督令管工官將前項未修未􅩘牆垣俱巳修􅩘完備於本年六月初五日疏放軍夫匠作暫且歇工當將現在未用物料責令南京內官監監工內使張秀等并工部委官看守及今孝陵衛委差官軍輪流日夜巡綽行查前後修完工程用過物料役過軍匠支過工錢口糧并原派未到物料備細數目附卷欲候催儹楠木至日另行擇日興造明樓緣係奉敕令臣等併工修造早為完備事理未敢擅便今將各項總數開坐具本専差千户姚鉞齎捧謹題請旨論撥船事宜奏狀車駕清吏司案呈奉本部送於內府抄出兵仗局署局事內官監左少監葉深先於成化十八年八月十八日欽蒙差臣等前往南京兵仗局成造盔甲等件除欽遵外照得所造盔甲擘手鐡袴等項俱係鋼鐡砑明紵絲紬絹之物起運之時比與别項錢糧匱扛至重所差船隻數少每遇河道灣淺一時難以動移又恐水氣侵尅以致發秀塺浥不便今後起運軍器之時合用馬快船隻合無照依各衙門事例每隻裝載十匱等因奉聖旨是該衙門知道欽此欽遵移咨到部送司案查成化十九年五月初十日該南京守備太監安寧等揭帖該兵仗局印信揭帖開報造完軍器四千五百件裝盛四百二十二匱用船裝運本部照依節奉欽依事理委官會同南京科道等官看裝每船裝一十三匱裝運到京交卸並無發秀塺浥續因裝運官物及進貢等項用船數多現在船隻不敷本部通行各衙門該運物件議擬則例具奏要將兵仗局軍器酌量可裝二十五匱本年九月二十八日兵部題奉聖旨都準擬欽此欽遵成化二十年正月內起運軍器七千二百件裝盛六百七十四匱其管運官不肯照依本部奏準每船裝二十五匱則例裝運每船止裝一十七匱亦運到京交卸亦無發秀塺浥今本官又奏要照各衙門事例每船止裝十匱查得南京工部起運上用創金描金硃紅膳盒等件俱用黃羅銷金袱子黃絨繩索及匱桶裝盛比與軍器匱扛大小多半相等每船實裝六十餘扛近來內織染局起運上用段匹每船亦裝一十三匱别無每船止裝十匱則例今却要每船裝十匱委的近來欽取供用香料并木植等項用船動以百計工部該運儀真厰甎料合用馬快船二十隻一年二運今無一船可差况南京各衙門年例起運時鮮及應付欽差回京人員各處進貢方物等件用船數多實難措辦臣恕亦非不欲其喜而欲其怒但差多船少不勾撥用豈得已也如蒙合無仍照本部照奉欽依事理將前項軍器每船裝二十五匱及各衙門一應起運物料俱照節該奏準儘船裝載事例及議擬則例而行不許管運人員自定扛數多討船隻煩瀆聖聽如此庶得事體歸一船隻彀差而裏河軍民拽船之勞亦可寬矣陳言山陜救荒奏狀臣伏聞邇來禮部題稱陜西山西山東河南北直𨽻災傷查得成化二十二年例該各處僧道關給度牒合無令其就彼納米給與等因奉聖旨是僧道官有缺亦著納米選用還酌量則例來説欽此又聞鎮守湖廣太監韋貴等稱山西陜西河南北直𨽻地方荒旱飢民南流數多日有萬口經過欲照例驅治又恐激變欲發倉廪賑濟官糧有限合無通行山西陜西河南北直𨽻巡撫都御史督令各該州縣將新舊流民令該管里老招撫復業等因奉聖旨該衙門知道欽此又聞太子太傅吏部尚書兼華蓋殿大學士萬安等題稱邇聞陜西山西地方亢旱無收陜西尤甚人民缺食死者無算填滿溝壑嬰孩路傍啼哭不絶合無將儒學生員不分地里逺近有納米者廪膳納米八十石增廣納米一百石俱赴陜西缺糧倉分上納本布政司起送國子監讀書挨次選用其軍民舍餘人等有願納米者授以軍職百户納米二百石副千户二百五十石正千户三百石指揮照例加米定與衛分帶俸間住俱赴陜西缺糧倉分上納具奏奉聖旨是該部知道欽此又聞差侍郎耿裕徐溥祭告西嶽西鎮西海大河之神臣有以見皇上與諸大臣畏天憂民救荒恤患之心可謂無所不用其極雖雲漢之詩所謂旱既大甚散無友紀靡神不舉靡人不周者何以過之臣惟陜西山西地方連年災傷米價貴甚閭閻小民貧難殷實者少雖奉上項恩例恐願納者寡焉能濟衆又訪得南直𨽻浙江江西湖廣今年頗收僧道生員軍民舍餘中間亦恐有願如恩例上納以圖補報者合無請敕每處差給事中御史郎中等官三二員分與府縣令其馳驛前去會同彼處巡撫巡按等官督同分巡分守官分投詣屬出榜召募前項人等各照米數每石令其納銀一兩給與文憑關領度牒照缺選用入監讀書及為指揮千百户等項其銀就令原差領敕官南直𨽻湖廣銀兩送陜西浙江銀兩送山西江西銀兩送河南俱公同巡撫巡按等官差委能幹司府官員分投詣屬給散缺食人户隨銀多寡每月驗口或給二錢或三錢令其自行買米救濟其各處流民之在荆襄者彼處鎮守等官既稱不可驅治又稱無糧賑濟要令各該巡撫都御史督令該管里老招撫復業緣里老亦多流移料無可差之人就彼有人可差各户家業巳失田野無望又無口食豈能回還臣思流民缺食無計聊生拊揗失䇿必為盜賊勞師動衆所費益多合無將湖廣今年該起運南京各倉及兌軍秋糧量留一二十萬石運赴荆襄水次倉賑濟流民以銷後患又將河南該兌軍秋糧量留一二十萬石運赴荆襄水次倉賑濟流民以銷後患又將河南該兌軍秋糧量留一二十萬石賑濟本處飢民及四方流來之民如河南兌軍糧米無徵亦須别作擘畫仍敕各處巡撫巡按提督三司委官如有流民到於該管地方即便加意賙恤不許驅逐致令失所且人一日不再食則飢兩三日不食則病不能起五六日不食則死此救荒當如拯溺救焚可急而不可緩緩則無及矣臣深慮召募僧道生員人等銀兩急不能得有誤賑貸合無先出內帑銀二三十萬兩火速發去陜西山西河南賑濟如內帑不足請諭貴戚近臣及在京巨富之家那移前去切不可緩待後召募有銀之日照數酬還仍乞降詔將被災府縣今年稅糧買辦等項盡行蠲免如此庶幾全活生靈潛消後患易危就安轉禍為福有以見皇上深仁厚德而有生之類蓋將感戴於無窮矣救林俊張黻奏狀臣恕荷國厚恩庸劣無補惟願聖德尊顯天下乂安俾臣得俯仰於無事之天沒齒於太平之日為幸大矣邇聞刑部主事林俊上章陳言忠誠激烈詞氣過直冒干天威謫官逺方後府經歷張黻為林俊陳情亦蒙拿問臣恕當以林俊等為戒括囊全身今復昧死而言者非納交於林俊等而為其遊説也實為國家天下慮耳方今之時外而邊陲烽煙未靖軍士暴露內而郡縣旱荒太甚民飢而死此誠陛下憂勤惕勵詢謀羣䇿極力救濟以收人心之時奈何興土木之役為佛氏之居蓋聞僧伽之言張大佛法之功於以尊之崇之資其利益以福斯民而延國祚也殊不知三代以前無佛法而帝王厯數率皆綿逺三代以後崇信佛法而帝王運祚未聞過之以此觀之佛法之無益於世也明矣其不足信也審矣且天地生成萬物祖宗創業垂統孔子明道立教其功其德豈佛氏所能髣佛萬一然而京師止設一壇以祀天地內府止設一太廟祀祖宗京都以及天下都邑亦各止設一文廟祀孔子就使佛法有靈而其功德可比隆於天地祖宗孔子其佛寺亦不宜多於天地祖宗孔子之壇廟也今都城內外佛寺不知有幾千百區兹又欲營建佛寺於皇城之側遷移軍民數千百家計費帑藏銀數十萬兩似為過之然安土重遷人之情也今一旦拆人房屋使之遷於他處欲人心安得乎帑藏銀兩所以備兵荒也今乃以為建寺之資使民飛挽於道路轉死於溝壑欲人心悅得乎人皆知此事之非宜而不言獨林俊言之者是林俊能盡忠於陛下而不顧身家也人皆私議以為林俊之言是亦無一人公言於朝獨張黻言之者是張黻亦能盡忠欲陛下納諫旌直以隆治道亦可嘉也今皆不之省而悉置之於法此臣之所未喻也臣恐由是人皆以言為諱設有讒佞之害正姦邪之誤國誰復言之陛下何由以知之又造宫殿為梁為柱大楠木南京各厰已無一根近來修孝陵明樓差官前去四川遍歷山谷尋採五年僅得五根數內堪中者少不堪者多起動數千人夫止拽一根到於水次餘者尚未出山此等大木誠為難得不知在京各厰現有堪作大梁大柱楠木幾多可彀幾座宫殿之用誠不可不愛惜以備用也陛下仁如帝堯孝同大舜自踐祚以來不畋獵不遊幸未嘗妄興一旅之師亦未嘗妄戮一無辜之人誠不世出之明主大有為之聖君也不意偶然有此蓋未之思耳此臣之所以日夜凛凛而不能巳於言也伏乞聖慈收雷電之威解恢恢之網復林俊等之職慰天下人之望暫停建寺之役専理兵荒之政如此庶幾遐荒向化九有歸心宗社可以鞏固天命可以永保矣臣無任戰栗待罪之至成化二十年十一月十九日具題定奪修城營葬工料奏狀準工部咨營繕清吏司案呈奉本部送於工科抄出應天府府尹于冕等奏據上元等縣申據神泉等鄉里老葛再等呈照得南京外羅城周圍一百三十餘里城門一十七座比先年間原係工部委官驗工計料差撥人匠軍夫修理近年以來遇有城垣坍塌應天府與工部分修現今各縣一年一次或二次起撥人夫多者一百四五十名少者六七十名每夫集價銀一兩動經七八百兩至一千餘兩及南京內官病故造墳安葬亦係民間撥夫集價遞年出辦負纍人難况南京積年起運惜薪司光祿寺安王妃等處柴薪夫價光祿寺挑酒夫價竹籬扛索價并修理鰣魚厰內織染局攙缸煉灰價銀及現今內府成造段匹揀選香炷欽差內外官員往來日逐供給下程僉撥皂𨽻搬運柴薪挑送糧米等項并手下役使厨役等類俱要供食一年之內出銀動以數千兩計以此科派繁重委的困苦無伸呈乞轉達將修城造墳二事量與寬減等因到府臣等看得外羅城所以環衛南京大城宗社宫闕之所在帑庫倉場之所積遇有坍塌損壞雖舉天下之工力修理亦不為過但本府所轄止是七縣內有江浦六合二縣係在江北里少民貧動輒移逃難以科差外惟有上元等五縣可以差撥加之地方連年旱潦相仍人民缺食困苦之極况外羅城周圍里數闊逺城門不止一座南京工部原有湖廣江西福建三布政司所屬府州縣人匠工料數多原設有修倉主事一員就管修城専理其事今本府蕞爾七縣遞年與南京工部分工修理况本府亦無現在人匠俱是將價銀雇覔南京工部管下人匠用工修理委的事體未當合無今後將坐派本府修城夫價以十分為率本府出辦二分其八分灑派附近直𨽻蘇松常鎮太平徽州寧國安慶池州等九府照依府分人民多寡出備大約一處集價不過銀六七十兩一年一次預先解送南京工部交納遇有城垣坍塌本部就委原管修城主事驗工計料一併修理如此則非但畿甸之民得以少寬抑且灑派不多外郡之民不致纍負况南京工部遞年得此工價不須别項勞費庶可經久常行其內官病故造墳一節緣內臣平昔俱曽效勞造墳之禮固不可廢但南京工部原無定例遇有坐派夫價工料等項往往多寡不一合無查照在京近年司禮監太監許安御馬監太監劉永成等病故工部造墳安葬事例行移南京工部照例遵守施行借撥本府夫匠一槩停止庶不至於勞民傷財臣等竊惟南京乃祖宗根本重地上元等七縣皆京畿之民比之他處尤當時加愛養不宜日漸疲憊伏望聖明裁處乞敕該部將前項修城等事量為寬減處置以蘇民困以固邦本臣等職在養民昧死冒干天聽不勝恐懼待罪之至為此具本該通政使司官於奉天門奏奉聖旨該部知道欽此欽遵行據順天府查得太監劉永成許安病故安葬事例本府應付棺材一具人夫二十名匠四名開報前來案呈到部參照應天府所奏要將修城夫價以十分為率本府出辦二分其餘分派附近直𨽻蘇松等府出備及奏查安葬太監劉永成等則例以憑遵守一節緣係修理城垣安葬大臣俱係朝廷重務今本府所奏中間雖是有理但未經行勘難便定奪合咨貴職煩為查勘前項所奏務要斟酌停當徑自具奏以憑定奪等因備咨到職隨行南京工部又行應天府查得南京外羅城垣先年遇有倒塌是南京工部委官驗工計料各衛差撥軍餘前赴該厰領料與班匠用工修理景泰六年蒙守備太監袁誠等奏行應天府著落上元江寧句容溧陽溧水五縣不為常例借倩人夫一百名分作二班相兼軍餘挑運木瓦等料匠作修理至成化九年本府府丞白昂見得牆垣經年不完夫役艱難備行內外守備等官會議得外羅城周圍一百六十里共一十六門逺近不等馴象門起八門係應天府修理滄波門起八門係南京工部修理其該用工料南京工部與應天府各另出備兩不干預每年春秋二季內外守備等官公同南京工部并應天府官各照分修地方相看遇有損壞就行丈量料計修理及查得應天府每年修城有用工價銀二三百兩者亦有四五百兩者多寡不一參照應天府奏要將夫價以十分為率本府出備二分其餘灑派附近直𨽻蘇松常鎮太平徽州寧國安慶池州等九府照依府分人民多寡出備預先解送南京工部交納遇有城垣坍塌本部就委原管修城主事驗工計料一併修理一節緣南京工部與應天府分修外羅城垣係是內外守備官會同議允巳行年久事理况於事體頗便難以更改及看得直𨽻蘇松常三府錢糧數多徽州安慶等府路程窵逺况各府俱有城池每年俱要起夫備料修理難令出備工價銀兩其鎮江寧國太平廣德與應天府州俱係原奉恩例減免錢糧去處又與南京相近太平府蕪湖縣近來設有抽分場僉點夫役供應往來事頗繁重亦難出備若令鎮江寧國廣德三府州出備事頗相應及照內臣病故造墳安葬既巳查有前例别無定奪合無行令鎮江寧國并廣德三府州每年各出價銀六十兩俱解送應天府收修城垣其餘不足之數不分多寡俱令應天府上元等五縣出備仍照舊與南京工部各照原分地方城垣門座修理今後南京內臣病故合無照依太監劉永成許安事例安葬緣係二部咨臣查勘所奏斟酌停當徑自具奏定奪事理俱未敢擅便具題同南京吏部等衙門應詔陳言奏狀臣等伏覩今年正月初七日欽降詔書有以見陛下敬天之渝恤民之困恐懼修省求言圖治之盛心也雖隆古聖明何以過之是以詔書到日誤罹刑辟者蒙更生之恩宿負錢糧者免追徵之苦如釋重負如解倒懸飢者得食勞者得息危者以安憂者以喜莫不願皇圖之鞏固祝聖壽於萬年向非聖心惻隱詢謀屈䇿焉能以致是臣等並受國恩待罪南都有所見聞雖不奉明詔亦當披肝瀝膽以圖補報萬分之一况明詔許諸人直言無隱若猶噤而不言言而不直是臣等上違聖諭下失民望將何顔以立於聖明之朝乎竊惟朝廷之布政令也猶上天之降祥異也一政令之得宜若禎祥之見而天下無不欣悅一政令之失宜若災異之來而天下無不驚懼易曰君子居其室出其言善則千里之外應之不善則千里之外違之况政令乎誠能發其善者而行之其不善者而改之則民自安天意自回尚何災異之不可弭而禎祥之不可至哉臣等欽遵明詔謹條陳今日缺失利病一二事昧死以聞伏乞聖慈俯垂睿覽采而行之天下幸甚臣等幸甚計開一洪武永樂年間官有定員朝無幸位是以賢能盡職食之者寡近年以來無功而升無能而進者日多一日他如工藝之人逋逃之徒邪術之輩各尋蹊徑得美職而服章服者充滿朝市實是虛糜廪祿虧損名器非所以勵賢能而勸有功也合無今後文職非由進士監生吏員出身者勿授武職非有軍功者勿升其巳升除額外文職悉令記名回家待有缺之日聽吏部察其可用者取用係醫卜匠藝出身者悉令各執本藝每月止支食米一石其餘俸錢皂𨽻俱各革去其軍職非有軍功而升在錦衣衛帶俸及管事者俱改調在京各衛帶俸止食原俸原無俸者每月亦止與食米一石餘俸俱各革去悉令差操俱不許管軍管事兩京一例若在成化十一年以前升用及貴戚之家循例而升者悉令照舊其在京考滿該升官員內樂舞生出身止於太常寺官天文生出身者止於欽天監官醫生出身者止於太醫院官匠人出身者止於工部所屬文思院營繕所等衙門官敘用俱不可授以六部都察院通政司大理寺等衙門堂上官庶不虛費錢糧混亂名器一近聞太監梁芳差鎮撫梁山舍人梁用馳驛前來兩淮運司關支欽賜官鹽五萬引著令該司出備包索船錢用銀數多該司無從措置被其逼迫今奉明詔不許勢要之家屯鹽雖稱前鹽係是欽賜之數百姓愚昧難以户曉未免致疑又令運司出備包索船錢人情愈加不堪伏乞聖裁合無將梁山等取回前鹽住支今後各處鹽課俱各存留以備邊儲敢有仍前求討者許户部及科道官糾劾使人無覬覦官有儲積一南京朝陽門外漆園原設百户二員甲軍一百餘名每三年一次行取直𨽻廬州府人匠二十名到園開漆所得漆不過二百斤棕園原設百户一員甲軍一百餘名每三年一次行取江西南昌府土民八名到園剝棕所得棕毛不過二百斤俱差內官一員監看開剝桐園原設百户二員甲軍二百四十名每年行取應天府油户不限名數到園收領桐子打油除存種子外所得油止有一百餘斤俱送內府南京丁字庫交收南京工部遇有修造黃戰船隻等項又去該庫關支合無今後止令該園餘丁自行開漆剝棕及雇人打油免再行取廬州等府開漆人匠剝棕土民打油人户及免差內官監看所得生漆棕毛桐油照數就送本部交收庶使事體不繁出納兩便一南京兵仗局現有欽差內官四員各帶領匠作一十四員名在局成造擺朝軍器五萬七千五百頂副經今三年未完緣地方災傷人民缺食南京工部及應天府措置物料借倩夫匠并應天府供給下程等項俱各艱難合無將前項軍器暫且停止收過各項物料公同南京工部并應天府委官查盤見數收貯官庫待後豐收之年行令南京守備太監提督該局照數成造仍將各項物料應減省者減省應改會者改會庶使人無重勞料不虧費一南京御用監內官監等衙門每年起運竹木板枋數多撥船裝載沿途拽運勞人乾淺去處又行起車裝載勞人尤甚况連年災傷人民流亡合無將前項竹木板枋停止一二年以後減半起運庶使人無怨嗟料有撙節一端人正士何代無之異端邪術世亦常有所貴察其忠良辨其姦妄而登用之擯斥之爾近者員外郎林俊經歷張黻以言事謫官尋蒙收召復其職任國師繼曉以左道惑衆亦被放逐遣歸田里此足以彰陛下天地之量日月之明容受其直而特為寬貸洞燭其誣而不為欺罔也竊惟諸司之中固嘗有先林俊張黻而被謫者天下之大亦豈無後繼曉而行術者合無吏部通查數年以來有因言事或降調外任或冠帶間住悉令復職俾圖自效如有政令缺失仍許直言無隱及令都察院行委巡城御史五城兵馬嚴加禁治如有姦妄之徒或執巧技或挾邪術者不許潛住京師希求進用敢有窩藏隱匿者罪及鄰佑如此則異端不至橫流正道可免榛莽一各處府州縣學廪增生員近年以救荒許納粟銀入監出身中間多有白丁錢虜或在學無成或入學未久或臨期冒報有司急於應令起送不暇詳審如此生徒學業未成禮節未習僥幸入監束書日計若又放回依親寧無忌肆或暴橫鄉里或干謁官府日後選用懵焉面牆妨政害民實多有之合無分送南北國子監不許放回依親著令自備柴米坐堂肄業本監學官用意講授務俾成材庶他日選用不至瘝曠一正統天順年間南京龍江大勝二關各止差內官內使三員名守把皇城各門并都城各門各止差內官內使二員名守把近來龍江關差太監奉御共六員大勝關差內官內使共七員名皇城各門差內官內使十餘員名都城各門有差內官內使五七員名者亦有三四員名者又內府南京甲字等九庫比先年間每庫止有內官內使二員名公同該庫官收支錢糧今各庫有內官內使五七員名者亦有十三四員名者政出多門弊難枚舉合無行令內外守備官將各門各關并各庫添差官員盡行革退令其各管本等職務照依正統年間事例存留守把管理免致多占官軍庫役妨誤公務一在京針工巾帽二局每年各差內使二名管送布絹等物前來南京染作郤裝回京與內官做造衣被巾帽等件該與在京內官者就彼給散該與南京內官者帶來南京給散差來內使在南京有住期年者亦有住七八箇月者有司日逐供給艱難占用馬快船及洗箱軍軍民人夫數多有妨差操兼且一往一來不無勞擾合無今後北京內官衣被巾帽等件就在北京做造給散南京內官衣被巾帽等件就在南京做造給散庶免往來勞涉騷擾軍民一南京龍江厰原係民間納糧田地先年設立堆放楠木俱巳用盡止存朽爛不堪者數根其該厰房屋牆垣俱各坍塌現今地土空間仍前占用軍餘一百餘名看守合無將地土給還原主領種辦納錢糧朽爛木植變賣銀兩入官看厰軍餘退回原衛當差於官無損於民有益一直𨽻蘇州等府買辦年例供應器皿項下黃紅羅黃紅絨金箔銀硃土硃生漆桐油熟銅熟鐡鏡面錫等項及四川布政司折納嵗辦皮張項下生漆熟鐡等項多是差人齎價前來南京收買卻被攬頭光棍誆騙花費或被解人鋪行通同侵分中間情弊多端難以枚舉以致前項物料不得完納有誤造作合無今後南京工部將前項物料價銀分派各該司府徵收起解本部轉送應天府官庫收候買辦送用若有積出附餘銀兩準作下年之數其一時物料內有高貴及價銀內有不敷本部另行處置庶使情弊可革工程易完一應議官子孫在京法司有奏準事例徑行提問今南京法司但應議官子孫有犯俱先提事內人問理有礙將原告并干證人監候羈候奏請提問有行提數月并半年之上不出官者及至問完不拘徒杖罪名一槩監候請旨發落未免久候及監候人難合無查照在京法司事例前項應議官子孫有犯除皇親外其餘有犯亦就提問問完之日徒罪以上監候杖罪以下羈候俱奏請發落庶為便益一南京御馬監每年起運苜蓿種子四十扛俱係南京太僕寺坐派養馬軍衛有司辦納蓋是先年北京地方不産此種以此取去播種今北方巳種六七十年豈無種子可種今却仍舊起運以事言之雖小而徵斂解納之際所費實多皆出自軍民合無行令南京御馬監今後不必行取苜蓿種子解京庶免科擾下人受害一朝廷差內臣在浮梁縣景德鎮燒造御用磁器今巳年久雇覔夫匠買辦柴圡顔料及供給監燒官員人等每年用銀不下數千餘兩俱是饒州等三府小民出備雖曰磁器計其所費不減銀器之價近聞原差內臣隨升太監鎮守江西往來提督而家人常川在彼生事尤甚供給益侈即今三府之民疲敝困苦不可勝言且饒州鄱陽湖邐迤數百里上控荆襄之衝一有警急民窮財盡何以為備此三府之民誠可痛憫而燒造之役所當急罷也况所燒磁器年積月纍其數必多合無暫且停燒造三五年以蘇民困待後缺用再行燒造亦未為晚一雲南福建浙江等處雖有出産銀冶府分其間或屢有頑梗之徒嘯聚為非地方人民因而不安者况中間鎮守太監或有於每年冬月親去前項府分煎銷銀課往來供應頭目人等甚是勞擾合無今後止令専管銀場布按二司官員每年督完銀課解至總司會同太監煎銷實為民便右件臣等略陳一得之愚如此伏惟皇上仁孝恭儉敬天勤民宜乎天人交感協氣嘉生而乃年不順成災異迭見者無他皆由臣等不能仰副聖明所致乞將臣等罷歸田里别選賢才任用庶回天意成化二十一年二月初七日具題三月初八日奉聖旨是文武醫匠等官取回支鹽鎮撫并禁造寺觀降調官員已處置了板枋免運一年大勝等關門官軍著南京守備太監定奪具奏成造軍器納粟生員坐監買辦物料提問應議官子孫該衙門看了來説造給衣帽等件起運苜蓿仍舊看厰軍餘量留二十名磁器燒完了停止其餘準議行陳俊等不準罷歸著盡心辦事該部知道欽此乞休致奏狀臣係陜西西安府耀州三原縣人由進士改庶吉士正統十四年欽除大理寺左評事歷升左寺副知府左右布政使成化元年欽升都察院右副都御史撫治流民二年以功升本院左副都御史巡撫河南一年升南京刑部左侍郎管部事九箇月餘丁父憂服除改刑部左侍郎總理河道年半有餘改南京户部左侍郎管部事將三年半復改都察院左副都御史巡撫雲南升本院右都御史仍前巡撫一年有餘改南京都察院右都御史參贊機務升南京兵部尚書仍參贊機務共一年有餘改兵部尚書兼都察院左副都御史巡撫南直𨽻蘇松等處地方總理糧儲五年有餘復改南京兵部尚書參贊機務今又一年有餘臣以卑鄙庸才仰荷聖明知遇歷官凡十六轉任事幾四十年或入陪廟堂或出巡方嶽寵榮巳極感幸何加徒懷犬馬之心莫報乾坤之德第以衰朽應合退間已嘗再三上章懇乞休致俱蒙聖恩勉留俾之仍前理事今臣年巳七十例該致仕又且老病侵尋雖仍戀闕庭力實不堪鞭䇿食焉無補居之弗安伏乞聖慈矜憫將臣放歸田里另選賢才以充任使庶不妨賢誤事斯有益於國家矣臣下情無任感激隕越之至加升太子少保謝恩疏昨臣以右都御史尚書九年考滿具奏取進止而蒙聖恩加臣太子少保照舊管事者伏念臣性資愚魯學術空疏荐歷崇階纍叨重寄無補於世有愧於心具奏之時自謂官巳踰分年巳衰老得一致仕足矣不意今日荷兹殊恩臣有以見陛下不遺踈逺之深恩寵異老臣之盛德也感激良深未易云喻第臣職守南都不能入侍左右少效忠勤補報萬一但願皇圖鞏固聖壽齊天前星依帝座以常輝主器守宗廟而永泰非獨臣感恩思報之心如此而天下臣民愛戴祝願之心亦莫不如此也臣無任瞻天仰聖激切屏營之至除望闕謝恩於今年二月初一日到任管事外具本専差千户李賢齎捧稱謝謹具奏聞督修孝陵工完奏狀照得成化二十二年五月十九日欽奉敕命臣同守備太監張本嚴督內外該管官員併工修理孝陵臣遵奉敕旨會同太監張本并守備內外官員恭詣孝陵同該管太監鄭強隆平侯張祐工部侍郎劉俊等看得孝陵殿宇門廡碑亭等項俱已修完惟明樓已抓縛鷹架做造斗科等件止因四川原採大楠木未到未曽拆修又看得周圍牆垣除修完外止有一千七十丈未完及臨漿糨房牆垣損壞六十五丈未曽修理隨令各官督工修築完備於本年六月初五日疏放軍夫匠作暫且歇工候催楠木至日另行擇日興工及將修完工程用過物料價銀口糧并原辦未到物料總數開坐具題外至二十一年四月內楠木方到本年七月十二日又節該欽奉敕命臣同守備太監錢能嚴督原管太監鄭強隆平侯張祐工部侍郎劉俊并內外該管官員量撥用工官軍匠作毋令空間役占計算在官合用物件并價銀及支給錢糧毋令冒妄浪費仍逐日併工修造早為完備欽此臣又遵奉敕旨公同太監錢能行令鄭強張祐劉俊等量撥官軍匠作南京欽天監擇於本年七月二十一日興工修理興工之後鄭強等日逐躬親提督工程郎中毛科専管收放物料工價臣等亦常不時前去督併執役之人各盡心力罔敢怠忽將明樓大梁及角梁枋桁斗科椽望銅絲簷網券門寶山城垣金水橋墁欄板等項但係損壞者俱各脫換修理揭􅩘墁砌彩畫油漆至本年三月二十一日工完會同守備內外官員并該監官詣前拜觀羣情莫不欣恱仰惟聖祖在天之靈亦可以少慰矣先該臣等行令郎中毛科自興工日為始日逐做過工程用過物料并工價銀兩等項每半月一次開報逐旋查算工完之日臣等又行通前查算明白除令南京工部照依工部原行事理將修完工程用過物料等項另行造册奏繳外緣係奉敕督修孝陵工完事理具本専差指揮石文通齎捧謹具題知將順上意匡輔時政疏臣伏聞近有聖旨禁約今後不許擅便奏討升官及遷轉各人名下并文武外官邊將及奏討蟒衣并替人討蟒衣及不許奏要在內府騎馬又聞自有此之後諸色人等俱不敢進貢物件希兾升賞朝政肅然小大之臣罔不畏天之威駿奔承事中外臣民聞之莫不歡欣鼓舞稱頌聖德而詠歌太平也夫此數者不禁止則官及私昵而政事為之不立利歸權門而邊儲為之不足豪右兼并而小民為之困敝名器混淆而上下為之無别僭踰日肆而禮法為之蔑如紀綱廢弛而教化為之不行人皆知此數者之為聖政纍久矣但恐禍及身家所以多不敢言去嵗正月皇上因天變敕諭文武百官令其陳奏敝政兩京臣僚間有言及之者或指陳失真或言詞過當是以多不蒙採納間有採而行之者不久又行更改而言者反遭笞謫間有優容者其心兢兢業業常不自安有若官校之隨其後所以前事日益滋熾而無巳有志為國者日益畏縮而不敢言也兹者皇上不因左右之言臣僚之諫而有此聖旨是蓋皇天眷佑國家將隆萬年無疆之休故啓宸衷而為之此臣民聞之所以歡欣鼓舞而稱頌詠歌也然此數者誠能持之堅禁之久而無所變更則天下國家何患乎不治安宗廟社稷何患乎不靈長四夷八蠻何患乎不賓服羣黎百姓何患乎不蒙福也如或持之不堅禁之不久而有所變更非惟有失大信於天下抑恐難保無虞於將來伏望皇上執此之政堅如金石行此之令信如四時仍將節次聖旨禁約事意傳與在京各衙門并科道知道今後但有故違敕旨奏討前項恩澤者俱照敕旨內參奏其奉特旨批出傳奉而與者亦要執奏不可有失大信如此則紀綱振肅而教化大行億兆歸仰而宗社靈長矣然臣此言非欲矯情以沽名而舍生以取禍但欲成皇上之美政為恃寵者弭後患耳惟聖明察其心而赦其罪幸甚具本専差辦事官徐徽齎捧謹具奏聞孝陵工完受賞謝恩疏伏蒙聖恩以臣同守備太監錢能奉敕督修聖祖孝陵工完賜臣紵絲一表裏生鈔一千貫者竊惟臣猥以章句之腐儒叨膺參贊之重寄凡百朝命皆當奉行矧夫陵寢工程敢不躬親提督經之營之乃百工之成效輪焉奐焉豈一夫之用心臣實無功何敢望賞辭之恐蹈不恭之罪受之難逃非分之譏揣巳則踧踖不寧感恩則汪洋無際除叩頭祗領望闕謝恩外具本専差辦事官舒光發齎捧赴闕稱謝謹具奏聞王端毅奏議卷六
