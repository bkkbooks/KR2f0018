  text: 欽定四庫全書史部六
  hash: sha256:5f60e64555bb05171f88ef93eab5b1c285f44f3268a9880b3cbd1f2ca80456fa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0018_WYG_000-1a, image: WYG0427/WYG0427-0453a.png}
body:
  text: 王端毅公奏議詔令奏議𩔖二奏議之屬提要臣等謹按王端毅公奏議十五巻明王恕撰恕有石渠意見已著録恕吏部奏議九巻宏治四年文選郎孫交編次李東陽序之後兵部尚書王憲取其自大理寺左寺副至南京兵部尚書時奏議六巻刻于蘓州御史程啓元又刻于三原此本則正徳辛已三原知縣王成章合二本而刻之者第一巻為大理寺及巡撫荆襄河南時所上二巻為南京刑部户部及總理河道時所上三巻為雲南巡撫時所上四巻為前叅賛幾務時所上五巻為巡撫南直時所上六巻為後叅賛幾務時所上七巻至十五巻皆吏部所上劉昌懸笥瑣探稱恕厯仕四十五年凡上三千餘疏則此猶汰而存之者矣明史恕本傳稱其敭厯中外五十餘年剛正清嚴始終一致集中所載如叅奏鎮守太監及論中使擾人等疏皆剴切直陳無所回䕶又如處置地方及撥船事宜諸狀皆籌畫詳盡具有經畧其他亦多有闗一時朝政可資史傳之叅証沈徳符顧曲雜言稱邱濬作五倫全備雜劇王恕謂其程學大儒不宜留心詞曲濬大恨之遂謂恕所刻疏稿凡成化間留中之疏俱書不報故彰先帝拒諫之失侍醫劉文泰因以此事疏攻恕恕因去位所以報恕之輕詆也明史恕傳則謂二人因争坐位故搆是獄案濬本狠忮恕一日不去則濬一日不得快其私其忌恕未必以此數語亦未必以此一事然恕亦殊乖避人焚草之意故史謂其昧於逺名之戒今刋本已無此二字或後來削之歟乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀王端毅奏議序周官冡宰即唐虞百揆之職雖列於六曹而實總衆務厯代宰相之設則别立六曹以隷之迨於我朝始不置相然所謂吏部尚書者獨為六部之長所領人才又天下首務非他政事比盖大臣之最重者也故非德足以格君正國才足以察理辨物者莫宜為之顧世逺制異天下事不盡于都俞吁咈之間則必假於辭而後能達於是謨訓之體變為章疏為題為奏代代有之晉山濤有所銓注必先啟而後奏宋趙普有所薦而不用則拾殘藁復上之者皆是物也今部曹所奏朝報所錄人皆傾耳而聴之今日行某事事之善者必曰吾君之仁也明日用某人人之賢者必曰吾君之明也是雖書簿格例之細而所謂格君正國者亦於是闗焉固諸曹之所同而在吏部為尤重也今天子御極之初三原王公復召為吏部尚書進太子太保天下翕然望之而公亦毅然以天下人才為己任凡有㑹議必手自屬藁雖部曹所擬官屬所具亦親為改訂四三年來散於諸司者不可悉記文選員外郎孫君交擇其闗於政之大者萃為一編以藏於家東陽得而觀之則歎曰於乎盛哉臯陶論知人必曰載采孟子言尚友必曰論世後之人聞公之風不獲見其人而接其論言者必於是觀之而一代之盛亦從可識矣東陽承乏翰林脩兩朝實錄皆在史館盖自正統以來迄於成化選舉之典式人才之名籍未嘗不得與也聖天子之休風善政大臣元老之嘉謨偉績乃復於今日見之敢不為天下賀哉且難進易退公之夙心而眷注方切未可以言去則所以益於君與國者尚多又敢不益為天下望之哉公自立朝累有獻納在南部者尤為天下所傳誦則既編為别巻而序之者已詳故獨識於此庶公之任以天下者有所叅考云𢎞治四年夏四月望日賜進士出身奉議大夫左春坊左庶子兼翰林院侍講學士經筵講官兼修國史長沙李東陽序
