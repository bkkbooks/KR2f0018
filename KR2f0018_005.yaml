body:
  text: 王端毅奏議巻五明王恕撰巡撫南直𨽻地震請停任奏狀㨿直𨽻常州府申據武進縣申據本縣在城里老王宗武等呈於本年五月初十日辰時分本處忽然地震有聲間生白毛係是地方灾異等因備申到臣除痛自修省外仰惟陛下以天徳而居天位於兹十有五年矣巳嘗勵精圖治夙夜不倦不嗜殺不游畋畏天恤民仁孝誠敬格於上下宜其天心克享民物阜安奈何近年以來水旱灾傷殆無寧嵗饑饉流殍南北皆然陛下又嘗宵旰焦勞遣使四出旣發倉廩以賑貸之又蠲糧差以寛恤之凡所以奉天安人者無所不至又宜可以少回灾沴召致和平夫何南畿之地復有如此之異此無他蓋是臣奉職不謹巡撫無狀之所致也况臣今年六十有四衰老多病昏憒無為委實虚縻廩禄有妨賢路伏望聖恩憐憫將臣罷歸田里以終餘年另選賢能代理其事庶幾優劣得所而天意可囘矣具奏奉聖㫖王恕不准罷歸着用心巡撫地方議事奏狀照得南京管糧并南直𨽻河南等處巡撫官例該八月以裏赴京議事查得先該南京守備成國公朱儀等奏准南京管糧并南直𨽻巡撫都御史先期相度如果至期地方無事仍照例赴京㑹議若事不可摘離量將應議事件具奏定奪今照南直𨽻安慶池州等府地方去年灾傷薄收即今人民艱食為盜者多正係撫安賑恤提督緝捕之時况近來常州府地震有聲應天鎮江等處雨水過多渰沒圩田不能栽蒔防閑處置尤不可忽欲便照例赴京㑹議誠恐有悞前事除仍在地方巡撫外今將應議事件開坐具題請㫖一查得成化七年奏准將江南應天府并蘇松等府該起運瓜洲淮安二處水次常盈倉糧俱撥官軍過江就各處倉場交兌每石除原定加耗外另加過江水脚米一斗所以軍得脚價民免逺運彼此有益交相稱便成化十三年十四年仍令民運赴瓜淮交兌民有盤費之損軍無加増之益由是言之則知民運至瓜淮不若軍到江南領運之便明甚如蒙乞勅該部㑹議合無將今後儹運瓜洲淮安二處水次常盈倉糧照例加與脚耗仍令官軍過江依期前去各處水次領兌庶幾軍民兩便漕運不悞前件仍照舊例民運於瓜淮及常盈倉兌納一蘇松常鎮及嘉湖杭七府嵗輸正耗稅糧八百餘萬石租重差繁民多逃移松江一府二縣之民巳包納坍江逃絶人户稅糧五萬有餘其他可知且杭鎮二府稅糧雖多不過起運南京各衛倉徐州等倉及兌軍儹運而巳蘇松常嘉湖五府稅糧除起運兩京内官監供用庫光禄寺等衙門白熟粳米白熟糯米一十四萬三千九百九十餘石每石連加耗脚價盤用有用糙米四石三斗二升者有用糙米三石三升者有用糙米二石七斗者共用糙米四十餘萬石蘇松常三府又起運兩京各衙門并公侯駙馬伯禄米二十八萬餘石連加耗脚價盤用共用糙米五十餘萬石約用運夫二萬有餘自備衣糧盤費又不可以數計况涉歴江湖過閘過壩盤灘剥淺辛苦萬狀或不幸又有遭風覆沒之虞四五箇月不得到京及至到京或遇隂雨不得曬晾動輒守候一兩箇月不能進倉如遇各衙門忠誠為國知民艱苦官員隨即照數收受出給闗單糧納受福若遇惟利是嗜不知民難官員百般刁蹬任意需索捉斛較量衝撒在地者皆不作數或百十石或五七十石一例折算照數添補以致借債賠補破産還債年年如此民財如之何不殫財殫力屈民難過活誠恐久則致生他變不特收糧之弊如此而各庫收受一應官物其弊亦然如蒙乞勅該部㑹議合無請勅戒諭兩京一應收受錢銀内外官員今後務要各公乃心憫念民難如遇錢糧到於倉庫辨驗堪中隨即收受毋刁蹬留難毋巧取財物毋多收斛面毋多稱斤量為國愛惜民力培養元氣如或仍前不悛剥削糧納許巡倉巡庫御史指實㕘奏不分内外一體拏問如此則法無偏私而人自畏服東南生靈之福也前件准擬行文禁約一查得在京光禄寺嵗用白熟粳米三萬八千一百二十五石南京光禄寺嵗用白熟粳米一萬五千石在京光禄寺日支飯米臣不知其數南京光禄寺日支飯米臣頗知其槩其每日所造之飯止供南京尚寳司六科巡城都督本寺及四署官數員而巳其餘則送各監局匠人本寺厨役及以此米送淮清橋三飯堂造飯濟貧大抵此米以一百分為率官員所食不及一分而匠人厨役貧子所食反有九十九分之上且此白熟米得之非易方其初收之時鄉民選取一色好稻舂碾成米篩簸擇好者取之其不好者退之勞費民力頗多實非常米可比在廷文武大臣非公差見辭奉㫖賜酒飯則不得食而匠人厨役貧子反得食之况環衛之士與朝廷守宫禁防奸細比之匠人厨役貧子輕重不同環衛之士止食四門倉之米所造之飯而匠人厨役貧子却食如此好米非惟人民辦納艱難抑且貴賤輕重不分如蒙乞勅該部㑹議合無今後兩京光禄寺合用祇待近侍官員及四夷使臣等項方許㑹計白熟粳米其餘匠人厨役飯食與夫飯堂造飯之米另項㑹計次等熟米但以熟米不分顆粒大小顔色紅白一例收受支給如此非但辦納者頗省勞費而飯食亦有差矣前件照舊具題節該奉聖㫖南京光禄寺扣算官員食用外厨役人等只與次等米食一直𨽻蘇州府所屬并蘇州太倉鎮海三衛吳淞江崇明沙二守禦千户所官吏師生旗軍俸糧及運糧備倭官軍行糧嵗用糧米二十三萬石直𨽻松江府所屬并金山衛青村南匯觜二守禦千户所及浦東等鹽課司官吏師生旗軍人等俸廪嵗用糧米七萬四千餘石近年以來蘇州府止存留糧米十萬餘石不彀半年支用松江府止存留糧米二萬八千餘石不彀五箇月支用遇有灾傷蠲免及坐買顔料愈見缺乏况太倉鎮海金山崇明沙吳淞江青村南匯觜俱係沿海衛所隄備倭冦官軍缺食㝷常尚難度日遇警豈不悞事節據金山等衛崇明沙等所告稱缺糧巳行該府暫將各縣備荒糧米借撥支領外即今各縣備荒糧米數亦不多中間亦有全匱乏者設遇饑荒非惟官軍缺糧支給而饑民亦無所望該府巳嘗具奏今成化十五年税糧蘇州府又止存留一十萬六千九百六十一石有零松江府又止存留三萬一千三百三十八石有零委的數少不彀支給查得蘇州府起運淮安府常盈倉米五萬五千石揚州府倉米一萬四千三百七十石松江府起運揚州倉米二萬石徐州永福倉米二萬石淮安府常盈倉米三萬五千七百石如蒙乞勅該部㑹議合無將蘇州府起運淮安常盈及揚州倉前項糧米盡數改存本府各倉松江府起運揚州等倉米内改撥五萬石存留本府各倉支用候㑹計成化十六年秋糧蘇州府存留二十三四萬石松江府存留七萬四千餘石備用如此則沿海倉厫不至空虚備倭官軍有所仰賴前件准擬一常州府靖江縣原係本府江隂縣馬䭾等沙地方成化七年設為靖江縣所轄五十五里户口數萬夏秋稅糧三萬九千四百餘石我朝官制縣二十里以上者設知縣縣丞主簿典史各一員謂之全設衙門今靖江縣因是近來開創本衙門止設知縣典史各一員其所屬止設儒學一處以致部運錢糧踏勘田土等項事務多不無缺官差委况境内醫卜僧道之流亦不為不衆未經設官殊無統攝如蒙乞勅該部㑹議合無將靖江縣照例添設縣丞主簿各一員仍設隂陽醫學僧㑹司道㑹司衙門鑄降印記銓選官員如此則百里之治非惟得衆職以分理亦可備一邑之制度前件准擬奏報灾傷因言織造進貢勞民傷財奏狀據直𨽻鎮江府丹陽縣申准知縣康厚闗遵依看驗得人民所種二麥自本年二月以來天降黄沙傷損萎黄槩縣約有七分灾傷闗報到縣申乞照驗等因到院行間又據應天府呈及鎮江府常州府太平府寧國府池州府徽州府安慶府廣徳州鎮江衛各申所屬軍民今年所種二麥俱同前灾夏稅子粒無從辦納臣今年二月出巡到於鎮江常州等處親見軍民所種麥苗委的萎黄成灾臣惟南直𨽻地方連年灾傷去秋纔得一熟中間尚有無收之家今復遇此灾傷軍民憂惶過活艱難除行屬給糧賑濟及催委官踏勘聽候覆勘外臣自去年奉命巡撫之後節據撫屬各府州申奉各部勘合派買各項物料及織造紵絲紗羅等項其數頗多該用價銀動以萬計在官錢糧刮剥殆盡見年里甲出辦不起因而逃移民情實有不堪臣又見各處進貢禽鳥花木等物經過去處亦頗騷擾臣惟凡此之𩔖朝廷之上固有不可缺者亦有可減省者亦有可缺者且如糧餉軍需紵絲之𩔖將以養軍馬備宿衛給賞四夷使臣不可缺者也綵裝竒巧花様紵絲紗羅十餘人碌亂半年以上方纔得一件所費物料難以數計賞賜臣下以酬其勞使之感恩思報固無不可但賞之有節得之者必以為竒又且省費賞之太濫得之者必不為罕又且傷財古之明主一嚬一笑猶且愛惜敝袴猶且蔵之以待有功况此物乎此可減省者也至於禽鳥花木等物數年間進之者不知其數一經重瞳之後料必置之他所臣仰惟陛下聖明聖知徳配天地宵衣旰食憂勞黎元必不以此為意然嘗有罷進貢之㫖矣而進貢者未見斥去是以不知畫一遵守競尋竒異之物不逺千里進至闕庭以為孝順殊不知此物非勞民傷財則不可得得之無益於時無補於治此可缺者也夫物或可缺而民則不可缺書曰后非衆罔與守邦是知民者豈可缺乎惟其不可缺是以古之聖帝明王愛民如子撫摩安輯務俾得其所彼投珠抵璧却千里馬焚雉頭裘者非不知珠玉之可貴而千里馬雉頭裘之可愛也但恐留意於此因而妨廢政事失天下心所以投之抵之却之焚之者蓋欲固結人心而為社稷計也且不作無益害有益功乃成不貴異物賤用物民乃足此經籍之格言也陛下誠能深思而力行之若功不成而民不足則斯言不足信而聖人之道不足重矣今當連年灾傷之餘軍民凋弊之際非特織造可以減省進貢可以寢罷凡百冗費俱宜撙節一應不急之務俱宜停止如蒙乞勅該部照例行移巡按監察御史覆勘前項地方灾傷除豁夏稅仍望陛下崇尚恭儉今後上用并宫中所用及賞賜諸王龍鳳等項花様衣服合無只著兩京内織染局織造其合用預備賞賜等項紵絲合無照依原額行移各該司府織染局織造差去官員匠師人等合無取回禽鳥花木等項玩好之物合無不必進貢俾軍民息肩感戴聖徳實為社稷之福臣叨為具臣愚不知止因言灾傷而冒昧及此罪該萬死惟聖明裁之宥其罪而賜之歸田幸甚具題乞暫停燒甎奏狀准工部咨該本部題據本部委官主事周宏等呈查得臨清厰成化十五年冬季分實在項下完整缺角半段等甎三百三萬八千餘箇大約計之止彀二三年帶運而山東河南并南北直𨽻各窯厰甎料即今俱巳盡絶若不具呈定奪誠恐臨期卒難燒造等因到部合無准其所呈行移河南山東南北直𨽻等處巡撫巡按督同各該都布按三司及府衛掌印官員即便親詣原有窯厰去處逐一查勘現在窯座數目若是原窯數多人力不敷斟酌可否量為減半燒造其合用做工軍民人夫柴薪并一應器具等項務在今年以裏整㸃齊備候成化十七年興工燒造各委的當官員管理不許擾害下人所燒各様甎數以十分為率城甎六分斧刃券甎四分及行管河管厰官員但遇一應經過船隻照舊帶運吏部照例添設郎中二員揀選能幹有為之人於今年十月内銓選馳驛前去分投各該有窯地方専一提督往來燒造等因奏准行移到臣除欽遵外行據直𨽻太平等府申稱查得永樂年間蕪湖縣立窯六十二座係南京羽林右羽林前府軍左三衛官軍燒造當塗縣采石河西岸立窯六十八座係南京金吾前金吾後旗手等三衛官軍燒造采石河東岸望夫山共立窯五十三座俱係須知為事官員燒造繁昌縣立窯八十三座係南京神䇿武徳府軍後府軍右虎賁左虎賁右六衛官軍燒造貴池縣黄公山丁家港劉婆磯三處共立窯四百座係南京留守中龍驤驍騎右豹韜興武鷹揚七衛官軍燒造桐城縣樅陽新隘口立窯六十二座係南京留守衛官軍燒造厰房器具等項俱係南京工部分派應用柴薪俱是奥龍等巡檢司蘆場砍砟與府縣事無相干今前項地方共止有完整窯一百九十六座其餘窯座俱各倒塌厰房止有基址器具俱無現在及查得景泰二年該南京工部奏准要照永樂年間事例差撥在京各衛官軍委官提督於太平等府沿江原立窯座去處砍辦蘆柴燒造城甎五千萬箇行移南京守備太監袁誠總都機務靖逺伯王驥守備豐城侯李賢等欽依燒造外又查得儀真瓜洲二厰每年運糧并官民船隻帶運整甎多則二十餘萬少則止有十數萬今二厰現有整甎一百六十二萬有餘半段甎四百二十四萬缺角段甎二十一萬有餘江北窯厰尚有整甎百餘萬江南窯厰尚有半段甎一百三十八萬有餘二十餘年尚帶不盡臣惟即今兩京城垣已包砌矣天地等壇與夫太廟巳完美矣宫殿已壯麗矣官署已蓋造矣間有損壊不過脩葺而巳竊料前項現在甎料可彀二十餘年之用况南直𨽻太平等府人民逓年買辦科差等項繁重兼且近年措置船隻搬運甎料赴儀真瓜洲二厰交割已費船錢不貲皆是軍民膏血今年二麥巳被灾傷秋禾又復薄收軍民憂懼口食無措凡百寛減尚恐不能存活若再起倩人夫整理窯厰措置柴薪燒造甎料誠恐凋敝之人不堪此役因而逃竄為非不無貽累地方伏望陛下以宗社為念思患預防乞勅該部暫罷燒造之役以蘇軍民之困少待數年再行燒造亦未為晚若有緊要營造必不得巳乞照前例預勅南京工部委官清理沿江一帶原舊燒甎蘆場砍辦蘆柴整理器具仍勅南京内外守備㕘贊等官量撥南京各衛官軍燒造如此則民不擾而事可成矣縁係燒造城甎事理未敢擅便具題乞照舊令南京各衛官軍燒甎并要清查沿江一帶蘆場奏狀據直𨽻池州府申據貴池縣東一等保圖老人江信等呈切縁本府所屬貴池等六縣人民止有九十九里人户不過一萬餘户近年以來連遇水旱相繼人民困苦查得本府每嵗節奉南北二京户禮工三部勘合坐派各色羅段杉株等木底皮顔料黄白蠟芽茶蜂蜜等項及各衙門輪班皂𨽻齋膳夫該納柴錢嵗用銀一萬八千餘兩俱係前項人户出辦李陽池口大通驛逓紅馬站船共該水夫一千三百餘名及各衙門弓兵皂𨽻禁子四百餘名亦係前項人户内編派本處地方邊臨大江路當衝要上下往來使客絡繹不絶拽船人夫一二千名亦係前項人户起倩今蒙明文行仰本縣將原設窯座脩理一半及合用做工人夫柴薪并一應器具等項作急整㸃齊備聽候燒造非敢不遵切思本府六縣人民稀少差徭繁重實難存活兼且亦無諳曉燒窯人匠如蒙准呈乞賜憐憫與民轉達合干上司查得永樂年間事例乞撥南京留守前留守中龍驤驍騎右豹韜興武鷹揚七衛旗軍匠作或附近徽寧二府及廣徳州新安宣州二衛起撥軍民夫匠前來燒造免致小民流移失所等因到府備申到院案照先准工部咨開行移河南山東南北直𨽻等處巡撫巡按督同各該官員查勘現在窯座合用做工軍民人夫柴薪并一應器具等項候成化十七年興工燒造等因備咨行據直𨽻太平池州安慶三府各申查得永樂年間蕪湖等縣沿江一應窯座俱係南京留守等衛官軍燒造厰房器具等項俱係南京工部分派應用柴薪係奥龍等巡檢司蘆場砍砟與府縣無干乞行南京兵工二部轉行各衛查照庶得明白等因及據建陽安慶二衛各申本衛並無原設窯座縁由到院已經通行南京兵工二部轉行各衛查勘去後未報欲候查勘至日定奪誠恐有悞燒造又經通行各府查照作急整㸃齊備委官管理聽候郎中等官到來提督燒造去後隨據太平府申稱比先年間燒造甎料柴薪在於鱭魚洲青村坊等處蘆場砍用行查得奥龍巡檢司原額蘆場坐落鱭魚洲先該天界能仁雞鳴三寺奏討巳撥與天界寺二十五頃能仁寺一十七頃雞鳴寺一十三頃本司現存蘆場止有三百八十處大信巡檢司原額蘆場一處在於鱭魚洲解南京工部交納一處陳喬沙坍塌止有一塊上生蒿草繁昌縣三山巡檢司黑沙洲蘆場不係額辦柴鈔場分其青沙坊與浮沙口巡檢司原額蘆場俱係直𨽻和州所轄今照前項甎料係緊要之物即今若不急為整理臨期惟恐有悞所據合用柴薪先年俱係各處蘆場砍辦合將天界能仁雞鳴三寺蘆場暫且那借及將本府所屬采石大信山河荻港四巡檢司嵗辦本色蘆場暫借砍用候燒造停止之日照舊退還等因行間今據前因訪得永樂年間委的是南京各衛摘撥官軍在於前項府縣地方燒造甎料尤不曽起倩民夫今各衛尚有軍餘在彼看守合用柴薪委的在沿江一帶蘆場樵砟應用不係民間措辦今各府蘆場柴薪多係該解南京工部及被人告佃奏討之數難擅借用雖稱減半燒造縁無定數合用人夫匠作柴薪物料想亦不少况建陽安慶二衛旣無設窯座而新安宣州二衛并徽寧二府及廣徳州亦非原有窯座處所留守前等衛又係在京衛分不該巡撫官管轄擅難差撥若止令太平池州安慶三府起倩夫匠措辦柴薪等項委的重難出辦不前如蒙乞勅工部計議合無依永樂年間事例行令南京内外守備官查照原先燒甎衛分量撥官軍前去燒造并行南京工部委官一員先將太平池州安慶三府沿江一帶蘆場清查明白但係近年以來奏討告佃及各巡檢司砟辦蘆柴解部并不係額辦者俱暫那借採用候燒造畢日照舊退還合用厰房器具等件著令太平池州安慶三府并附近徽寧二府及廣徳州各照里分均派出備建陽安慶宣州新安四衛亦量撥餘丁協同各衛官軍燒造姑待清查蘆場積有柴薪然後興工仍乞定擬燒造各様甎料數目使之知有了期樂於趨事如此則事體停當工程易為縁係民情及係查照舊例燒甎事理未敢擅便具題蒙賜誥命謝恩奏狀伏蒙聖恩賜臣誥命進階資政大夫加贈臣祖惟真父仲智俱資政大夫兵部尚書兼都察院左副都御史祖母張氏母周氏妻蓋氏繼室張氏俱夫人者臣伏以綸綍煇煌巳荷推恩於二代簿書填委何曽補衮於萬分聖徳難名愚衷莫旣臣性資麤率學術荒蕪叨登進士之科濫與翰林之選任評事任寺副殊無異績為知府為布政未有竒勲屢轉顯官久尸厚禄方戰兢之不暇豈旌寵之敢當偶沐乾坤莫大之恩特加父祖非常之贈龍章絢綵馬鬛璔煇顧將何徳以酬之惟有此身而巳爾除望闕謝恩外謹具奏聞乞休致奏狀臣誤蒙列聖曁陛下深恩叨享禄位三十餘年每欲披肝瀝膽竭忠宣力以圖萬一之報第才短術疎終不能増涓埃於海嶽是以日夜思之旣慙且懼而汗流沾背也况臣今巳六十有六志慮巳衰筋力巳憊百病侵尋氣息奄奄靡瞻不眩靡聽不惑委實驅䇿不前有妨賢路若不及早求退日茍一日久則必成罪戾而為識者之笑且優老賜閒乃朝廷之盛徳辭榮謝事實衰拙之本心伏望聖恩憐臣衰老赦臣死罪放臣歸田使之擊壤衡門之下以終犬馬之年感戴盛徳寧有涯涘尤望聖明慎選賢能代臣巡撫俾之敷徳東南轉餉西北以佐萬年太平之治是臣之退非獨利於臣之一身實乃利於天下國家也臣下情無任不勝瞻天仰聖激切屏營之至又乞休致奏狀臣本闗西布衣之子荷列聖教養之恩叨由科第備員封贈二代䕃叙一子可謂榮且幸矣雖鞠躬盡瘁死而後巳亦不能報塞萬一竊聞古人云陳力就列不能者止又云四時之序成功者退當今天下雖太平而内地多灾傷邊方少寧息正是用人整理之時而臣昏眊無為才不能治事智不能周物又不能進一言畫一䇿為朝廷安内以攘外無用如此不止可乎矧今羣賢濟濟不為無人而臣尸禄三十餘年久占台鼎之位髮白齒落動履艱辛妨賢如此不退可乎當可止可退之時而猶徘徊瞻望不忍舍去在巳雖曰無貪心在人不免有非議失今不去日後被人數其罪而逐之不無負朝廷保全之意失人臣進退之宜伏望聖恩憫臣愚戇憐臣衰老放臣歸田以終頽齡進用賢才以圖治安非惟臣感聖恩於無窮而來者亦感聖恩於無窮是乃一舉兩得進退無失宜之嫌彼此有交慶之美矣臣不勝瞻天仰聖激切乞恩之至言應天等府糧草灾傷并成熟數目奏狀據應天府呈并直𨽻鎮江等府申及據民人益紀等各告稱今年自春至夏天時亢旱高田乾燥不能翻耕插蒔秧苗等因巳經行仰踏勘如果灾重具奏定奪若是灾輕申來處置去後至七月十三等日風雨大作臣恐蘇松常鎮等府地方低窪田禾渰沒當差應天府都稅司副使耿瑞前去看得應天府句容等縣鎮江府金壇等縣有低窪水渰去處亦有高阜有收去處常州蘇州松江嘉興湖州等府地方稻穀俱結秀成實續據常州等府各申稱屬縣地方八月十七等日又被風雨大作江湖泛漲山崩水發衝倒民居渰死人口渰沒田禾等因臣又經行仰各府委官從實踏勘及令徑自具奏外續又據各府踏勘過灾傷成熟田糧總數及草冊申呈到院内金壇丹陽二縣勘報不實另行委官覆勘明白巳將初勘委官拏問外及臣至常州府無錫等縣里老人等告稱府縣止將被水渰沒田禾作灾内有風秕等項無收之數不蒙作灾臣因見小民艱難分付府縣具申到臣除原勘報灾傷之外每平米一石又與減免一斗縁前項減免平米不係正糧係是多餘以備賑濟之數及臣到蘇州府各縣人民亦各稱府縣作灾數少納糧不起臣欲照常州府無錫等縣事例每平米一石減免一斗内吳江縣查無餘米長洲等縣餘米數亦不多不彀減免因此仰令將折糧銀布暫且停徵一半内吳江縣太倉米亦暫且停徵除停徵蘇州府銀布等項縁由先巳具題及通行各府將無徵糧草聽候覆勘仍將成熟有徵糧草作急催徵起運兌軍外為此今將告灾直𨽻各府成熟灾傷糧草總數開坐謹具題知應天府灾傷無徵秋糧七萬一千九百五十八石八升二合四勺六抄三撮馬草八萬四千七百九十五包五觔十五兩九錢三分八毫鎮江府灾傷無徵秋糧六萬六千三百三十九石二斗六升四合一勺馬草八萬四千六十一包九斤十兩蘇州府灾傷無徵秋糧二十四萬八千八百五十六石四斗六合六勺馬草七萬四千三百九包九斤八兩續告灾傷停徵銀九萬五千七百五十兩准米三十八萬三千石布九萬疋准米九萬石米九千二百石常州府灾傷無徵秋糧九萬六千七百五十六石五斗三升八合四勺馬草七萬二千七百八十六包七斤十五兩續告灾傷減免平米四萬九千九百七十二石一斗一升三合九勺松江府灾傷無徵秋糧一十六萬八千二十二石四斗五升八合七勺馬草五萬七百五十三包五斤六兩六錢二釐太平府當塗縣灾傷無徵秋糧三千二百四十石八斗二升九合六勺馬草三千六百八十二包九斤十五兩三錢乞休致奏狀臣原籍陜西西安府耀州三原縣光逺里由正統十三年進士改翰林院庶吉士初授大理寺左評事供職二年半陞本寺左寺副又二年半陞直𨽻揚州府知府又五年半陞江西布政司右布政使又三年八箇月陞河南布政司左布政使又九箇月陞都察院右副都御史撫治流民又二年以平賊功陞本院左副都御史巡撫河南又一年陞南京刑部左侍郎又九箇月丁父憂服闋改刑部左侍郎總理河道又一年半改南京户部左侍郎又三年半改都察院左副都御史巡撫雲南又七箇月以九年考滿陞本院右都御史仍前巡撫未久改南京都察院右都御史㕘贊機務又未久陞南京兵部尚書仍前㕘贊未踰年又改兵部尚書兼都察院左副都御史巡撫南直𨽻蘇松等處地方今已三年有餘伏念臣猥以駑鈍之資誤蒙列聖曁皇上莫大之恩拔擢至此叨享厚禄三十餘年未嘗不知感激而思補報亦未嘗不欲長顯榮而久富貴第臣犬馬之年今巳六十有七矣筋力巳衰矣精神已倦矣雖欲勉彊自然勉彊不去矧蘇松常鎮等府地方錢糧多詞訟多是非多非衰老者所宜久居今臣巡撫其地巳三年之久矣衰老如此若猶栖栖不去深恐墮悞公事患生不測而為聖政之累伏望聖恩憐臣衰老放臣歸田另選賢能代臣巡撫非惟臣之幸實乃地方之幸也臣下情無任不勝激切屏營之至成化十八年三月二十日奏奉聖㫖卿敭歴内外諳練事體宜勉副委任不允休致吏部知道乞取回買玩好王太監奏狀據江東馬驛報准前路逓到欽差内官監太監王牌面為公務事當職前往南直𨽻浙江江西等處公幹先遣牌面前去仰沿途軍衛有司驛逓巡司等衙門官吏即便抄牌預備廩給口糧馬匹車輛軍民人夫等項差委的當官員管領聽候應付拽送毋得稽遲有悞公務惹罪不便所司官吏敢有指以饋送下程為由因而科斂軍民財物或體訪得出或被人告發輕則量情責罰重則枷釘解京奏聞區處或有假稱當職處陳告以憑懲治沿途逓牌衙門不分晝夜火速差人程逓前去毋得磨擦牌面字様如有糢糊就便寫記驛名開申到職治以重罪先具抄牌官吏不違依准繳來仰將此牌程逓送抵南京㑹同館收候當職按臨至日通將各該官吏不違依准并執結連牌呈繳施行等因據報臣始則以為朝廷軫念淮陽蘇松等府地方饑荒軍民流亡恐臣等奉命不謹莫能區畫賑貸以致失所特遣近臣齎内帑錢物逺來救濟旣喜且懼者累日巳而𫝊聞太監帶百十號馬快船隻裝載私鹽前來江南收買玩好之物雖未委虚的今大江南北饑荒殊甚斗米直七八十錢民有饑色野有餓莩老稚轉於溝壑壯者散而之四方者不可勝數臣奉勅往來提督賑濟近來雖頗安妥而張口待哺者尚多若太監此行為賑恤饑荒而來則大江南北億萬生靈舉蒙再造之恩陛下盛徳大業可以比隆二帝三皇而無疆國祚可以與天地相為悠久矣若為收買玩好之物而來似此聲勢張皇未免騷擾郡邑驚嚇吏民臣恐逺近𫝊聞將謂陛下惟珍竒是好而無憂民之心致使狂夫得以藉口非社稷之福也臣以為當此饑荒之際朝廷正宜裁冗費却貢獻禁奢侈抑僥倖慎爵賞重名器輕徭役惜民力以收天下之心以培億萬年社稷之基本夫何織造旁午貢獻絡繹奢侈之風競起倖進之門大開遂使爵賞冗濫名器混淆徭役繁興財力日屈欲斯民之不貧且盜欲天下如泰山之安得乎昔唐太宗遣使往凉州諷李大亮獻其名鷹而大亮不可明皇令益州織半臂褙子琵琶捍撥鏤牙合子等蘇許公不奉詔其事載諸信史後之讀史者莫不稱太宗明皇之明李大亮蘇許公之忠今陛下以上聖之資居至尊之位聰明睿智本乎天性仁孝誠敬不待勉彊可以為堯舜可以邁湯武尚何太宗明皇之足言哉臣幸際明時備員巡撫偶遇所聞若隠忍不言使陛下不知而天下國家受其弊豈忠臣乎非惟有愧於皐夔稷契伊傅周召豈不有愧於李大亮蘇許公之輩是以臣不避斧鉞為陛下言之者非為身家計也為社稷計耳惟陛下留神深思速返其使併將前數事與臺閣大臣從長計議作急區處以安天下社稷幸甚生民幸甚臣不勝戰慄隕越之至成化十八年七月十五日具題奏繳賑濟過軍民户口文冊奏狀照得成化十八年正月初三日臣因應天府并蘇松常鎮等府衛地方去年灾傷薄收即今東作方興誠恐貧難軍民缺少牛種不能耕種及無口食難以度日巳將行令各該府衛委官督屬掌印官從公取勘被灾極貧軍民如無牛具者為勸借助耕無種穀者斟酌借與缺食者自二月起至四月終止每月照例驗口給糧賑濟仍斟酌現在倉糧若有贏餘就便減價糶賣以平米價本年四月十六日節該欽奉勅兹特命爾督委前項府州縣衛所官吏巡歴灾重去處取勘饑民的數即將預備倉糧照數給散其蘇松常鎮四府各有逓年該收糧内撥剰餘米斟酌多寡散與極貧軍民應天府如果糧少聽於南京常平倉量借二萬石前去接濟除户部擬奏條件外其餘有益軍民之事勅内該載未盡者聽爾從宜處置務俾軍民得所地方寧妥欽此欽遵隨准户部咨開擬奏條件及稱候今夏麥熟之後將賑濟過倉糧并軍民數目造冊具奏等因到院除遵照勅㫖并開來事件一一奉行外臣又遵奉徳意從宜處置數事行仰各府衛將現徵未完錢糧内貧難小户辦納不起與監追虧折拖欠錢糧人犯并民間一應私債停候秋成追徵取討及禁止官員不許指以脩造公用為由罰人贓物濱海之民以魚鹽為生但係肩挑背負私鹽易換飯米及於海邊採取魚鮮救饑者暫且弛禁饋送公差人員下程紙劄等數各要減省往來進貢經過船隻止許撥夫拽送不許多討人夫勒要財物及照光年户部奏准許令軍民給與散官冠帶等項事例召人納米俱收本處以備賑濟再令年深馬夫書手量出糧米與夫考滿官吏所出糧米俱撥吳江等縣缺糧去處以助賑濟外又於各處設立飯堂煮粥以食求乞之人臣復躬親往來提督各該委官盡心為之由是撫内缺食軍民得蒙徵貸又蒙寛恤咸有生意不至流亡失所莫不感戴聖恩兹今二麥雖薄收而秋禾栽蒔將遍民情頗安可保無虞隨據應天并蘇松常鎮等府衛各將賑濟過人口糧米等項數目縁由申呈到臣除查算相同擬合開坐造冊今將造完文冊具奏陳言聖學疏據直𨽻常州府申該國子監監生湯楘齎捧聖㫖揭帖内開成化十八年八月司設監太監杜福友𫝊奉聖㫖著國子監生湯楘軍舍孫智前去常州府著落府縣拘集民人段銓家取要截江網古書一部盧岐僧院取要刻絲作羅漢十八幅觀音二幅再有古跡書畫尋來進用欽此欽遵具申得此臣有以見陛下好學好古好善之盛心也中庸曰好學近乎知論語曰好古敏以求之也孟子曰好善優於天下世之人好其一不好其二者有矣好其二不好其一者亦有矣夫兼好而無遺者則鮮矣今陛下兼好之矣非天縱之聖其能然乎然帝王之學與韋布之學不同韋布之人隠而未用多聞彊記將以待聘故其學貴乎博帝王者身兼治教之責而為億兆之主故其學不在乎博在乎知其要夫經各有其要能知其要則足以盡博矣詩三百一言以蔽之曰思無邪若能思無邪雖不讀詩亦可也經禮三百曲禮三千亦惟曰毋不敬而巳若能毋不敬雖不讀禮亦可也佛氏之書臣不知其幾千萬巻也其要不過慈悲而巳老氏之書臣亦不知其有幾也其要不過清净而已曰慈悲曰清凈自是出家人之事皆非治天下之道也其餘神仙之說黄老之術盡妄誕耳非惟治天下不可用且以惑世誣民而為斯道之害尤非帝王所當留意者也儒者之書發明三綱五常之道修齊治平之理如布帛菽粟之在天地間有不可一日而無也然而諸儒論說紛紜簡編浩繁亦豈帝王所能徧觀而盡讀之今陛下勵精圖治自朝至於日中昃不遑暇食若復博覽羣籍玩索章句不無有勞宸衷非所以保養天和也如於退朝之後清燕之時取書之二典三謨與夫太甲說命無逸旅獒諸篇而讀之復取漢唐書有闗於治亂成敗者三二䇿而涉獵之儘可以開廣聖心資助化理何必徧求諸家之書而觀之乎大抵帝王之學非徒誦說文字講解訓詁而巳要在學二帝三王之道身體而力行之建中建極為百官之程式俾萬民之乂安可也且土階三尺茅茨不翦堯也惡衣菲食禹也今日崇高富貴固難師法乎堯禹亦不可不以堯禹之心為心而撙節之若能以堯禹之心為心而撙節之即今日之堯禹也不邇聲色不殖貨利湯也視民如傷望道而未之見文王也不泄邇不忘逺武王也若能心湯之心行湯之道即湯也心文武之心行文武之道即文武也夫何不可及之有凡此皆為聖學之急務也孟子曰左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之今日進退人才必如此而後可不如此則君子退而小人進矣又曰左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也今日之用刑亦必如此而後可不如此則刑必及於無辜矣諸葛武侯曰宫中府中俱為一體陟罰臧否不宜異同若有作奸犯科及為忠善者宜付有司論其刑賞以昭平明之治不宜偏私使内外異法也今日之刑賞又豈可不如此乎不如此則同功異賞同罪異罰而人心不服矣凡此皆馭世之要道也是道也人皆知之皆能言之然人皆知之皆能言之而不言者恐無益於事徒自失寵而取辱也臣雖至愚極陋非不知此第以菲才備位六卿受恩深重若復如此非惟有負恩徳且非疇昔之志也是以直言而不隠者非沽名也將以報徳也報之欲陛下為堯舜之君也欲陛下左右之人為堯舜之臣也欲天下蒼生為堯舜之民而被堯舜之澤也欲後世之人思慕陛下如今日之人思慕堯舜也倘蒙不以臣言為迂留神深思専意於二帝三王之學是法是行而不為異端異術之所惑其進退人材也其用刑也必如孟子之言其賞功也其罰罪也必如武侯之言若雍熈泰和之治不見於今日聖徳仁聲不𫝊播於無窮臣則甘受妄言之罪臣昧死上言干冒宸嚴不勝惶恐之至成化十八年十一月十三日具奏乞休致奏狀臣以襪線微才荷國厚恩官至尚書職兼都御史受禄三十餘年貤恩之典及乎父祖寵幸巳極是以日夜孜孜思效分寸圖報萬一邇來屢進狂瞽之言自謂若得上達宸聦雖伏斧鑕亦甘心焉伏蒙陛下𢎞天地之量昭日月之明察納其言而優容之是臣幸中之幸也臣雖至愚豈不益感聖徳益思奮勵益欲效死豈肯自負自棄而甘為林下之窮人乎第臣年嵗巳至疾病侵尋耳目失聦明視聽不便腿腰常疼痛行坐不便牙齒脫落過半言語不便飲食亦不便加以志倦神疲頽焉以居欲其立紀綱肅官僚熙庶績貞百度上副九重之託下遂萬物之情豈易能乎失今不去竊恐將來瘝官曠職禍出不測而為世所笑非但臣之羞且為聖政之累也伏望聖恩憐臣衰老放歸田里另選精彊大臣巡撫其地康濟兆民俾臣不失進退之宜得全始終之節感戴天恩豈有涯涘論中使擾人因乞休致奏狀臣去年以年力衰老陳乞休致節該欽奉聖㫖卿敭歴内外諳練事體宜勉副委任不允休致欽此今年臣復乞休致又節該欽奉聖㫖不准休致著用心巡撫地方欽此臣惟聖明之朝賢才濟濟不為無人如臣之愚正宜退避然猶勉留再三而不舍者臣有以見陛下不以犬馬視臣而以耆舊大臣之禮待臣雖成湯之先民時若成王之壽耇無遺不是過也臣雖無似豈不感激聖徳然陛下旣以大臣之禮待臣臣敢不以大臣之道自勉欲盡大臣之道必須遵守祖宗之法以安民為心而不為勢利所奪可也一為勢利所奪則祖宗之法壊而民不安矣民不安豈不失大臣之職乎然欲不失其職豈能免毁言如即墨大夫乎且祖宗時差内臣出外公幹或齎勅書或齎聖㫖帖子必明開所幹公事縁由或所取物件數目是以在外諸司衙門易於奉行來使無過求多取之弊地方免横征暴斂之擾近見太監王敬齎來聖㫖帖子止開前往常州府蘇州府採取藥餌收買書籍别無行拘大户索要銀兩縁由豈期本官動以朝廷為名需索銀兩無有紀極東南地方為之騷然民不堪命臣巡撫其地心知其非而莫敢誰何然王敬未回而太監段英又來造辦藥梅氷梅蘇松常三府巳辦與價銀六千兩打發跟隨人員銀兩在外以臣計之造辦藥梅氷梅用銀多不過千兩尚有五千兩餘剰今又行令鎮江太平池州寧國安慶徽州廣徳七府州每處取要酥合油牛黄沉香乳香等藥近千斤約直價銀一千五百餘兩豈真要此藥物無非以此為名而勒要銀兩耳又牌仰松江府速辦上等花毯二十條各色綾一百疋大細白綿布一百疋大様手巾一百條約直價銀五百餘兩又發鈔四百塊與松江府官賣每塊要銀五兩又該銀二千兩蘇常等府必有别項取索亦必發賣鈔塊但未據申報縁照前項藥餌花毯等項俱非聖㫖帖子内開來物件臣又訪得前鈔係是兩京客商之物今却槩令有司措辦變賣需索不巳征斂重疊民豈克堪各府申臣定奪臣若阿順其意令其應付則祖宗之法壊而民不安矣臣是以遵守祖宗之法不敢擅支錢糧逼迫小民巳行本官處查理外彼必謂臣打攪進貢未免懐恨怒之心發譖毁之言此臣所以欲盡職而心不安也况臣委實衰老無才無行不達時務不堪巡撫現今地方并江上彊賊不時竊發臣委實膽小惴惴焉惟恐小民不能聊生從賊為非地方不安而為社稷之憂伏望聖恩憐憫放臣歸田另選賢才而任用之庶幾優劣得所政舉民安臣無知干冒天威不勝惶懼之至論中使科擾民所得物件奏狀臣惟自古人臣之事君以聲色貨利珍竒方術為容悅以取寵幸者未有不壊天下之事而為社稷之憂也切見内官監太監王敬前來江南採取藥餌收買書籍朝廷止賜鹽七千引公用止可直銀八千餘兩却發鹽一萬五千五百引與寧國等府衛逼要銀三萬二千五百兩不知餘鹽八千五百引從何而來多取價利作何花銷又有鹽數十船發去江北廬州等府衛江西南昌府等處官賣不知又得銀幾千萬兩至蘇常等府刑驅勢逼官民取受銀三萬六千餘兩玩器藥餌等物并跟隨人員私下取受者不在其數又令蘇州府織綵粧五毒大紅紗五百餘疋每疋直價銀十五六兩止給銀六兩五錢及其交納每疋反勒要機户解扛銀五兩虧民數多使之破家蕩産含寃莫訴其在江西浙江二布政司并南京及沿途索要官民金銀并玩器等物不知又有幾千萬數臣聞千户王臣本非勲賢叨享禄位専弄左道邪術豈知經國大體而太監王敬聽伊撥置刻剥軍民舳艫相銜滿載而歸以為自巳孝順自巳功能以覬寵幸殊不知取之不義得之不以其道所以失人心者在此所以損國體者在此所以傷和氣而致灾沴者亦在此也若但見其易而不思其難樂其有而不恤其無往者過而來者續用日侈而財日屈非民之福亦非國之福也况各人假公營私明取暗受者多使朝廷擔其名此尤不可之甚者也除王敬等在江西等處賣鹽并取索銀兩臣不知備細者不開外今將臣所知者開坐具題計開寧國府賣鹽三千五百引解過價銀七千兩内三千三百七十八兩九錢八分一厘係那借在官錢糧三千六百二十一兩一分九釐係里甲措辦太監王敬收太平府賣鹽一千五百引解過價銀三千兩係舖行里甲措辦池州府賣鹽二千引解過價銀四千二百兩俱里甲措辦又賣鈔四十塊解過價銀二百二十兩係舖行借出安慶府賣鹽二千五百引解過價銀五千二百五十兩係里甲措辦九江府賣鹽二千五百引解過價銀五千二百五十一兩九錢九分係賑濟銀内支廣徳州賣鹽二千引解過價銀四千六百一十九兩係舖行措辦建陽衛賣鹽五百引解過價銀一千兩係官軍俸糧當借安慶衛賣鹽五百引解過價銀一千兩係官軍俸糧當借九江衛賣鹽五百引解銀一千八十五兩又使用銀九十五兩内七百八十七兩五錢係官軍俸糧銀三百九十二兩五錢係借客人的宣州衛不曽賣鹽送銀二百八十兩係官軍俸糧當借以上銀兩俱太監王敬同千户王臣等秤收松江府華亭縣大户陳宣等十名共出銀七百兩刻絲作褥子心一副李在畫四軸觀音二軸龍涎寳瓶一箇一秤金孩兒四軸三白圖一軸聖一軸夏志横披一軸季龍眠佛三軸古銅香爐三箇慶壽圖一軸高彦畫一軸商嵌香爐三箇彭寳香爐一箇水晶環一箇倪元鎮畫一軸葉仲明千字文一巻戴文進畫一幅張梅巖佛像三軸銀字蓮經七巻孩兒四軸梁楷佛三軸刻絲作斗弓畫二軸王子乆畫一軸手提銅香爐一箇官寳罐一箇夏珪畫四軸毘陵草蟲二幅古銅花瓶三箇上海縣大户張瑾等一十二名共出銀七百兩古銅花瓶一對温日觀葡萄一幅畫二軸羅漢二幅嘉興府大户槐越等九名出銀七百兩白玉石香盒一箇翎毛畫四幅水墨畫四幅草書手卷一箇百字圖畫四幅山水畫十二幅禽鳥冊葉一箇琥珀臺盞二幅白玉石筆架一箇水墨翎毛畫二幅菜玉盞一隻琥珀念珠一串又糧長出鈔價銀五百五十兩蘇州府長州縣大户丘元伏等十名共出銀二千四十七兩吳縣大户蘇通等二十六名共出銀二千三十五兩崑山縣共出銀一千八百五十兩又大户羅璵等五名共出銀四百兩糧長歸瓚等共出銀一千一百兩里長張昭等共出銀四百五十兩常熟縣大户顧志行等二十二名共出銀一千七百七十兩八錢五分水晶臺盤一副吳江縣大户吳壽等二十七名共出銀一千兩内一千三百兩太監王敬收二百五十五兩又二百兩千户王臣等收二十兩軍牢頭目收嘉定縣大户王半海等九名共出銀一千五百九十八兩常州府江隂縣大户徐熙等三十四名共出銀一萬兩太監王敬分八千兩千户王臣等分二千兩無錫縣大户鄒賢等三十名共出銀六千四百兩古畫一十二幅剔紅果盒一箇剔紅盆二箇俱太監王敬收外銀二百五十兩千户王臣舍人張麒分武進縣大户蔣鎮等一十名共出銀三千兩太監王敬分一千兩千户王臣等分五百兩五百兩分付買藥材書畫宜興縣大户張輗等共出銀一千兩太監王敬收又訪得太監王敬起程之時與無錫等四縣官到常州府每縣索要銀五百兩共該銀二千兩糾劾奸人撥置中使擾亂地方奏狀去年臣見内官監太監王敬牌面内有前往南直𨽻浙江江西等處公幹仰軍衛有司驛逓巡司等衙門預備廩給口糧馬匹車輛人夫等項委官管領聽候應付輕則量情責罰重則枷釘解京奏聞區處等語又聞本官沿途弄勢張聲騷擾軍民臣恐為國生事是以昧死上聞乞取本官回京以消未然之患繼聞差人趕至徐州黄家閘本官接了帖子不知縁何不回臣伏覩節該欽奉聖㫖今差王敬前去常州府蘇州府採取藥餌收買書籍欽此臣又見應付本官闗文内開䝉欽依准與長蘆運司餘鹽七千引帶去公用仰惟聖意蓋欲伊將前鹽兩平賣價收買藥餌書籍免致科擾下人此陛下仁民愛物慮患防微之盛心也豈期跟隨王敬千户等官王臣等不體聖意罔恤民難撥置本官自離京師直抵南京經過軍衛有司運司驛逓巡司等衙門無不科擾所得銀兩不可勝計比到南京清江厰住泊數日上新河又住泊數日而城裏城外得過之家所有玩器書畫金銀寳石等物搜括殆盡又撥置本官將原賜官鹽并夾帶私鹽及攬到商鹽差錦衣衛百户等官王釗等彊發與太平寧國池州安慶九江五府建陽安慶九江三衛并廣徳州共一萬五千五百引逼要價銀三萬二千五百五十兩其鹽斤重多不足每引止可賣銀一兩一二錢定要煎銀二兩又要加耗反取舖行不致高擡少估結狀以避罪責鹽纔下船就要銀兩坐守催併急如星火官吏被逼無奈只得照數辦與又發鈔四十塊與池州府逼要煎銀二百二十兩宣州衛止有二千户所不肯領鹽却將指揮責打亦要去銀二百八十兩俱解太監王敬等處獲有批收前項銀兩係是那移官錢扣賣軍糧當借客商資本至今官錢無可填補官軍不得糧喫客債尚未還足累官損民含寃莫訴其發去江北廬州等府衛并江西南昌等處變賣者其數尤多所得價銀何止三萬餘兩在江西地方住兩箇月浙江地方亦住兩箇月彼中所得玩器金銀臣雖不知細數嘗聞到彼之日無物不要城市舖店為之闗閉村落人民無不驚駭又發鈔五百餘塊與杭州等府俵散糧長每鈔一塊止值銀三兩却要銀五兩嘉興府賣鈔一百一十塊巳解與銀五百五十兩獲有批收亦可查考到嘉興府拘大户槐越等到官各將所有玩器書畫送與因怪不送銀兩每人責打二十順腿拘住要銀得銀方纔疎放又行令蘇松府縣拘拿大户索要玩器并金銀等物大户有者自出無者著令糧長出辦又威逼蘇州府長吳二縣著機户織綵粧五毒大紅紗五百一十二疋每疋直工價銀一十五兩止給與銀六兩五錢機户賠銀八兩五錢共賠銀四千三百餘兩中間看不中者又令重織及其交納每疋反要機户解扛銀五兩負累機户掲債破産苦不可言且五毒者艾虎蜈蚣蝦蟆蛇蝎也以五彩絨組織此五物於大紅紗兩肩胸背通袖膝襴之上其為淫巧竒怪古所未聞其費工料每疋可織常紗十餘疋其妨農廢業尤不可言况此物止用於端午之一日其他日皆不用又况此毒物人皆見之必以為不祥而憎惡之今織之於衣非至尊所宜服亦非宫中所可服不知本官暴殄許多天物害虐無數烝民織許多件數將何為也觀此一事則其平昔不以財為財不以民為民可知到無錫縣親率王臣等下鄉打開大户鄒賢家門捉拿本人索要金銀因本人躱避就在其家住坐二日拘常州府官帶領畫匠將本家房屋畫成圖本聲言回京進與朝廷定將他家抄了嚇詐鄒賢兄弟二人銀兩與王臣等分用又捉拿華文熙等鎻打勒要銀兩又嗔知縣熊經拘人不到要行綑打本官懼怕當將官庫銀兩替大户出銀又取武進縣胡溥到江隂縣發放著大户蔣鎮等一十名出銀八千兩其後各人共輳三千兩又發放常州府知府孫仁朝廷有宻㫖著我去徐中書等家討要玩器書畫等物我如今要往各家去被孫仁勸住各家共輳銀一萬兩送王敬等分用又有等無藉小人乗機妄首人家有物各官輒便差人或行縣四散捉拿驚嚇人户逃走地方為之騷然因拿大户陳䕶却將鄰人李源妻陸氏趕逼下河身死又發牌問無錫縣討要兼絲布茶扇等物王臣欺瞞王敬私下詐騙軍民銀兩又不可以筆記其松江等府不係坐來收買書籍地方亦皆擾徧所進書籍玩器等項俱係取諸人者藥餌亦係府縣另行備價收買者並不曽用賣鹽價銀人民委實受害不得安生咸有怨言臣惟陛下自嗣大歴服以來敬慎厥徳賢能效職庶政咸和二十年間邊方少警海内晏然不圖今日而有此事非獨上虧國體抑且下失人心設使王敬等將所得玩器金銀等物盡數進獻以充國用而取之不義如此得之不以其道如此非聖明所宜受况朝廷富有四海府庫皆財倉廩皆粟豈少此哉如或不肯盡數進獻使朝廷虚擔其名各人實享其利豈不尤可太息兼且朝廷所用錢糧多仰給於蘇松常等府若使彼處百姓不得安生國用何所取給此數府百姓尤宜加意安全而不可使之困苦流冗也昔治書侍御史權萬紀言宣饒出銀大發采之嵗可得數百萬唐太宗曰卿未嘗進一賢才而専言銀利昔堯舜抵璧於山投珠於谷漢之桓靈乃聚錢為私藏卿欲以桓靈待我邪乃出萬紀今王敬等所為害理尤甚決不可以待權萬紀者待之臣又訪得王臣即王瘸子俱是奸詐無賴小人素無勲勞止以左道邪術得幸父子俱得好官非惟虚糜廩禄有玷名器且使懐才抱藝之士為之不忿夫金銀乃天地之精氣非智術所能為設若王臣能之何不自做自用何以日前到處以此為名騙人財物累犯刑憲何以今日撥置内官用彊要人金銀騷擾地方昔文成五利旣以邪術欺漢武今王臣復以邪術欺陛下此忠臣義士所以為之痛心而扼腕也且陛下為萬乗之君百神之主而敢為之欺罔如此百姓乃陛下之赤子邦家之根本而敢肆其暴虐如此是可忍也孰不可忍也臣又聞王臣在江西等處收買美色婦女數人盛粧在船言頗矯誣人多不信百户姚敬娶娼為妾被王敬搜出送蘇州衛鎮撫收監於本官名下追銀一千兩恐後訐出王臣前情仍將本婦給還姚敬此亦人所共知凡有識者莫不曰陛下聖徳寛仁敬天愛民若知此情必不容之但一時不知耳臣備員六卿奉勅巡撫職在衛國而安民覩兹弊事若循黙不言依阿取容萬一事出不測以遺君父之憂雖死何贖是以不敢不言之伏望陛下留意於難保之天命割恩於壊事之小人奮乾剛之獨斷昭王法之無私行取王敬王臣等到京或明正典憲或量加懲治使天下知聚斂之擾人非朝廷意乃王敬等矯制王敬擾亂地方非其本心乃王臣等撥置而然也如此則怨有所歸人心寧止而天下安矣不然則怨無所歸其患蓋有不可勝言者矣臣愚仍望朝廷自今伊始凡百用度悉從儉約節不經之費罷無功之賞裁冗官汰冗食則財用自足果缺公用物件定擬數目行移出産地方採辦進用則民自不擾内外公差官員跟隨頭目多不許過三二名則事自減省否則賣官鬻獄不足以供執事者之費剥膚椎髓不足以滿隨行人之欲欲斯民之不窮財力之不屈盜賊之不起天下之治安得乎臣為國之心激切不自知其言之狂且瞽也罪該萬死儻蒙聖恩優容不加譴責亦乞將臣放歸田里耕以待盡為幸無涯除王敬王臣等索要沿途衙門銀兩并浙江江西等處財物不知的數及蘇常二府進貢藥餌書籍不開外今將各官嚇詐臣該管地方并九江一府官民金銀等物開坐具題申救常州府知府孫仁奏狀臣聞太監王敬公幹回京稱㫖受賞隨行千户王臣亦蒙陞賞王敬㕘奏常州府知府孫仁現蒙差官提取聞者莫不驚愕咸謂王敬此來知府孫仁十分慇懃隨到無錫縣聽候十餘日又隨到江隂縣聽候十餘日凡力可為者本官無不為之今乃不得王敬王臣之喜反招其怒若謂本官欺罔違慢縁巳到處跟隨聽候如指之從臂非有欺罔違慢也若謂本官不行收買藥餌縁常州一府巳送書籍等項價銀一萬九千餘兩又另用銀五百餘兩收買藥餌進用非不行收買藥餌也若謂本官將銀兩囑送縁前項銀兩書籍藥餌俱巳交收了當别無公私可囑也况孫仁自到任以來有為有守深得民心若罪本官固雖快言者之意不無失地方小民之心然快一二人之意其事小失千萬人之心其事大伏望聖恩少霽天威稍寛孫仁之罪則庶民不失望官知所勸而地方安矣臣昧死上言不勝悚懼之至陳言制治保邦奏狀臣聞周官有曰制治於未亂保邦於未危誠以未亂而制治則必不至於亂未危而保邦則必不至於危使已亂而制治雖勞心經營終不能救其亂已危而保邦雖極力扶持終無以免其危此往古巳驗之實事非俗儒聞談之空言也臣不敢逺舉姑以近事言之宋徽宗初年天下太平蔡京倡邪說以為當豐亨豫大之運専以奢侈勸上窮極土木之工作玉清神霄等宫崇信道士林靈素以朱勔領花石綱竒花異木怪石珍禽竒獸無逺不至加以梁師成専務應奉作為淫巧以蠱上心是以民窮財盡政事不理國勢不競遂致方臘之亂而成靖康之禍方其初也使納言者之諫罷前項無益之事専以節用愛人為心使百官和於朝萬物和於野宋其有衰乎方今天下太平四方寧謐國勢若金甌之完全無纎毫之缺損又况皇上聖徳寛仁神武不殺上合天心下合民心禮樂法度之巍然典章文物之煥乎可謂治且安矣宜若無可慮矣然古人有言亂不生於亂而生於治治之極者亂之始此臣之所以為陛下憂也陛下雖精一執中無怠無荒第左右之人感戴聖恩思欲報之肆為掊克之計爭獻竒異之物以恱聖心以固恩寵此固孝順之意若不及早圖之更絃改轍誠恐浸潤日久嗜慾日滋糜費日多財用日屈民日益窮事日益壊即不幸有數年之兵數年之荒不知何以為計欲如今日之安欲無後日之悔恐未能也此臣之所以願陛下制治於未亂之時保邦於未危之日以隆聖明億萬年無疆之丕緒也伏望陛下以古為鑑乃勅多官㑹議制治保邦之條件採而行之天下幸甚宗社幸甚陳言治安奏狀臣聞邇者邊庭不靖内外戒嚴朝議以各邊軍餉不足也旣遣官以糴買之以京營軍士不足也復遣官以清查之又以内帑銀物不足也而出征官軍無厚賞方今天下一家海内一國以言乎糧餉漕運之轉輸陸路之飛輓非不多也以言乎銀兩鑛場之閘辦糧草之折納非不廣也以言乎軍馬在京有四十餘衛所又有外衛番上之役到營而操練分將以統領非不衆也夫如是宜乎廪有餘粟而不可勝食矣庫有餘財而不可勝用矣軍士多且精而所向無敵矣奈何一旦有警輒見不足蓋承平日久安不慮危糧費於冗食財費於侈用軍疲於差占若王師不早出强敵不早退臣恐不止口外之被擾邊民之被擄其為患蓋有不可勝言者矣今敵兵既罷王師凱旋此實皇上聖徳格天天道助順將校用命之所致也然目前似無事矣臣不敢保其必無事似可安矣臣不敢保其必可安若謂敵兵旣去必不來也臣不敢保其必不來書曰惟事事乃其有備無患孫子曰無恃其不來恃吾有以待之此臣等居高位享厚禄為國股肱者所當致意也伏望陛下當此閒暇之時勅令諸司明其政刑量減在官冗食之人無輕冒報功次之罰重名器抑奔競則不加賦而糧自足矣少作無益之事不貴珍異之物慎賜賚節用度則不厚斂而財自足矣免畚土輦石之差嚴私役買閒之禁時教閱養銳氣則不招集而軍自足矣三者旣足則元氣自壯根本自固邪氣自不能入外侮自不敢作設有邊報要軍馬就有軍馬要糧草就有糧草要賞賜就有賞賜尅期以出相機而行以守則固以戰則勝何賊之不可破而何功之不可成哉茍不撙節愛養於平昔及其事至而欲取辦於一時臣未見其濟也此國家之大計廟堂之上必有以處之也若無待於臣言矣今臣言之者亦區區為國之心也惟聖明恕其狂瞽而裁察之幸甚塵瀆宸聦不勝戰慄待罪之至敷陳古訓奏疏臣惟古之堯舜禹湯文武之為君聖君也皋夔稷契伊傅周召之為臣賢臣也當是時君不自以為聖而必取人以為善臣不以君為聖而必責難以為恭是故益告舜曰吁戒哉儆戒無虞罔失法度罔遊於逸罔淫於樂任賢勿貳去邪勿疑疑謀勿成百志惟熙罔違道以干百姓之譽罔咈百姓以從已之欲無怠無荒四夷來王禹告舜曰無若丹朱傲惟慢遊是好傲虐是作罔晝夜頟頟罔水行舟朋淫於家用殄厥世夫聖莫聖於舜而於前此數者曷嘗有一於身哉益非不知也禹非不知也而猶以是告之者蓋舜處崇高之位其流將或至此所以豫為之儆戒以防之者人臣愛君之心也仲虺之告成湯有曰徳日新萬邦惟懐志自滿九族乃離王懋昭大徳建中于民以義制事以禮制心垂裕後昆予聞曰能自得師者王謂人莫已若者亡好問則裕自用則小伊尹告太甲有曰制官刑儆于有位曰敢有恒舞于宫酣歌于室時謂巫風敢有殉于貨色恒于遊畋時謂淫風敢有侮聖言逆忠直逺耆徳比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨又曰慎乃儉徳惟懐永圖又曰徳惟治否徳亂與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后傅說告高宗有曰惟治亂在庶官官不及私昵惟其能爵罔及惡徳惟其賢又曰惟事事乃其有備無患無啓寵納侮無耻過作非又曰監于先王成憲其永無愆召公告武王有曰玩人喪徳玩物喪志不作無益害有益功乃成不貴異物賤用物民乃足不寳逺物則逺人格所寳惟賢則邇人安不矜細行終累大徳告成王有曰我不可不監於有夏亦不可不監於有殷我不敢知曰有夏服天命惟有厯年我不敢知曰不其延惟不敬厥徳乃早墜厥命我不敢知曰有殷受天命惟有厯年我不敢知曰不其延惟不敬厥徳乃早墜厥命又曰肆惟王其疾敬徳王其徳之用祈天永命周公告成王有曰在昔殷王中宗嚴恭寅畏天命自度治民祇懼不敢荒寧肆中宗之享國七十有五年其在高宗時舊勞于外爰曁小人作其即位乃或亮隂三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至於小大無時或怨肆高宗之享國五十有九年其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟躭樂之從自時厥後亦罔或克壽或十年或七八年或五六年或四三年又曰文王不敢盤于遊畋以庶邦惟正之供文王受命惟中身厥享國五十年臣惟湯武之聖豈仲虺召公能過之哉太甲高宗成王之賢亦豈出於伊傅周召之下哉然而仲虺伊傅周召屢進直言懇懇切切而不顧者以其食君之禄受君之託職分之當為也在他人聽之若有所不堪而湯武太甲高宗成王皆受之而不拒而不罪者知其立言之意為國為民為天下而不為巳私也有是君有是臣所以共成雍熙泰和之治澤被當時名垂萬世而無巳也仰惟陛下聦明聖智孝友寛仁承祖宗之大統為億兆之君師可以比隆二帝三王而軼乎太甲高宗成王逺矣臣生當斯世陟兹崇階沐仁義之膏澤覩道徳之光輝何啻親見堯舜禹湯文武之聖君矣欲效皋夔稷契伊傅周召之敷言以盡忠愧乏其才欲黙黙以自全尢恐負陛下之深恩日夜思懼計無所出是以掇拾前言以為陛下獻惟陛下於清燕之時召二三儒臣於便殿逐句而詳解之復以今日之事逐件而體比之其有合者行之不合者改之可儆戒者儆戒之可效法者效法之務俾有益於聖徳有益於治道有益於國家有益於生民而後巳如此是陛下以皋夔稷契伊傅周召之任待臣臣以皋䕫稷契伊傅周召之道事陛下也何患乎四海之不賓服萬邦之不咸寧又何患乎雍熈泰和之治不見於今日哉臣年七十屢陳休致不蒙聖恩俞允陛下若用臣言雖退歸田里即同日侍左右若不用臣言再留數年不過多食俸錢於臣則有益於治道則無補此臣區區為國之心天地鬼神之所共鑒非敢佞也非敢誑也伏乞聖明裁察幸甚論録事邵義𫝊奉㫖陞通判奏狀據直𨽻蘇州府申奉吏部氐字五百五十六號勘合前事成化十九年九月十四日早該太監覃昌𫝊奉聖㫖廣東韶州府巡檢司巡檢劉璋陞錦衣衛所鎮撫著仁智殿辦事儒士湯珪陞鴻臚寺序班著文華殿辦事上林苑監録事邵義陞直𨽻蘇州府通判管事該部知道欽此欽遵補本覆奏外行仰本府取本官到任日期同原領文憑繳報備奉到此照得新任通判邵義合用弓兵皂𨽻欲於均徭册内僉㸃撥與等因到臣查得蘇州府原設通判三員一員管府事一員管糧一員管治農皆現任無缺今又陞邵義前來管事是為額外冗員官冗則事不歸一而民擾矣邵義原任録事正九品也依例止該陞正八品今陞通判乃正六品也無乃有壊選法選法壊則士無定志而奔競之風起矣且邵義之為録事小官也名實未加於上下今不由吏部銓選而傳奉聖㫖陞授是官則羣情不能無疑三二年前𫝊奉聖㫖或陞一司務或陞一序班或陞一匠官或陞一千百户鎮撫方是時議者皆以為開此蹊徑後將難止但未有為陛下言之者是以陛下𫝊奉之官一年多於一年也今工部所屬額外匠官將及千員各衙門司務序班千百户鎮撫等官難以數計俱要俸禄皂𨽻伴當不無耗國用損民力而輕名器設使𫝊奉之初有人言之陛下聦明仁聖未必不從冗官未必至於如此之多今又𫝊奉聖㫖陞除在外府縣官俾之管事臣備員巡撫久處於外頗知民間疾苦若再不言將恐奔競之徒逓相效尤各尋徑路不數年間盡據天下之要地恃寵妄為正路蓁蕪賢者難進則郡縣之政日益非田里之民日益困而天下之事日益壊矣豈特耗國用損民力輕名器而巳哉陛下儻以臣言為是勅令該部將邵義照依資格陞授在外府縣相應員缺今後在内五品以下在外四品以下文職遇有員缺悉從吏部照依資格具名請㫖選用其在京堂上與夫在外方面官遇有員缺亦從吏部每員推舉相應二員請㫖於内㸃出一員俱不必𫝊奉若吏部銓選不公推舉不當明正其罪其千百户鎮撫非有軍功不得濫陞如此則奔競自息賢能在職羣情安而天下治矣如不以臣言為是伏乞聖恩容臣送骸骨還鄉非但臣之幸亦好進者之幸也臣無任干冒天威不勝惶懼待罪之至具本謹題請㫖京師地震自陳休致奏疏臣聞邇者京師地震皇上旣齋心滌慮省愆修徳勅諭羣臣改過自新懋修厥職復頒恤民安邊事宜俾之欽承此誠陛下克謹天戒應天以實勵精圖治之盛心也内外臣僚罔不淬礪激昂同心戮力勉修職業用答聖明憂勤倚毗之意而臣獨以衰朽庸劣之材竊食江南無所禆補雖聖徳寛仁不加譴責而臣自揣於巳實所不安且江南錢糧詞訟軍需買辦等項其數倍蓰於他省而官吏賢否軍民善惡雜乎其間必須年力精彊有學術有才能之人任巡撫之寄方能齊整其事上為國家分憂下為生民造福今臣犬馬之年巳是六十有九巡撫其地已踰五年筋力久衰精神已耗省覽案牘則眼目昏花分付事務則言語錯亂計慮實不及逺施為愈不如初百病嬰身諸事懶作雖不敢因循度日亦豈能奮勵成功委實無益聖時有妨賢路伏望聖恩憐臣衰老放臣歸田另任賢能用圖至治非惟臣之幸實地方之幸也臣不勝戰慄感仰之至具本謹具奏聞伏候勅㫖王端毅奏議巻五
