body:
  text: 王端毅奏議卷十二明王恕撰吏部議知府言芳升用科道官奏狀文選清吏司案呈奉本部送戶科抄出直𨽻廣平府知府言芳等奏稱工科給事中唐希介監察御史李葵盤糧專事威福等項事情該通政使司官奏奉聖㫖這本所奏的事該衙門看了來說欽此欽遵抄出送司案呈到部除專事威福及僞造關防等項事情係別部掌行外其言今後清要之職合無仍求久歷別官才德素聞之人升用其新進年少雖一時紙上文字可觀才德未著宜勿輕授致令傲然輕世作聰明以乖治體一節查得給事中從前至今多係進士就除並無別官升用及查得𢎞治元年正月該南京禮部精膳清吏司郎中李諒奏稱近年以來被前姦貪之臣畏懼紏彈朦朧奏稱新中進士未諳刑名事體必先選在外有司推官知縣待其政蹟昭著吏部行取選任御史不知內寓奸術意將初中進士正志氣轟烈獨立敢言之時也一旦選為有司庶職使之奔走於塵埃馬足之中俯仰於承問聽命之頃曲折百般頓挫無奈守正者俟命挨次行取奔競者請託權貴保舉旌異既得美官只知恩出於權貴縱有奸惡豈肯輒便紏劾合無仍照舊制於進士中年貌相應學行優長平昔名實相須者及聽選舉人在外進士知縣儒學官員果係學行兼全政蹟著聞者相兼博訪精選任用庶使賢才彚進風憲得人至治日臻等因具奏奉聖㫖該衙門看了來說欽此欽遵本部議得推官知縣進士俱讀聖賢書俱由科目出身豈進士無練達老成之人推官知縣皆不才奔競之士顧擇而用之何如耳茍擇得其人則皆可用用匪其才則皆不稱此必然之理不易之論也今南京禮部精膳清吏司郎中李諒奏要仍照舊例於進士中年貌相應學行優長及聽選舉人與在外進士知縣儒學官員相兼任用御史一節誠為得宜合無准其所言今後選用御史於在京各衙門辦事進士與夫曽經一考稱職行人博士及進士舉人出身推官知縣內選年三十以上五十以下人物端莊言語正當操行亷謹才識優長者送都察院理刑半年滿日聽本院考察各注考語連人送部諳曉刑名堪任御史者本部奏請照缺銓補不諳刑名不堪為御史者別用巳經節次題准將進士陳震等選送理刑及實授御史去後今知府言芳又奏前因臣等竊惟科道官之職不職係乎人之賢不賢不係乎新進之與久任也人固有出仕未久而端重老成者亦有歷官數年而浮躁如故者似難概以新進久任而論人之賢否也况言芳所奏唐希介等前項不法事情未經體勘不知虛實難憑言芳一人之言輒將已行銓選之法輕易更改若候行勘唐希介等前項事情如果是實付諸法司論罪發落自足以警戒將來豈宜因人而遂變其法合無候戶部行勘唐希介李葵有無前項事情奏請定奪以後給事中御史有缺仍照見行事例兼用進士除補永為定規緣係節該奉欽依該衙門看了來說事理未敢擅便𢎞治三年五月初四日具題初六日奉聖㫖是欽此議知州趙源乞開升衙門奏狀文選清吏司案呈奉本部送准兵部咨職方清吏司案呈奉本部送兵科抄出廣西龍州土官知州趙源奏云云等因奏奉聖㫖該部知道欽此欽遵抄出移咨送司案呈到部看得廣西龍州土官知州趙源奏稱本州地方與安南國毗連每遇交人進貢往來係臣率領目兵迎送護持其間官僞稱侯伯都督侍郎勢張狐犬之威欺壓守邊官員妄自尊大乞照憑祥縣開設軍民府事例將龍州改為龍州府土官知府職事長牙爪精神固守地方一節臣等竊聞書曰監於先王成憲其永無愆詩曰不愆不忘率由舊章此古昔之格言後世君臣之所當法守者也緣前項地方自國初開設州治迄今一百二十餘年自趙帖堅歸附為土官知州子孫世襲其職至趙源已是四輩未嘗改作所以邊釁不生境內宴然今土官知州趙源無上事設此謀託此詞欲升百餘年來巳定之州治而為府治若允所請恐邊境自此多事矣非地方之福亦非趙源之福合無行令巡撫都御史今後如遇安南遣使入貢經過龍州地方差官開諭來使務要遵守禮法母得生事擾害仍戒諭知州趙源亦要安分循理遵守祖宗成憲永享和平之福母再妄生異議率意改作以貽日後之悔緣奉欽依該部知道事理未敢擅便𢎞治三年五月初七日具題次日奉聖㫖是欽此議修蘆溝河官不當升職奏狀文選清吏司案呈奉本部送內府抄出欽差內官監太監李興題云云等因具題奉聖㫖吏部便斟酌了來看欽此欽遵抄出送司案呈到部切惟朝廷置文思院官并把總人匠無非為營造設也今副使潘俊等修築蘆溝河隄岸工完雖曽效勞是乃職分之當為非分外事也訪得天順年間并成化初年亦曽修築河隄本部查無升官事例想是彼時不曽升官止查得成化十九年六月修築蘆溝橋决口工完升把總袁狗兒等十二名八月蓋造恭慎夫人墳塋工完升把總柴甫成等四名九月修理大慈恩寺殿宇工完升把總金全等三十七名俱文思院副使是以濫升匠官并欽天監太醫院等衙門官日增月益動以千計大壞名器虛費錢糧物議為之沸騰欲其革罷而未之能逮至陛下即位因科道建言一切罷去人心十分痛快仰望太平且如營造憲宗皇帝山陵乃初政第一莫大工程凡八閲月所役軍夫匠作人等何止三四萬然後告成中間豈無精通藝業造作有方之人亦豈無揀擇月日修合藥餌書辦文案之人未聞有加升職事者今修隄之功不及山陵三分之一較其事之輕重奚啻百鈞之於一羽也昔營造山陵工完未嘗升官今修築河隄工完若許升官不無有失輕重况目今修城等項工程數多若工完之日俱照此例奏討升官將何詞以拒之其為冗濫又復如前日矣豈不為新政之纍所據副使潘俊等只可量加賞賚以酬其勞恐不可升官以開弊端也緣奉欽依吏部便斟酌了來看事理未敢擅便𢎞治三年五月初十日具題次日奉聖㫖是潘俊等不准升都加與賞賜欽此復運使周軫等選任運司官奏狀文選清吏司案呈奉本部送吏科抄出山東都轉運鹽使司運使周軫等奏云云等因具奏奉聖㫖吏部知道欽此欽遵抄出送司查得先該南京工部營繕清吏司主事夏英奏稱今後運使同知務選年壯亷潔之士副使判官要除進士英俊之人官年壯則無日暮途窮之憂任進士則有砥礪名節之勸如有不為利誘者三五年間不次升擢等因該戶部議擬具題節該奉聖㫖運司官員吏部照依所奏選除欽此欽遵巳經節次將二甲進士萬福等三甲進士袁翺等選除運使運判訖今該前因案呈到部檢照諸司職掌內開各鹽運使司運使各一員同知各一員副使各一員判官員數不等蓋以運使為掌印正官同知與運使同知其事副使則副運使而行事所以不分運司鹽顆多寡而各設一員也判官員數不等者蓋以判官為分司催辦鹽課之官如兩淮運司有泰州淮安通州三分司則設判官三員長蘆運司有滄州青州二分司則設判官二員兩浙運司有溫台寧紹嘉興松江四分司則設判官四員由是而知判官乃分司催辦之官後雖頗有裁革職掌未嘗不同今運使周軫不知何為而有運使所以總理鹽課而公派啇之法同知副判所以親臨鹽場而盡催辦之勤之說若不與之辨别誠恐不知者被其所惑而以周軫之言為是使同知副使遂為催辦之官而不得干預司事不無有乖治體其言本司運判缺員要於第三甲進士內精選一員或舉人監生中有年力精壯可必其有守有為者一員以補其缺一節但即今舊進士已住外選新進士辦事不久未該選用合無於舉人監生內選補前缺今後各處運副運判有缺於進士舉人內相兼選用仍通行各該運鹽使司使知朝廷設官之意如分司缺判官催辦暫委運同運副催辦或監掣盤鹽等項亦聽差委如判官不缺及别無差委著令運同運副公同運使管事或共案署押或分投理辦務要同寅協恭秉公效勞共成其事不許互相推託致誤公務如違許巡鹽監察御史參究拏問應奏請者照例施行如此則官不久缺職掌不紊緣奉欽依吏部知道事理未敢擅便𢎞治二年五月初十日具題次日奉聖㫖是欽此乞休致奏狀臣自受命典選以來惟恐舉用不得其人有誤朝廷任使是以夙夜兢惕廣詢博訪期得才賢少盡以人事君之道豈敢自用偏執以來物議邇者會同兵部尚書馬文升等推舉巡撫延綏都御史臣首舉太僕寺卿王霽衆謂王霽南人恐不便鞍馬馬文升謂可舉年力精壯者因舉少卿韓文臣謂韓文才雖可用但資望尚淺再一二年才好用馬文升隨又舉少卿白思明臣謂白思明先前也曽舉他若再舉他恐人說不相應侍郎呂雯又謂我亦是太僕寺少卿推舉巡撫白思明也相應馬文升謂寫白思明為首韓文陪之衆皆議允然後具題節奉聖㫖白思明升都察院右僉都御史巡撫延綏地方欽此今被科道官紏劾奉聖㫖是白思明既不協人望對品調外任今後吏部會推官員務要博詢衆論不許偏執欽此臣聞命之餘驚惶失次竊聞書曰舉能其官惟爾之能稱匪其人惟爾不任白思明既改調外任臣等固不能辭其責特蒙恩宥豈不自知感愧但聖如帝堯尚以知人為難况衆人乎臣等固不能知白思明必稱其職科道官亦豈能知白思明必不稱其職必用之而後見臣本不才誤承天寵忝居大臣之列公同三四大臣推舉二官已蒙聖明簡用一官可謂信任臣等而無疑矣一被言官論之輒加斥逐臣有以見聖明從諫如流之美亦有以見信任大臣不如信任言官之篤也孔子曰衆惡之必察焉衆好之必察焉豈無徴之言哉且白思明雖非全才之士與共本所舉韓文人品才調相去不甚逺况當所舉之時衆謂寧夏事簡易守著韓文去延綏事繁難守著白思明去以此論人似不為差今不知白思明何獨不見容於衆論蓋是臣等兩部堂上官所見與衆人不同也若謂白思明不協人望今之士豈能盡協人望哉臣恕是其一也然白思明實是臣等衆人公同計議推舉非是臣偏執巳見若白思明曽有一言之請將本官改調外任他也甘心委無請託之情今將他原任少卿都去了本官雖不敢言臣等豈能自安今後如何推舉官員若必求才德兼備無可異議之士而用之臣恐諸司庶僚之位為之一空其如天下政務何周公曰無求備於一人孔子曰及其使人也器之子思曰聖人之官人猶匠之用木取其所長棄其所短故把梓連抱而有數尺之朽良工不棄使天下全才之士多而聖賢豈為此言哉又聞古人有言陳力就列不能者止臣實不能况臣年巳踰七望八衰朽倦勤孤立寡助不中人意人多怨之此其當止之時也若不止之竊恐不測之災一旦及於其身非惟喪平生之名節而為世所笑且辱陛下昔日召用之顯命今日寵遇之隆恩有始無終悔將何及伏望聖恩憐臣衰老放臣歸田庶幾不失進退之宜保全始終之節臣一日不死則感聖恩一日一年不死則感聖恩一年臣雖死臣之子孫亦不敢忘聖恩矣臣情激於中言無倫序塵瀆天聽罪該萬死惟聖明矜察幸甚臣無任悚息待罪之至等因𢎞治三年五月十二日具奏十四日奉聖㫖白思明巳發落了王恕不准休致該部知道欽此再乞休致奏狀臣昨以舊患腿疼舉發不能行走兼以頭目昏暈心神靡寧難以理事將原掌印信咨送本部題奉聖㫖是印還著王恕掌該衙門知道欽此欽遵臣伏思之臣僚之中設有迂拙無用如臣者雖年未老亦當退雖無疾病亦當退今臣年已七十有五又有前疾屢乞休致悉蒙聖恩慰留雖卧病亦令掌印蓋是朝廷體貌大臣之禮亦以見聖意知臣朴忠無僞所以眷顧之篤如此臣非木石豈不知感豈肯遽舍聖明之主甘處寂寞之鄉乎但七十致仕古今之通制也今臣七十有五久居要位不能序進賢才以平邦國之政使海內之民屢遭水旱之災頻罹饑饉之苦而臣獨享厚祿既無康濟之䇿又乃栖栖不去人將謂臣何哉况臣委實衰老腿疼委實行不得矣若留臣一日則誤一日之事而臣之罪益深一日矣曷若速令臣去之為愈也伏望聖恩憐憫容臣送骸骨於故里全名節於暮年尤望另選有德望有精鑒之士而任用之使之統百官均四海必獲治平之效非惟臣之幸實天下國家之幸也臣無任懇祈感悚之至𢎞治三年五月三十日具奏六月初一日奉聖㫖卿年雖老精力未衰豈可求去不准該衙門知道欽此又再乞休致奏狀臣昨以衰老昏暈兼以腿疼行走不得恐誤國事懇乞休致節奉聖㫖卿年雖老精力未衰豈可求去不准欽此臣有以見陛下優禮大臣人惟求舊之盛心臣豈不知感伏念臣以庸材致位冡司雖捐軀隕首莫報㳙埃豈敢姑為退託以求自便竊惟人之生也不能皆賢賢者積學待聘固未嘗不欲仕也其仕也孰不欲殊擢異升以躋乎顯秩但得之者常少不得者常多不特人之才行有優劣資望有淺深而典選者采擇或不精是亦各有命焉夫以天下之顯秩待天下之異才此固朝廷立法之意而臣謬膺是任豈不欲擇異才以充顯秩但人之操存難知臣之聰明有限所以不能皆如其意若明知其人不能勝是任而徇情以舉之臣則不敢然帝堯之於伯鯀周公之於管叔豈知而使之耶此臣之所以惴惴焉不敢久於其職者惟恐謬用非才以誤天下之事尤恐不得志之士怨乎不以而罪及乎身然臣固不敢厚誣天下之人皆以知人為難抑恐有知人之明賢如帝堯周公者是以不敢不避賢路以讓人也且四時之序成功者退知足不辱知止不殆此古人之明訓不可有違又况臣委實衰老百病侵尋腿疼尤甚艱於步趨誠恐一旦挫跌以遺無窮之羞此臣之所以連乞休者此爾伏望聖恩俯賜矜察容臣歸田則臣未死之年皆是感恩之日也臣無任感仰悚息之至𢎞治三年六月初三日具奏次日奉聖㫖卿但盡心職務不必深辨所辭不允該衙門知道欽此議郡王禁奸革弊奏狀考功清吏司案呈奉本部送內府抄出汝寧王奏云云等因具奏奉聖㫖該衙門知道欽此欽遵抄出送司案呈到部除禁約僣用器用服色𨽻都察院掌行外照得天下府州縣官員若有不法事情聽被害之人赴合干上司告理拏問其貪酷罷軟等項許巡撫巡按官考察黜退具有成憲今汝寧王奏稱通判雷翀知縣趙鑑前項不職事情未委虛的難便依王所奏就行黜退使其言是實退之固當彼亦不能無後言設若言之未盡實退之或未當未免有怨言况誣告人與奏事不實律俱有明條王者有犯理必見宥若將此事施行實則雷翀等受罪虛則罪不及王竊恐此風一起王府人員與有司官或有讐嫌或請託不行或求索不遂輒便掇拾細故用言讒譛萬一王聽察不審就行具奏被害之人將與何人對理欲其不含寃受屈難矣如此今後為有司官者將聽信奉承之不暇何敢持正論守法度以忤王左右之人乎且舉人劉文與知縣趙鑑書係是書生巧文飾詞毁譽是非之言未必皆實豈可憑此而輒行黜陟况此書係外間事與王無干非左右之人傳報與王王何由而得又非用計左使亦豈不謀而遽為此奏所據要將雷翀趙鑑黜退似難施行合無行河南布政司轉行本府教授啓王知會今後外間事與本府無干者不必聽信左右之言輒便具奏有失大體如此則事體不紊上下相安矣𢎞治三年七月十八日具題次日奉聖㫖是欽此議給事中盧亨修明治道奏狀考功清吏司案呈奉本部送兵科抄出本科給事中盧亨題云云等因題奉聖㫖該衙門知道欽此欽遵抄出送司案呈照得本部見行事例在外司府州縣等衙門官員三年六年給由赴部考核不分稱職與不稱俱照例引奏復職必待九年通考然後論其殿最定其黜陟是即唐虞三載考績三考黜陟幽明之良法若有老疾罷軟等項不職官員聽各該巡撫巡按官考察黜退三年朝覲又大明黜陟中間果有治行卓異者復有旌擢之典其法可謂周悉無遺矣今看得給事中盧亨所言大意以為官不久任則政多紛更政多紛更則民無定守今後官員三年考滿果有卓異政蹟量升一級仍留管事必俟九年考滿然後不次升擢知縣就升知府知府就升布政一節其意固善但三年量升一級存留管事似非舊制若知縣必待九年升知府又恐御史有缺不得相應老成官員除補知府必待九年升布政非惟參政有缺少相應官員升補抑恐參政任滿無相應員缺轉遷且以資格待尋常之士不以資格待非常之才此古今之通制也合無仍照舊制除巡檢倉場等官三年周歲考滿外其餘司府州縣等衙門官俱候九年滿日考其殿最定其黜陟果有政蹟卓異者府州縣官必須曽經一考以上考稱者遇有相應員缺斟酌升用方面官不拘年歲遇有相應員缺照例推舉仍行各處巡撫巡按都御史等官今後府州縣官果有亷能幹濟政蹟卓異者務要循名責實從公舉保以憑具奏旌擢不許將阿諛奔競有名無實人員一概濫舉如所舉非人以致蠧政殃民者聽本部并科道官紏舉參奏如此則進用有序庶官不曠緣奉欽依該衙門知道事理未敢擅便𢎞治三年八月二十四日具題次日奉聖㫖是欽此議侍讀曽彥久任隆治奏狀文選清吏司案呈奉本部送刑科抄出翰林院侍讀曽彥奏云云等因具奏奉聖㫖該衙門知道欽此欽遵抄出送司案呈到部看得侍讀曽彥所言大意以為祖宗時內外大臣與夫府州縣官皆久任故能效勞績溥政化今之在內大臣固巳眷留久任矣但在外巡撫官與夫布按二司以下官不見有至七八年者所以多不知土俗民風如李父貴等冒認皇親而巡撫官與布政使按察使俱因年淺不能周知止憑里老保勘以致如此願自巡撫以下至於府州縣等官皆以久任為重有功止加其職小過必致其赦使各盡其才務臻其成其意固為善矣竊惟朝廷之命官臣等之典選非不欲內外官皆久其任以成其功但在內堂上官有缺不得不於巡撫并方面等官內擇其賢且才者而舉之方面知府等官有缺不得不於科道并部屬等官內兼論資望而用之風憲有缺不得不於科目出身知縣等官內取其練達老成者而進之所以雖欲久任而不能皆久也所謂以資格待尋常之士不以資格待非常之才者蓋以此耳合無今後內外官俱照例以九年為滿考其功績定其黜陟中間果有才識卓異者如遇相應員缺不拘年資仍照舊例推舉如此則進用有序優劣得所而治功亦無不成矣緣奉欽依該衙門知道事理未敢擅便𢎞治三年九月十九日具題二十一日奉聖㫖是欽此論工完乞恩奏狀文選清吏司案呈奉本部送內府抄出內官監太監李廣等題云云等因具題奉聖㫖該部看了來說欽此欽遵抄出送司查得先是內官監太監李興題稱奉敕提督官軍人匠修築蘆溝橋工完要將文思院等衙門副使潘俊把總曲興等量加升職本部為照營造憲宗皇帝山陵乃初政第一莫大工程所役軍夫匠作人等何止三四萬凡八閲月然後告成未聞有加升職者今修築河隄工完若許升官不無有失輕重况目今修城等項工程數多若工完之日俱照此例奏討升官將何詞以拒之其為冗濫又復如前日矣豈不為新政之纍所據副使潘俊等只可量加賞賚以酬其勞恐不可升官以開弊端等因具題奉聖㫖是潘俊等不准升都加與賞賜欽此欽遵今該前因案呈到部看得太監李廣等題稱修築正陽門城垣河橋工完乞要將冠帶掌作把總并天文生醫士及催工官尚禮等量加俸級一節緣修築城垣河橋較之修築河隄工程相去不逺蘆溝橋工完官匠人等既奉欽依不准升都加與賞賜所據修築城垣河橋把總尚禮等似難量加俸級合無照依前例量加賞賜以酬其勞庶幾事體歸一人無異議緣奉欽依該部看了來說事理未敢擅便𢎞治三年閏九月二十四日具題二十七日奉聖㫖冠帶把總尚禮王友道王猪兒杜鑑羅祥與做軍器局副使王福董瓉耿福汪寬朱顯都與冠帶董旺葉森楊承德楊通王穆陳霽加賞絹一匹欽此再論工完乞恩奏狀該本部題文選清吏司案呈奉本部送內府抄出內官監太監李廣等題云云等因具題奉聖㫖該部看了來說欽此欽遵抄出送司查得先該內官監太監李興題稱奉敕提督官軍人匠修築蘆溝橋工完要將文思院等衙門副使潘俊把總曲興等量加升職本部為照營造憲宗皇帝山陵乃初政第一莫大工程所役軍夫匠作人等何止三四萬凡八閲月然後告成未聞有加升職者今修築河隄工完若許升官不無有失輕重况目今修城等項工程數多若工完之日俱照此例奏討升官將何詞以拒之其為冗濫又復如前日矣豈不為新政之纍所據副使潘俊等只可量加賞賚以酬其勞恐不可升官以開弊端等因具題奉聖㫖是潘俊等不准升都加與賞賜欽此欽遵今該前因案呈到部看得太監李廣等題稱修築正陽等門城垣河橋工完乞要將冠帶掌作把總并天文生醫士及催工官尚禮等量加俸級一節緣修築城垣河橋較之修築河隄工程相去不逺蘆溝橋工完官匠人等既奉欽依不准升都加與賞賜所據修築城垣河橋把總尚禮等似難量加俸級合無照依前例量加賞賜以酬其勞庶幾事體歸一人無異議緣奉欽依該部看了來說事理未敢擅便𢎞治三年閏九月二十四日臣等具題本月二十七日奉聖㫖冠帶把總尚禮王友道王猪兒杜鑑羅祥與做軍器局副使王福董瓉耿福汪寬朱顯都與冠帶董旺葉森楊承德董旺楊通王穆陳霽加賞絹一匹欽此臣等竊惟自古帝王之治天下其要無過賞罰號令而巳賞罰無二號令如一則人自信服否則欲人之信服也難矣治亂之機豈外是哉仰惟陛下嗣承大統之初中外臣民翕然愛戴莫不願陛下萬萬年常居寶位永為億兆之主所以然者固由祖宗德澤及人之深亦由陛下首頒詔㫖革罷傳奉冗官驅逐妖僧邪士不受獻貢停止織造裁省冗費數者有以歆動之也臣等受陛下大恩忝居銓選之司若於用人得失謾不可否惟順㫖而行竊恐隂壞大事失天下心雖死何贖是以不避斧鉞之誅屢進逆耳之言無非欲匡輔至治少盡臣職而已豈有他哉且如前者太監李興奏要升修蘆溝河隄岸管工副使潘俊等職事陛下已納臣等前言特降聖㫖不准升都加與賞賜今太監李廣奏要將修城垣冠帶官尚禮等量加俸級臣等亦以前言具題陛下却降前項升賞之㫖是功同而賞異也臣等固不知李興之意有無不平在他人有所不免必將復比例上請矣若再請再不許彼必惶恐許之則冗官之弊滋熾况今升尚禮等多係前時革罷傳奉官員前日革之巳得衆心今日升之豈不復失衆心又况革罷傳奉官千百餘員見尚禮等又得升職未免各尋蹊徑夤緣求進不知何以處之欲其不為聖政之纍難矣且洪武永樂年間營造兩京城池宫殿山陵及文武衙門有無升賞管工官員臣等固不能知正統年間營建三殿兩宫包砌京城及修造各衙門工程若彼浩大升除匠官不過五六員今補修城垣橋梁比之前工不及萬分之一反升官如此之多不亦異乎且軍器局止是額設大使一員副使二員近來副使李安等一十六員赴部考滿在任未考滿者不知又有幾員今又升尚禮等五員似非祖宗設官之初意伏望陛下俯賜察納收回前㫖將尚禮等亦量加賞賜如此則前後之恩如一彼此之心俱安且塞將來無厭之求人自信服而太平之治效亦可以立見矣𢎞治三年十月初二日具題初四日奉聖㫖尚禮等既升職冠帶了罷欽此又再論工完乞恩奏狀臣等竊惟賞罰乃朝廷之大柄大臣乃贊朝廷以行賞罰者也朝廷賞罰當臣等固當將順之設或未當亦當匡救之若知其未當畏罪而不言使國家受其弊而巳安享其富貴豈忠臣乎昨者臣等因見升尚禮等官職恐開弊端是以昧死言之奉聖㫖尚禮等既升職冠帶了罷欽此臣等仰窺聖意豈不知臣等所言近理第為業巳許之不可更改且國家政事茍未得其當雖十易之不為病要於其當而後巳不然其流之弊將不可救臣等再思尚禮等委的止是修補城垣無甚大功又多係前時革退傳奉官不可升只可量加賞賜若以為巳升了不可改亦望聖明留意今後內外官員但有似此為人奏討升官有壞名器者許科道官參奏拿問如此則奔競頗息名器頗重錢糧不致妄費軍民亦可安生矣𢎞治三年十月初五日具題初七日奉聖㫖這以後事朕自有處置欽此王端毅奏議卷十二
