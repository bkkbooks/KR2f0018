  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0018_WYG_001-1a, image: WYG0427/WYG0427-0456a.png}
body:
  text: 玉端毅奏議卷一明王恕撰大理寺申明律例奏狀臣備員棘寺叨司審録常愧無分寸之補奚敢有出位之思竊見法司中日逐擬斷之事揆之律例雖無不合推之人情亦有未宜今略舉一二昧死妄言伏望聖明少賜裁決著為定例庶幾事得其宜而人易遵守開坐具本謹題請旨一件祛除凶德事臣惟姦盜凶德也凡人有一於身人皆賤之恥與為伍况堂堂清朝豈可容此之徒承襲世祿而玷辱聖化乎竊照軍職中間守分盡職者固多而為姦作盜者不少且姦與盜名雖不同實則相等查得見行事例軍職犯縱容及抑勒妻女與人通姦者俱照敗倫傷化事例革職為民許令應襲弟男子姪替職其犯竊盜掏摸搶奪盜官畜産者法司因無事例止照常例發落仍令還職實是玷辱名爵有傷風化如蒙准言乞敕該部同三法司計議除已發落外合無將今後軍職有犯竊盜掏摸搶奪盜官畜産者如律罪之亦照敗倫傷化事例革職為民許令應襲弟男子姪替職如此則世祿及忠良之士在官無凶德之人矣一件抑勒為娼事伏覩大明律內一欵抑勒妻妾及乞養女與人通姦者本夫義父各杖一百姦夫杖八十婦女不坐並離異歸宗其抑勒子孫之婦與人通姦者罪亦如之欽此竊照有等無廉恥之徒抑勒妻妾及乞養女并子孫之婦與人通姦討錢使用其妻妾及乞養女并子孫之婦堅執不從被其逼打不過才方將情具告法司因見不曾成姦律不該載止坐不應杖罪仍令婦人隨住竊詳此等婦女思係良家不肯從伊為娼志節貞潔誠為可嘉今既具告到官意在脫免汚辱若謂未曽成姦仍令隨住彼必得志仍前抑勒稍有不從輒加捶楚以此婦女剛强不屈者必至死地柔善軟弱者終被汚辱實是敗壞人倫有傷風化如蒙准言乞敕三法司計議合無將今後但係抑勒妻妾及乞養女并子孫之婦與人通姦雖未成姦取問明白就令婦女離異歸宗若婦女誣告亦依律罪之如此則凶徒不得肆姦而良善庶免汚辱矣一件囚人納紙事照得法司見行事例除真犯死罪竊盜并逃軍逃匠逃囚不納紙劄外其餘一應罪囚各納紙一分入官竊詳立法初意蓋謂逃軍逃匠逃囚多是窮苦小人以此免其納紙今照報效義勇民壯舍餘勇士力士人等名雖與軍不同其實與軍一般操備征進為事一般照例發遣守哨法司因見前例不曾除豁亦令納紙未免破費盤纒實是窮苦不堪及有一家同居人口被人牽告三兩口在官者有之五七口者亦有之發落之時每人各納紙一分且民紙一分直銀三四錢官吏紙一分直銀一兩富貴者固不為事貧難者從何措辦甚至傾財破産鬻男賣女若此窮苦實可矜憐如蒙准言乞敕三法司計議合無將今後問擬在逃報效義勇民壯舍餘勇士力士人等俱照逃軍事例免其納紙及一家同居人口有犯不分人數多少只令納紙一分如此則窮苦小人不致失所矣一件囚徒㑹赦事伏覩景泰三年五月初二日詔書內一欵官吏軍民人等為事問發運米做工等項悉行放免欽此該衙門因見詔書不曾開有煎鹽炒鐵充軍伴儀從膳夫之類止將運米做工等項放免却將煎鹽炒鐵之類仍前拘役竊詳運米做工與煎鹽炒鐵等項囚徒俱係犯該徒流并雜犯死罪人數止是一時發落有此頭項不一矧詔書明開運米做工等項竊恐煎鹽炒鐵之類亦在其中若止將運米做工囚徒放免其餘煎鹽炒鐵等項不行放免非惟有違詔書事意且使囚徒不得均霑曠蕩之恩况煎鹽炒鐵等項多是窮苦軍民在工日久未免逃躲及至挨拿又不出官工役處所既不得其出力原籍原衛又不得伊當差兩相擔閣俱不得用徒有虛名實未便益如蒙准言乞敕三法司計議合無將曾經赦煎鹽炒鐵充儀從軍伴膳夫等項囚徒悉與運米做工等項一體放免如此則赦例無彼此之分囚徒霑均一之恩矣一件除姦革弊事竊照在京五府并各衛軍職官員俸糧折支銀絹椒木等物每季俱係各衙門差委指揮千百户等官赴內府總領出外分散中間有等無知委官不以錢糧為重惟務貪圖肥已多方侵漁略無忌憚有指以置買什物而侵欺者有假以抵還私債而尅落者或見彼軟弱而全不給與或因人不在而就不送還宿弊百端難以枚舉及至事發到官依法追問却乃展轉支吾不服招認錢糧被其侵欺官府被其攪擾蓋緣給散之際無有文職糾察得以縱意自由故也照得年例當賜軍士冬衣布花俱差給事中御史并户兵部官親臨該衛眼同委官逐一唱名給散以此委官無由侵欺軍旗受其實惠弊源既塞詞訟自息此法最善實為便益如蒙准言乞敕該衙門計議合無今後每季關領軍職折俸銀絹椒木之時照舊各差委官赴內府關領到衛仍照給散冬衣布花事例差給事中御史并户兵部官分投督令委官將銀兩照數分鑿成塊絹匹每分捆作一束椒木每分包作一處如法封記眼同委官逐一唱名給散如此則侵欺之弊可革而告訐之風自息矣一件僧道犯罪事伏覩大明律內一欵僧道犯罪曾經決罰者並令還俗欽此切照法司日逐問過僧道但犯一應大小罪名不分故失并曾否決罰悉令還俗其僧道官有犯因見律不該載止照常例運糧運灰等項發落仍令還職臣惟僧道官主典教門表率叢林比之僧道戒行尤宜精嚴持身尤宜端謹僧道有犯既令還俗僧道官有犯豈可仍令還職且人誰能無過若將過誤犯罪及因人連纍致罪并犯罪不曾決罰僧道一槩令其還俗竊恐禁網太密下無全人如蒙准言乞敕該部同三法司計議除已發落外合無將今後僧道官并僧道有犯公罪并過誤犯罪及因人連纍致罪者俱照常例運糧運灰等項發落仍令還職復業其犯姦盜詐僞并一應故犯罪名俱照常例運糧運灰決罰等項發落不分僧道官與僧道一體罷職還俗如此則事例得適中之宜僧道少故犯之徒矣景泰五年九月初三日題奉聖旨三法司計議停當行撫治荆襄處置地方奏狀先准兵部咨該本部奏准行令臣等候賊冦搜勦盡絶之日就行㑹議區畫久長安治良策差人奏請定奪除欽遵外臣㑹同監督軍務太監唐慎右少監林貴提督軍務工部尚書白圭總兵官撫寧伯朱永左參將都督同知喜信右參將都督僉事鮑政等議得荆襄一帶山林深險土地肥饒刀耕火種易於收穫各處流民僧道人等往往逃移其中用强結菴立産官吏不敢科徵里甲不敢差遣以致驕慢日生縱橫日熾荼毒生靈以天命為不足畏謀為不軌以國法為不足遵兹者仰賴皇上聖德神威賊冦俱已殄滅若不乘時處置抑恐餘蔓復滋重貽後患緣係該部奏准行令臣等㑹議區畫久長安治良策奏請定奪事理未敢擅便今將處置地方緣由逐一開坐具本順差指揮同知石湧親齎謹題請㫖一襄陽荆州三衛并夷陵千户所官軍永樂宣德年間俱在本處操守地方彼時山中雖有流民畏懼軍衛不敢嘯聚為非正統十四年為因摘調鎮逺靖州等衛官軍前去麓川雲南等處征進致令邊城缺守苗賊出沒該總督軍務都御史王來等奏准暫將荆襄等衛官軍調去彼處分作兩班輪流備禦候邊衛清勾軍士足伍之日另行定奪隨後又將三班軍餘亦調前去征進今已十五六年邊衛隊伍計必完足前項官軍仍舊輪班一向本處城池空虛武備廢弛以致賊首千斤劉等得以伺隙為非今雖殄滅勞費實多看得前項衛所除運糧并頭班備禦官軍外其二班三班官軍餘丁每衛不過七八百名合無令頭班官軍照舊前去備禦將二班三班官軍餘丁存留本處操守城池振揚威武遇有警急易於調用如此則盜賊知所畏懼而地方可以永寧矣一襄陽府房縣僻在萬山之中離府八日之程所轄地方有歇馬大市螃蟹溪格兜坡潭頭坪馬腦關三扒峪梯兒崖頭沙河湯家河洞庭廟玉女廟長口榔口馬欄青峯夀陽柏木前坪後坪洪坪等處土地肥饒道路險阻各處流移人户在彼潛住者不下萬數近者賊首千斤劉等一起衆皆響應相從為非查得比先年間因見本縣山水險惡流民數多盜賊不時生發所以設立一千户所在彼守禦後因節將官軍餘丁差調各邊備禦征進并漕運去訖止留老弱殘疾之人不堪防禦致賊窺伺為患且前項地方溪水雖多灘浪峻急舟楫不通漕運艱難合無將本所原調各邊備禦征進并運糧官軍盡數掣回本所操守城池振揚軍威遇賊生發易為調遣撲滅其該所原發運糧官軍宜從巡撫三司等官計議於各衛另行照數撥補如此則城池有人操守而緩急不致誤事矣一襄陽府均州地里當四方之中與竹山房縣上津鄖縣穀城光化相為唇齒本州地方流民比竹山房縣等處流民不相上下彼有警則此戒嚴此缺守則彼警擾自然之勢無足怪者本州原設一千户所官軍一以守禦本處地方一以控制附近縣分永樂年間奉敕全存修理宫觀一應備邊征進軍糧等項俱不差調切緣太嶽太和山宫觀在前用工修蓋完固即今煥然如新中間縱有損壞用工不多查得本所實有食糧正軍一千二百餘員名餘丁三千餘名雖稱有輪班修理之名其實歇役在間不曾做工合無將正軍盡數令其在城日逐操練振揚軍威遇有本處并鄰近縣分賊盜生發聽分巡分守等官調度勦捕各處并邊方有警及運糧等項不許一槩差調其餘丁三千餘名照舊輪班修理遇有大營造之時仍令正軍盡數用工如此非惟可以保障一方軍民亦可以防護各山宫觀矣一襄陽府均州南漳穀城竹山鄖縣上津房縣等處荆州府當陽逺安等處俱有各處流移人户并逃軍逃囚人等帶領家小在彼耕種趂食躲住遞年結搆為非均房二處各有千户所守禦鄖縣上津竹山三處俱離均房二千户所不逺穀城南漳離襄陽衛不逺當陽離夷陵千户所不逺惟遠安縣西北抵房縣千户所五百餘里西南抵夷陵千户所二百八十里東南抵荆州三衛三百四十餘里又離荆州南漳當陽等州縣俱各窵遠况本縣止有一里半民遇有賊盜生發急無官軍救援照得已革去荆州護衛官軍見在荆州三衛帶管合無於內查屯田近逺安者摘調一千户所發去逺安縣與民相兼用工修築城池設立千户所衙門守禦地方如全所不勾一千户所就於别所輳撥遇賊生發隨即撲捕如此則軍威彼此相接而盜賊不敢輕動矣一襄陽府房縣南漳穀城襄陽四縣荆州府當陽縣地方接連陜西四川河南疆域廣闊道路險阻要害去處因無巡司盤詰以此各處流移人户逃軍逃囚僧道人等往往來彼或開山耕種或結菴居住停藏年久聚集為非看得房縣板橋山穀城縣石花街南漳縣七里頭襄陽縣油枋灘當陽縣漳河口俱係强賊出沒流民經行緊關去處合無前項地方每處設立一巡檢司照例銓官撥吏就於該縣僉㸃弓兵一百名令其常川盤詰往來巡視除住種年久附籍已定流民聽其本分生理外其不肯附籍者發回原籍當差造作非為者拿送官司治罪私自結菴僧道就將菴舍拆毁有度牒者遞送原出家寺院識認住坐無度牒者解發本管官司問罪還俗遇有賊盜生發就便相機撲滅仍仰嚴加禁約今後各處趂食流民僧道一應無文引之人俱不許擅入前項山場巡司官兵人敢有假公營私生事害人者許巡按御史并按察司分巡官拿問如律如此則控制有人而流移不復聚衆關防嚴謹而賊盜日漸消沮矣一襄陽府均州竹山鄖縣上津南漳穀城棗陽光化宜城荆州府當陽逺安等州縣在前因是土民不及里數俱係裁減衙門州設知州判官吏目縣設知縣典史竊照各州縣土民雖少而地土廣闊中間趂食流民屯田軍餘與土民參雜住種者不計其數詞訟日逐紛紜盜賊不時生發原設官員俱全尚且分理不周一遇公差考滿等項輒委雜職官員署事非惟不能幹辦公務抑且因而侵漁百姓以致事多耽誤民多受害合無將前項裁減州縣州添設同知一員縣添設縣丞一員令其專一撫安人民緝捕盜賊防革姦弊如此不惟撫捕二事責有所歸而一應公務舉無所失矣成化二年十月初十日具題奉聖旨俱准行查勘失機官員功罪奏狀准兵部咨該欽差都察院右副都御史王恕題先准兵部咨該襄王奏成化元年九月初八日臣為封內房縣賊人殺傷差去勦捕軍人攻犯本縣城池已差百户胡榮具奏其後强賊縱橫自房縣至南漳數百里內放火劫掠殺傷軍民搶去盔甲火藥等器攻陷南漳燒毁縣內居民房屋官吏人民驚惶奔走深被其害等因具奏該本部官於奉天門欽奉聖旨前日王奏賊情已敕湖廣總兵等官調兵勦捕今又奏賊情緊急武備多缺且將荆襄安陸五衛運糧官軍存留本處操守殺賊還寫書報王該部知道欽此欽遵抄出送司案呈到部看得襄王所奏除已欽遵聖斷施行外照得湖廣都布按三司等衙門怠慢誤事都指揮王英參議劉子鍾僉事郁文博并知府干璠指揮孫能千户曹宗李俊李全百户曹政韓忠尹釗等雖該本部先已議奏行令都御史王恕查勘明白參奏究治緣今既因各官互相怠慢致賊如此若不另為處置誠恐各官無所畏懼因而愈加誤事未便合無行移都御史王恕著令各官住俸做為事官上緊協力殺賊候前賊勦捕畢日將各官前項誤事實跡并有無殺賊功勤緣由通行查勘明白具奏定奪等因具題成化元年十月二十日本部尚書王復等於奉天門奏奉聖旨是即行文書去欽此欽遵移咨到臣除行湖廣都布按三司等衙門將指揮王英參議劉子鍾僉事郁文博知府干璠指揮孫能千户曹宗李全李俊百户曹政韓忠尹釗俸給俱自成化元年十一月初七日住支令做為事官上緊協力殺賊外行據分巡荆南道僉事黃謹呈據襄陽府呈准本府通判趙茂牒准本府牒抄蒙荆南道案驗㑹同襄陽衛委官指揮僉事薛通親詣南漳房縣查勘行據房縣申據原日捕盜老人向友恭并民壯地方知見人等王名等供結得先前强賊蔣虎等三十三名在河南南陽府打劫民人李穩家財蒙鄧州守禦千户所差委應捕百户周䦖帶領旗軍緝至襄陽府穀城縣㑹合本縣應捕委官醫學訓科李守忠督令火甲人等押帶原首人孫興等指引到金牛山挨捉賊首蔣龍等各賊知覺糾合强賊劉長孫等拒敵將委官李守忠打傷被賊搶去騎坐馬匹及將應捕軍餘郝端陳亮殺死各賊逃往陜西漢中府洵陽縣去訖後被守備漢中等處都指揮吳榮官軍追趕於成化元年七月內復回襄陽府竹山縣地面文峪河搶劫民人任皮家財該縣委隂陽訓術袁璧帶領總甲盛謙等與和尚招師一同向前與賊對敵內火夫柳廣等用藥箭將賊射死三人中傷五六人各賊發狠向前將原帶火夫聶景等并招師一十名殺傷身死本縣申府轉達右副都御史王恕處行委襄陽府知府干璠襄陽衛指揮孫能帶領官軍民壯人等協同前去被劫處所緝捕前賊當有捕盜老人向友恭等走報有前賊在湯頭關駐劄指揮孫能不候知府干璠到來商議就行輕率百户曹政韓忠尹釗房縣千户所應捕千户曹宗各帶旗軍拘同老人向友恭帶領火夫人等前去捕至馬欄鋪與賊對敵各不奮勇殺賊被賊殺死旗軍鄭信等一十名民夫五名被傷旗軍將所執軍器盡行丢棄各散有知府干璠委的未到不曾策應本年八月二十三日前賊復到房縣城外攻城知府干璠指揮孫能并本所副千户李全曹忠等右所百户曹政韓忠尹釗因見賊勢凶惡關閉城門率領官軍民壯在於城上用火鎗弓箭射傷强賊五六人被賊在於城外劫掠財物燒毁軍民馮子智等一十七家房屋至晚各賊退散去訖等因行間隨據均州守禦千户所申准本所副千户李俊關奉衛帖該抄蒙右副都御史王恕案驗備行本職照選精壯軍餘二百名各帶鋒利器械聽候本衛指揮孫能親臨調用依准㸃選過旗軍王槐等二百名於成化元年八月十九日跟隨本衛指揮使孫能前到地名外朝山據本所原差探信小旗時常等報稱强賊在於後川屯地名月竹關圍營宿歇轉往站川去訖當蒙指揮孫能分撥本職與同千户髙嶽周鼎姜禎旗軍蔣泰等一百五十三名員分路徑往月竹關追捕內將旗軍鄭信等五十名跟隨指揮使孫能前往房縣截捕前賊與賊對敵被賊殺死旗軍鄭信等五名其千户李俊在於月竹關捕賊未曾到於房縣又據南漳縣申准原委捕盜隂陽訓術羅道呈查得成化元年十月初四日强賊到於本縣之時比有知府干璠先奉贊理軍務巡撫湖廣都察院左僉都御史王儉劄付為水患事坐取回府踏勘災傷賑濟饑民指揮使孫能在於中途舊縣鋪駐劄不曾到縣房山千户所千户曹宗李全均州千户所千户李俊彼時俱各回所未曾到縣止有襄陽衛百户曹政韓忠尹釗等在於本縣領旗軍人等與賊對敵被賊殺死本縣并穀城縣民壯劉原等五名燒毁民人徐剛等一十五家房屋劫去在監輕重囚犯鄒政等八名口搶去民人單政等家馬六匹虜去民人鍾魁等家男女四名口及查得前項强賊在於房縣南漳等處殺傷官軍攻劫縣治之時有原委都指揮王英回司管事參議劉子鍾在均州撫民僉事郁文博蒙巡按湖廣監察御史王􅚇取回科場去訖俱各不在不曾嚴督各官殺賊以致賊人將官軍民壯殺死等因取具該縣所官吏委官民壯火甲并原日對敵處所當地知見人等結狀回繳得此案照先准本府牒該承准荆南道故牒奉右副都御史王恕劄付前事備由移牒到職㑹同襄陽衛指揮蔣通行查勘去後今照前因擬合㑹案各另回報為此今將㑹勘過緣由并取具各該官吏等結狀移牒本府轉繳到道據此案照先節奉右副都御史王恕劄付案驗為强賊在山拒捕殺傷軍民等事查勘各官誤事實情及轉行鎮守湖廣總兵官都督同知李震分守荆襄等處右參將都指揮王信通查各官有無功勤去後今據繳報行間續又節據襄陽府呈抄蒙分守荆襄等處右參將都指揮王信案驗開查先於成化元年十一月二十一日本職分哨督統官軍前到房縣進兵勦冦間十二月初九日强賊在於門樓頭駐劄與同僉事郁文博設意使令官軍前去劫營殺死賊人一百五十名內生擒賊人四十四名器械二十八件官軍全勝回還有功成化二年正月二十三日忽有賊來房縣本職督同本官領軍在於城東外與賊對敵殺退賊衆奪回賊馬四匹器械三十二件至二十四日二十五日賊衆擁來攻城連日分投在於城上戰敵殺退賊衆殺死賊人五十五名保全孤城後有大軍進兵本官隨軍儹運糧儲節次勤勞有功千户李全李俊曹宗於成化二年正月二十二日賊衆擁來房縣攻城之時連日在於城上與賊對敵殺退賊衆保全城池及奉鎮守湖廣總兵官都督同知李震劄付查得成化元年十一月十四日攻進隘門關大木厰等處殺獲有功官軍內有都指揮僉事王英擒斬賊級二名顆右參議劉子鍾生擒賊人一名知府干璠生擒賊人二名指揮孫能斬獲首級一顆百户尹釗曹政韓忠俱係先當奪關等因及照得自成化二年二月以來蒙欽差總兵官進兵勦殺賊冦之時有都指揮王英參議劉子鍾在於穀城縣哨護糧道知府干璠在南漳縣理辦糧料指揮孫能百户曹政韓忠尹釗俱在南漳縣守城各有勤勞等因具結呈繳到臣參照都指揮王英參議劉子鍾僉事郁文博知府干璠指揮孫能千户曹宗李全李俊百户曹政韓忠尹釗前項誤事實情既已查勘明白於法固當究治緣賊情今已寧息各官頗有前項功勤兼且誤事之罪犯在成化元年十一月二十七日大赦以前緣係該部奏奉欽依候前賊勦捕畢日將各官前項誤事實情有無殺賊功勤緣由通行查勘明白具奏定奪事理未敢擅便具題又該右副都御史王恕題為緊急賊情事先准兵部咨該巡按湖廣監察御史王瀛等題臣到襄陽府南漳縣訪得都指揮陳昶成化二年二月初七日領軍到於資坪𥪡立排柵初八日果有賊人前來有陳昶預先怯弱分付頭目不許出敵將官軍民快俱令在於排柵內以待賊人到來方用火器弓弩擊殺有賊首石和尚等止令數十賊人先來誘敵指揮梁昱不識詭計信以為實獨率二百餘人渡水迎殺賊人因見出戰軍少四下突出將梁昱所領軍快人等圍住陳昶見事危迫才方發兵策應以致被賊殺虜前項軍快人等數多得此參照都指揮同知陳昶統領官軍快手二千員名遇賊不能奮勇一戰退縮怯弱而力主固守之謀指揮僉事梁昱不能算料賊情獨率二百餘人輕進易敵而獨恃血氣之勇號令既不歸一行事又相矛盾以致賊人殺死軍人快手數多所據陳昶梁昱等俱各查提問罪等因具題該通政司官奏奉聖旨該衙門知道欽此該兵科抄出送司案呈到部參照巡按湖廣監察御史王瀛等奏稱都指揮同知陳昶指揮僉事梁昱等俱合查提問罪緣由緣指揮同知陳昶指揮僉事梁昱并各該領軍官員既有前項懷姦退縮并輕進易敵失機誤事情由於法合當究治但今荆襄賊冦猖獗正係用人領兵勦殺之際若將各官就便提問誠恐缺人領兵因而誤事未便合無行移都御史王恕著令各官住俸做為事人在彼領軍上緊協力勦殺前賊候賊情寧息之日將各官失機誤事實情并有無殺賊功勤緣由通行查勘明白具奏定奪等因具題成化二年三月二十七日本部尚書王復等奏奉聖旨是欽此欽遵移咨到臣除行湖廣按察司轉行湖廣都司將都指揮同知陳昶辰州衛指揮僉事梁昱并各該領軍頭目安陸衛指揮同知黃琛荆州右衛指揮使秦昭武昌衛指揮同知李隆武昌護衛指揮僉事于鏞俸給住支令其做為事官協力殺賊外行據分巡荆南道僉事黃謹呈據委官襄陽府襄陽縣主簿曾忠呈抄蒙本道紙牌該奉臣劄付前事行准南漳縣牒拘得資坪地方里老吳敬等到職審據各人供稱成化二年二月初五日有健步尤繼海等報有强賊前來攻劫南漳縣當蒙太監總兵都御史等官議調都指揮陳昶等統領官軍二千員名於二月初七日出哨到於資坪河北駐劄𥪡立排柵為營初八日果有賊人前來委的都指揮陳昶預先分付指揮黃琛秦昭李隆于鏞等不許輕易出敵只在排柵內待賊到來方用火器弓弩擊殺有賊石和尚等先令數十餘賊從河南岸前來誘敵陳昶黃琛等俱在營內不敢出戰有指揮梁昱不能料敵獨領官軍二百員名渡水前去逆戰隨有快手總甲許真統領快手八十名前去策應賊人因見出戰軍快數少舉衆前來四面夾攻軍快奮勇殺死賊人約有四十餘名不曾斬得首級奪回賊馬四匹被賊殺死快手二十六名軍人十名後太監總兵都御史等官又差都指揮蔡升統率官軍二千員名前去策應賊勢稍却本日晚收軍回營當夜賊人復來劫營節被官軍用弩箭石炮打退初九日早太監總兵都御史等官又差指揮蔡英統領官軍一千員名前去應援舉放信炮鼓噪而進有賊首石和尚等聞知才方向前詐說願投降等語隨即投散入山去訖今蒙查勘所供是實據供猶恐不的又據拘鄉導陳華等到官再三研審覆實相同等因呈報到道案照先奉右副都御史王恕劄付准兵部咨前事仰本職即照開去為事官員從實查勘原先失機誤事實情有無殺賊功勤緣由依奉已經行委本官查勘各官誤事實情并行把總安陸衛指揮僉事蔡英查勘各官有無功勤去後今據前因行間又據委官指揮蔡英呈查得指揮梁昱于鏞李隆各於月日不等前進白洛河及格兜坡等處俱各斬首三功數內秦昭亦係督軍殺賊之數黃琛進哨之時蒙撥守備南漳并資坪等處往來防護搭架橋梁開修道路都指揮同知陳昶率領官軍自南漳起至潭頭坪擺堡往來哨護糧料擒獲賊人一名有功等因為照都指揮陳昶指揮梁昱于鏞李隆生擒賊犯并斬獲首級中間恐有不的行據襄陽府呈抄蒙紀工監察御史孫珂鄧本端案驗查得辰州衛指揮梁昱先於白洛河斬獲首級一顆後於格兜坡斬獲首級二顆及武昌衛指揮于鏞斬獲首級各三顆俱驗明白皆准功次都指揮陳昶擒獲賊人一名李友俱各有功回報到道備呈到臣參照都指揮陳昶指揮梁昱于鏞李隆秦昭黃琛前項失機誤事實情既已查勘明白論法固當究治緣今賊情寧息數內陳昶梁昱于鏞李隆已有前項生擒斬首功次秦昭亦曾督軍殺賊黃琛亦曾守備南漳搭架橋梁開修道路頗效勤勞共成殺賊之功緣係該奉欽依候賊情寧息之日將各失機誤事實情并有無殺賊功勤緣由通行查勘明白具奏定奪事理未敢擅便具題成化二年十一月初八日該通政司官於奉天門奏奉聖旨該衙門知道欽此欽遵抄出送司案呈到部參照右副都御史王恕奏稱都指揮王英擒斬賊級二名顆參議劉子鍾生擒一名知府干璠生擒二名指揮孫能斬首一顆百户尹釗曹政韓忠俱當先奪關僉事郁文博設意使令官軍劫營殺死賊人一百五十名生擒賊人一十四人千户李全李俊曹宗與對敵保全城池各官頗有功勤兼且誤事之罪犯在赦前及稱都指揮等官陳昶生擒賊人一名梁昱李隆于鏞俱斬獲首級三顆秦昭亦曾督軍殺賊黃琛亦曾守備南漳搭架橋梁開修道路頗效勤勞共成殺賊之功一節緣各官先因失機誤事已該本部節次議奏令其住俸做為事官戴罪殺賊令副都御史王恕候賊平之日將各官失機誤事實情并有無殺賊功勤查勘明白通行具奏定奪今彼處地方既已寧息其右副都御史王恕自合照依比先節次奉欽依內事理各將官查勘見某人有何功蹟堪以贖罪某人應該奏問却乃將奪關并與賊對敵及督軍殺賊開修道路等項一槩作殺賊功勤朦朧具奏合無本部仍行本官令其公同巡按監察御史將各官逐一查勘要見某人功過相凖相應寬貸某人罪重功微相應究問再行查勘明白各另具奏定奪等因具題成化二年十一月十五日本部右侍郎李震等於奉天門奏奉聖旨是欽此欽遵行移到臣查得兵部前項奏內先一次止稱合無行移都御史王恕著令各官住俸做為事官上緊協力殺賊候前賊勦捕畢日將各官前項誤事實情并有無殺賊功勤緣由通行查勘明白具奏定奪後一次止稱合無行移都御史王恕著令各官住俸做為事官在彼領軍勦賊候賊情寧息之日將各失機誤事實情并有無殺賊功勤緣由通行查勘明白具奏定奪别無令臣查勘各官某人有何功蹟堪以贖罪某人應該究問緣由况賞罰乃人君之大柄非臣下所敢專兵部原奏內不曾令臣如此擬奏臣豈敢輕易妄擬以此臣止照欽依內事理將各官失機誤事實情并數內王英劉子鍾陳昶梁昱等獲到功次及尹釗等當先奪關秦昭督軍殺賊黃琛開修道路等項勤勞具奏取自上裁今該前因欽遵公同巡按湖廣監察御史王璽查得指揮孫能委的不候知府干璠到來商議輕率百户曹政韓忠尹釗千户曹宗各帶旗軍火夫人等捕至房縣馬欄鋪與賊對敵各不奮勇殺賊被賊殺死旗軍鄭信等一十名民夫五名彼時知府干璠指揮孫能千户李全曹宗百户曹政韓忠尹釗委因賊勢凶惡關閉城門率領官軍民壯在於城上用火鎗弓箭射傷强賊五六人被賊在於城外劫掠財物燒毁軍民馮子智等一十七家房屋至晚退散去訖千户李俊委在月竹關捕賊不曾到於房縣其後强賊到南漳之時知府干璠委蒙巡撫僉都御史王儉取回踏勘灾傷賑濟饑民指揮孫能委在中途舊縣鋪駐劄不曾到縣千户曹宗李全李俊彼時各俱回所止有百户曹政韓忠尹釗在彼領軍與賊對敵被賊殺死民壯劉原等五名燒燬民人徐剛等一十五家房屋劫去在監囚犯鄒政等八名口搶去民人覃政等家馬匹虜去民人鐘魁等家男女四名口及勘得前項强賊在於房縣南漳等處殺傷官軍攻劫縣治之時有原委都指揮王英回司管事參議劉子鍾在均州撫民僉事郁文博蒙巡按監察御史王璽取回科場去訖俱各不曾督軍殺賊以致賊人殺死官軍民壯其後官軍攻隘門關等處都指揮僉事王英擒斬賊級二名顆右參議劉子鍾生擒賊人一名知府干璠生擒賊人二名指揮孫能斬獲首級一顆僉事郁文博在於房縣設意使令官軍前去劫營殺死賊人一百五十名生擒賊人一十四名又督官軍與賊對敵殺退賊衆奪獲賊馬殺死賊人五十五名千户李全李俊曹宗百户尹釗曹政韓忠委與賊人對敵當先奪關曾效勤勞又查都指揮陳昶等統軍到於資坪遇賊委的陳昶同指揮黃琛秦昭李隆于鏞等俱在營內不敢出戰有指揮梁昱不能料敵獨領官軍二百名渡水前去逆戰隨有快手總甲許真統領快手八十名前去策應共殺死賊人約有四十餘名被賊殺死軍快二十六名其後指揮梁昱于鏞李隆在於白洛河等處俱各斬首三功都指揮同知陳昶領軍擺墅護哨護糧料擒獲賊人一名指揮秦昭委的督軍殺賊指揮黃琛委的守備南漳開修道路曾效勤勞看得都指揮黃英陳昶參議劉子鍾僉事郁文博知府干璠指揮孫能梁昱于鏞李隆既有前項殺賊之功堪以贖日前誤事之罪相應寬貸指揮秦昭黃琛千户李全李俊曹宗百户尹釗韓忠曹政罪重功微俱該究問緣數內李全李俊曹宗尹釗韓忠曹政俱犯在成化元年十一月二十七日大赦以前緣係欽依再問查勘明白具奏定奪事理未敢擅便具本謹題繳撫治流民敕諭奏狀成化三年二月二十三日節該欽奉敕諭今特命爾巡撫河南地方欽此照得先奉敕諭命臣撫治南陽襄陽荆州三府流民已經欽遵督同司府州縣衛所官吏委官取勘撫治無田地者區畫撥與無牛耕者措辦分給無衣食者設法賑濟願入籍者編成里甲願復業者省令秋成回還及將編過里甲安插過户口撥過田地給過牛種賑濟并願復業人戶數目具題外去年賊平之後又經督令各該委官將被賊驚散者招撫復業詐冒鄉貫漏報户口等項者取勘明白應改正者就與改正應附籍者仍編里甲應發遣者照例發遣去後今該欽奉前因除欽遵及行湖廣布政司撫民參議劉子鍾徑自督屬委官撫治外今將原奉撫治流民敕諭進繳謹具奏聞計繳敕諭一道升左副都御史謝恩奏狀成化三年三月十五日准本院咨為功次事該兵部題節該欽奉聖旨是王恕升左副都御史欽此欽遵臣恕猥以庸材濫膺重寄偶遇山賊之狂悖幸賴天兵之勦除慚無調度之功遽荷升遷之寵感恩莫既揣分奚堪願傾葵藿之誠敢效涓埃之報除望闕謝恩外謹具奏聞巡撫河南區畫未完稅糧奏狀行據河南布政司呈送造完天順八年以前未完稅糧文冊到院看得冊內起運京倉等處未完者少存留各府州縣未完者多伏覩成化元年十一月二十七日節該欽奉詔書內一欵各處軍民解納糧草農桑人丁絲絹門攤商稅户口食鹽米鈔并諸色課程除已到倉庫上納外有納缺年久追賠未完者自成化元年十一月以前悉皆宥免欽此除欽遵外今照前項拖缺天順八年以前各年稅糧除起運京倉等處另行外其存留未完之數中間雖有已經起解被里甲大户侵欺者亦有輕收輕齎到於臨倉糴買攬頭誆騙不能完納者亦有逃亡死絶人户遺下之數里甲賠貱不起因被上司催併緊急揑作徵完虛文起解者亦有委被水旱灾傷申告後時不蒙准理仍前催徵不曾上納者亦有責令細户自行送納不曾到倉者求其拖缺之故雖不同大抵皆是納缺年久追賠未完之數遵依前項詔書事例俱該宥免但緣有司惟恐倉廩匱乏供費不足又恐下人作弊將已徵錢糧揑作未完希冀蠲免以此一槩不與分豁節次行文催併去訖竊謂前項稅糧若是里甲大戶侵欺雖令典田賣地賠貱完納亦不為過果係小民拖缺例該宥免者若猶追徵非惟逼迫人難實是孤負恩典况河南地方連年災傷人民艱窘原經收人戶有名無實家道消乏者多雖稱在前侵欺糧價年久亦皆費用不存若仍追徵本色縱使傾財破産鬻男賣女亦恐賠納不起兼且本布政司官庫銀兩盡數送赴荆襄軍前給賞軍士即今無他儲積非惟買辦等項缺價支給萬一有緊急之用實難措置若不設法從宜處置錢糧殆難完結官司徒自紛擾如蒙乞敕該部計議合無行移河南布按二司各委堂上公正官員㑹同前去所屬缺糧府州縣督同各該官吏從公審勘天順八年以前各年存留稅糧除已納完外未納之數果係徵收在官已經起解被里甲大户侵欺者照例每糧一石折收銀二錢五分煎銷成錠解赴本布政司上納收銷以備支用若是小民拖缺者俱照欽奉詔書內事理宥免如布按二司委官不行用心查勘縱用下人通同作弊許巡按監察御史參奏拿問如此庶幾錢糧明白而小民得霑恩惠庫藏贏餘而緩急不至誤用緣係委官查勘未完稅糧折納銀兩事理未敢擅便成化三年四月十五日具題蝗生境內請避位因勸上去奢崇儉奏狀據開封漳德衛輝等府睢鄭等州滎澤陽武尉氏通許杞縣祥符儀封河隂新鄭陳留長葛蘭陽臨漳安陽新鄉等縣申各准委官判官等官王憲等牒成化三年六月內巡視得恆山等地方間有飛蝗過落及蟲蝻生發食傷禾稼督令火甲人等打捕移牒轉達等因到職行間又據河南布政司并河南按察司分巡河北道僉事王霽亦呈前因案照先據衛輝等府備胙城等縣申稱蝗蝻生發已經具題及通行都布按三司原委分巡分守參政等官王髙分投前去督屬委官設法打捕去後今據前因除嚴督原委官員打捕另行外臣竊惟蝗蝻生發固雖天灾實關人事人事修則天意可回而灾不為灾矣昔卓茂令密邑而蝗不入境茂能修其職也今蝗蝻為患於河南者豈無故乎良由臣巡撫失職不能敷宣聖化以安民人是致上天以此而譴告耳况臣管內地方連年水旱加以去嵗荆襄盜起軍勞於征調民困於轉輸及又今年起運稅糧并勘合買辦物料等件比之往年數多今又遭此蝗蝻之灾軍民何以聊生考之於史宋真宗罷諸營建而飛蝗盡絶此真宗能修德政以應天是以天灾隨之而消也伏望陛下以天戒為可畏以地方為當重將臣罷歸田里另選賢能代理其事尤望陛下去奢崇儉除祭祀軍需之外其餘一應不急之務無益之事可減省者減省之可停止者停止之使財不妄費民困少舒庶幾天意可回而灾沴可弭矣臣受國重寄值兹灾異不敢循默為此具題激勸賢能奏狀節該欽奉敕諭今特命爾巡撫河南地方官吏有能奉公守法修舉政務者量加奬勸欽此欽遵及節該欽奉詔書內一欵府州縣官有廉能公正撫字勤勞深得民心者上司以禮相待仍具其政蹟奏聞以憑旌擢欽此欽遵除河南布政司所屬州縣見任廉能知州謝光知縣尚璣王璽胡澄先該巡撫都御史賈銓奏請旌異不開外今體得開封府中牟縣知縣王斆商水縣知縣羅楫河南府孟津縣知縣丁政新安縣知縣魏恭俱各廉能公正撫字勤勞深得民心未經旌擢除欽遵詔書內事理以禮相待外如蒙乞敕吏部將各官照例量加旌擢庶使廉能者益加勸勉不才者有所感發緣係激勸官員事理未敢擅便今將各官略節政蹟開坐具本謹題請旨計開開封府中牟縣知縣王斆處事公勤持身廉介耄倪感德逺近知名商水縣知縣羅楫不剛不柔無私無僞令行禁止事妥民安河南府孟津縣知縣丁政操持端謹政令公平庶事康哉羣黎樂只新安縣知縣魏恭外無浮華中則純確令嚴政善吏畏民懷代書辦吏賈儀等請冠帶奏狀臣先任右副都御史奉敕諭撫治南陽襄陽荆州三府流民彼因缺人書辦行該吏部題准撥令史賈儀典吏陸皓跟隨書辦後因荆襄盜賊節次奉敕命臣公同太監尚書總兵等官唐慎等計議征勦師出數月賊冦殄滅地方底寧伏蒙聖恩念臣前項微勞升臣右副都御史緣令典賈儀陸皓一向隨臣在於軍前書辦公文催糧督軍蹈危履險同受辛苦未霑天恩况各吏係是吏部考中例該厯俸三年滿日冠帶正八品出身人數今已厯俸三十箇月止有六箇月未滿照得提督軍務白圭帶去令史陳廉總兵官撫寧侯朱永帶去掾史黃宣和等俱未及三年已䝉冠帶今賈儀等與各吏事體相同如蒙乞敕吏部照例令各吏冠帶辦事挨次取用如是則勤勞者知所感激而益樂於效力矣緣係激勸事理未敢擅便具題言吏部不覆請給誥命未當奏狀臣因父年老於成化三年九月初二日具奏乞請誥命奏奉聖旨吏部知道欽此太醫院使施安院判方賢各為母老於本月初三日具奏乞請誥敕亦奉聖旨吏部知道欽此該部已與施安方賢覆奏奉聖旨准他却不肯與臣覆奏以致臣不蒙恩典竊思臣與施安方賢同為在京堂上官同為親請給誥敕而該部與施安方賢覆奏不與臣覆奏非惟不遂臣之私實於體未宜伏望皇上憐臣親老一視同仁特敕吏部照依施安方賢事例以臣應得誥命先行給賜使臣父生被光榮非惟臣感恩於無窮而天下之為臣子皆知所勸矣臣為親之心激切干冒天威不勝戰栗之至為此成化三年九月十三日具題升南京刑部左侍郎謝恩奏狀臣先任都察院左副都御史欽差巡撫河南近准吏部咨欽升前職臣猥以庸材屢蒙顯擢備員兩省殊無異政持憲三年未有竒勳方虞物議之未平詎料宸衷之不棄特降綸音於北闕俾弼邦教於南京寵命非常驚懷失次臣敢不公忠是勉敬慎自持遵賢哲得情勿喜之言體聖明視民如傷之意庶禆無為之至治少酬莫大之洪恩臣下情無任除望闕謝恩前去到任外具題王端毅奏議卷一
