body:
  text: 王端毅奏議巻二明王恕撰南京刑部彗見地震乞休致奏狀臣見年五十三嵗係陜西西安府耀州三原縣人由進士改庶吉士正統十四年欽除大理寺左評事歴陞寺副知府左右布政使左右副都御史及今官屢被朝廷莫大之恩叨享祿位二十餘年雖夙夜兢愓欲圖報稱奈學術淺陋終無禆益竊惟灾異莫大於彗見地震而召致之由無踰於刑獄之寃濫茲者彗見於上地震於下固由臣等諸司官吏不能上體聖心欽崇天道恪修職務之所致而臣司刑之官失職之罪比衆尤為甚也伏蒙聖慈特賜優容不加譴罰勉臣等省身脩職以囘天意臣雖至愚豈不知感但臣年力衰憊才德罔稱不能効用無補明時徒縻廩祿若復包羞固位将來隳政廢事取譏於人獲譴於天恐不止此伏望聖恩憐憫将臣放歸田里茍全㣲體另任賢能大新至治庶幾優劣得所而天意可囘矣臣不勝戰慄之至具題請㫖聞父喪復請給誥命奏狀臣係陜西西安府耀州三原縣人由進士改庶吉士歴任評事寺副知府左右布政使成化元年欽䝉聖恩陞都察院右副都御史成化三年為功次事陞本院左副都御史廵撫河南成化四年四月十六日實歴左右副都御史俸三十六箇月三年考滿給由間本月十七日准吏部咨為缺官事陞今職命臣就彼赴任管事臣以此不曾赴京給由就於本月二十九日到任管事訖彼因先任副都御史應得誥命未曾請給為念臣父年巳八十有一惟恐不能有待已經具奏乞恩請給急欲得之以為臣父生前一日之榮吏部因臣三年考滿未曽赴京給由不䝉請給臣父果不能有待於本年十二月二十六日在家病故臣於成化五年二月十一日聞喪今臣雖欲為父求生前一日之榮不可得矣仰惟聖朝以孝治天下凡兩京官曾經三年考滿者照依品職給與誥勅封贈祖父母父母俾各遂其孝親之心誠隆古所無之恩典也中間有為親乞恩者雖未滿三年亦䝉聖慈給與誥勅光被存没臣先任副都御史三年已滿誤蒙聖恩陞擢今職又将一年任内别無違碍止因未曾赴京給由之故而應得恩典不及其親人子之情豈能自巳伏思臣任江西右布政時流賊髙安吳廣華等千有餘徒屯聚廣東程鄉縣地方刼掠贛州府縣臣同都指揮王貴督令勦捕任右副都御史時强徒梁温汪四等千百餘人在南陽府雙廟兒爭占銀鑛擅立營寨私造軍器幾生他變臣到彼調度設法撫捕俱獲渠魁具奏䖏置訖况在荆襄殺賊臣亦曾効勞夫為臣伐功固非美徳為親乞恩實乃至情伏望聖恩念臣節次㣲勞憫臣愚悃恕臣死罪勅該部給臣先任副都御史應得誥命臣父雖没得以贈官題寫銘旌榮于殯葬之時光于泉壤之下臣生當隕首死當結草臣急於為親自陳無狀干冐天威不勝戰慄之至謹具奏聞蒙賜誥命謝恩奏狀近者欽蒙聖恩賜臣先任都察院左副都御史誥命進臣階通議大夫贈臣祖父惟真父仲智俱通議大夫都察院左副都御史祖母張氏母周氏妻蓋氏繼室張氏俱淑人伏念臣資質凡庸學問膚淺過䝉錄用常切慚惶志雖不忘乎公才實無補於治况此憂服之日值此曠蕩之恩龍章降自九重豸服被於三世光榮罕儷寵幸何加臣敢不殫犬馬之勞答乾坤之造除望闕謝恩外謹具奏聞蒙賜葬祭謝恩奏狀臣父仲智先蒙勅封文林郎大理寺左寺左評事成化四年十二月二十六日在家病故復蒙聖恩給賜誥命贈通議大夫都察院左副都御史遣進士蔡晟造墳安塟陜西布政司右叅政賈傑諭祭今已事畢伏念臣素乏才猷誤蒙任使雖竭駑駘之力曷酬覆載之仁夙夜兢慚莫知攸措值慈父違榮於三釜致湛恩降賜於九重既葬既祭逮下之禮無以加載馳載驅報上之誠罔敢後除望闕謝恩外謹具奏聞總理河道論報管河工程及乞禁馬快船附搭私貨奏狀節該欽奉勅諭令臣管理一帶河道臣自通州直抵儀真等處往來嚴督郎中等官陸鏞等将一應河道事宜但係日前廢弛損壞者令其逐一漸次修復及将淮安揚州二府等處淺澁難行河道俱已挑濬深闊但緣淮揚一帶運河别無泉源止藉髙郵邵伯等湖所積雨水奈何彼處地方自去嵗秋冬以來至今一向少雨湖水消耗慮恐開通閘河走泄水利愈致淺涸已令淮安府暫於清江閘越河并新莊閘下添設二壩車盤船隻及令揚州府委官前去瓜州儀真等處車戽江水接濟臣在揚州府躬率官吏人等設壇祈禱雨澤待有水之時撤去新莊壩方開閘河照得去年因是揚州等處久旱不雨遂致糧運遲滯今又似前乾旱臣以為當斯之時北有守凍囘還等項船隻南有白糧并各衛所兑運船隻一往一來相挨而行又有南京裝運官物馬快船隻日逐相繼而來每起或五七十隻或三四十隻且又船大載重難為撑駕其餘運糧等項船隻一見前來舉皆退避讓路動經數日不敢前進及到閘河積水雖不滿板亦須通閘開放閘内運船不無淺閣兼且往年江北衛所運船俱在瓜州淮安等處交兑比及三月已完八九完者就行尚以為遲今年俱往蘇松等處兑運今有三月将半兑完而囘者僅見一二若不預為處置誠恐糧運遲滯非惟負累軍士抑且有誤國計如蒙乞勅該部計議合無速行南京守備内外官員将年例該進鮮物依期撥與快便船隻装送仍禁約夫甲人等不許裝載江米板片磁器等項重物在内其餘裝運竹木馬槽等項物件者暫候有水時月逐起發運庶幾京儲不致遲誤軍民得其便益成化八年三月十二日具題言開河事宜并乞先修舊塘水閘奏狀臣看得揚州一帶河道南臨大江北抵長淮别無泉源止藉髙郵邵伯等湖所積雨水接濟湖面雖與河面相等而河身比之湖身頗髙每遇乾旱湖水消耗則河水輒為之淺澁不能行舟若将河身濬深三尺則湖水自來河水自深雖遇乾旱亦不阻船前向河道自南至北四百五十餘里中間除深闊不用挑濬外其淺窄可挑濬去處尚有二百餘里約用九萬餘人六十工可完毎人日給口糧二升該用糧米一十萬八千餘石捲埽打壩共用樁木一萬六千餘根草二十餘萬束及看得髙郵湖自杭家嘴至張家溝南北三十餘里俱係磚砌隄岸每遇西風大作波濤洶湧損壞船隻失落錢糧人命不可勝計况前項隄岸之外地勢頗低若再濬深三尺闊一十二丈起土以為外隄就将内隄原有減水閘三座改作通水橋洞接引湖水於内行舟仍於外隄造減水閘三座以節水利雖遇風濤亦無前患若興此役約用一萬三千餘人六十工可完毎人日給口糧二升該用糧米一萬五千六百餘石合用築隄樁木五萬四千餘根草二十七萬餘束造減水閘并改造通水橋洞約用樁木磚石等料并工價銀二百餘兩又看得揚州灣頭鎮迤東河道内通通泰等五州縣二千户所富安等二十四鹽場其間有魚鹽柴草之利在前河道疏通之時二千户所運糧船隻俱在本所艌脩客商引鹽裝至儀真毎引船錢不過用銀四五分揚州柴草毎束止賣銅錢二三文近年以來河道淤淺不曾挑撈加以天旱雨少河水乾斷舟楫不通魚鹽柴米等項俱用旱車裝載二所運糧船隻不得囘還本所牛車脚貴柴米價髙以致客商失䧟本錢軍民不得聊生前項河道自灣頭起至通州白浦止三百四十餘里俱用挑闊八丈深三尺約用八萬五千六百餘人六十工可完毎人日給口糧二升該用糧米十萬二千七百九十餘石再看得雷公上下塘勾城塘陳公塘俱係漢唐以來古蹟各有放水減水閘座年久坍塌遺址見在近年以來止是打造土壩攔水隨修隨坍不能蓄積水利若毎塘修造板閘一座減水閘二座潦則減水不致衝決塘岸旱則放水得以接濟運河以上四塘共造放水板閘四座減水閘八座除舊有磚石外約用磚石樁木等料價值并匠作工價銀二千餘兩臣雖無識詢之于衆咸以謂若将以上三件河道依前整理庶㡬舟楫疏通永無淺阻風濤之患而為往來軍民無窮之便也但係前項工程浩大合用人力錢糧數多况揚州府地方連年灾傷人民窮困已極倉庫錢糧不敷兼且邇來𤣥象示警邊境不寧人心驚疑如斯之役未易輕舉須候時和嵗豐人力寛舒方可為之惟修理陳公等塘閘座一事既不起倩人夫止用前項工價為之頗易如蒙乞勅該部計議合無於本府收貯解京船料銅錢内委官支給收買物料脩造閘座亦可以蓄積水利接濟運河為此成化八年三月二十二日具題乞罷巡河管泉等項官員奏狀准本部咨准吏部咨該欽差印綬監太監韋煥題裏河一帶自通州直抵儀真等處雖有巡河御史等官因無專主等待更替致使河道連年淤淺阻碍船行具題抄出該吏部㑹同户工二部計議奏奉欽依自通州至德州一帶河道著郎中陸鏞專管自德州至濟寜一帶著副使陳善專管自沛縣至儀真瓜州一帶著郎中郭昇專管仍請勅命臣總理其事嚴督沿河一帶巡視等官并軍衛有司人等凡前項河洪閘壩湖泊泉源鋪夫井樹及一應河道事宜根究本末設法措置以次修復不許諸人侵占阻滯務在通行經久利便其見在管河巡河管泉等項官員應否去留宜從總理河道官處置定奪行移到臣除領勅前去沿河一帶提督郎中等官陸鏞等并軍衛有司人等将河洪閘壩湖泊泉源鋪夫井樹及一應河道事宜根究本末設法措置漸次修復候工程完日另行具奏外查得揚州府一帶河道見有主事崔陞管理淮安府一帶河道見有漕運衙門問刑主事游佐并清江浦提舉司督造船隻主事屠勲兼管徐州洪有主事王道專管吕梁洪有主事謝敬専管濟寜南北天井等二十閘主事過璘專管臨清至荆門一十五閘衛河提舉司督造船隻主事南鵬兼管濟寜迤南至儀真瓜州又有御史方中專管巡河迤北至直沽等處又有巡鹽御史兼管巡河兖州等處又有主事張盛專管泉源臣看得徐吕二洪濟寜州天井在城趙村三閘臨清縣新開等四閘最為𦂳要不可一日無人管理其餘河道閘壩泉源今既令郎中陸鏞副使陳善郎中郭昇等專管若又存留管河巡河管泉主事御史管理非惟甲可乙否掣肘難行抑恐互相推托因而悞事合無令主事王道專管徐州洪謝敬專管吕梁洪過璘專管濟寜天井在城趙村三閘并上新下新宫村呉泰四閘南鵬兼管臨清縣新開等四閘其餘一應河道閘壩泉源等項著陸鏞郭昇陳善各照原分地方管理将管河主事崔陞管泉主事張盛巡河御史方中取囘其餘問刑造船主事巡鹽御史兼理河道者令其止管本等事務不必似前兼理庶㡬事體歸一易於責成緣係該部奏奉欽依見在管河巡河管泉官員應否去留宜從總理河道官處置定奪事理未敢擅便具題言詔令不可失信奏狀臣聞信者國之寳民之所依以立者也詔者國之號令敷恩澤感人心而示之以必信者也易曰渙汗其大號言號令如汗之出而不反也書曰慎乃出令令出惟行弗惟反言號令之出不可不謹行之不可不信也魏文侯小國之君不失虞人之期商鞅霸者之佐不廢徙木之信矧為億兆之君師者乎庸言亦信庸行亦謹矧布詔令於四方者乎臣伏覩詔書内一欵自成化七年十一月十六日昧爽以前官吏軍民人等有犯除謀反大逆謀叛子孫謀殺祖父母父母妻妾殺夫奴婢殺主蠱毒魘魅毒藥殺人强盗人命妖言不赦外其餘已發覺未發覺已結正未結正罪無大小咸赦除之敢有以赦前事相告言者以其罪罪之欽此臣聞順德府知府黎永明止因毆公差人員獲譴浙江布政使等官劉福等止因織造段疋不如法致罪别無另項重情况又犯在革前今却以降調等項發遣是前項明詔不信於天下也設或此事傳播四方使懼罪逃躱反側不安者聞之誰肯自首求免乎臣恐由是幅􅊷之内人懷危疑倘有不虞之事發咫尺之書求濟一時之急誰復肯信不信則不從不從豈不誤朝廷之大事乎議者以為生殺予奪由朝廷臣下豈宜妄議臣愚以為理之當生殺予奪而生殺予奪之可也不當生殺予奪而生殺予奪之未可也若賞一人而千萬人勸則賞之罰一人而千萬人懼則罰之此公天下之賞罰則所謂理之當生殺予奪而生殺予奪者也賞一人而千萬人不勸則謂之淫賞罰一人而千萬人不懼則謂之濫罰此非公天下之賞罰即所謂理之不當生殺予奪而生殺予奪者也且君以聴言為明臣以進言為忠朝廷賞罰合乎宜臣固當将順之未合乎宜亦當匡救之豈可以越人視秦人之肥瘠忽焉而不加喜戚於其心乎然黎永明等之事雖曰出自一時聖斷而執法之官亦不能辭其責何則漢文帝時張釋之為廷尉文帝欲重犯蹕之罪釋之曰當罰金文帝怒釋之曰法者天下之公共也今法如是更重之是法不信於民也且廷尉天下之平也一傾天下用法皆為之輕重民安所措其手足文帝從之其後文帝又欲族盗髙廟器者釋之曰當棄市文帝怒釋之謝曰法如是足也今盗髙廟器而族之假令愚民取長陵一抔土陛下且何以加其法乎文帝許之至今百世之下莫不稱文帝之仁明釋之之執法設若初發落黎永明等之時法司能如釋之之執法以奏陛下聖明寛仁未有不賜俞允黎永明等未有不䝉曠蕩之恩天下後世未有不稱陛下如文帝稱今之法司如釋之者然而此事雖小害信為大臣之所以懇懇為陛下言者不但為黎永明等惜為天下惜不但為天下惜實為朝廷惜也倘䝉陛下不棄芻蕘之言将黎永明等並依革前宥之使復其職庶明詔可以取信於天下而不誤事於将來矣臣愚更望陛下自今伊始凡罪之當罰者雖貴近必罰功之當賞者雖疏逺必賞發一號令出一詔旨亦宜熟思審處求合人心然後付之有司行之天下如金石之堅如四時之信使萬姓咸悦逺近歸心又何患中國之不安四夷之不服哉若賞罰過當號令不一曰治曰安非臣之所能知也臣以菲材叨司邦刑知而不言是謂有隠伏乞皇上憐其直赦其罪不勝大幸言運船前進囘淮揚修理河塘壩座奏狀臣先准户部咨提督分管河道郎中等官并沿河一帶軍衛有司整理河道催儧糧船七月十八日等日淮揚地方風雨大作山水泛漲衝決河塘壩座損壞隄岸隨即提督各該委官整理修築緣工程浩大卒急難完已将糧船俱過揚州月日及修理河塘壩座畧節緣由各另具題外近准吏部左侍郎尹旻咨為督催漕運事臣又公同本官并總督漕運左僉都御史張鵬等往來提督催儧糧船昨在德州已将河道近頗有水并糧船所過地方緣由具題外今臣已抵直隷河間府靜海縣地方查得各衛所糧船已到京通州等倉上納及過天津迤北者約有十之七過臨清者約有十之九俱已晝夜前進無阻况有侍郎尹旻等催儧處置事必停妥臣欲候糧船俱到通州之日前去督修淮揚河塘壩座誠恐冬深土凍前工難成有悞來年漕運之計未便除於十月初一日前去淮揚督修河塘壩座外謹具題知言管河官應否添設奏狀准工部咨都水清吏司案呈准户部四川清吏司手本奉本部送戸科抄出巡按直隷監察御史婁謙題五事内一件整理河道事看得管河官員原無額設俱係沿河軍衛有司委官管理各多懦弱無為更易不常以致責無所歸事鮮成效見今雖有工部郎中陸鏞等官分投管理然亦不過提其大綱而已若欲事有定規必須官有專主查得臨清濟寜沿河一帶府州縣分俱有額設管河官員如蒙乞勅該部計議合無自通州直抵臨清除各府州并仝設縣分照舊委官管理外其餘裁減縣分照依臨清迤南事例添設管河官一員不許别項差使各另專一管理河道等因該通政使司官奏奉聖旨該部知道欽此欽遵備由手本到司案查近該欽差總理河道刑部左侍郎王題稱自儀真直抵通州一帶河道閘座泉源照依原擬分與郎中等官陸鏞等管理要将管河主事崔陞管泉主事張盛巡河御史方中取囘其餘造船主事巡鹽御史兼理河道者令其止管本等事務庶使事體歸一易於責成等因本部已經依擬覆奏通行遵守去後今巡鹽御史婁謙又奏前因案呈叅照所奏要於裁減縣分照依臨清迤南事例添設管河官員一節未審有無相應違礙合就移咨斟酌應否務合時宜徑自施行備咨准此照得通州直抵臨清一帶河道委的多有灘淺旱則阻滯船隻潦則衝決隄岸常要扒撈修築必如御史婁謙所言将前項地方裁減縣分照依臨清迤南事例添設管河官員專一管理方能有濟但沿河順天府所屬七州縣河間府所屬十州縣廣平府所屬中間止有武清一縣原設淺鋪修隄等項人夫二百三十名却係全設衙門其餘裁減縣分人夫多者不過百餘名少者止有三五十名比之臨清迤南縣分河道工程人夫數目不及十之一二若各添設官一員專管俸祿僕馬不無煩擾及查得沿河揚州府所屬四州縣淮安府所屬六州縣徐州并所屬沛縣中間閘壩洪淺湖塘等項最為𦂳要毎處所設各項人夫多者數千名少亦不下數百名毎嵗修隄打壩等項費用樁草等料數百萬計前項府州縣亦無添設管河官員止是委官管理若府州縣所委官員專一往來督屬整理亦不誤事柰何常被巡撫巡按等官差委勘理别事動經旬月不到河塘况所屬委官多不得人雖有分管河道郎中等官地方廣逺一時照管不及未免有誤如䝉乞勅該部計議合無照例将順天河間揚州淮安四府各添設管河通判一員徐州添設管河判官一員專一督同所屬官吏委官整理河道一應事務俱不許别項差遣仍令分管河道郎中副使等官往來提督比較如此則官亦不繁事亦可集緣係工部行令臣斟酌應否務合時宜徑自施行事理未敢擅便具題言裏河一帶災異奏狀去年自京師直抵揚州南北三千餘里水旱灾傷五榖薄收軍民艱食今嵗正月初間止得一雪自雪後至今八十餘日雨澤少降狂風迭作飛沙揚塵遮天蔽日彌月不止田地乾燥河水耗散麥苖出土多被沙壅穀種雖下未曾萌芽臣又訪得臨清武城至德州一帶地方三月初四日申時分有黑氣自西北而來忽然晝晦出手不見掌比之夜間天隂無星月之時黑暗尤甚移時方退民心十分驚愕不寜臣雖不通術數亦知其非休徵也但沿河一帶軍民目今已自十室九空缺食糊口父母兄弟離散妻子不相顧流移死亡不可勝數若到四月間再不降雨二麥恐無所望富者亦難存活臣往來河道之間目擊耳聞豈忍循黙伏望皇上以宗社為念特降香帛遣官分祭各處山川之神祈禱雨澤以濟枯涸以慰民望以固根本仍詔廷臣講究弭灾䘏患之策求其至切至要可以囘天意可以安民心可以延國祚於億萬年者而力行之必有效驗臣不勝大願為此具題該禮部覆奏奉聖旨山東百姓既十分艱難須行實惠便降詔将今年税糧等項盡行蠲免順天等府有灾傷處也量宜減免祭告遣侍郎劉吉就著闗領香帛銀兩去山東得雨河道疏通奏狀今年三月十二日臣自通州南下本月二十五日到東昌府武城縣已将沿河地方自正月以來雨澤少降狂風迭作田地乾燥河水耗散乞請香帛祈禱等項緣由具題外四月初四日臣至濟寜訪得本州於三月二十八日夜得雨一陣不久而止至魚臺詢訪得雨日期與濟寜同而其勢頗大其雨止可潤地河水無增四月十五日晚至古城驛遇雨至次日早方止河水頗增自古城而下至淮安至揚州河水深濶船隻無阻臣復自揚州北上整理河道催儧糧船五月初五日到宿遷縣地方偶遇河水泛漲比舊約增五六尺之深詢問北來公差官員皆説近日山東徐州等處得雨閘河一帶俱有飽水臣又訪得未得水時泗州淮安等衛糧船到宿遷等縣陸家墩等淺俱曾起剝得水之後臣親見懷逺沔陽新安鳯陽儀真留守左等衛糧船至彼皆不起剝又得順風俱各張帆而行滔滔無阻畧不費力軍民懽悦皆曰今年得水早糧船比舊年定然早到此皆朝廷洪福軍民賴之臣職專河防久旱之餘遇茲大水豈勝忻忭除儧糧船日夜前進外緣係河道得水糧運疏通事理具題改南京户部左侍郎謝恩奏狀臣先任刑部左侍郎欽差總理河道近准本部咨准吏部咨欽改前職伏念臣材質凡庸學術疎淺偶中春闈之選麄紬秘閣之書任評事任寺副恒憂讞議之未明為知府為布政每懼承宣之無狀兩副都憲而左以右陞再佐秋官而北由南轉食祿年久感恩日深雖迫桑榆之年難忘聖主豈知錢穀之託遽及愚臣撫已若驚靦顔就列臣敢不堅持晚節益勵初心竭犬馬之微勞答乾坤之大德臣無任感天荷聖激切屏營之至除望闕謝恩前去到任管事外謹題南京户部處置運糧餘丁月糧奏狀廣東清吏司案呈抄蒙欽差南京守備太監安寧等節該欽奉勅爾等㑹同将南京各該衛所旗軍并新江口等處寄操旗軍查勘酌量選補運糧若正軍數少即将殷實餘丁㸃凑照依正軍事例免其一丁差使幫貼月支米一石養贍家口行糧賞賜一體闗給欽此欽遵除該年依勅選補外自是以後各衛所餘丁因見運糧者月支米一石又有行糧賞賜别差者無有糧賞所以皆願運糧而不願别差衛所官吏受其請屬凡遇運糧旗軍逃故多不於正軍内選差輒将餘丁撥補甚有将在運旗軍揑故掣囘改差就以餘丁更替及至逃故等項旗軍復役補役又不送去上運替囘餘丁改差所以食糧餘丁一年多似一年在倉糧儲一嵗少如一嵗又如在外衛所旗軍有月支本色米八斗者有月支本色米六斗者而運糧餘丁一例俱支米一石比運糧正軍支米反多若不處置非惟錢糧妄費抑且恩澤不均案呈如蒙乞勅該部計議合無通行内外軍衛衙門今後不許将運糧旗軍揑故掣囘改差果有逃故等項仍照先奉勅書内事理先儘操備等項旗軍查勘酌量選補若正軍數少方許将餘丁㸃凑如運糧逃故正軍復役補役即令上運替囘餘丁改差在外衛所運糧餘丁若該衛所正軍食糧一石者亦與糧一石食糧八斗者亦與糧八斗食糧六斗者亦與糧六斗不可使餘丁食糧多於正軍其選補運糧旗軍餘丁俱於運糧完足囘營之日選補仍将選過餘丁造冊南京各衛送南京户部在外衛所送所在有司查照收糧敢有不先儘正軍選補及将運糧正軍揑故掣囘改差濫㸃餘丁頂替虚費錢糧者叅奏挐問如此則錢糧不至於虚費而恩亦庶乎均一矣具題申明茶法奏狀陜西清吏司案呈巻查應天府批驗茶引所直隸常州府宜興縣張渚批驗茶引所浙江杭州府批驗茶引所節次闗去茶引自成化元年起至成化十年止陸續共闗過茶引五十八萬三千六百六十一道前去發賣各處茶商照賣茶觔累催不見銷繳查得本部先於景泰五年為因各處茶商人等多将舊引影射私茶不行銷繳查照清理鹽法事例具奏該户部依擬奏准出榜曉諭及行各處巡按巡鹽巡河巡江監察御史監收船料提督洪閘郎中等官禁治搜檢各批驗所追繳退引等因已經通行遵守外今照前項退引累催不繳其故蓋因批驗所不置簿籍附寫茶商姓名貫址或不照茶商路引聴其冐名開報或将引由賣齎産茶地方轉賣與人如此欲得的確名籍行追繳引難矣况茶貨出山經過官司既不從公盤詰又不依例批驗縱有夾帶觔重多是受財賣放彼何畏憚而不停藏舊引影射私茶又如南直隷常州府廬州府池州府徽州府浙江湖州府嚴州府衢州府紹興府江西南昌府饒州府南康府九江府吉安府湖廣武昌府寳慶府長沙府荆州府四川成都府保寜府重慶府夔州府嘉定州瀘州雅州等處俱係産茶地方相去前項三批驗所逺者數千里近亦不下數百里若照引内條例聴茶商徑赴産茶府州納課買引照茶於人為便理必樂從誰肯不買引由公犯茶禁今却令茶商皆來此三所買引路途窵逺往返不便欲其一二遵依不作前弊亦難矣况批驗所退引該與截角今前項三所卻管賣引不行批驗照退名實不稱有乖職掌呈乞施行等因到部臣等竊惟印造茶引鹽引禁治私茶私鹽係是太祖髙皇帝舊制今官不修職民不守法茶禁廢弛一至於斯若不申明禁約非惟虧國家之課程抑恐壞祖宗之制度合無請給聖旨榜文通行天下曉諭今後園户賣茶及茶商興販茶貨造引給由與夫批驗納課等項務要俱遵引由内條例數内惟買引一事免其納錢只照見行事例毎引一道納鈔一貫中夾紙一張仍令前項産茶府州斟酌所管地方毎嵗可出茶貨若干合用引由若干預先具數差人赴本部闗領前引囘還收貯出榜召商中買仍要辯驗茶商路引果無詐偽即将其人姓名貫址附簿将引給與年終該府州各将賣過前引造冊就将收過紙鈔差人一同解繳本部鈔送該庫交收紙劄造引仍具數領闗次年合用引由各批驗所如遇茶商經過務依例逐一批驗将引截角如無夾帶即便放行若有夾帶就連人茶挐送本處官司問理年終将批驗過客商姓名貫址并引數目及盤獲私茶起數緣由造冊申達所轄轉繳本部查考如有日前停藏舊引未曾繳報者榜文到日限三箇月以裏赴所在官司告繳與免本罪敢有不遵條件興販私茶者許巡按巡鹽巡河巡江監察御史監收船料提督洪閘郎中等官及各該軍衛有司守把闗隘人員挐問挑擔䭾載及引領牙行停藏之家俱依律治罪盤獲私茶并盤車船頭畜等物俱入官如将引由照茶依例批驗截角賣畢隨将赴往賣所在官司告繳封送原引衙門通𩔖解部查銷若有過期不繳者原領引衙門查報各該巡按監察御史按察司提問追繳如此則職掌定而政務修法令明而姦蠧息緣係申明舊例清理茶法事理未敢擅便今将茶引由内條例開坐具題計開一茶引由内茶引一道納銅錢一千文照茶一百觔茶由一道納銅錢六百文照茶六十斤見行事例毎引由一道納鈔一貫中夾紙一張一諸人但犯私茶與私鹽法一體治罪如将已批驗截角退引入山影射照茶者同私茶論一客商興販茶貨先赴産茶府州具報所賣斤重依例納課買引照茶出境發賣如至住賣去處賣畢隨即於所在官司繳納原引如或停藏影射者同私茶論一山園茶主将茶賣與無引由客商興販者初犯笞三十仍追原價没官再犯笞五十三犯杖八十俱倍追原價没官一茶引不許相離有茶無引多餘夾帶並依私茶定論一客商販到茶貨經過批驗所須要依例批驗将引由截角别無夾帶方許放行違越者笞二十一偽造茶引者處死籍没當房家産告捉人賞銀二十兩一賣茶去處赴宣課司依例三十分抽一分芽茶葉茶各驗價直納課一販茶不拘地方欲令兩淮山東長蘆三運司将鹽引紙毎張納鈔一貫奏狀陜西清吏司案呈照得本部先行收貯各運司送納印刷鹽引紙張數多奏准行移兩淮山東長蘆三運司毎紙一張折收鈔一貫解送本部轉送南京内府收貯以為文武官員旗役人等折俸支用其餘兩浙等運司仍用紙張後因紙有不敷又經奏准照舊納紙外今查得本部逓年收到各運司送納印刷鹽引紙除支用外見有七百一十餘萬張在庫約彀七八年支用外若再收紙積之年久不無損壞况今南京内府收貯鈔貫數少不彀折俸買辦等項支用案呈如蒙乞勅該部計議合無照例仍行兩淮山東長蘆三運司自文書到彼日為始各将該納印刷鹽引紙張暫且停止令其毎紙一張納鈔一貫差人解部轉送南京内府交納本部照數換與鹽引兩浙等運司仍照收紙如此則紙張不致損壞而鈔貫亦可以備用矣緣係處置鹽引紙張易鈔備用事理未敢擅便具題欲令公侯駙馬伯具印信文書闗支祿米奏狀陜西清吏司案呈照得南北二京公侯駙馬伯祿米逓年差人俱赴本部闗攴本部照依戸部咨文内開來數目於蘇松常三府運到秋糧米内撥支緣各官差來舍人家人人等俱無印信公文投部止是照驗各人路引撥與及至闗支完日原引隨身帶囘本部無可備照設若有等冐名告闗無憑查考且如已故寜陽侯陳潤妻唐氏與新襲爵寜陽侯陳瑛告爭祿米只為頂名闗支至今爭訟未息慮恐今後亦有此弊若不處置深為未便案呈到部查得北京大小文職官員差人闗支三分四分俸糧俱各齎有本衙門印信手本到於南京該衙門造來糧册查對相同然後給與俸帖照數闗支所以事無差池巻亦明白如䝉乞勅該部計議合無行移兩京公侯駙馬伯今後闗支祿米亦照前例不分坐府管事不管事公差在外合行移該府或附近相應衙門令首領官吏具印信手本若衙門品級亞於本部者令堂上官吏具印信手本各開該支祿米數目并差來闗領之人姓名就付本人齎執前來闗支仍照先年奏准限期赴部查對明白立案闗支如此則真偽易於查考而祿米不至冐支矣為此具題改左副都御史巡撫雲南謝恩奏狀臣先任河南布政使司左布政使成化元年欽䝉聖恩陞都察院右副都御史仍支從一品俸厯陞本院左副都御史南京刑部左侍郎改刑部左侍郎再改南京户部左侍郎今又蒙聖恩改臣前職巡撫雲南伏念臣本草茅賤士樗櫟庸材誤蒙聖恩節次遷轉粉骨碎身不能補報雖雲南逺在萬里之外夷情不常難於撫治臣敢不罄竭駑鈍敷宣德意以圖萬一之報除望闕謝恩前去理事外成化十二年九月十二日具題欲帶男承祿隨侍奏狀臣原任南京户部左侍郎欽蒙聖恩改臣前職巡撫雲南竊緣雲南逺在萬里之外古謂不毛之地水土與北方不同北人到彼難為調理臣生長北方况今年踰六十日漸衰老非親人隨行不可伏望聖慈憐憫容臣帶男王承祿前去朝夕扶持看視飲食勉力圖報不勝感戴之至成化十二年九月十二日具題王端毅奏議巻二
