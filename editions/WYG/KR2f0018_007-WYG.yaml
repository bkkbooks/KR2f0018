body:
  text: 王端毅奏議巻七明王恕撰吏部老疾不能赴召奏狀成化二十三年十一月十一日節該欽奉勅勅至爾即馳驛來京欽此伏念臣愚昧寡學無所知識仰荷列聖之恩叨由科第初授大理寺評事厯陞至太子少保南京兵部尚書㕘贊機務去年先帝以臣年老賜臣以尚書致仕使臣得優游田里茍全餘齡恩莫大焉今皇上新即大寳念及舊物遣使齎勅召臣臣亦欲躍然而起以覩道徳之光第臣年巳七十有二不時疾作聞命之初即欲辭避而來使不從乃於本月二十五日上道一程而至西安府遂感痰嘔之疾腸胃疼痛一日一夜不止自臣原籍至京計四十三站今止行一站疾作不能前進若待調理痊可方進不無遲滯儻若前途其疾復作豈能保其安全况臣素無經濟不堪任使伏望聖慈容臣仍前致仕庶得老年不致失所不勝感戴隕越之至成化二十三年十一月二十七日具奏十二月二十二日奉聖㫖卿老成重望特兹起用所辭不允偶有微疾還著所在有司好生撥醫調治痊可即便前來欽此辭吏部尚書奏狀臣原任太子少保南京兵部尚書參贊機務去年以尚書致仕在尚書第四考之間遇蒙今年四月十七日覃恩詔例進從一品散官一階書生至此榮幸巳極感激無涯莫知所以為報近蒙聖恩遣使齎勅召臣臣謹遵嚴命啓行至于西安府賤體不安已嘗具本奏乞仍前致仕稍安前進以俟俞旨十二月初一日至於華隂縣復奉改臣吏部尚書之命續蒙聖恩不允臣辭令臣前來今臣已到臣竊惟今之吏部尚書即古冢宰之職也古之冢宰掌邦治綂百官均四海伊尹傅說蓋嘗以冢宰兼師保左右厥辟矣今之吏部尚書雖曰専主銓選而銓選一事治與否之攸繫銓選得人則治不得人則不治其責任亦不為不重非才徳出衆明哲過人者不足以當之臣素無才徳今益昏塞耄倦而濫膺是寄大懼不協時望有忝休命非臣之福也伏望聖恩收回新命另擇人以授之賜臣仍以舊職致仕如此非惟天工可以寅亮而臣亦可以免羞吝矣臣下情無任感戴之至成化二十三年十一月二十七日具奏次日奉聖旨卿年徳老成久為人望特兹􅂤任不允所辭欽此辭太子太保奏狀該司禮監太監覃昌𫝊節奉聖旨吏部尚書王恕加太子太保欽此伏念臣先任南京兵部尚書荷蒙先帝憐臣年老賜之歸休感激未巳圖報無由誤䝉皇上特賜璽書召臣到京改為吏部尚書俾之職掌銓衡臣自惟年耄徳衰不稱厥職巳嘗具奏懇辭未蒙俞允本欲再辭恐負厚眷是以姑且就職另圖陳乞不意聖恩又以前官加臣使臣聞命驚懼益增汗顔竊以太子太保乃三公之一所以論道經邦燮理隂陽者也責任視尚書尤重非才徳兼備之人不足以當之昨改臣吏部尚書臣尚不克堪今又加臣以是官臣又何敢當所有新命臣不敢祇受伏望聖慈容臣且以尚書供職圖惟報稱使非分之恩不及臣身不稱之譏不出衆口實莫大之幸也臣無任戰兢懇切之至成化二十三年十二月二十九日具奏次日奉聖旨吏部重任朕特起卿用典銓衡以圖治理加陞職事卿不必辭欽此議左監丞郭鏞建言選法奏狀文選清吏司案呈奉本部送准禮部咨儀制清吏司案呈奉本部送於内府抄出御馬監左監丞郭鏞題云云等因具奏奉聖㫖該部看了來說欽此欽遵移咨送司案呈到部看得左監丞郭鏞題稱近年以來専以科甲取士中間未必皆賢國子監生未必無所取材山林隠逸懐材抱徳之人少見録用薊州知州豐潤學官經年不除務將選法疏通毋使阻塞賢路一節照得我朝自洪武永樂以來養士於學校取士於科貢銓選内外官員則於辦事進士歴事監生之中挨次相兼取用未嘗専一甲科而不用國子監生自景泰天順以來鄉試㑹試所取士子視昔數多國子監生除嵗貢生員之外又有納粟納馬四十以上等項入監者吏員之中亦有納粟納銀免其考試辦事就行冠帶者是以聽選之人日增月益用之不盡其於山林隠逸懐材抱徳之人未及舉用去年十月皇上詔告天下令府州縣正官舉懐材抱徳堪為任用者送部核實考用如有舉到之人臣等謹遵明詔即當核實考用不敢有違及查得薊州知州豐潤縣學官員缺巳於成化二十三年十月日期不等選補去訖所言務將選法疏通毋使阻塞賢路臣等查得成化二十三年二月到今急選并大選官員通有六千三百餘員兩月一選巳是定例如遇急缺又行急選隨補隨缺豈能得完臣等職司銓衡固欲疏通選法亦欲為官擇人且如知州知縣俱是牧民正官府佐之官亦係緊要職事茍非其人鮮不廢事殃民况入選進士監生吏員俱是挨次取用一選之中所取之人有堪任前項官員者數多則多選幾員數少則少選幾員是乃圓融之道非固執之法此等之事人多不知所以各據巳見而言之臣等旣任是事敢不盡心以副聖明用人圖治之意縁奉欽依該部看了來說事理𢎞治元年正月十九日具題二十一日奉聖㫖是欽此覆給事中韓鼎公選法奏狀文選清吏司案呈奉本部送禮科抄出禮科給事中韓鼎題云云等因具題奉聖㫖該衙門看了來說欽此欽遵抄出送司案呈到部看得給事中韓鼎所言考選監生出論有請客之名要行出判語及令親供一節臣等議得考選監生出以論題觀其作文以第高下此舊規也奈何所考監生賢愚不一能者依經傍註一篇可成不能者閣筆張眸一辭莫措却乃不依本題别寫他作故人謂之請客此等之人固不當取但人材難得是以或觀其寫字或觀其人物而次第之以備下僚末職之用未嘗有棄材也若與能者出論題與不能者出判語是使學者皆記判語而不學作文非法之善也合無今後考選監生聽本部出題取其文理平順者為一等文理頗通者為二等文理不通若寫字人物有一可取姑以入選如此則考選有方而高低自别矣其言各衙門主事等官有歴俸三年二年或未及二年而驟陞者有七年八年或九年將滿而􅂊陞者拘於各部似乎不公要照郎中林㙱等調改復除事例不分本部别部以歴俸年深者陞用一節臣等查得往者各部缺官若本部有相應人員就於本部陞用無相應人員方於别部陞調此見行事例若户部郎中林㙱員外郎吳裕調吏部是也若但以歴俸年深為主不分清濁勤惰一槩更調如歲貢例不無賢否混淆紛更太甚合無今後轉陞官員如某部缺郎中員外郎先儘本部年深相應員外郎主事銓補如無相應者則於别部年深相應員外郎主事調補如此則選法公而人心勸矣其言旌異推舉有舉取未成而問發為民有旌異方畢而問發充軍有行取到部調除原職者要行連坐舉主一節所言有理合無今後在外官員果有廉能公正政蹟卓異聽巡撫巡按等官從公旌舉各注舉主於旌舉官員之下日後犯􅂍連坐舉主如是庶幾舉能其官用得其人矣縁係陳言公選法及奉欽依該衙門看了來說事理未敢擅便𢎞治元年正月十九日具題二十一日奉聖㫖是欽此論致仕為民丁憂官吏𩔖引奏狀考功清吏司案呈伏覩大明律内一款若内外大小官員但有不便事件許令明白條陳實封進呈取自上裁欽此欽遵照得本部見行事例兩京堂上官丁憂并内外官九年給由到部年老願告照例陞職致仕者俱具題請㫖放囘其公差等項年老有疾例該致仕閒住官員與夫告疾等項例該為民吏典及在京科道部屬以下官員并醫士丁憂者却令聽候𩔖引奏請然後放回如遇人多聽候一月止可𩔖引一次若是人少聽候兩月之上方可𩔖引一次有此事體不一下人不便呈乞施行等因到部臣等切詳致仕為民丁憂官吏醫士俱係失意可矜之人使其就行回還心尚不安却又令其聽候累月方􅂊引奏放回何以慰其羇旅憂思之心兼且日費艱難人情實有不堪合無今後遇有前項致仕為民丁憂官吏醫士到部照依兩京堂上官丁憂并年老願告陞職致仕官事例具題請㫖就行放回如此則可矜之人不致羈留朝廷之上亦免煩瀆實為兩便縁係定奪引奏官吏人等事理未敢擅便𢎞治元年正月二十日具題奉聖㫖是欽此調用南京堂上官奏狀文選清吏司案呈照得南京吏禮二部尚書侍郎俱缺合行照例具缺推舉等因到部臣等看得去年朝廷進退兩京堂上官并各處巡撫都御史及在外方面數多前項員缺須得老成重望練達政體之人方可推舉今各處方面多係近新陞用歴任年淺似難推舉南京各部頗為事􅂤户部見有尚書王㒜左侍郎侯瓚工部見有尚書黎淳右侍郎黄孔昭合無於内調一員於吏部一員於禮部管事姑待一年半載各處方面歴練頗熟然後推舉如此則任用不茍事體允當縁係急缺南京堂上官員事理臣等未敢擅便定奪𢎞治元年正月二十日具題當日奉聖㫖王㒜調南京吏部黎淳南京禮部欽此議都御史邊鏞保治奏狀文選清吏司案呈奉本部送准禮部咨該都察院左副都御史邊鏞奏云云等因具本奏奉聖㫖這本所言該衙門看了來說欽此欽遵抄單移咨送司案呈到部當將本官所言任賢以逺姦諛等六事逐一看議明白各開前件伏望聖明裁處縁係節該奉欽依該衙門看了來說事理未敢擅便𢎞治元年正月二十一日具題奉聖㫖准議欽此一議得君子小人迭為消長君子進則小人退小人進則君子退自古未有用君子而不治用小人而不亂者也且執徳守義正直中和者君子也巧言令色便僻側媚者小人也但君子難親而易疎小人難疎而易親陛下新服厥命固嘗用君子而退小人矣今都御史邊鏞拳拳以是為言者第恐君子雖用而信任不専使小人得以間之終不能成其治小人雖退而屏逐不逺後將夤縁復進終有以害其政旣知其為君子而任之則不必致疑知其為小人而去之則不可復用如是則正人立朝而萬邦咸休矣一議得都御史邊鏞所言納諫以廣言路一節誠人君為政第一事也陛下嗣位之初嘉言無不納善政無不舉弊政無不革臣民無不恱服若李文祥之奏疏其意雖忠直其言則逆耳陛下畧不加罪但除事繁縣佐使之歴練以成就之恩莫大焉不知者以為貶李文祥以箝言者之口此邊鏞所以為陛下言之合無准其所言行取李文祥前來照依甲第資格改除在京事繁衙門使之歴練以成其徳器一以釋衆人之惑一以全納諫之美不亦善乎一議得勸懲者人君之大柄所以歆動人心而警懼天下者也今都御史邊鏞所言别善惡以昭勸懲一事誠為有理臣等又聞古人有言賞必自疎逺始罰必自貴近始賞自疎逺則賞一人而千萬人勸罰自貴近則罰一人而千萬人懼陛下若納邊鏞之言用古人賞罰之法則善無不勸惡無不懲而天下治矣一議得名器者人君之至寳所以彰有徳而别有能若不擇其人而授之則奔競之風起而廉耻掃地矣其何以為國乎陛下新服厥命擯斥奸佞惟賢是用固未嘗以名器假人矣今都御史邊鏞猶以是為言者但恐寡廉鮮耻之人尚在投間抵隙之念未絶惟願陛下始終此心始終此政杜絶先容之私言自無倖進之妄人夫如是又何患名器之不重而朝廷之不尊乎一議得都御史邊鏞所言乞勅巡撫巡按等官嚴加訪察守令務致的實名著循良者指實具聞即便擢用而無拘乎資格政果貪酷者據實訊問即便罷黜而無待於朝覲其守令之中尤有循良之最者書於御屏或錫車服以彰其能一節查得節次詔書與夫巡撫都御史勅諭并本部奏行事理其於守令之賢否俱有旌擢黜退之典今邊鏞復以是言之者蓋是巡撫巡按等官奉行未至合無通行各處巡撫巡按官查照節次詔書并勅諭及本部奏行事理嚴加訪察知府知州知縣等官某人廉能公正某人貪酷害民某人罷軟無為某人年老有疾當旌擢者具其政蹟奏聞當奬勸者量為奬勸當拏問者就行拏問當黜退者就行黜退當致仕者行令致仕務在至公無私不許顛倒是非致失勸懲之道自取失職之譏一看得都御史邊鏞所言陛下於文武大臣之中留神俯察先識其言語動静次察其才能性行孰可宰銓衡孰可總風紀孰可為大將孰可為副參孰可撫安一方孰可守鎮要地旣即事以驗其才再因才以授其職不因瑕以掩瑜務舍短而求長一節誠為􅂤任大臣之良法但自正綂年間以來每日止設一朝或兩朝每一朝臣下進見說事不過片時聖主雖聰明豈能盡識盡察不過寄聰明於左右之人大臣與左右之人相見者不多左右之人亦豈能盡察識諸大臣之賢否亦不過寄聰明於門客門客之識見未必盡合公論或得之毁譽之言或出於好惡之私是以以直為枉以枉為直者多欲察識之得其真必須陛下日御便殿宣召諸大臣與之講論治道謀議政事或令其轉對或閱其章奏如此非惟可以識大臣而隨材任使亦可以藉收啟沃之助議郎中李諒以進士舉人知縣相兼選御史奏狀文選清吏司案呈奉本部送准禮部咨儀制清吏司案呈奉本部送禮科抄出南京禮部精膳清吏司郎中李諒奏云云等因具奏奉聖㫖該衙門看了來說欽此欽遵移咨到部查得舊制御史給事中員缺多是進士除補進士或少間以聽選教官舉人監生補之至成化六年以來除授御史拘於憲綱不用新進初仕之說一向不用進士止於進士出身推官知縣行人内選用奈何行之年久不能無弊案呈到部切詳推官知縣進士俱讀聖賢書俱由科目出身豈進士無練達老成之人推官知縣皆不才奔競之士顧擇而用之何如耳茍擇得其人則皆可用用匪其才則皆不稱此必然之理不易之論也今南京禮部精膳清吏司郎中李諒奏要仍照舊例於進士中年貌相應學行優長及聽選舉與在外進士知縣儒學官員相兼任用御史一節誠為得宜合無准其所言今後選用御史於在京各衙門辦事進士與夫曾經一考稱職行人博士及進士舉人出身推官知縣内選年三十以上五十以下人物端莊言語正當操行廉謹才識優長者送都察院理刑半年滿日聽本院考察各註考語連人送部諳曉刑名堪任御史者本部奏請照缺選用不諳刑名不堪為御史者别用但知縣推官係在外官員本部雖嘗訪察知之未詳合無通行各處巡撫都御史各於按屬進士舉人出身知縣推官内從公推舉如前相應之人備開脚色政績具奏以憑遇缺行取相兼進士行人博士選送理刑不許舉非其人如此則選擇得人風憲克稱其職矣縁係考選風憲及奉欽依該衙門看了來說事理未敢擅便定奪𢎞治元年正月二十日具題二十七日奉聖㫖是欽此議尚書余子俊均選法奏狀文選清吏司案呈奉本部送兵科抄出太子太保兵部尚書余子俊題云云等因具奏奉聖㫖該衙門看了來說欽此欽遵抄出到部謹將本官所言議擬開立前件縁奉欽依該衙門看了來說事理未敢擅便𢎞治元年正月二十五日具題二十八日奉聖㫖是選法只照舊欽此一看得太子太保兵部尚書余子俊所言近年以來銓衡之司公天下以為心者絶少美官多私於所厚以致正人君子每每垂首喪氣莫展平生所志一節此臣等吏部官受病處今旣有以發之臣等即當自怨自艾圖惟厥新務要銓法公平好官不私於所厚君子不怨乎不以其言若選兩京官員若六部額設屬官各若干都察院額設屬官各若干六科總紐額設各若干以㑹試三等之數為則均平銓除如吏部大約南數該幾員北數該幾員中數該幾員著為定例間有一二員不甚相當非出於私意者置之勿論其他衙門一如此例其不該銓除户部者均平於兩京衙門用之各不許膠固使南北中數常在此一司此一科此一道一節此誠自古所無之法須得天下竒才方可擬議而行若使臣等淺見薄識者議之設或向後分配不停當用人不稱職徒自紛更致壊選法罪將焉歸且如一方有鄉談之人均選於通政司鴻臚寺使之祝讚說事不識可乎一方寡詞藻之士均選於翰林院詹事府使之脩史作文亦不識可乎然而此事所係甚重臣等豈敢輕議伏乞聖裁論王府保舉官員奏狀文選清吏司案呈奉本部送内府抄出淮王奏云云等因具奏奉聖㫖吏部知道欽此欽遵抄出送司查得劉奎前項府縣人由生員成化二十一年七月遇例納銀送南京國子監放回依親讀書至今􅂊方二年有餘及查本部聽選監生自入監歴事以來守候十八九年方得除授今劉奎之為監生未及三年輒便希求保舉圖任伴讀若准所保不無遂其僥倖之計阻滯年深之人及查得天下王府二十五處額設官員不為不多除良醫典膳典樂外其餘俱係常選官員近年以來遇有員缺往往奏保或稱妃兄妃弟或稱儀賓親屬與凡相熟之人不論可否一槩奏保任用實是有壊選法阻滯常選之人案呈合無今後王府官有缺該長史司即便呈報各該布政司轉達本部照缺於監生吏員内相應人員銓補不許仍前奏保􅍴越仕籍阻壊選法如此則奔競者不得倖進守正者免其嗟怨仍行各該布政司啓王知㑹縁係乞恩舉保官員及奉欽依吏部知道事理未敢擅便𢎞治元年閏正月初一日具題次日奉聖㫖是欽此議僉事林淮願就教職以便養親奏狀文選清吏司案呈奉本部送吏科抄出雲南按察司僉事林淮奏云云等因奏奉聖㫖吏部知道欽此欽遵抄出送司案呈到部看得雲南按察司僉事林淮奏稱雲南路逺母老不堪就養辭官則家貧難供朝夕置親則無人可託乞要授以本處或附近府縣學教授教諭以便養母一節情實可矜况本官辭尊居卑辭富居貧豈得巳哉合無俯順其情授以附近地方府學教授職事令其到任以便養親親終仍除僉事職事一以慰本官母子之情一以為臣下忠孝之勸等因具題奉聖㫖是欽此欽遵今查得直𨽻常州府儒學見缺教授一員欲遵奉欽依事理將林淮除授直𨽻常州府儒學教授順齎文憑令其到任管事未敢擅便𢎞治元年閏正月初四日具題次日奉聖㫖是欽此議按察使雍泰犯罪乞從輕宥免奏狀文選清吏司案呈准刑部山西清吏司手本開問得犯人雍泰由進士任山西按察司按察使犯該除監臨官因公事於人虚怯去處非法毆打至死等罪不坐外合依各衙門收支錢糧等物監臨主守不正收正支那移出納還充官用者計􅂍准監守自盜論四十貫罪止律尹珍依奏事詐不以實者律各減等徒罪俱職官各還職内雍泰送吏部收查發落查得先該錦衣衛鎮撫司㕘稱雍泰旣居風憲之職自合存心公恕為當却不合擬罪失於出入鞫問過於用刑雖是因公致傷人命又乃那移錢糧擅打四品官員尹珍不合傲慢上司致罪取辱又出惡言毁罵及揑虚詞奏擾等因該大理寺官奏節奉聖㫖這各犯雖遇革雍泰致傷人命送吏部查例來說尹珍奏事多虚復職了還罰俸三箇月欽此欽遵抄招連人送司除知府尹珍復職罰俸另行外隨於本部見行事例内查無因公致傷人命之條止查得朝覲考察官員内有貪酷者為民事例案呈看得抄招内雍泰所犯委的只是因公用刑致傷人命比之貪酷害民者頗有不同况又犯在革前罪旣宥免比例發落亦宜從輕且知府尹珍係按察使雍泰屬官上下體統豈可紊亂尹珍越禮犯分傲慢上司雍泰若不懲治有失體統何以管人尹珍又出惡言毁罵及揑虚詞奏擾今尹珍復職若將雍泰别作發落但恐今後彊梁屬官逓相效尢因而違抗上官上官懼其奏告不敢管攝紀綱自此紊亂而法令不行於部屬所係匪輕縁係節奉欽依雍泰致傷人命送吏部查例來說事理臣等愚見如此未知是否𢎞治元年閏正月初二日具題初四日奉聖㫖雍泰旣犯在革前從輕降一級調方面别用欽此欽遵查得雍泰原任按察使係正三品今降一級該從三品與在外布政司參政品級相等今查得湖廣布政司見缺右參政一員欲遵奉欽依事理將雍泰降補前缺給憑令其赴任管事未敢擅便本月初十日具題當日奉聖㫖是欽此選用新舊進士兼懲規避奏狀照得舊例進士登科之後自本年至第三年第二甲進士内則選主事等官外則選知州第三甲進士内則選評事行人等官外則選推官知縣至第四年不分二甲三甲俱選主事等項京職以其辦事年乆故也成化二十年取進士三百名存留一百名在各衙門辦事餘皆放囘依親讀書已經二次行取除巳到選用及見在外尚有四十餘員未到即今在外缺知縣推官共七十餘員欲將見在二十年舊進士擬除補缺縁係舊年進士去年巳不選外任俱授京職今見在舊進士比之先授京職者辦事聽選又多一年若選外任揆之人情實有不堪比之舊例亦不相同合無將二十年見在舊進士照例挨次俱除京職將二十三年第三甲新進士除在外知縣推官并在内行人待舊進士選盡却將第二甲新進士於内外相應員缺内相兼選用所據舊進士除巳到外其行取不到者似有躱避外選情弊合無除丁憂事故外其餘無故至今不到以後到部之日俱除外任庶幾銓法無私人心有警縁係斟酌選用新舊進士事理未敢擅便𢎞治元年閏正月十五日具題當日奉聖㫖是欽此疏通選法奏狀照得本部見行事例原考中二等該雜職出身未任吏員俱選各處周嵗衙門大使副使間或兼選九年衙門職事缺少人多不得疏通即今天下各縣典史共缺二百餘員例該原考中一等雜職出身并未任從七正八從八正九品告願雜職官員及倉官巡檢該陞正九品考驗不稱降雜官員考選除授其原考二等雜職吏員中間亦有相應之人因不預考選不得除授典史只得守候周嵗員缺以此二等雜職往往告稱壅滯而典史員缺却又少人選補合無量為疏通除於例該選典史人員外將在部守選二等雜職吏員考選文移頗通年貌相應者除補典史今後遇有典史員缺照例斟酌多寡選用庶使二等雜職得以疏通各縣首領不致久缺縁係疏通選法事理未敢擅便𢎞治元年閏正月十七日具題十九日奉聖㫖是欽此乞休致奏狀臣以庸材叨登正綂戊辰科進士十有九轉而至今官榮幸可謂極矣年巳七十有三來日無多寧不懼乎古人云知足不辱知止不殆可以長久今臣官巳如此年巳如此若復貪冒持禄固寵人將謂臣何如仰惟陛下嗣位之初誤聽人言起臣於旣退之餘進之以美官付之以重任今巳供職將兩月矣其所盡心者不過銓選之常事别無嘉謀嘉猷之敷陳而於保傅之職殊未之盡也焉能滿衆人之望保後日如今日乎矧臣昔在南京之時節次陳乞休致俱蒙先帝厚恩勉留其後不因臣陳乞却令臣致仕相知者皆為臣惜臣亦不能不為之羞愧也今臣已衰朽作止蠢拙陛下雖不厭棄臣自不安儻有人言及之陛下若固留臣則拂言者之意若令臣去則為臣無窮之羞何若臣今日自求而去之為愈乎伏望聖恩憐臣衰老賜之歸田實莫大之慶幸臣犬馬之心不獨在於今日為臣子孫者亦當捐生以圖報也臣情發於中言不能巳無任悚懼之至等因具本𢎞治元年閏正月二十一日奏奉聖㫖卿職典銓衡方隆委任毋為過慮遽欲退休所辭不允欽此再乞休致奏狀臣本陜西民間子弟少遊邑庠從師講學剽竊經籍之章句叨由科目以發身歴官十有九任食禄四十餘年報徳無能捫心有愧年踰七十謝事西歸雖居畎畂之中不忘君父之恩向蒙聖慈眷念遣使起臣前來命為冢宰加以宫保蓋欲臣為國進賢輔成太平臣以衰朽受任兩月殊無勞效慮恐向後不為公議所容豈若先事求退為愈是以昧死陳乞休致伏奉聖㫖卿職典銓衡方隆委任毋為過慮遽欲退休所辭不允欽此臣仰荷聖㫖且感且泣雖殞首捐軀何以報塞萬一但今内外臣僚未及七十致仕而去者比比今臣七十有三蒼顔皓首衰頽無似且乏通變之才無補聖明之治尚在班行旅進旅退人雖不言豈能自安伏望聖恩容臣致仕庶免後艱非惟不失臣子進退之義抑且克全君父始終之恩臣干冒宸嚴無任戰懼之至等因具本𢎞治元年閠正月二十三日奏奉聖㫖卿朝廷老臣未可輕退宜勉副任用事有當言的盡心來說毋再固辭欽此王端毅奏議巻七
