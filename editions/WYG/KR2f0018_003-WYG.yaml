body:
  text: 王端毅奏議巻三明王恕撰巡撫雲南處置邊務奏狀節該欽奉勑諭命臣巡撫雲南地方仍禁約接連交阯等處地界官吏軍民不許私通商旅徃来交易除欽遵通行外近訪得交阯着頭目換易服飾裝作客商潜入臨安等處地面聽探消息又訪得三五年前有一江西人王姓者曽到雲南要冒籍報名科舉所司不容隨後其人奔徃交阯受彼偽御史職事為之運籌畫策提兵巡邊且彼不特此一人而巳亦有偽總兵等官徃来巡守又聞交人以蓮花灘為市專一收買雲南販去生銅鑄造短鎗曩者跟隨太監錢能京衛指揮郭景齎𠡠道由雲南而徃遂使交人有假道赴京之舉然此雖由郭景誘致實乃彼之欲為今又聞交阯走囘軍人説稱在前交阯吞了占城之時就要乗勢来犯天朝雲南地方觀此數事則交人奸謀詭計不言可知明者暏未萌况巳著耶今臨安府宻邇交阯本處雖設一衛實在官軍除屯種守哨等項差撥外見操止有二百餘人通計雲南二十五衛所實在官軍除屯種守哨等項差撥外見操不及一萬三千人每處見操官軍多者不過七八百人其他諸夷雜處該徴税糧數少且又不通舟楫官軍糧餉止靠屯田供給别無來處見今所在食糧不彀一年攴用况兼頻年以來災荒不收今嵗尤甚軍民憔悴日不聊生盜賊在在生發動輒刼掠殺人東備西出殆無寜日加之以廣西廣南元江麗江羅雄等處土官連年讎殺不聽撫化再加之以閘辦銀課索取進貢等項地方騷擾人心失寜况臨安雖委指揮一員在彼守備名位不重難以節制衛所金齒雖有副總兵都督同知沐瓉在彼止可鎮守金齒騰衝二處控制外夷地方亦不能兼制臨安又照得迤東曲靖六凉等處迤西洱海大理等處在前俱有守備都指揮專一提督操練禁防盜賊其後一向缺官操守及照都司止有都指揮僉事方明掌管印信兼理馬政周佐恊同管事兼管操吳瑢操備近又為事問發帶俸差操王倫奉勑提督屯種亦巳病故俱各缺人替補然事機之殷盜賊之多兵力之寡財用之乏征科之繁軍民之困守職之缺如此又况臣才識凡庸年力衰憊恪守憲綱固所當勉經畧邊務實非所長萬一交人跳梁冦兵北向難稱為手足之疾未免貽宵旰之憂除行都布按三司分巡分守官禁約接連交阯等處地界官吏軍民不許私通商旅交易銅鐵等物及提督各處官軍時常操練慎固封守嚴加隄備及将前項都指揮員缺㑹同鎮守巡按等官推舉相應人貟另行奏請定奪外伏望聖明憐憫地方特𠡠該部計議合無将雲南都司所轄衛所除金齒騰衝二邊衛官不動外其餘二十二衛所見操官軍於内量調四千員名分兩班令其輪流前去臨安恊同本處官軍舍餘在彼操守半年一換上班之日照例給與行糧下班住支仍添設才識老成副使一員專一在彼整􅅚兵備公同守備官操習人馬振揚威武一以防腹裏之盜賊一以備外夷之侵侮及将雲南安寜黑白鹽井等鹽課提舉司成化四年五年六年七年八年存積鹽課就於本布政司召商開中十萬餘引每引令其納足色白銀六錢於本司官庫收貯以備糴買軍餉不許權豪勢要之家占中侵奪民利剥削竈户仍将閘辦銀課及進貢寳石等項暫且停止仍簡命年力精強才兼文武大臣一員代臣巡撫其地将臣放歸田里以終餘年如此則任用得人武備不期修而自修軍民安業盜賊不期息而自息矣縁係處置邊務事理未敢擅便具奏謹題奏解犯人及叅鎮守官奏状准兵部咨内開安南走囘軍丁楊四説稱舊年三月内見有朝廷差指揮等三十餘人到安南地方送與交阯王馬二匹細狗二隻弓一張箭一綑干碍地方軍機重情合當查究但不曽指實是何指揮姓名合無行巡撫雲南左副都御史王恕㑹同雲南巡按監察御史查勘是何衛分指揮帶領三十餘人前去安南有何公幹縁何饋送國王馬匹弓箭等物要見的確明白一名名行提到官取問如律情輕者就彼先行照例發落内指揮與情重者枷釘差人押送赴京再問另行奏請定奪奏准移咨前来行據雲南都布按三司呈查得有原跟欽差鎮守雲南太監錢能名下金吾左衛指揮使郭景齎捧𠡠書前来雲南帶領人伴戎達等徃安南國開諭當将戎達等行提到官監候查得郭景先該太監差徃干崖等處公幹未囘委據雲南按察司僉事方進呈稱前到金齒司提獲本犯懼罪投井身死将跟隨人伴時瑛等并求索夷方寳石等件強奪伯夷人口罕擺等解報到院臣㑹同巡按雲南監察御史甄希賢問得犯人戎達招係雲南都司廣南衛右所百户陳宗原總旗錢聚下小旗成化十年八月内有達跟隨鎮守雲南太監錢能名下金吾左衛巳故指揮郭景公差到京䝉差本官齎捧𠡠諭前去交阯有本官明知廣西是出使交阯路道不合枉道囘至雲南就在太監衙内住坐有錢太監與達并今在官小旗劉全孫千戸家人孫得兒完千户家人羅順兒巳故總旗李俊説稱差你每跟郭景徃交阯去你可作急收拾衣鞋達等不合依聽本月二十一日早郭景令人呌領人夫從衙内擡出黒木櫃六箇竹籠三箇又牽出白㸃子大馬一匹火食菓品一担并弓箭腰刀等件在外達等跟隨本官當日起身衙内又差百戸蔣雄亦不合依聽護送前去本月二十三日到通海驛歇郭景不合挾勢索要火千戸虎黧細狗一隻又呌前所乆慣下畨巳故軍人史義跟隨同行二十五日到臨安衛歇郭景又索要本衛指揮華鐸騮馬一匹清沙馬一匹銀十兩軍人葉周白花細狗一隻又令本衛差今在官總旗任能張永小旗潘原未到官千戸葉春百户鄒斌總旗陳名王瑄小旗李貴帶領軍人鄭忠等四十四名各不合依聽各帶器械護送又帶今在官華鐸家人華通識字軍人孟達并伊家人孟海餘丁王成未到官總旗鄒鑑小旗詹鉞軍餘李景各不合跟隨前去又差建水州失記名民人叚麻子先去交阯界上報信二十八日臨安起身二十九日到䝉自縣土官禄剛家安歇又将伊家牛一隻宰殺喫用本年十二月初四日到交阯地界清水河曠野去處搭盖窩鋪安歇本月二十五日交阯差頭目人帶領官軍不知其數到蠻來寨駐劄二十六日差通事帶三四十人到清水河徃來荅話三日至三十日有船二十隻來接有蒋雄葉春鄒斌帶領旗軍任能等并孟海囘還逹同李俊劉全孫得兒羅順兒華通鄒鑑詹鉞孟逹王成李景史義各亦不合越度邊關跟隨郭景上船過河到蠻來驛安歇有交阯頭目来見就令官軍将舘驛圍住成化十一年正月初四日上船行一日又到亦不知名舘驛安歇仍令官軍將舘驛圍住初五日行半日過蓮花灘灘下有船二百餘隻每船有軍十餘人亦有吹皷手達等每人坐一船就装載原帶行李馬匹等件又行數程失記日期到歸化衛又有大船數隻來接二十日到紫蓮州交阯王先在彼下營接待江中又有大小船三四百隻郭景見王在彼輙将𠡠諭置於船内輕身先去拜見王見郭景先来拜見因説我身上不安免拜本日王囘城郭景同達等仍在船内歇次日又行三十餘里王又在㟁上立迎郭景即奉𠡠諭上岸置於龍亭王先囘郭景隨勑諭進王城官軍将達等圍送天使舘安歇郭景見王畢亦到舘内二十二日王遣官送下程二十二日郭景於前項木櫃内取出紅寳石頂子青紵絲瓦隴㡌一頂金廂起花玉帶一條金廂寳石縧環二付一付紅寳石心一付青寳石心各色寳石十包約一升有餘大紅紵絲綵綉蠎龍衣服二件各色上様紵絲二十疋中様紵絲十疋各色上様羅二十疋各色上様紗二十疋中様紗十疋白三梭布五十疋洗白夏布三十疋真色夏布三十疋紅毼子五疋皂麂皮靴十五雙氊襪十五雙竹籠内取出减金事件馬鞍轡一付减銀事件馬鞍轡二付并隨身帶去銀結束腰刀二把撒帶一付弓一張箭一綑馬三匹細狗二隻進與交阯王二十四日交阯王差人送卓面酒飯到天使舘宴郭景有頭目二十餘人来陪宴畢郭景却詣王國行五拜三叩頭禮謝恩二十五日王回送郭景銀五十兩扇一百十把茄南香三塊與逹等跟隨人伴毎人銀一兩逹等自到天使舘官軍日夜防守不得自在交阯王說要整理方物差頭目同郭景等從兩廣路赴京進貢郭景怕去兩廣無由脫身却設計與交阯王詐說我又齎駕帖来雲南討禽鳥藥材這幾箇伴當都是黔國公差来送我的也要交還他若是進貢就同我從雲南去赴京比兩廣路又近便沿途都有驛站人夫馬匹又無大海風波之險交趾王依聽収拾方物差陪臣何宣陳瑾帶領軍馬一千餘名隨同郭景雲南入貢因而窺瞰我中國虚實行至蓮花灘有郭景又詐與何宣等說我先去䝉自去整理人夫馬匹前来迎接郭景同逹等脱身連夜走回報知䝉自縣當有千戶叚忠同土官舍人帶領土兵人等前去阻當有何宣等已到本縣管轄判村駐劄有叚忠等到彼把住道路不容何宣等前進又差人報知太監總兵差指揮馬𤣥等亦到判村守把何宣并本國節次移文堅執要從雲南經過以致沿邊一帶及腹裏寜州通海等處軍民聞知驚疑皆欲流徙躱避其後太監總兵并三司差官齎文前去再三撫諭何宣等方纔回還郭景等前項情罪一向不曽事發本年十一月初八日遇䝉赦宥成化十二年十二月内為地方事錢太監又差郭景黔國公差千戶龔遂㑹同金齒副總兵委官指揮侯勇前去千崖宣撫司地方公幹有郭景帶領今在官家人時英伴當劉祥屠名趙福未到官軍人楊海不合依聽越度邊關於成化十三年正月十一日到千崖宣撫司郭景不合索要宣撫怕開法馬二匹銀三十兩頭目罕歪小厮一口名喚剌泥本月十二日到南甸宣撫司又索要宣撫舍人刁落過金廂寳石㡌頂子一箇本月十六日到蠻莫又索要頭目刁孟扛銀一百五十兩小女一口名喚阿你馬二匹本月二十四日勘事了畢龔遂侯勇回還郭景又要去各處外夷地方求索財物仍領時英等於本年二月初一日到孟宻有頭目曩罕弄并男思賔不出本月二十日郭景到寳井見得本井已故頭目混鏊即混你今在官第三妾喚名罕擺係曩罕弄孫女生有姿色使令楊海等探知本婦出外挑水强撦到窩鋪内姦宿一夜一向在鋪姦占不放本年閠二月初一日曩罕弄使人請郭景回至孟宻郭景索要曩罕弄銀二百兩就將原求索前項銀兩収買寳石并曩罕弄餽送寳石共二十二斤零八兩六錢又買象牙二十四斤檀香一十六斤寳石屑二百二十三斤又索要失記名夷人碧玉縧環一付碧玉包指事件二付碧玉甜𤓰四箇金盞一箇重四錢銀廂楪子一十八箇銀廂碗四箇緬茄兒鬼見愁共一十三斤虎牙二箇伯夷銀一百零二兩趙福亦取買寳石五兩收拾行李起身曩罕弄要将罕擺留住不容郭景帶回郭景言説若你不與我帶去不許你在這地方住食若與我去我討冠帶與你管事曩罕弄意圖冠帶管事只得依從郭景隨帶罕擺一路姦宿本月失記日期到隴川宣撫司郭景將玉帶二條送與宣撫失記名舍人本舍回奉伯夷銀一包郭景嫌少不受到芒市長官司郭景將青拱線織金尾撒一件青紵絲圓領一件白紵絲直身一件大紅羅尾撒一件葱白羅直身一件大紅紗織金蠎龍尾撒一件送與在前拜認為男百夫長放斌接受放斌銀壺二把銀罐一箇本年三月十七日到潞江安撫司郭景將黒籠一箇内有錦褥一床靸鞋一雙枕頭一箇并黄騸馬一匹寄在千户尹宣家本月十九日回到金齒歇息本月二十一日夜有廵撫雲南王都御史劄委僉事方進亦到金齒挨提郭景次日方僉事設法邀請郭景到司與伊說稱有一人在廵撫處告你着我来取你回去郭景回說交阯事務先已有人報我知道干我何事都是錢公收拾異様物件差我去我是聽使之人敢不依從等語方僉事當令指揮胡亮將郭景行李擡赴分司月䑓上眼同副總兵沐都督并金齒大小官員盤驗將完副總兵回去方僉事當將郭景鎻杻發仰鎮撫俞銓令人防守在傍有俞銓不合不行嚴謹止令已問發軍人李祐看守亦不合將郭景引放廂房内却去上後以致郭景投在本司井内身死令人撈出身屍委官相視明白浮坵在彼將時英等并原占婦女二口小厮一口馬四匹同㸃㨂見數寳石等物通解到院惟恐郭景身屍不明牌仰金齒司將屍擡至雲南西門外委官覆相明白責令屍親領埋訖取問罪犯外結得郭景雖帶官軍蔣雄等六十六員名内蔣雄等五十四員名到於安南界上先回止有戎達等十二名跟隨前去並無三十餘人到安南國達等毎人受銀一兩在路花費無存郭景委因懼罪自行投井身死别無他故招結是實十七名劉全孫得兒羅順兒華通孟逹王成時英劉祥屠名趙福任能張永潘源孟海罕擺剌泥阿你供招與戎達招結内相同議得戎達劉全孫得兒羅順兒華通孟達王成俱合依越度縁邊關塞因而出外境者律絞秋後處决時英劉祥屠名趙福俱除不應輕罪外依越度縁邊關塞者律各杖一百徒三年任能張永潘源孟海俱依不應得為而為之事理重者律各杖八十時英等俱有大誥减等時英劉祥屠名趙福各杖九十徒二年半俱審有力照例納米完日任能張永潘源孟海各杖七十與戎達等七名俱犯在革前免科同供明罕擺剌泥阿你各着役隨住内戎達劉全孫得兒羅順兒華通孟達王成俱係跟隨郭景私出外境情重人犯除將罕擺等案發雲南都司覊候時英等先行摘發戎達等牢固枷釘及寳石等物印封完固案發雲南按察司差撥官軍押解都察院再問另行奏請定奪外查得先據雲南按察司掲帖該木邦軍民宣慰使罕落法􅃡書告禀洪武永樂洪熈宣德正統天順年間並不聽見京官指揮到来夷方先有盧京官蘇京官楊京官前来不到我宣慰處却往孟宻曩罕弄思賔處説稱要開衙門得金銀寳石他思賔曩罕弄起兵来殺宣撫多歪悶男多活法死了又来將我應襲男罕糯法殺死了其有差發拜見拖欠只因京官指揮人等前往思賔刁孟扛道路去訖被刁孟扛將我百姓殺了今有思賔反我地方係是洪武永樂年間設立衙門降與金牌信符着辦差發等因已呈總兵官黔國公沐琮等委官撫勘外開報知㑹伏覩金牌信符衙門節該欽奉勑諭倘大小官員貪婪無籍用强擾害全家治以死罪欽此今招郭景到於孟宻等處索要銀兩寳石强奪婦女及稱我討冠帶與你管事等情可見木邦前項緬書所言之事不誣查得盧京官即盧安蘇京官即蘇本俱指揮楊京官即楊能係百戶俱係跟隨太監錢能頭目㕘照太監錢能以帷幄腹心之臣而隂結外國之君誣上行私不義孰甚况郭景奉使無狀擅起邊釁及與盧安蘇本楊能等故違前例􅉍年前去夷方索要金銀寳石人口馬匹等物許開衙門以致曩罕弄等背叛本管宣慰奪其地而殺其人流毒遠方搆怨外夷雖則各犯之所為實乃錢能之主使合將錢能盧安蘇本楊能等拏送法司明正其罪以為後世事君而有二心及生事邊陲擾害夷方者之戒再照鎮撫俞銓不行用心關防以致犯人投井自盡亦合拏問及照罕擺剌泥阿你俱係郭景强奪强取伯夷人口欲便差人伴送彼處給親完聚使夷人知朝廷法令之公柔逺之仁且以潜消其怨怒不平之氣而隂折其刼奪無上之心縁錢能係内臣盧安蘇本楊能俞銓俱係軍職罕擺等係外夷人口未敢擅便今將起解過犯人并寳石等件開坐具本計開犯人七名戎達劉全孫得兒羅順兒華通孟達王成計開寳石等件青紅寳石二十四斤零一十三兩六錢寳石屑二百二十三斤碧玉包指事件二付碧玉縧環一付碧玉甜𤓰四箇金廂寳石㡌頂子一箇金盞一箇重四錢銀廂楪一十八箇銀廂碗四箇銀壺二把共重三十四兩銀罐一箇重十兩伯夷銀一百零二兩緬茄兒鬼見愁共一十三斤象牙二十四斤檀香一十六斤虎牙二箇叅鎮守官跟隨人員擾害夷方奏狀據灣甸州印信􅃡書譯該告禀照得洪武年間將灣甸州衙門給與金牌誥命勘合底簿一年該辦差發銀一百五十兩􅉍年上納並不曾拖欠正統四年麓川思任發造反攻殺各處地方䝉欽差總督軍務兵部尚書王驥總兵等官調領本軍前来征勦反人了當又給榜文與各地方張掛撫安夷民耕種安業辦粮當差至成化九年有呉京官前来本州住一十五日得銀二百兩我毎將二年差發送與他回還了成化十年有京官江和送鎮康州知州刁孟戛回還住本州經過後住二十日取要銀兩我毎又將拜見進貢銀五百兩送與纔回又將本州做莊子令認納銀二百兩至成化十二年正月十五日有鐡京官前来送賞賜叚子二疋銀一百二十兩本年三月有京官福安到本州催要方物拜見取母子象二隻并打壺瓶臺盞銀三百五十兩打發盤纒銀一百五十兩前往孟定去訖又一百兩於四月内京官江和差通事袁鑑到州撫諭陶孟人等出至金齒住半箇月送叚四疋要銀四百六十兩比時有錢公公上金齒有本處伴當㢘棣得銀一百五十兩一次有京官江和又送叚一叚要我毎借他銀一百五十兩本州不曾揭借有錢五到金齒送叚子三疋得銀一百兩至十二月十九日京官江和前去鎮康往州路過住了七日又要了三百兩成化十三年二月十六日京官楊能差人送叚二疋不曾回奉他物因此拖欠差發拜見今本州知州景拙法病故伊男長成不曾做官有把事已故通事年老亦無冠帶火頭百姓承應擡扛不得安業俱各逃往别處去了將田地抛荒拖欠差發罪責我每不便有下程牛豬雞酒米粮不計其數因此呈緬書告禀知道可憐見我奴婢不要着他京官毎来我臨近地方恐怕不成衙門告禀可憐見給請漢夷榜文前来張掛使火頭百姓纔得耕種田地辦納差發有金齒俞鎮撫與江京官做弟兄因送叚子得我毎銀六十兩告禀着令還我奴婢方便等因到院臣仰惟我太祖髙皇帝統馭天下慮恐大小官員軍民人等假托公差為名前往外夷衙門生事擾害需索財物致生邊患故降𠡠諭金牌信符及勘合底簿關防詐偽以盡撫綏之道列聖相承率由舊章每於踐阼之初換與勘合底簿勅諭昭昭篇首立法甚嚴是以臣民遵守不敢違犯夷人得以安生莫不慕義向化恪脩職貢頃自太監錢能到於雲南侮慢自賢㒺遵聖訓不時差人前去外夷衙門假公營私需索攪擾失夷人心職貢因之以缺今灣甸州告稱前項京官節次要伊銀兩等情臣再三體訪委的是實然此軰之到雲南非特攪擾外夷衙門而腹裏地方無不被害人情大為之不堪除給榜文發去該州禁約及巳故知州景拙法伊男承襲之事另行外查得吳京官即吳源係散官江和即姜和係指揮鐡京官即鐡聦係勇士福安即劉安與楊能俱百戶係跟隨錢能人員錢五係錢能義男合無差官將各犯拏解到京查金牌信符衙門勅諭事例治以重罪就將追出賍物給該州出銀人收領如此則法令昭明而奸頑知所警懼恩信不失而逺人自然悅服縁數内姜和等係軍職未敢擅便具題乞嚴賞罰以禁盜賊奏狀照得衛所官軍本為防奸禦侮緝捕盜賊征討不庭而設非徒費軍實張虚聲而為觀美也且雲南地方諸種蠻夷雜處其人兇悍好殺不以盜賊為恥盔甲鎗刀弓箭挨牌等項軍器家家有之動輒三五十人或一二百人結為羣黨各執軍器流刼村寨抄搶家財殺死人命或截路搶刼商旅貨物畧無忌憚各處雖有哨堡廵司及廵捕官軍非惟賊衆軍寡不能抵敵亦由馭之無法所以不能成功何也伏覩大明律失悞軍事及主將不固守條内别無與賊對敵殺傷官軍罪坐管軍頭目之人况勝負兵家之常雖智如良平勇如信布亦不能保其必勝奈何近来庸愞不才頭目因向時領軍將校或以輕進被叅或以損軍得罪以此遇賊先以退縮保軍為心畧無向前勦賊之志幸而稍得其利輒便虚増首級妄報功次以圖陞賞不幸而折損官軍就行隱匿不聞設辭􅃒掩以避其罪况進則有死而無功退則有生而無罪如此為將校者誰肯提軍出戰為士卒者誰肯奮不顧身此官軍遇賊所以不能成功者然也設若臨陣奮勇與賊對敵而死者厚恤其家不罪領軍之官若能成功厚加賞賚其臨陣退縮不能奮勇效死致賊猖獗殺害良民失䧟地方照依軍法處治設或皷之再戰誰敢退縮誰不向前此馭之之法也如此則賊不期破而自破功不必成而自成矣且雲南强賊比之他處數加十陪雖曰習俗之使然其致之也則有由焉或土官令家奴紏合部民而為之或管莊之人招引無籍軍而為之盗以土官并管莊之人為主人賘俱藏於其家誰敢前去捜捕此雲南强盜所以多於他處也况雲南去京萬里非可以朝發而夕至若将問成該决强盗照依常例奏請至秋後然後行刑動經監候一年之上或二三年者亦有之比及奏請至日或死於獄中而不受刑者多矣将何以警兇惡而快人心如䝉乞勅該部計議合無今後官軍人等與賊對敵而死者官給銀物以恤其家本管頭目督軍同戰救援不及者不罪如或有功次量加賞賚若遇賊退縮不能奮勇不能督戰及見同征軍士被圍故不救援者俱以軍法處治土官并管荘之人縱賊為非者亦治以重罪仍将今後挐獲并見問未結强盜都布按三司㑹問明白同見監已問結强盜俱引赴鎮守總兵廵撫廵按等官處㑹審無寃委官押發市曹就便處决仍将首級發於打刼地方梟掛示衆然後具奏如此則賞罰當而官軍知所勸法令嚴而盜賊不敢肆矣縁係明賞罰以禁盜賊事理未敢擅便具本具題陞右都御史謝恩疏臣去歳伏䝉聖恩以南京戸部左侍郎改都察院左副都御史廵撫雲南今年六月初十日欽奉勅諭陞本院右都御史仍前廵撫伏念臣居萬里炎荒之地荷九重寵擢之恩品秩有加職司仍舊捧黄麻而感激持白簡以汗顔奸貪滿目慚無擊摶之能愁歎盈途愧乏撫綏之術冦盜未盡屏息蠻夷尚爾跳梁言論不暇及乎家志慮時常在於國忠誠徒切功業未成既䝉信任而無疑敢不捐生以圖報除望闕謝恩外謹具奏聞乞却鎮守官進貢禽鳥奏狀㨿雲南都布按三司呈抄䝉欽差鎮守雲南御用監太監錢能案驗據雲南按察司呈承奉欽差廵撫雲南都察院左副都御史王劄付成化十三年六月初八日未時有雲南中衛後所千戸叚忠手擡黄袱苫盖一物由本院中路而進本職恐是勅書急走前去迎接揭起黄袱看視却是黄鳥一隻有指揮熊誌等說稱這是黄鸚哥公公使我們送来着大人進貢本職回説進貢事與我無干當令各官將鸚哥擡回外今思本院並無奉到進貢黄鸚哥明文雖已令各官擡回誠恐鎮守太監錢能有奉到㫖意公文尋得前項鸚哥著令本職進貢本職不知不行收接進貢有失敬上之禮日後累罪不便擬合行查為此劄仰本司即便轉行鎮守太監錢能處查勘前項鸚哥産自何方從何而得奉何㫖意公文行取令本職進貢或令鎮守太監錢能自行進貢惟復鎮守太監錢能尋得前項珍竒之物自要進貢於例有無違礙明白回報施行奉此理合具呈乞為明示施行得此照得當職成化四年三月十六日皇上勅命前来鎮守雲南聖㫖面諭彼處産有各様禽鳥尋取進来欽此除欽遵外續後又奉御用監太監錢義傳奉㫖意分付進貢禽鳥百戶福安等除將各色禽鳥進貢五次成化十一年二月十七日金齒司民人楊華報稱孟宻寳井有寳石一塊重一斤黄鸚哥一架陸象牙一隻成化十二年十一月二十日據雲南布按二司呈為地方事該千崖宣撫司土官宣撫怕開法􅃡書譯告有反人刁孟扛等聚衆孟宻人馬殺占地方搶擄象馬百姓等情縁係邊務地方事理㑹同總兵官黔國公沐琮案仰三司轉行分廵分守官員及委指揮郭景千戶龔遂前去撫勘當職自備銀兩叚疋順差指揮郭景尋買前項寳石鸚哥去後郭景到於金齒呈稱寳石俱已尋得及黄鸚哥一架具數開報續據雲南按察司呈為外夷脱回中華軍丁事提取郭景僉事方進在於金齒計令郭景投井身死将寳石等件抄封解送廵撫左副都御史王處驗封并犯人戎達差鎮撫劉韶等解赴都察院轉達遺有黄鸚哥在於金齒司本司差徤歩軍人楊恕送到看得黄鸚哥寳石俱係郭景尋買事干一連随差指揮熊誌千戶叚忠送赴廵撫左副都御史王處轉進却稱熊誌叚忠由本院中路而進但係朝廷所用之物各處進貢皆由御道而進此禮不妨及查有無奉到㫖意公文行取尋得前項珍竒之物自要進貢等情中間誠有不容當職在邊鎮守合仰雲南都布按三司抄捧回司轉行廵撫左副都御史王煩請早為定奪作急奏聞當職詐傳聖㫖将年例所貢之物盡行革去將當職發遣施行都司轉呈總兵官黔國公沐琮知㑹䝉此理合備呈施行等因到院案照先因鎮守太監錢能令熊誌等送黄鸚哥前来盖以黄袱不露其形臣初不知為何物已而乃言令臣進貢臣亦不知主何意因思去年内閣大學士商輅等奏准却貢獻之事今後不許進貢竒花異卉珍禽異獸珍珠寳石金銀器物今却令臣進貢黄鸚哥誠恐近日又有奉到𠡠㫖臣是以轉行本官處查理别無不容本官在邊鎮守之意今来文之言如此臣欲不與之辨誠恐本官故為此言將以中臣雖朝廷明見萬里必不為其所惑然下情戰慄豈能自已故臣不得不昧死言之且本官之在雲南遞年假以地方為名差京官盧安蘇本江和楊能福安鐵聦吳源等前去外夷孟宻等處求索金銀寳石擾害夷人所得之物以十分為率錢能與盧安楊能等先尅落八九分止有一二分進上郭景此去收買寳石等項銀兩多是取諸夷人錢能聞知拏郭景恐怕郭景到官説出真情就差人齎帖子及令人寫簡帖報知郭景得方便處自討分曉因此郭景投井身死臣前項文移止是行查有無奉到進貢黄鸚哥㫖意公文今却平空造此浮浪之言其意亦可槩見臣再思向者學士商輅等所言却貢獻無非為蒼生為社稷計也陛下慨然准其所奏者亦無非為蒼生為社稷計也上下同心朝野稱慶夫何詔㫖已頒行於天下而錢能不為意公然以進貢為名差人前去夷方索要寳石禽鳥等件方命擾人莫此為甚臣聞昔漢之時䑕巢於樹野鵲變色識者以為不祥夫鸚哥本緑羽而今黄其羽豈非所謂野鵲變色之􅁼不知錢能何取於此遣人逺渉徼外擾害取之将以進獻不知朝廷何少乎此亦不知朝廷無此何所損有此何所益乎然而此物有無既不足為朝廷損益抑不知錢能何忍故違目前詔㫖而必欲進乎萬一朝廷納之何以使天下臣民之無疑乎是乃因小以失大也其可乎哉臣愚以為此物誠不宜受况雲南數年以来盜賊竊發地方不寧若禽鳥若金燈籠寳石屏風等項之貢絡繹不絶行居騷然近来少息人心稍寧若又容進此物而不却則希寵徼幸者将必過求竒巧以進之豈止前數事而已其弊盖有不可勝言者臣又聞不寳逺物則逺人格逺人不服則脩文德以來之即今外夷久缺朝貢之禮交人漸有不服之心此正朝廷及内外臣鄰無怠無荒之日豈宜設耳目之玩忽不虞之戒伏望陛下念祖宗創業之艱難今日守成之不易明降詔㫖痛却錢能此貢仍通行各處守備鎮守内外官員今後除常例歳貢外其餘一應花草禽鳥寳石玩好物件一切禁止不許貢獻願陛下留心聖學專意政事永為華夷之主天下幸甚生民幸甚臣因錢能之言而冐昧及此臣誠不識時務不知忌諱罪該萬死伏惟陛下恕其狂􅎩而察其心為此具題駕帖不可無印信疏臣荷蒙聖恩叨掌風紀材杇學淺不諳事體近聞雲南中衛百戶汪清来自京師齎捧駕帖與刑部郎中鐘蕃錦衣衛百戶宋鑑臣竊有疑焉伏見五府六部都察院行移天下諸司公文及給批差官前去各處公幹或提取犯人俱於所在官司比號相同然後行事又聞駕帖下各衙門則用司禮監印信該科掛號皇城各門俱打照出闗防印子皆所以防詐偽也今聞齎来駕帖既無該監印信該科字號又無各門關防此臣之不能無疑者一也近該臣等題為外夷脱回中華軍丁事都察院覆本奏奉聖㫖是各差的當官去務要勘問明白干礙錢能奏来處置欽此今原差郎中等官鐘蕃等齎領前項㫖意公文於本年九月初六日到雲南提取犯人盧安等到官鞫問間百戶汪清又齎駕帖於本月十一日到送與郎中鐘蕃等此臣之不能無疑者二也然臣之所疑者無他但為事體之不一何則事體一則人皆尊信而無疑事體不一非惟起人之疑且使投間抵隙者得以行其詐而濟其私設若駕帖内有賜死重事而無印信可驗其人將死乎將不死乎果出於上意而不死則是違君命而罪愈重若非上意而死之未免含寃於地下由是言之駕帖之出誠不可無印信臣以疏逺孤踪劾奏炙手可熱之權要何啻履虎狼之尾撩虺蛇之首真可謂不知量者也但縁前項事情非臣私家之事干係地方之安危生民之休戚國體之輕重人心之向背且如昔者交阯守鎮非人因而失䧟地方騰衝一夫啓釁以致麓賊反叛費無限之錢粮傷無限之生靈至今無老少言之莫不疾首蹙額酸鼻流涕今日錢能等所為之事殆有甚焉將来之禍誠不可測朝廷縱無按問之文部屬縱無訴告之詞臣廵撫其地風聞其事亦當為陛下言之况交通外國之事兵部奏准行臣與御史甄希賢㑹問攪擾夷方之事木邦等處節有緬書告訴臣是以不得不從實上聞其罪彼與否朝廷自有祖宗法度在臣豈敢容私意於其間哉若臣不以實告則是黨權要而欺朝廷也其罪將安逃乎縱使幸而免之亦豈忠臣孝子之心之忍為乎且忠孝乃臣子之節臣若以不忠不孝存心朝廷將安用臣臣將何以報陛下哉况居其位則思死其官乃臣之分也黨權要而茍利禄臣則不忍為也有此情悃干冐天威不勝戰悚待罪之至叅提奪占南甸田地軍職奏狀據南甸宣撫司印信􅃡書該䕶印土官百夫長刀惱欒同知劉暹通把事人等譯告欽差鎮守廵撫雲南都御史知道據矣顯百克蠻呈文到本司稱説普天下衙門地方皆是天皇帝掌管永樂十二年開設南甸州有孟底一處矣顙一處孟决一處羅卜思莊一處作水甸一處斬細一處大蒲窩一處共七處地方屬我南甸州朋辦差發拜見應付站赤到今似我矣顙地方父祖百夫長刀羡丙在日並不曽將田土賣與别人一叚天順四年有八那濃換田地胡叅將来管食時將撒欒一寨官塞一寨撥與刁孟玉作馬料闕田後胡叅將病故有他管荘楊四將田地三寨盜賣與尹指揮了有錢衙占了邦盪一寨縁多弄一寨線多乃一寨有騰衝陳指揮占了邦勞一寨稱線一寨路那一寨磨隴一寨有明指揮占了克茄一寨蠻養一寨被尹千戶占了田二叚因此百姓逃移差發不敷我將田一處當在蕭榮名下後將銀贖取並不肯還田寨把事謝政占田一叚知事謝慶占了一寨皆是辦納差發拜見應當站赤的地方俱被占去一二十年了並不肯替當站應付人夫馬匹我矣顙百姓盡去逃了拖欠差發拜見有誤站赤人馬供給罪責不便將情呈知本司得此轉呈印信􅃡書告禀乞請明文着令親齎前来本司收照着令他毎將村寨田地退還我毎照舊辦納差發當站便是等因到院審得刁克蠻供稱錢太監占了邦盪等處田地委金齒鮑千戶管又被騰衝藺千戶盜報起科等臣竊惟外夷之人性如犬羊馭之以道則歸順馭之失䇿則背叛故祖宗時因其慕義向化臣伏中國是以待之以誠信撫之以恩義嘗降勅禁止官員軍民人等不許假托公差前去夷方擾害非徒安外夷實所以安中國也若外夷安則邊方無事而中國自安外夷不安則邊方多事而中國亦不得安今外夷南甸宣撫司百夫長刁克蠻告稱各官占伊前項村寨田地以致百姓逃竄差發拖欠節縁係侵擾外夷地方事理若不拏問處置誠恐失夷人心因而激變引惹邊釁不無勞師費財為中國憂所係甚大非但區區田土而已查得尹指揮係尹泉陳指揮係陳輔明指揮係明廣尹千戶係尹銘藺千戶係藺鑑俱騰衝司鮑千戶係鮑鑰金齒司知事謝慶係土官合無將各官與百夫長刁克蠻等拘提到官坐委雲南都布按三司堂上公正官各一員押帶前去告田處所從公踏勘如所告是實即將田地斷給刁克蠻管領招撫逃民復業耕種辦納差發有罪之人問擬如律若有虚詐亦當宣布恩威諭以禍福使之知所警懼不敢違犯干礙太監錢能另行奏請定奪如此則彊禦畏法而詞訟自息逺人安業而邊釁不生縁數内尹泉等係軍職謝慶等係土官未敢擅便具題請勅貴州㑹兵撫捕羅雄州賊人奏狀准兵部咨職方清吏司案呈奉本部送兵科抄出廵按雲南監察御史林符題據雲南都布按三司經厯司呈各承奉本司劄付照㑹各准本司副使等官董俊等咨關據六凉衛指揮郭宏呈稱曲靖軍民府羅雄州土官知州者甫等先被營長阿昌等殺害地方告䝉總兵官征南將軍黔國公沐琮鎮守雲南太監錢能案驗仰都布按三司轉行分廵分守都指揮僉事方明左叅議桂茂之副使董俊㑹案牌仰宏等帶領官軍并土官副使資安原差把事楊景山等帶領民兵於本年五月十二日分路前往阿得村把隘聽調是宏不知鄉道有者甫男者格自帶官奴人等引至地名小房邊忽被阿昌統領本寨并貴州黄草壩馬步夷兵三千餘徒各執長鎗勁弩挨牌等器至十三日午時分就與民兵抵敵殺死阿鎻等二十人砍傷四十餘人彼時民兵發狠亦將賊人阿末等殺死射傷一十餘人被阿昌將者格虜去不放是宏等官軍見得勢大不敢抵敵阿昌又同營長阿南等分據各寨令賊把截路口欲要装伏迎敵官軍等因又據亦佐縣土官縣丞海禄呈稱阿昌隱其兇惡情犯推稱土官者甫與適索有故争田因和者格前来抄擄本營村寨三司就便統兵前来怎奈我何不肯將者格與職領回及平夷衛指揮李忠呈稱帶領官軍㑹同亦佐縣典史凌常大等管領民兵到於黄草壩那革河口累被適習差人把路實難前去等因又據土官者甫把事楊景山走回民兵奈道等各呈告前因到職為照先䝉總兵鎮守等官案驗俱為前事已經差委曲靖府同知等官丁賢等前去本州撫拘阿昌等諭以朝廷恩威禍福照依土俗與者甫盟誓講和被其因親結搆黄草壩强盜阿束等入境擒殺聞知上司親臨撫諭又敢助兵據寨不服出官今據郭宏等各呈前来委的兇犯阿昌等設計招引不相統攝之人抗拒官軍敵殺民兵况各賊勢大分據山險急難撲勦若不早圖長䇿處置停當誠恐結搆日深醸成禍患不便等因移關到司查得先䝉廵按雲南監察御史董韜案驗奉都察院廵按雲南七百四十八號勘合劄付及總兵官征南將軍黔國公沐琮准右軍都督府雲字七百二號勘合咨俱為積年聚衆殺虜地方等事據羅雄州土官知州者甫等奏稱成化七年月日不等被營長阿周南那保同妻適索等朋聚本管夷兵各借倩貴州黄草壩營長阿冊等兵馬二千餘人各披執衣甲鎗刀弓弩張打旗號將本州阿貴塊冊等殺死營長民人周通等二十餘人内將阿本阿久等分屍號令生擒男婦二百餘口燒毁房屋三百餘間仍抄搶牛馬家財奪占者甫莊田一十七處聲言若不順從起兵俱要殺盡等情奏行刑部看係邊夷抄詞備行雲南鎮守總兵廵按等官轉行都布按三司分廵分守官員撫出者甫與那保審係争論田荘照依土俗講和回報訖續為朋聚燒毁村寨支解人命等事據里老火頭張小等告稱本州土官者甫使令家奴阿索討租彼適索同奸夫阿昌等主使民兵阿額等窺伺各人經過射砍六人登時殺死六人告䝉布按二司委官詣彼撫諭及被紏聚貴州黄草壩已故營長阿冊妻適習兵馬二千餘人將者甫原住村寨圍住内殺死把事李沙海等分屍支解有土官寅夜走脱及據本州矣恐等村被害民人阿達等各告朋聚民兵殺虜人財攪害地方等事成化十一年月日不等被適索阿昌阿南等結聚黄草壩適習并阿昌妻弟營長阿束等統領民兵將父者寧等殺死抄搶家財等情告䝉呈達總兵官征南將軍黔國公沐琮鎮守雲南太監錢能廵按雲南監察御史林符備行三司分廵分守都指揮僉事方明叅議桂茂之僉事翁遂撫捕間各官又據本州千夫長適定營長小阿乖等告稱阿昌等連年謀害土官奪占各村田莊殺虜人民不得安業要乞調軍勦捕等因備呈總兵鎮守等官行仰三司分廵分守官員量調官軍民兵前去相機捕解仍行貴州鎮守總兵廵撫廵按等官坐委三司副使等官劉本等行委普安衛州指揮等官蔣經等前去黄草壩撫治適習等不許出境幫助阿昌等攪亂地方訖豈其適習係阿昌親妹結搆年久不肯改悔添兵屯聚阿昌住寨處所仍要讐殺又該分廵分守副使等官董俊等呈伏覩成化十一年十一月初八日詔書内一欵節開湖廣貴州等處苖蠻多因所司失於撫字及因貧窘所廹不得已相聚為盜詔書到日許令改過自新各歸本土安生樂業若不改悔仍前聚集為非並聽總兵等官征勦欽此照得阿昌連年借引貴州黄草壩苖賊越境殺人為非不肯改悔例該征勦呈䝉總兵鎮守等官案行各官量調官軍民兵前去羅雄州酌量彼中夷情事勢緩急若果各犯仍前為非即照詔書内事理勦捕去後今該前因擬合通行合行劄付照㑹本司即便轉呈施行等因到院臣看得雄州已故營長那保妻適索先與土官者甫争奪田荘互相搆怨阿昌因與適索有姦幫助積年讎殺又紏營長阿南等見據木黒等寨山箐險阻去處不聼招撫其地與貴州黄草壩接境止隔一江其黄草壩有扒者等三十八寨俱係已故大營長阿冊統属人馬威强其部内營長阿束等俱各夷兵衆多兇惡勢大先年阿昌因與者甫有讎將伊妹適習與阿冊其阿束又係阿昌妻弟以此㰱血誓盟結黨搆兵應援阿昌招之即来揮之則退又各以貴州所屬夷人與雲南官司不相統攝肆無忌憚致將土官者甫趕逐在外不敢回州所管民人財畜被其殺虜數多又被放火燒毁村寨强占田莊被者甫節次奏告行委三司分廵分守官員親詣撫諭輒敢仍招賊黨擁兵據寨不服拘喚及官軍壓境又敢拒敵殺死民兵搶去者甫之子者格不肯放回及照賊犯阿束適習等既䝉貴州總兵廵撫等官行委三司官員撫諭不許越境生事乃敢玩法益兵愈加猖獗幫助阿昌等為惡似此强夷法所難容今副使等官董俊等呈乞早圖長䇿處治一節臣以爲除患必先治其黨欲討羅雄州之賊不先治黄草壩賊黨彼將相援負固必不從化誠恐日後貽患地方非輕除案行都布按三司轉行分廵分守官員親詣羅雄州將賊犯阿昌等設法撫捕外如䝉乞勅該部計議合無請𠡠貴州鎮守總兵廵撫等官嚴督彼處分廵分守官員親詣黄草壩將夷賊適習阿索等撫回本土各安生業今後不許越境助阿昌等爲惡如是適習等黨惡不悛仍前領兵前来攪擾地方就便量調貴州官軍㑹合雲南官軍夾攻並勦各將適習阿束阿昌等通行擒捕解官處以重刑如此則諸夷知所警懼一方可保無虞等因具題成化十三年十二月初七日通政使司官於奉天門奏奉聖㫖該部知道欽此欽遵抄出送司查得成化六年十月十七日該雲南曲靖軍民府羅雄州土官知州者甫奏稱被本州法干寨營長阿周同男那保及革宗者等村營長阿昌阿南等并貴州黄草壩營長阿折等助兵朋聚殺虜人畜燒毁房屋乞要調兵擒捕等因本部爲照係一靣夷情查無各該鎮守總兵等官具奏縁由已經議行總兵鎮守廵按三司設法撫勘去後未報今該前因案呈到部叅照雲南曲靖軍民府羅雄州土官知州者甫被營長阿昌挾讎結黨搆引貴州黄草壩賊衆將者甫趕逐在外殺虜人財燒毁村寨等情係是土官夷人争奪田莊互相攻擊先該兵部及刑部奏行都察院備行雲南鎮守廵按三司官撫勘去後其委官都指揮叅議副使等官方明桂茂之董俊自合體量夷情多方設法擒其首惡散其餘黨使不至於日動干戈延及良善今却妄引詔書比照湖廣貴州見奉勅書征勦苖蠻事例輙便動調官軍前進追勦致被夷儸將原領鄉道知州者甫男者格捉去不肯送出又將官軍原領民兵阿鎻等二十餘人殺死似此輕率寡謀處置失當本當䆒治但礙夷羅事情不係腹裏軍務况且止是廵按御史林符具奏不見總兵太監三司同奏中間事恐未明合無行移雲南鎮守太監錢能總兵官黔國公沐琮廵撫左副都御史王并廵按監察御史都布按三司議委分廵分守等官親詣羅雄州先行宻切體勘彼中賊勢如何若果退散責令土居諳曉夷情之人前去村寨撫出營長阿昌等到官曉諭朝廷恩威生死禍福照依夷俗體例俾令兩相和觧將原搶村寨田庒人畜逐一退出給主其間果有人命重情量為處置應奏請者具奏裁處倘此賊執迷生抝梗化弗從應合調兵勦捕計議停當量調附近軍兵民快人等相機行事仍星馳差人奏報本部仍行貴州鎮守右少監韋鑄總兵官都指揮同知吳經廵撫右僉都御史宋欽㑹同廵按三司等官坐委分廵分守官員黄草壩撫拘頭目適習阿束等回還本土各安生業保守疆界不許似前幫助阿昌等為惡攪亂地方自取夷滅果能聽從撫化釋其已往之愆特示自新之路倘稔惡不悛負固不服應該别項處置具實回奏定奪等因奏奉聖㫖是欽此欽遵移咨到院㑹同總兵官征南將軍黔國公沐琮欽差鎮守雲南太監錢能廵按雲南監察御史甄希賢雲南都布按三司都指揮僉事方明左布政使俞鐸按察使劉釪計議得賊首阿昌今巳病故者格已被適索等謀死黄草壩賊人適習阿束等係是適索黨與各賊積年為惡攪亂地方殺死人命逼逐土官知州者甫躱避不敢回州管事再三委官撫諭執迷不聼情犯深重本當勦捕但不知即今賊勢有無聚散行㨿都布按三司呈准都指揮僉事方明右叅議金禮僉事方進咨關准本司咨關抄䝉臣等案驗准兵部咨該廵按雲南監察御史林符題前事依䝉親詣羅雄州委㨿諳曉夷情六凉宜良衛所千戶張弼周義等呈依䝉各賊於成化十三年五月初七日帶同土居諳曉夷語通事張聚與本州吏目夏志能等到於適索原住補羅額寨撫出適索與家奴趙阿哥阿希哲張普苴等到職隨問阿昌者格下落推稱俱已身死各職據此當將榜文内原奉勘合備細縁由令通事張聚譯作夷語曉諭適索知道本婦回稱務要者甫分與庄田三十二處與我各管一方纔罷等語各職回州本月初十日仍帶張聚等前去撫諭有適索趙阿哥等説要帶領者甫管下營長家奴人等來寨講和十二日依從與指揮竇俊等同帶營長小阿乖等前去地方黒西寨駐劄講和互相争諭適索趙阿哥等紏集賊首阿羅忒阿南阿惡阿歪南阿額阿俗阿冊阿京阿歹普等并阿昌原日借留貴州黄草壩伊妻弟小營長阿束等殺傷民兵三百餘人見其占種雲南地方夷民田土居住不回幫助適索為惡夷兵二千餘人身披衣甲手執鎗刀弓弩要與厮殺各人見其勢惡四散奔走職等亦就回州今思首惡阿昌已死適索前項人馬俱是家奴趙阿哥阿希哲張普苴等聚集恃衆擾害地方至十三日又䝉備榜差千戶郭景齎去撫諭趙阿哥等令其改過勸化適索相與講和各人又哄郭千戸説你且回去明日同委官張千户等再領各營長来講和各職依聽十五日復引營長小阿乖等到彼又被家奴趙阿哥等添聚强兵三千餘人各執器械執迷生抝不肯講和又要趕殺各職見其兇惡恐傷性命只得脱身回来委的勢衆實難撫化等因到職據此案照先為前事已將原奉勘合并案驗内事理二次備榜差委各官照依土俗體例講和去後今呈前因叅照趙阿哥阿希哲張普苴等與貴州夷兵阿束等俱係恊助適索并已故阿昌殺傷民兵數多與捉虜土官知州者甫男者格謀害身死不見下落人數及查各賊原今巻内成化八年該按察司去任副使等官曹景等成化九年僉事張寛等成化十年都布按三司都指揮僉事等官方明等成化十一年左叅議桂茂之等成化十二年副使等官董俊等及今本職等通前撫諭六次愈加執抝結黨不服人犯若不呈禀移文貴州廵撫鎮守廵按三司照依見奉勘合事理早將黄草壩占種雲南羅雄州夷民田地乆住不回幫助適索等為惡强兵阿束等招撫回還又量調彼處附近軍兵與雲南軍兵將適索趙阿哥等夾攻殄滅誠恐各賊大肆猖獗釀成邊患深為未便等因回報到院臣㑹同總兵官征南將軍黔國公沐琮廵按雲南監察御史甄希賢雲南都布按三司都指揮僉事方明右叅議金禮副使陳騏計議得賊首適索等係土官知州者甫部内之人乃敢結搆貴州黄草壩賊人適習阿束等節次擾亂地方趕逐土官抗拒官軍敵殺民兵已嘗委官撫諭數次令其革心向化終不聽從又將者甫之子謀害身死今奉欽依又行委官撫諭令其兩相和解退還村寨豈期各賊愈加生抝仍不聼撫復聚强兵三千餘徒意欲趕殺委官其稔惡不悛如此之甚合當勦捕欲便量調附近官軍民兵人等進勦但係黄草壩賊首阿束等見今占往羅雄地方動輒幫助適索等為惡誠恐兵至其地其賊結黨愈衆據險以待我軍欲進不得欲退不可不無誤事况不知近来貴州曾無委官撫拘適習阿束等有無聼從縱使從之亦不足信且如去年貴州委官已取適習阿束等不敢擅調兵馬幫助適索等過界為非結狀繳報外及至雲南進兵其適習阿束等又来幫助適索等敵殺官軍此縱使從之亦不足信之明驗也必湏雲貴二處各調兵馬進壓其境振揚威武可撫則撫可勦則勦方可成功如䝉乞𠡠該部計議合無請𠡠貴州鎮守總兵廵撫等官量調彼處官軍到於黄草壩臨近地方駐劄臣等雲南亦量調附近官軍民兵人等到於羅雄州臨近地方駐劄各人選差諳曉夷情之人前去撫諭如是撫拘適習阿束等到於軍前不致幫助適索等為惡其適索等若肯俯首聼撫即當振旅而還倘若各賊稔惡不悛仍前幫助適索等為惡就便㑹合刻期進兵擣其巢穴擒其渠魁散其餘黨以彰天討之公以除地方之患以正官民上下之分以為夷羅作亂之戒庻乎可矣縁係處置地方賊情事理未敢擅便具題改南京都御史叅賛機務謝恩䟽臣以都察院右都御史廵撫雲南成化十三年十一月十五日欽奉本年九月初二日𠡠諭改南京都察院不妨院事叅賛機務者臣竊惟叅賛機務重任也非剛正有為博洽多識深沉而能斷者何足以當之臣以迂拙庸材雖嘗誤䝉任使不過因人成事其餘前數者之善實無一焉今䝉聖恩授以此寄拜命之餘驚憂失次深恐不稱以負聖明用人圖治之意欲便懇辭讓於能者然璽書既降理難封還臣雖愚敢不夙夜匪懈鞠躬盡瘁補報萬一除望闕謝恩前去到任外謹具奏聞王端毅奏議巻三
