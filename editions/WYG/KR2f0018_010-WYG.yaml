body:
  text: 王端毅奏議巻十明王恕撰吏部乞休致奏狀臣以迂腐無用之材仰荷列聖莫大之恩官至太子少保南京兵部尚書叅贊機務久叨厚祿愧無分寸禆補向以年老歸田待盡衡門之下無復他望伏蒙皇上遣使齎勅召臣前來改吏部尚書加太子太保俾典銓衡恩禮極隆委任已重臣雖無似豈不知感自分年耄德衰不稱任使巳嘗累章具奏辭免俱蒙温詔勉令就職雖極力黽勉其於職業終不能修舉一二又嘗屢乞休致俱不蒙俞允逮今茍延又將周歲筋力愈加衰憊神思愈加昏倦腰膝酸麻步履艱辛又多健忘作事顚倒委的難居銓選之地且其性愚戇不能弼亮調爕良孤皇上以禮召用之意况今滿朝文武臣僚再無一員年及七十者獨臣七十有三形骸潦倒尚玷班行左瞻右顧豈不知愧又於本月二十二日忽患痰嗽胸膈疼痛不思飲食伏望聖恩憐臣衰老賜臣歸田庶㡬全始終之義完亷恥之節惟聖明垂察幸甚下情無任戰慄之至𢎞治元年十一月二十四日具奏次日奉聖㫖卿受重託當勉圖報稱毋以疾求退不准休致欽此再乞休致奏狀臣自受命之後自知年老力衰才不勝任是以於閏正月二次具奏懇乞休致一奉聖㫖卿職典銓衡方隆委任毋爲過慮遽欲退休所辭不允欽此一奉聖㫖卿朝廷老臣未可輕退宜勉副任用事有當言的盡心來說毋再固辭欽此臣感激皇上知遇之恩於職分内事巳嘗盡心爲之遇有當言之事亦嘗言之但爲之不力不能輔成聖政言之不切不能感悟聖心者有之非不欲報也六月又以衰老求去復蒙温詔勉留至今又將半年筋力愈覺衰憊疾病日益侵尋委的支持不去欲望聖恩容臣休致又奉聖㫖卿受重託當勉圖報稱毋以疾求退不准休致欽此臣仰惟恩㫖固知陛下不舍臣臣受恩深厚亦豈欲舍陛下哉但臣老巳至矣雖欲勉强輔佐聖明少圖報稱委的不能勉强留之實無益也伏望聖恩憐憫容臣送骸骨於故鄉遂丘首之至願幸莫大焉如此非惟臣感聖恩於没齒雖九泉之下亦不能忘也臣下情無任於邑亦惟少垂察焉𢎞治元年十一月二十七日具奏二十九日奉聖㫖前日卿乞休致巳不准了不必固辭該部知道欽此議太常寺缺官供祀奏狀文選清吏司案呈奉本部送吏科抄出太常寺掌寺事太子少保禮部尚書劉岌等題云云等因具題奉聖㫖該部看了來說欽此欽遵抄出送司查得徐啟端原任司樂𫝊陞恊律郎王福廣等十三員俱由樂舞生𫝊陞恊律郎等項官職成化二十三年九月該科道官陳言要將𫝊奉濫設官員通行查出罷歸原籍閑住等因節該奉聖㫖是原有官陞職的三品四品降正從六品五品六品降正從八品七品以下降雜職樂舞生道士出身的冠帶閑住都不許再求進用欽此欽遵外今該前因案呈到部看得太常寺掌寺事太子少保禮部尚書劉岌等題稱本寺缺官供祀要將徐啟端仍復司樂其餘王福廣等月支食米聽候差委祭祀一節先因内外奔競無恥之徒夤縁梁芳等𫝊陞京職日積月累遂至千數百員費耗錢糧濫占皂𨽻不可勝紀互相交結以邪妨正又不可言三五年來名器大壊物議不平仰惟陛下嗣位之初首罷𫝊陞官員朝野爲之改觀人心無不痛快迄今一年有餘事體方定奔競稍息今劉岌等却要將徐啟端等復職食粮是爲𫝊陞官員立赤幟也若復用一人則數千百人皆相率而來豈勝煩擾豈不壊朝廷清明之政失萬邦黎獻之心所言難准且三年一次致祭嶽鎮海瀆歴代帝王俱遣樂舞生行禮若謂金山等處墳所四十五處祭祀官少不敷差遣照例差樂舞生行禮亦無不可何必開已閉之倖門引既退之小人然而此舉非真爲缺官供祀蓋是徐啟端等央凂劉岌等假此爲名以求復進非惟啟此弊端抑且故違詔㫖所據徐啟端等俱合挐送法司明正其罪以爲𫝊陞降革再求進用者之戒劉岌等亦合有罪縁劉岌等俱係在京堂上及京官及奉欽依該部看了來說事理未敢擅便𢎞治元年十二月十七日具題次日奉聖㫖是徐啟端等本當挐問且都饒這遭劉岌等罷欽此議封見在繼母奏狀驗封清吏司案呈奉本部送准户部咨廣東清吏司案呈奉本部判送據山西清吏司主事唐錦舟呈云云等因到部送司案呈看得主事唐錦舟係正六品官例該封贈父母及妻查得伊故父唐仁先任吏科左給事中已關敕命故母周氏故繼母周氏俱巳封贈孺人訖今本官乞要封見在繼母舒氏若拘常例止封一繼母縁前繼母係伊父請給勅命所封非本官請給勅命之所封今要封其見在繼母亦是止封一繼母非封二繼母也若不准令封其見在繼母止令封其妻使其繼母穿著常服坐於其上其妻珠冠霞帔立於其傍爲之子者寧能自安爲之婦者亦何忍爲似非聖朝教人以孝之意也合無准令主事唐錦舟封其見在繼母舒氏今後該封繼母者止封見在繼母一人若前繼母曽因父受封後繼母見在亦照此例封之如此則姑婦同榮母子皆安恩澤均而彛倫厚聖朝以孝教人之意可謂曲盡其情而爲萬世法矣縁係請給勅命及係事例未敢擅便定奪𢎞治元年十二月二十一日具題次日奉聖㫖是唐錦舟准封見在繼母欽此議陞臨清縣為州奏狀文選清吏司案呈奉本部送吏科抄出廵撫山東地方都察院右僉都御史錢鉞等題云云等因具題奉聖㫖該部知道欽此欽遵通抄送司案呈看得廵撫山東右僉都御史錢鉞并廵按山東監察御史向翀各題稱會議得臨清縣係南北要衝與臨清衛軍民相叅詞訟繁多要照湖廣等處茶陵等縣陞州事例將臨清縣改陞全設州治銓官鑄印仍𨽻東昌府管轄將附近館陶丘縣來屬一節查有前項事例合無准其所擬照例將臨清縣改陞臨清州仍𨽻東昌府管轄館陶丘縣𨽻臨清州管轄其附改官制更動一應衙門與凡選官鑄印等項事務候命下之日另行奏請定奪等因具題奉聖㫖是欽此欽遵查得諸司職掌内開各州不及三十里長有所屬縣分者裁减同知無所屬縣分裁减同知判官今臨清縣見有三十四里例該全設欲將臨清州附改官制除授知州同知判官吏目各一員管馬管河判官各一員并儒學添設訓導一員候有相應人員銓補臨清縣原除知縣等官俱暫令在彼管事本部查有相應員缺陸續具奏調補其本縣儒學倉閘隂陽醫學僧道會司等衙門官銜俱未入流本部欲照先年茶陵等縣改陞茶陵等州事例將臨清縣儒學見任教諭王楷改爲臨清州儒學學正訓導陳暐馬善改爲本學訓導并隂陽醫學僧道會司俱改爲典術典科僧正道正及原屬廣積常盈二倉新開上閘渡口驛清源水馬驛清泉水驛仍𨽻本州管轄其各衙門官銜吏典印記俱照州治行移鑄換添設舊印照例収銷其原設守備等官應否裁革行移兵部徑自查議定奪縁係改陞州治衙門官銜事理未敢擅便開坐𢎞治二年二月初十日具題次日奉聖㫖是欽此議徽王乞陞鈞州為府奏狀文選清吏司案呈奉本部送准户部咨河南清吏司案呈准工部營繕清吏司手本奉本部送内府抄岀徽王稱名奏云云等因奏奉聖㫖該衙門看了來說欽此欽遵抄出送司照得改作衙門係𨽻别部掌行除禀堂外合用手本前去户部該司呈堂施行等因到司案呈看得前項改陞衙門一節比與臨清縣陞州事體相同係𨽻別部掌管本部難以施行合就移咨徑自施行等因到部送司案呈看得徽王所奏除脩築城池及改挑河道俱係工部掌管除行該部徑自施行外其稱分封寥落州治要將鈞州改陞爲府治就於郭内添設一縣并前項有名州縣一體所轄一節臣等體得肅府見在陜西蘭州瀋府見在山西潞州荆府見在湖廣蘄州岷府見在湖廣武岡州立國多者八九十年少亦不下四五十年率皆仍舊未嘗改爲今徽府要將鈞州改爲府治又要將汝州郟縣魯山寶豐商城許州襄城長葛臨穎郾城鈞州宻縣新鄭等一十二州縣改𨽻所轄不惟異乎前四府仍舊之撰且啟前四府改爲之端况今各處災荒軍民凋弊欲興此役實非所宜兼且州之與府於王頗無所與改與不改於王似無重輕以此言之不如仍舊貫之爲善也臣等愚見如此未知是否縁係欽依該部看了來説事理未敢擅便伏乞聖裁𢎞治二年三月十四日具題次日奉聖㫖是不心改陞還寫書與王知道欽此㑹議儧運糧儲行移奏狀文選清吏司案呈奉本部送准禮部咨該本部等衙門題刑科抄出都察院左副都御史邊鏞等題湖廣道呈刑科抄出總督漕運兼廵撫鳯陽等處都察院左副都御史秦紘奏㨿湖廣等處承宣布政使可呈蒙廵按湖廣監察御史姜洪批兊軍糧米本院節行會奏去訖布政司星馳差人咨稟淮安總督漕運官尚早處置毋得臨期致誤國用備由轉呈臣處照詳處置施行備呈得此臣查得淮安徐州臨清德州四處水次倉糧數少雖各該衛所運糧官軍行糧尚不勾用又况臣撫屬地方亦有災傷但於内酌量輕重那移輳補今亦未完其湖廣布政司前項兊軍糧米無從措置除行本布政司計處外爲照各處廵撫都御史與廵按御史行事雖不相關而名分終難紊越毎見各處廵按御史與廵撫都御史移文有令按屬衙門抄案轉逹此於名分雖乖猶以敵體相待今看得御史姜洪前項批詞玩其語意乃是以上司督臨屬官名分倒置如此顯是姜洪不諳大體如䝉乞勅都察院將御史姜洪挐問明正其罪以爲越禮犯分之戒及行令各處廵按御史今後凡與廵撫都御史有行仍照行移體式徑自具呈不許出案轉逹庶使名分正而體統嚴等因具本該通政使司官奏奉聖㫖都察院知道欽此欽遵又該刑科叅看得監察御史姜洪批詞既曰星馳差人又曰咨稟其下文毋得致誤等語乃爲布政司而設今都御史秦紘以此自認怒目不明輙便叅奏自傷大體事屬紛擾宜從抄出施行通抄具呈到院看得總督漕運兼廵撫鳯陽等處左副都御史秦紘叅奏廵按湖廣監察御史姜洪前項批詞玩其語意乃是以上司督臨屬官名分倒置如此顯是姜洪不諳大體乞要挐問明正其罪又稱各處廵按御史今後凡與廵撫都御史有行仍照行移體式徑自具呈不許出案轉達一節巳該刑科叅看得監察御史姜洪批詞既曰星馳差人又曰咨禀其下文毋得致誤等語乃爲布政司而設今都御史秦紘以此自認怒目不明輙便叅奏自傷大體事屬紛擾詳此叅辭御史姜洪似爲無罪難以提問及查得行移體式内止開各道御史并廵按御史呈都察院並無廵按御史具呈廵撫都御史辭語其廵按御史出案轉達廵撫都御史揆諸事體亦無妨礙今要徑自具呈行移體式既不該載亦難擅擬爲例所據都御史秦紘該刑科叅出前項紛擾情節合當查究但本官近陞右都御史廵撫兩廣去訖伏乞聖明裁處縁秦紘係在京堂上官及奉欽依都察院知道事理未敢擅便𢎞治二年三月十二日具題奉聖㫖這本係干名分大體禮部便會各部通政司大理寺堂上官從公看了來説欽此欽遵抄出到部會同吏部等衙門太子太保尚書等官王恕等查看得行移體式各道并廵按御史具呈都察院雖無廵按御史呈廵撫都御史之文縁廵撫都御史亦係本院堂上官相應具呈但在外廵按御史有具呈者有抄案轉行者今廵按湖廣監察御史姜洪却批詞布政司星馳差人咨禀淮安總督漕運官尚早處置毋得臨期致誤國用委的詞語欠遜有失大體及刑科并都察院叅稱都御史秦紘自傷大體合當查究等詞不無偏向俱各有罪所據御史姜洪刑科經該官都察院僉書官吏通該查究提問合無今後廵按御史事與廵撫都御史相關者仍照行移體式一體具呈庶㡬名分攸存體統不紊縁事内干礙在京堂上官并京官及節該奉欽依禮部便㑹官從公看了來説事理未敢擅便本月十九日具題次日奉聖㫖是姜洪批詞不遜有失大體難居風憲對品調外任刑科都察院經該僉書官吏偏向不公本當提問且饒這遭各罰俸糧一箇月欽此欽遵擬合通行除外合就移咨欽遵施行等因送司案呈到部看得御史姜洪係正七品今對品調外任該除在外正七品知縣職事查得山西平陽府解州夏縣見缺知縣一員欲將姜洪調補前缺順賫文憑令其就彼到任管事未敢擅便𢎞治二年三月二十四日具題次日奉聖㫖是欽此論知州劉槩有犯此依妖言律過重奏狀竊見刑部河南清吏司問得犯人劉槩合比依造妖言者律斬秋後處决湯鼐依風憲官受財加其餘官受財不枉法有禄人一百二十貫二等罪止律减等杖一百徒三年吉人依奏事詐不以實者律减等杖九十徒二年半李文祥鄒智俱依不應得爲而爲之事理重者律减等杖七十俱職官各照例運磚各完日湯鼐係有􅂍官革職爲民吉人李文祥鄒智俱浮躁淺露人數送吏部収查定奪東思誠曹璘俱供明各還職大理寺審擬合律奏奉聖㫖是這厮每既情犯深重劉槩揑造非言依律處决湯鼐風憲犯􅂍押發陜西肅州衛充軍吉人肆姦欺罔發囘原籍爲民李文祥鄒智私交妄議降三級調邊任都免運磚其餘准擬欽此欽遵抄招用手本連李文祥等送本部施行等因除湯鼐李文祥等罪不至死臣不敢妄議外但劉槩比依前律坐以斬罪臣則不能無疑焉伏覩大明律云凡造䜟緯妖書妖言及傳用惑衆者皆斬欽此先儒謂䜟緯如亡秦者胡之䜟及赤伏符等及諸經之緯書蓋䜟緯之書即妖書䜟緯之言即妖言以其說未來之興亡能惑衆亂民壊國家之事故禁之嚴使之不敢犯也今劉槩招稱不合要得阿諛湯鼐又揑寫一夢書内稱別後時時夢中㑹見一夕夢一老人騎牛背上行陷於泥淖中公左手把一五色石子右手捉牛角引就正路其人謝而去因思人騎牛背儼然一朱字正我朝之姓氏豈非天生豪傑欲頼之引君當道耶但五色石子意不可曉或者公自臺中首先抗疏爲彈之第一等耶請試思之如何等情臣切詳劉槩書詞固爲狂妄不能無罪其夢有無亦未可知推原其情不過因見湯鼐節次建言指陳得失不計利害以爲乃天生豪傑以道事陛下也是乃與人爲善之意别無惑衆亂民之情今比依造妖言者律論以死罪臣竊以爲過之設有造如亡秦者胡也之𩔖之言惑衆亂民者不知更以何罪加之昔之時有以忠諫者爲誹謗深計者爲妖言至今人猶爲之痛惜陛下受天明命正位宸極以堯舜之道治天下天下愛戴之如堯舜矣今法司以如此之情坐劉槩以妖言死罪不無有累陛下清明之政欲使天下後世不爲之痛惜恐不可得也且一婦含寃三年不雨今各處災異人情洶洶此正朝廷欽恤刑獄求言脩省以囘天意以弭災變以安人心之時若使劉槩縁此死於獄中豈不愈傷天地之和愈召水旱之災而臣忝在六卿之列知而不言則違先聖事君有犯無隱之戒其罪將安逃乎是以不避斧鉞爲陛下言之儻蒙聖明裁察寛宥劉槩死罪將見天下後世莫不稱頌皇上欽恤之仁豈不召和致祥衍慶延祚於無窮也𢎞治二年四月初三日具奏奉聖㫖劉槩造言引喻非𩔖法司比律問擬未爲不當你如何這等來説且監著待後發落刑部知道欽此乞休致奏狀臣見年七十四歲係陜西西安府耀州三原縣人正統十三年進士改庶吉士初授大理寺左評事歴陞太子少保南京兵部尚書叅賛機務成化二十二年致仕二十三年荷蒙聖恩遣使齎勅起臣前來俾典銓選特加太子太保以寵異之臣感激知遇之隆是以於職分内事無不盡心爲之其於政治之得失茍有所見亦無不欲言之欲言之者臣爲國之心也間或言之而不能禆補萬一者見之未眞知之未至慮之未精而言之未盡中理也是以臣雖欲報覆載之深恩而終不能報也徒自懐愧莫知所措今臣委的年老力衰日益昏晦兩腿酸痛步履艱辛不能朝叅署事伏望聖恩憐憫容臣致仕歸田以終餘齡庶不有妨賢路而臣之心亦休休矣臣干冒天威無任戰慄隕越之至𢎞治二年四月初八日具奏次日奉聖㫖卿受重任宜勉盡職毋以衰老爲辭不允休致欽此再乞休致奏狀臣昨以衰老腿疼步履艱辛不能朝叅署事陳乞休致奉聖㫖卿居重任宜勉盡職毋以衰老爲辭不允休致欽此臣有以見陛下不以臣爲迂腐無用特賜温詔勉留是乃上天包含徧覆之仁也豈勝感激臣伏自蚤歲從師講學以爲異日儻得成就受一階半級當效古人攄忠竭誠盡職報國今臣仰荷聖恩職居冢司官至極品此實人臣之奇遇縉紳之至榮豈不欲䇿勵駑鈍盡心奉職以圖萬一之報焉肯因循茍且適巳自便託疾求去孤莫大之恩負疇昔之志哉但縁臣今年七十有四委的血氣衰憊腰腿疼痛行走吃力跪拜艱難昨於御前承㫖力不能支㡬乎跌仆殊失觀瞻此左右之所共見百官之所共見非敢妄言退託况臣資質庸下學術空疎雖有忠君愛國之心而無論道經邦之才久居要地濫叨富貴將恐物議不平非臣之福也伏望聖恩憐憫容臣休致臣雖退伏畎畆亦不敢斯須有忘聖德茍有所見即當上言以盡區區之誠並不敢以進退而貳其心臣干冐宸嚴無任激切屏營之至𢎞治二年四月十二日具奏次日奉聖㫖卿年雖老宜勉副任用不准休致今後大風并雨雪日免早朝午朝可不必來欽此乞給假奏狀臣近於本月初八日因衰老腿疼不能朝叅署事奏乞休致奉聖㫖卿居重任宜勉盡職毋以衰老爲辭不允休致欽此十二日又以前情懇乞休致奉聖㫖卿年雖老宜勉副用不准休致今後大風并雨雪日免早朝午午朝可不必來欽此臣聞命之餘惶懼殊甚罔知攸措自惟樗櫟庸材於時無補誤蒙聖恩再三眷念禮貎益隆臣雖捐軀隕首莫報涓埃即欲報名謝恩但縁腿疼未瘳步履尚爾艱辛跪拜猶未方便欲望聖恩容臣暫且在部勉强供職俟腿疼少愈即當入謝臣狂妄無狀罪當萬死𢎞治二年四月十五日具奏次日奉聖㫖准他該部知道欽此定奪欽天監官奔喪奏狀稽勲清吏司案呈奉本部送據欽天監呈前事據五官司厯劉玉呈稱有母張氏𢎞治二年正月十九日病故祖塋在於順天府東直門外遷民屯巳於本年三月初二日安𦵏畢思得本職係是親男例應守制理合具呈乞爲查照定奪等因到監據此查得洪武十九年二月二十四日該本監官於奉天門欽奉太祖高皇帝聖㫖恁隂陽官人每都不要丁憂永爲常例欽此欽遵外今照本監查無守制事例及看得本官母故巳行安𦵏完畢要行守制一節縁本官係是提督造厯緊要官員正値興工之時及有前項事例本監難擅定奪備呈乞爲查照定奪等因到部送司案呈查得永樂二年正月十七日有本監五官司厯潘緝熈父故要囘奔喪該監官奏奉太宗文皇帝聖㫖著他去欽此天順二年二月二十九日五官靈臺郎方欽母故呈乞奔喪該監官引奏奉英宗睿皇帝聖㫖照例欽此成化元年二月十二日監正谷濱母故奏要奔喪該本部具題奉憲宗純皇帝聖㫖照例欽此成化六年三月二十三日五官靈臺郎呉英父故奏乞終喪該本部具題奉憲宗純皇帝聖㫖准他去奔喪欽此及成化十年三月二十日監副楊瑛順天府人繼母病故奏乞躬𦵏成化十七年三月二十五日中官正皇甫敬母故置立塋所順天府地方奏要安𦵏成化二十二年十二月十三日漏刻愽士袁紘父故置地順天府地方奏乞奔喪安𦵏本部節次照例題准俱限三箇月奔喪安𦵏畢日照舊辦事前項奔喪事例已行八十有餘年况袁紘父故買地順天府地方安𦵏與劉玉事體相同又係目前之事本官與本監官豈得不知今本官既有母喪自合随即呈監轉呈本部照例奔喪爲當却乃遷延月久待其安𦵏已畢方纔具呈意欲免其奔喪顯有貪禄忘親之情而該監官却將奔喪事例匿而不言止稱查無守制事例又稱本官係是提督造厯緊要官員雖稱呈乞定奪其意亦欲免本官住俸奔喪不無受囑情弊且該監官聞父母喪既已免其守制若又不照例奔喪則是於送終之禮全不用情烏得爲孝子乎且聖明之世有禄人員豈可容此不孝之人所據劉玉并該監僉書官吏本當究問但呈文内有呈乞定奪字様合無免其送問行令劉玉照例奔喪三箇月滿日赴部送囘本監照舊辦事以後凡遇該監官員人等聞父母喪者務要照依前例随即具呈奔䘮敢有託故不行奔喪者以違制論堂上官知而不令奔喪者亦治以罪如此則法令嚴而姦頑懼彛倫明而風俗美縁係查例定奪欽天監官奔喪事理未敢擅便𢎞治二年四月十七日具題次日奉聖㫖是欽此議何鼎陳言重官爵奏狀文選清吏司案呈奉本部送内府抄出長随何鼎題云云案呈查得成化二十一年正月十六日吏部等衙門題爲災異陳言事節該奉憲宗皇帝聖㫖𫝊奉文職大小官員除勲戚功陞廕授不動欽此又查得太常寺奏要將革罷傳奉官徐啟端仍復司樂王福廣等月支食米本部爲照此舉蓋是徐啟端等央凂劉岌等假此爲名以求復進欲將徐啟端等挐送法司明正其罪等因具題奉聖㫖是徐啟端等本當挐問且都饒這遭劉岌等罷欽此欽遵此其欲開倖門本部題准不容開者矣今何鼎題要審查文非考中本等程式陞者自天順元年至今一切革去以杜倖門一節縁天順元年至今三十三年彼時倖進之人壯者今巳老老者今巳故其見存者亦有遷轉一二次者且如成化年間内閣學士李賢子李璋彭時子彭頎俱以舍人除授尚寶司司丞李璋陞本司卿劉定之子劉偁以生員除授中書舍人陞南京尚寶司司丞商輅子商良輔以監生乞恩除授主事近來商輅孫商汝謙又以納粟監生乞恩除授尚寶司司丞太監張慶姪張暉由承差除授驛丞陞至太常寺寺丞今降典簿御史鍾同子鍾鉞由生員除授通政司知事之𩔖皆是文非考中本等程式陞除之人有保陞爲太醫院官者爲欽天監官者爲工部所屬衙門官者爲各府都事等官跟隨總兵等官書辦者彼因多係廕授及不係傳奉人數不曽查處今若又行查革將不勝其革且有不可革者徒見其紛更而無已也臣等竊惟治天下之道貴乎簡要安靜處置得宜犯者治之其不犯者不必追究如此則事不煩而民志定若今日一人言一徃事而翻騰之明日一人言一舊事而追究之但見其事體叢脞而衆心疑懼非所以顧大體而隆治道也又惟諸司官俱有定員不可濫授濫授則民擾士之進身亦有正道非由正道進者猶鑚穴隙之𩔖也雖有才能何足道哉伏望皇上俯賜裁察合無不必追究往事自今以後内外大小衙門官缺一員則銓補一員不可輕易聽人妄保不由正道出身之人泛濫陞除如此則奔競自息官爵自重朝廷自尊萬姓自安而天下自治矣若往者雖革之來者又許之徒見其紛擾有何益哉縁奉欽依該部查看了來説事理未敢擅便𢎞治二年七月初五日具題次日奉聖㫖是欽此王端毅奏議巻十
