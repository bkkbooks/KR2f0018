body:
  text: 王端毅奏議卷十一明王恕撰吏部修省陳言奏狀文選等清吏司案呈准驗封清吏司付奉本部送准禮部咨𢎞治二年七月初七日早該太監韋泰傳奉聖㫖近日京城雨水為災南京又奏大風雷雨之異朕當檢身飭行祇謹天戒爾文武百官尤當各加修省勉圖報稱毋自因循各衙門政事有缺失當舉行改正的斟酌停當來說禮部知道欽此欽遵等因案呈到部臣等欽遵聖諭痛加修省勉圖報稱外今將本部政事缺失當舉行改正的事件斟酌人情事體開坐伏乞聖明裁處緣係修省事理未敢擅便𢎞治二年七月二十七日具題次日奉聖㫖都准行欽此一查得諸司職掌內九年考滿教官考不通經者别用府衛教授州學正縣教諭府衛州縣訓導俱係教官教授係從九品學正教諭訓導俱未入流謂之别用者但不令復為教官而於品級相等官內改用也教授合改除從九品稅課司大使府倉大使司獄巡檢等官學正教諭訓導合改除未入流河泊所官稅課局織染局鹽課司大使副使倉大使副使等官景泰天順年間教授有改除稅課司大使等官者學正教諭訓導有改除倉官河泊等官者近年以來不分教授學正教諭訓導俱改除河泊所官非惟太拘其於教授實為降等有乖别用之制合無今後教官考不通經者教授改除從九品大使司獄巡檢等官學正教諭訓導俱改除未入流河泊所及大使副使等官不拘衙門如此則改調有等選法疏通一外官九年考滿到部有司官繁稱升二級簡稱升一級教官考通經府州縣學官舉人及數乃升衛學官并選貢衙門學官無舉人亦升丁憂復除者舊例俱以後任定其黜陟頗有不均且如有司官前任事簡歷俸少後任事繁歷俸多升二級固為相應若前任事繁歷俸多後任事簡歷俸少止升一級不無有虧教官前任府州縣學日多後任衛學并選貢衙門學日少照衛并選貢衙門學不論舉人而升固不相應前任衛學并選貢衙門學日多後任府州縣學日少論舉人不及數而不升亦不相應合無今後有司官九年考滿不分前任後任但事繁歷俸日多者升二級事簡歷俸日多者升一級教官亦不分前任後任但任府州縣學日多者從府州縣論任衛學并選貢衙門學日多者從衛學并選貢衙門學論如此則事體停當人心恱服一在外所屬例該考核官員雖開合於上司考核詞語不開稱職平常不稱職字樣者案候行查回報之日有司官引奏復職教官具奏入選不無守候人難合無今後有司官雖不開稱職平常不稱職字樣其詞語內有勤能端謹等項字樣者即以稱職論有頗可等項字樣者即以平常論有無為無守誤事懶惰等項字樣者即以不稱論初考二考不必行查就與定稱否引奏復職三考仍候行查至日定奪全無考核詞語照舊行查教官舊例止以到部考通經有舉人定黜陟不以上司考語為殿最雖無考語即與具奏入選差錯官吏俱照例參問一舊例外官考滿後任日少許通理前任日多另歷三年是說丁憂起復并更調改除官前任後任近年以來却將考滿給由到部復任輳考者亦以前任後任如前論之此其因襲之失合無改正今後止以丁憂起復及更調改除為前後兩任照前例查考其考滿復任輳考者不必論前任後任多少一考滿官歷任六年止開三年事蹟給由者參問准作三年考滿仍令回任補造六年考滿牌冊給由不無往返人難合無今後考滿官雖歷任六年止開三年事蹟考滿給由者免其參問准作三年考滿不必補造六年考滿牌冊侯九年考滿通將後六年事蹟櫕造牌冊給由為便一吏員出身考滿官或該升正從八品正九品者或該本等用者或該降者入選之時考中該升者升該本等者本等用該降者降不中俱降雜職內巡檢與司府衛倉場大使俱係從九品官巡檢以軍囚及數升司府衛倉場大使以糧草及數升巡檢不考就升司府衛倉場大使考中方升不中降雜職此諸司職掌不該載不知昉於何時一向因襲而行且以正從八品并正九品官考不中一例俱降雜職似無分别是以入選官懷不平者往往纒告合無今後吏員出身考滿該升正從八品正九品者考中照例升考不中本等用其原該本等用并該降者不必考驗照例選用若考中該升官告願就雜職者聽如此則選法一而人心服一知印資格兩京五府知印從八品出身六部都察院知印正九品出身在外都布二司知印從九品出身在外知印係農民僉充役滿赴部冠帶辦事半年不考就除從九品職事在京知印係役滿承差請㫖㸃做役滿冠帶五府者考中除從八品職事六部都察院者考中除正九品職事考不中俱降除雜職且在外知印不考就照資格除授在京知印考中方照資格除授不中降用事體不一况知印原非書辦文案人役與吏典一般考試招擬多是不中往往降除雜職是資格高者得官反卑資格卑者反高似非所宜除都布二司知印照舊不考就選外合無今後五府六部都察院知印臨選之時止考行移中者照資格除授不中者降一級用如此則事體適中而彼此皆安議不當加升按察使陶魯奏狀文選清吏司案呈奉本部送准兵部咨該本部題職方清吏司案呈奉本部送於內府抄出總鎮兩廣內官監太監韋眷等題云云等因奉聖㫖該部看了來說欽此欽遵通抄送司行准吏部文選清吏司手本開查得按察使陶魯原籍廣西梧州府鬱林州人由舍人景泰四年十月除廣東廣州府新會縣縣丞七年五月功升從七品俸天順七年七月升本縣知縣成化二年閠三月升本府同知仍管縣事本年四月升廣東按察司僉事專在肇慶等處提督操練𠞰賊十二年六月升本司副使專在高雷二府提調操練二十年四月改管司事本年十一月功升俸一級成化二十一年十一月九年考滿升湖廣按察使仍在兩廣軍前帶管嶺西道遇警聽委撫治𠞰截手本回報前來本司又於節年卷內查得兩廣地方廣西賊情最多原設副總兵并左右參將共三員其餘守備官不止五六員廣東賊情稍緩止設左參將一員總督備倭都指揮一員近日南韶二府又設守備指揮一員其南韶并廣潮惠等府雖經正統十四年并成化初年賊情猖獗亦不曽設有將官在彼提督捕盜及查得先該兩廣守臣奏報成化二十二年十一月內廣西鬱林等處𢎞治元年三月內廣東潮州等處本年七月內廣東廣州府後山等處各起苖賊并强賊功次內領軍官俱有按察使陶魯職名因無巡按御史勘實造冊奏繳未曽定擬升賞今該前因節該伏覩大明律內一款文官不許封公侯其生前出將入相能除大患盡忠報國者同開國功勳一體封侯諡公欽此並無方面風憲文職改授武職事例案呈到部看得兩廣總鎮總兵等官太監韋眷等會奏按察使陶魯文武兼資威望素著要查本官功次量改武職提督廣州潮州惠州韶州南雄等五府地方官軍緝捕盜賊保安境土若廣西等處賊情緊急仍前聽調一節緣廣州府係都布按三司總會之地又係太監韋眷總兵官栁景都御史秦紘鎮守巡撫去處况離梧州不逺陶魯見今挈家在彼居住即與鄉里無異潮惠二府俱係邊海有備倭都指揮管理南韶二府有守備指揮管理若再添將官不無官多人擾兼且原擬止在軍門聽委不拘逺近賊情皆可責其效力若是限定分守一方未免勢有所拘才不得展况本官初由白身舍人纍官正三品風憲文職恩巳酬勞位巳過分雖有三起𠞰賊功次又未經巡按御史勘報所據量改武職查無事例臣等不敢擅擬以壞選法以開弊端其應否量升文職合行吏部查奏定奪候命下之日仍照原擬令其在於軍門聽委隨處領軍𠞰賊緣係議處地方用人及奉欽依該部看了來說事理未敢擅便等因具題奉聖㫖是欽此欽遵備咨送司案呈到部看得總鎮兩廣太監韋眷等奏稱廣東廣州等五府久缺領軍官員要將按察使陶魯查照功次量改武職或量升文職提督前項地方官軍保安境土若廣西賊情緊急仍前聽調等因既該兵部參稱前項地方俱各有官管理本官原擬止在軍門聽委不拘逺近賊情皆可責其效力查無量改武職事例應否量升文職合行吏部徑自查奏定奪臣等切緣內外三品以上文職俱有定員缺一員則於進士舉人出身方面官內推舉一員以補之未嘗以白衣出身捕盜升遷人員內舉用亦未嘗以捕盜功而濫升文職大臣者且陶魯雖有前項微勞自舍人而升至按察使其官不可謂不高其權不可謂不重其富貴亦云至矣仍以前職聽調殺賊可也若果有殊功賞以金帛亦足以酬其勞何必加非分之官以駭人之耳目所據陶魯量升文職一節臣等未敢擅便定奪𢎞治二年八月初八日具題次日奉聖㫖陶魯還著兵部查他功次來說欽此論御醫蔣宗儒妄奏復職奏狀文選清吏司案呈奉本部送吏科抄出太醫院冠帶醫士蔣宗儒奏云云等因具奏奉聖㫖吏部看了來說欽此欽遵抄出送司查得成化二十三年九月內該科道官題為糾劾事內開御醫蔣宗儒等醫術不精當先帝不豫之時用藥乖謬以致宫車晏駕要將本官拏送法司明正典刑等因具題節該奉聖㫖你每說的是蔣宗儒降醫士欽此欽遵今該前因案呈到部看得蔣宗儒平昔醫術不精用藥乖謬以致先帝宫車晏駕痛傷陛下之心大失臣民之望論其罪犯死有餘辜皇上恩同天地雖韙科道之言尚從寬恤之典貸其死罪降為醫士正當感恩思報豈可復萌覬覦之心今却妄奏與醫士吳綬同在春宫用藥見效臣等竊意聖躬萬福或者斯須缺安天相神佑勿藥自喜蔣宗儒等豈可掩為巳功以圖升賞若以此為功則進藥於先帝而不見效之罪其可逃乎况吳綬太醫院開作二等臣等詳味二等之說則知其非用藥有效之人不敢與用藥有效者並列正恐此輩相率而來打攪朝廷今蔣宗儒一見太醫院開吳綬名字到部果來進本奏擾若更復吳綬等職事不但蔣宗儒一人進本奏擾其餘革退傳奉職事醫士天文生樂舞生僧人道士匠官樂工等項三四千人皆來比例奏擾豈不溷亂朝政壞天下事乎臣等所以不敢曲為之說開此幸門者正為是也所據蔣宗儒并吳綬朱俊宫良寧銓等俱不當聽其甘言悲詞令復舊職以來幸進之人而為新政之纍再照蔣宗儒在前妄投藥劑上誤先帝及今乘機妄奏以啓釁端之罪皆不可不治合無將蔣宗儒拏送法司明正其罪置諸重典以為將來之戒緣奉欽依吏部看了來說事理未敢擅便𢎞治二年九月初五日具題初七日奉聖㫖蔣宗儒巳被劾降醫士了如何又來奏擾不准也不送問著回太醫院當差欽此議布政使徐恪裁革承奉司吏奏狀驗封清吏司案呈奉本部送內府抄出徽王奏云云等因具本奏奉聖㫖吏部看了來說欽此欽遵抄出到部送司案呈查得祖訓條章并諸司職掌內俱不曽開有各王府承奉司合設吏典緣由今內府各監局亦不曽設有吏典及秦晉周楚等王府承奉司亦無吏典考滿到部想是自來不曽設有止查得天順七年德王出府該本府長史司手本開本司并所屬衙門無吏書辦要行定撥等因前來本年七月內本部撥去長史司吏戶禮房司吏一名典吏六名兵刑工房司吏一名典吏六名審理所司吏二名典吏四名良醫所司吏一名典膳所奉祠所工正所司吏各一名典吏各二名典簿聽典吏一名廣受倉廣受庫攢典各一名不曽撥有承奉司吏典本年九月內撥承奉司司典各一名各送著役去訖稿簿內亦不曽開稱因何添撥以後秀王崇王吉王徽王出府相因俱撥有承奉司司典吏各一名今徽王奏稱河南左布政使徐恪行文裁革本府承奉司吏典二名等因不知徐恪因見祖訓條章并諸司職掌內不曽該載承奉司吏典或見周伊等府承奉司俱無吏典獨徽府承奉司有吏典疑是濫設要行查革抑不知別有其故未經行勘難便定奪合無本部行移河南布政司查勘前項吏典因何要行裁革著令從實回報前來另行奏請定奪等因具題奉聖㫖是欽此欽遵巳行河南布政司查勘去後今該前因案呈看得前項承奉司吏典諸司職掌既不該載周趙唐伊鄭等府自來又不曽撥有况本部在前撥送德崇吉徽四府各承奉司之時亦無奏奉聖㫖緣由左布政使徐恪職司前事恪遵祖宗成憲裁革誠是但前吏相沿參撥頗久不行咨呈本部查勘待報施行就行裁革雖無別情而輕易之罪亦不能辭欲轉行德崇吉徽四府長史司將承奉司吏典一體裁革送各該布政司改撥及行都察院轉行巡按河南監察御史將徐恪就彼提問明白照例發落緣係裁革吏典參問方面官及先奉欽依吏部看了來說事理未敢擅便𢎞治二年九月二十日具題次日奉聖㫖是既祖訓條章并諸司職掌不曽開有承奉司吏典便寫書與各王知道照例裁革徐恪處事輕易本當提問且饒這遭還罰俸兩箇月欽此論不可內外異法奏狀臣竊聞古人有言國無賞罰雖堯舜不能為治臣謂賞罰不當與無賞罰同何以勸善懲惡服天下心天下不心服則萬事瓦解雖有智者不能善其後矣諸葛武侯有見於此故告後主有曰宫中府中俱為一體陟罰臧否不宜異同若有作奸犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使內外異法也斯言也實公天下之格言服人心之要道也雖為後主告實所以為萬世人主告也臣伏覩昨者發落南京御史姜綰等聖㫖似與武侯之言不同大駭物情誠恐天下聞之謂今聖明之時內外異法豈不有傷陛下平明之治乎臣實不忍敢不昧死言之且姜綰等與太監蔣琮交相訐奏互有虛實姜綰等既降調其職侍郎黃孔昭等被其連纍亦各罰俸三箇月豈宜獨宥蔣琮之罪而不為之處置乎夫為此一人遂廢天下之公論壞國家之政體豈陛下之本心蓋未之思耳臣荷聖恩起於既退之餘加以一品之職非徒富貴之也蓋欲朝夕納誨匡輔至治臣知此事未宜而不言是不忠也儻異日陛下自覺其非豈不以不忠責臣乎縱使陛下終不覺悟臣亦安忍坐視乎昔子思言於衛侯曰君之國事將日非矣君出言自以為是而卿大夫莫敢矯其非卿大夫出言自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生由是言之是君不可以不聽言臣不可以不進言也臣伏願陛下追還前㫖叧行裁處務合公論使彼此心服天下無得而議將見盛德大業可以與天地相為悠久矣若以臣言為狂妄而不之省乞將臣罷歸田里以為多言者之戒臣干冒天威不勝戰栗待罪之至具題𢎞治三年正月二十五日奉聖㫖這事巳發落了罷欽此再論不可內外異法奏狀臣昨伏覩發落太監蔣琮及南京御史姜綰等聖㫖以為蔣琮姜綰等俱是有罪人犯姜綰等降調外任侍郎黃孔昭等被其連纍亦皆罰俸蔣琮獨蒙恩宥又不為之處置人皆不平是以昧死上言欲望陛下追還前㫖另為裁處以昭公道以服人心且免天下後世內外異法之議是臣惓惓為國之心非敢徇情妄言以惑聖聽自取誅殛之罪伏奉聖㫖這事巳發落了罷欽此臣惟人之大倫有二君臣也父子也傳曰事君有犯而無隱事親有隱而無犯此言事君事親諫諍之道不同也又曰事父母幾諫見志不從又敬不違勞而不怨此言為子者當諌於父母也又曰君子之事上也進思盡忠退思補過將順其美匡救其惡此言為臣者當諫於君也臣讀聖賢書所學者忠君孝親之道今臣已老矣親巳去世矣雖欲孝誰為孝幸有聖天子在上且又身居臣鄰之地匡輔諫諍是其職也是以於政治闕失知無不言言無不盡期於補其闕成其美以圖萬一之報而已若陛下曰可臣亦曰可陛下曰否臣亦曰否則非陛下起臣之意亦非臣之志也然而此事雖小關繫治體甚大設未得其當雖十易之不為過要於其當而後已若謂已發落了不可易古之所謂從諫如流者所從者豈皆未發落事乎漢文帝欲重犯蹕之罪張釋之曰當罰金欲族盜高廟器者張釋之曰當棄市文帝雖發怒終從其言未嘗以不合巳意而不從也伏願陛下昭日月之明察芻蕘之言𢎞天地之量赦狂瞽之罪乞將前事再加􅕍括別作處置使內外無分彼此而人心服治體不至虧損而朝廷尊矣臣不勝至願𢎞治三年正月二十八日具題次日奉聖㫖朕意以蔣琮守備重任不宜輕動如何又這等來說不准再不許來奏擾該衙門知道欽此論傳奉官不可授職奏狀文選清吏司案呈奉本部送吏科抄出太醫院冠帶醫士蔣讓奏云云等因具奏奉聖㫖該衙門看了來說欽此欽遵抄出送司案呈照得先是有等奔競之徒夤緣梁芳等傳升京官數千百員大壞名器蠧國損民使海內失望逮夫皇上嗣登寶位用科道之言罷傳升之官朝野拭目仰望太平其後太常寺奏要復傳奉官徐啓端舊職該本部參奏雖蒙聖恩寬宥其罪未嘗許復舊職人皆以為聖明政令如此何患天下之不太平不意太醫院假以修省改正為名欲復革罷傳奉官陳俊宫良寧銓吳綬聶整朱俊等舊職臣等以為不可再三陳奏皇上軫念各官曽在春宫用藥有效量與升職訖今革罷傳奉官蔣讓又來奏擾蓋欲變已成之法以遂一巳之私甚不可也且蔣讓伊祖蔣用文雖䝉前項令㫖未嘗使之世襲其官今蔣讓既為冠帶醫士又令收放藥餌亦是得所之人比之饑寒困苦流離失所者大有徑庭似於前項令㫖無違若允蔣讓所奏量授一職則革罷傳奉官數千百員皆來奏擾不允則彼皆以蔣讓為口實允之則傳奉官之冗濫又如前日矣豈不大失天下蒼生之望乎伏望皇上慎始圖終懲一戒百將蔣讓拿送法司明正其罪以為觀望求進者之戒緣奉欽依該衙門看了來說事理未敢擅便𢎞治三年二月二十五日具題次日奉聖㫖蔣讓不准授職也不送問欽此乞休致奏狀臣係陜西西安府耀州三原縣人正統十三年中進士改庶吉士十四年授左評事景泰三年升左寺副五年升揚州府知府天順四年升江西右布政使八年升河南左布政使成化元年升都察院右副都御史撫治南陽荆襄流民三年以平賊功升左副都御史巡撫河南四年升南京刑部左侍郎七年改刑部左侍郎總理河道九年改南京戶部左侍郎十二年復改都察院左副都御史巡撫雲南十三年升本院右都御史仍前巡撫當年改南京都察院右都御史參贊機務十四年升南京兵部尚書仍前參贊十五年改兵部尚書兼都察院左副都御史巡撫蘇松等處二十年復改南京兵部尚書仍前參贊二十一年加太子少保二十二年致仕西歸二十三年荷蒙聖恩起取前來升吏部尚書不日又加太子太保臣自受命以來至今四十二年雖不稱任未嘗不罄竭駑鈍以圖㳙埃之報但今犬馬之年七十有五筋骨不仁耳目失職氣息奄奄朝不保暮猶且隨羣而入逐隊而趨萬一跌仆失儀士夫未免竊笑此其所宜去者一也况典選日久不遂意者未免怨恨怨則謗生謗則禍必隨之此其所宜去者二也又况兼保傅之官不能盡輔弼之道無補於國家無益於軍民失中外之望此其所宜去者三也有此三宜去不去何安伏望聖恩憐臣衰老賜歸田里俾遂丘首之願幸莫大焉尤望叧選碩德重望之人俾典銓衡則賢者進而不仁者逺萬邦其有不咸寧乎此實臣惓惓為國之心非直為己也臣無知干冒宸嚴無任戰栗懇祈之至𢎞治三年三月初一日具奏初二日奉聖㫖卿當勉圖盡職不准休致欽此議南京吏部尚書王㒜等修省奏狀文選清吏司案呈奉本部送吏科抄出南京吏部尚書王㒜等奏云云等因具奏奉聖㫖該部知道欽此欽遵抄出送司案呈到部除均勞逸以愜士心事備咨禮部徑自施行今將簡大臣以綜政務等七事逐一議擬開立前件伏乞聖裁緣奉欽依該部知道事理未敢擅便𢎞治三年三月初八日具題初十日奉聖㫖南京戶工二部各添尚書一員吏禮兵三部各添侍郎一員有兩員的罷寫本監生准照數添兩京取撥監生仍舊吏典不必經由御史等官考送只部裏嚴加考選不許姑息其餘准議欽此一看得南京吏部尚書王㒜等奏稱南京戶刑工三部較之各部政務頗繁今止有侍郎一員及南京都察院止有右僉都御史一員要於各部尚書或侍郎都察院右都御史或副都御史請㫖簡命各一員前來到任管事一節查得南京總督糧儲右副都御史李益近奉欽依改南京都察院管事連右僉都御史虞瑤已足二員之數不必再添外南京戶刑工三部委的政務頗繁堂上官少分理不周合當添除南京兵部亦係事繁衙門左侍郎白昻近奉欽依改戶部左侍郎提督整理河南山東河道去訖止有尚書張鎣獨員管事又兼參贊機務亦合添除合無於戶刑工三部或尚書侍郎各添一員兵部添侍郎一員命下之日本部照例會同各部都察院通政司大理寺三品以上大臣於兩京各衙門及在外巡撫方面內推舉相應官各兩員請㫖簡用一查得成化十七等年節該聽選監生陳䇿等奏要照倉攢曹寬等冠帶守支事例冠帶聽選等因該吏科參看得朝廷設立學校作養人材誠三代崇尚儒術之意故科貢有常制任用有差等今聽選監生陳䇿等乏藏器待時之猷忘觀我朵頥之戒包羞忍恥自比雜流希求冠帶恐虧大體等因節經立案訖今南京吏部尚書王㒜等又奏要將附選監生不拘科貢納粟等項年四十以上者及會試中副榜不願就職舉人不拘年歲給與冠帶大意欲使附選監生年老者可榮終身副榜舉人不第者終為教官固是疏通選法之一端但人之常情好榮利者多甘恬退者少節奉詔書恩例監生有不願出仕聽選者授以從七品依親坐監者授以正八品俱有司職名及填注衙門其有歲貢生員到京不曽坐監不願出仕者亦曽比例給與冠帶間住俱係見行奈何不願出仕者千無一二减年冒進者比比皆然且三考吏典巳有資格例該冠帶附選監生未定品級難令冠帶今若一概給與冠帶不惟使科貢出身之人下同雜流且非崇儒舊規一查得在外司府州縣等衙門官三年六年俱赴部給由惟雲南布政司軍職首領并斷事司理問所官府州縣首領官貴州布政司所屬府州縣官并軍職首領官三年六年考滿俱赴本布司給由考核就彼復職牌冊類繳候九年通考赴部其各處閘􅄵河泊稅課司局并驛遞官三年六年考滿𨽻布政司者俱赴各該布政司給由南直𨽻者赴南京吏部給由亦就彼考核復職牌冊俱差人類繳本部北直𨽻者赴本部給由引奏復職九年通考官不分逺近俱赴部給由係是舊例及查得成化六年為申明舊制事本部題准今後除邊方軍馬錢糧所係官員考滿申請定奪外其餘不係邊方大小官員務要依例三年給由雖有專責差占及奉例納米等項三年六年之間亦要一次赴部給由考核不許托故違者查理究問有規避黜降巳經通行外成化二十等年又該戶部題准被災去處三年六年考滿官員依例納米准令給由以備一時救荒又經通行去後今奏前因誠為有理除雲南等處地方窵逺有司大小官員照舊本布司給由外其浙江等布政司并南北直𨽻府州縣等衙門今後有司大小官員三年六年考滿俱要依例赴部給由考核驛遞等官在外者仍赴本布政司給由係南直𨽻者赴南京吏部給由俱造牌冊繳部查考北直𨽻者赴本部給由引奏復職俱不許仍前令其一概納米以玷名節如遇地方災傷缺糧賑濟許令有司預先別作措置或臨期多方區處如此則考課之法不致廢弛而備荒之政不誤矣一看得南京吏部尚書王㒜等奏稱南京戶部等衙門俱有寫本監生止是本部并南京禮部一向不曽添設及稱各衙門寫本監生俱行本部轉行南京國子監取撥止有戶工二部徑自行取不曽經由本部及至滿日却乃送回附選年月淺深無從查算要將南京吏部并禮部各添設寫本監生二名南京兵部再添設一名及將南京戶工二部寫本監生俱從本部取撥一節合無准其所言行移南京吏部依擬施行及照南京刑部工部都察院大理寺鴻臚寺尚寶司寫本監生俱經由本部取撥內禮部寫本并兵部清軍清黃續黃中書舍人寫誥戶部天財庫收鈔工部清匠都察院出巡刷卷等項監生俱係各衙門徑自行取歷滿之日方送到部附選年月淺深亦難查考合無今後遇有前項各衙門寫本清軍等項監生有缺俱要行移本部照缺轉行國子監取撥如此則事體歸一庶便查考一看得南京吏部尚書王㒜等奏稱辦事當該吏典數少不彀撥用要全撥福建湖廣所屬府州縣或摘撥江西福建湖廣窵逺府分及要停止巡按御史考試新例一節照得天下吏員出身資格雖有不同皆是管事人員若不考選一概收用將來豈不誤事前項考選之例無非甄別人材以備任用立法之意未為不善兼且行之未久難便停止各處兩考吏典赴本部給由者亦有數撥用尚恐不敷其湖廣福建兩省吏員難准全撥合無量撥福建邵武府湖廣德安府吏典與南京吏部本部仍行福建湖廣布政司今後二府并所屬吏典役滿之日徑自起送南京吏部撥用如此則事頗得中而人不乏用矣一查得諸司職掌內開吏員人等父母年老別無人丁者務要經由本部移文體勘是實明白奏准方令離役俱候親終服滿起復赴部聽用今南京吏部尚書王㒜等奏稱吏典初參之時不思親老缺人侍養及至役滿赴部即告侍親要將充吏農民審係單丁不許起送收參合無通行各布政司及南北直𨽻今後選取農民充吏之時務行所屬官司里老從實審勘軍匠戶五丁以上民戶二丁以上者方許收充單丁之家不許一概朦朧起送收參其充吏之後兄弟亡故父母年老無人侍養告要侍親者仍照舊例施行一查得諸司職掌京官丁憂具奏關領勘合回家守制若有接服者申報本部改填勘合其餘官吏監生承差知印人等聞父母喪守制接丁祖父母繼母等憂起復到部查有原籍官吏里老保結者俱准收用今南京吏部尚書王㒜等奏稱丁憂官吏有接服者俱要豫先申達起復之日查無豫申者送問仍將符同官吏究問如律一節合無准其所言照依先年奏准事例通行天下今後丁憂官吏人等服制未滿接服守制者隨即具告本州縣審勘明白申報該部備照候起復之日查無預申新喪公文者就送法司問罪仍將符同官吏究問若稱巳行申報中途沉滯者官員監生不許附選吏典不與實撥候行查至日定奪王端毅奏議卷十一
