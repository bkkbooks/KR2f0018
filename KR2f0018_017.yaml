body:
  text: 新刋介菴奏議後䟦大冢宰三原王公清忠大節著天下章縫士識與不識莫不知推尊之顧其平生章奏往往𫝊聞于人而全帙多未之覩慕公者盖日企焉久矣侍御東魯王公往使闗中以風節髙峻為公所期重且道雅相合因録得疏草二百餘篇每攜自隨兹奉命按江南激揚之暇思欲廣之以資有志事功者因謂我郡守林侯曰三原公一代耆徳固今後輩楷模况敭歴既久所建明多地方事亦司風紀者之所宜習也盍刻而𫝊之侯勵精郡政雅志逺大欣然請捐俸督其成以余之居郡下也遂授而俾編焉魯魚亥豕㣲效刋正得八十六篇釐為六巻其再起為吏部時撰又不在是大凡校編事宜皆請質二執政而後定𦕈焉末學直董書而巳既成復承命志所由刻古語云惟賢知賢信然哉公之大勲業自筆太史固非愚生之所敢論侍御公按兹周稔執法秉公始終一心而侯篤尚恵愛以風化率下皆所謂三原公之徒歟且公桃李滿門晚得相知乃更在四海之内則知君子道同則合雖千載猶金蘭契非是鄰墻旦暮而後相為謀也侍御公言公引年家居後在邑城外數里許築草堂日著書其中以為課今年垂九十而聰明强健好學不衰且増廣古今章疏甚富其自得而不忘世又如此公又間語侍御公曰士大夫是劄得脚住然後可以有為亦名言也敢併志云𢎞治十五年嵗次壬戍十一月望日後學吳郡楊循吉拜手謹書介菴奏議六巻舊刻之姑蘇三原公故里也公逝矣時縉紳知公者重其名思其手澤之新惟公不可見得見是集也斯可矣然乃不能應諸縉紳之求乃啚廣之乃因舊本別為三集逾冬工始刻成讀其辭直而不矯婉而不随危而不激仰承俞允播宣中外時則有若削兵權出侍近誅大奸惡以丕覃聖化華夏夷服想望風采是固聖明從諫好善之懿夫其轉移孚動果敢剴毅公之精㣲固自有不可及者公殁之明年啓充來尹三原又三年奏議重刻說者謂公之質直如長孺心事如希文奏疏如包孝肅好學如衛武公表正鄉閭如陳太丘一時出處屹然朝著俾善𩔖頼以有立是集也猶吾足徵也惟公不可見得見是集也斯可矣遂藏棗于𢎞道書院併志嵗月以𫝊正徳七年壬申冬十有二月賜同進士出身知三原縣事嘉州後學程啓充拜書書王端毅公奏議後耿文恪公居太宰有譽公可繼端毅公者文恪公曰王公孰可當之其在位吾夕過其第必見蒼頭沽油也銑先公守延安考滿考功郎中佐持牘上王公曰汝未盡斯人之節邊吏率自潤斯人約身裕民嵗歉止徵坐是停禄恒餒其妻子公乃自署考曰清白之操詳明之政次日先公堂辭謝曰某逺郡吏何由辱公之知公曰吾諸子留三原鄰郡惟君無問遺爾秋日撿書覽公奏議擊奸守法一介弗撓乃籍上事嗟乎元臣勛名固不以巧辭飾行而取哉嘉靖甲午秋日相臺崔銑書王端毅奏議後䟦
