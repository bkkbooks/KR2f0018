body:
  text: 王端毅奏議卷十四明王恕撰吏部議在京三品官病故請給誥命奏狀驗封清吏司案呈奉本部送吏科抄出左春坊左諭德楊守址奏云云奉聖㫖吏部看了來說欽此欽遵抄出送司案查先奉本部送該本官奏前事為查正統三年四月內纂修宣宗皇帝實録進呈節奉英宗皇帝聖㫖陳循徐珵王玉既丁憂且不升欽此成化三年纂修英宗皇帝實録進呈節奉憲宗皇帝聖㫖事故的罷欽此今次纂修憲宗皇帝實録進呈翰林院手本開纂修該升官員而有查有先年節奉欽依事故的罷事例不開外等因則知今次纂修之升官悉遵先朝之故事及查得成化三年纂修事故官內一員副總裁禮部右侍郎李紹先於天順八年八月內開館成化二年八月內本官養病成化三年八月進呈在館二年去任一年不曽升官此其事故的罷之明驗也今右侍郎楊守陳品職并為副總裁俱與李紹同而在館之日比與李紹少去館之日比與李紹多本部所以不敢故違先朝事例與伊覆奏以此將奏詞立案訖今又奏前因案呈到部切緣自祖宗朝至今在廷文職大臣病故贈本身一官者間或有之贈及祖父母父母者絶無歷任三年請給誥敕者有例厯任未及三年病故請給誥敕者無例今楊守陳任三品官未及三年病故伊弟楊守址為伊奏乞贈官并請原任三品誥命封及祖父除請原任三品誥命封及祖父例難准理外所據贈官一事臣等未敢擅便定奪緣奉欽依吏部看了來說事理𢎞治四年十二月十八日具題次日奉聖㫖是楊守陳贈禮部尚書欽此扶持公道奏狀文選清吏司案呈查得先該吏科等科都給事中等官張九功等題兹者法司㑹議論奏栁景秦紘之事陛下於栁景念及祖功赦其死命俾得幅巾優遊間住於秦紘則以奏事亦有不實免其運炭使之致仕且律條有曰告二事以上重事告實輕事招虛及數事罪等但一事告實者皆免罪今秦紘所言栁景之事輕重勘實不止一端間有不實乃千百中之一二耳揆之律意固當免罪況秦紘之舉乃風憲彈劾之公義非常人告訐之私情雖曰有罪薄乎云爾揆諸情法尤可矜恕伏望皇上俯念人才之難思秦紘盡心為國反遭擯黜之枉將秦紘仍留辦事以慰在官等因具題俱奉聖㫖秦紘巳發落了不准該衙門知道欽此欽遵抄出到部巳經立案訖續該南京六科給事中倪天民等十三道監察御史楊璡等與夫肇慶府同知張吉亦論奏其事文雖殊而意則同俱奉聖㫖該衙門知道欽此欽遵抄出送司案呈到部臣等竊惟帝王之治天下惟賞與罰最為緊要當則人服否則不服其可忽哉參看得都給事中等官張九功等所上五章極言栁景秦紘之情罪與夫朝廷所以處之者是非了然欲望朝廷召還秦紘以正賞罰以為勸戒陛下宜從而未之從者是臣等不能贊襄以成陛下納諫之美罪莫大焉今栁景該追贓又䝉聖恩免之矣而恩獨不及於秦紘則是為地方軍民之害者可恕而除地方軍民之害者不可用其何以服人心而勵將來豈不大可惜乎伏望陛下從天下之公論召還秦紘或處之都察院或處之南京都察院俾之視事未必無補如此則賞罰攸當舉措得宜而人心服將來勸矣不然則非臣等所敢知也伏乞聖明裁察幸甚緣係節奉欽依該衙門知道事理未敢擅便𢎞治四年十二月二十四日具題二十七日奉聖㫖南京戶部尚書黃紱改南京都察院左都御史秦紘著做南京戶部尚書欽此乞休致奏狀臣陜西三原縣人年十三始入縣學二十六而中鄉舉三十三而登進士改庶吉士三十四除大理寺評事尋升寺副五年而升知揚州府又六年而升江西右布政使又四年而升河南左布政使未踰年而升右副都御史撫治流民又二年以平賊功升左副都御史巡撫河南未幾升南京刑部左侍郎管部事改刑部總理河道又改南京戶部管部事復改左副都御史巡撫雲南升右都御史改南京右都御史參贊機務升南京兵部尚書參贊如故既而改兵部尚書兼左副都御史巡撫南直𨽻蘇松等處復改南京兵部尚書參贊機務九年秩滿升太子少保仍舊管事成化二十二年致仕二十三年皇上嗣登寶位之初召臣為吏部尚書加太子太保今又五年矣臣自入仕至今四十四年荷列聖莫大之恩官至一品誥贈三代榮幸無加捐生莫報但犬馬之年今巳七十有七矣委實筋力衰弱不能趨走承事神思昏倦難以旌别淑慝雖請託路絶奔競風息然已用者未必皆遂意未用者未必皆無言第恐積毁日深不能保終有辱召命伏望皇上少賜矜察放臣歸田另選碩德重望之人代臣非惟使臣老來安恬以待終必能薦引羣賢羽翼以成治矣臣無任懇切隕越之至等因𢎞治五年正月十六日具奏次日奉聖㫖卿居重職當勉副委任勿以老辭吏部知道欽此論御醫王玉不當升俸奏狀文選清吏司案呈奉本部送吏科抄出太醫院御醫王玉奏云云等因具奏奉聖㫖該部看了來說欽此欽遵抄出送司案呈到部查得成化二十三年九月內該科道官陳言該本部查處具題節該奉聖㫖太醫院堂上官照額挨次存留院使施欽開來看欽此欽遵續該本部照額挨次存留院使施欽院判任義章淵三員其餘左通政張倫左參議丘鈺院使仲蘭錢鈍院判劉文泰汪智許觀莊元金璽李思勉施鑑陳公賢徐生黃綬孫泰潘澤王玉共一十七員俱係額外官員等因具題節該奉聖㫖是太醫院額內的僉書額外巳降的罷汪智李思勉致仕張倫降院判其餘降御醫都各供事欽此欽遵彼時王玉丁憂在家其後起復到部違限年久本部欲送法司問罪題奉聖㫖王玉違限年久本當送問且饒他著復御醫辦事欽此欽遵又查得先該禮科等衙門給事中等官孫圭等題稱御醫等官王玉等四員丁憂去訖無憑考察該本部題准候各官起復到部仍行給事中等官㑹同考察續據吏目朱戡等奏要免考本部為照各官俱係題奉欽依該考人數難准免考等因具題節該奉聖㫖丘鈺王玉朱戡巳復原職并吳英都免考欽此欽遵又查得太醫院以修省改正為由欲復革罷𫝊奉官陳俊宫良寧銓吳綬聶整朱俊等舊職臣等以為若復陳俊等官則其餘𫝊奉革罷者皆來奏擾再三陳奏不可皇上竟將陳俊宫良寧銓吳綬升授御醫訖今王玉奏稱曽在春宫效勞與陳俊等事體相同要復院判且太醫院額設院使一員院判二員成化年間濫設數多皇上嗣位之初遵依舊制存留院使一員院判二員見今不缺今王玉又要升授院判則是欲遂巳私不顧有壞成命況太醫院官以修合藥餌治療疾病為職事前項降除御醫者誰非效勞之人若復王玉一人之官則其餘人等必來奏擾不與覆奏彼必怨怒造言謗訕無所不至與之覆奏則冗官仍復如前有纍陛下初政天下公論必謂臣等阿諛竊祿不能匡輔有何顔復立於朝設若院判有缺而王玉名在同降衆人之末計其資望考其藝術未必超越衆人亦難輒憑所奏就與升授所據御醫王玉既䝉聖恩免其送問又免考試自合黽勉盡職以圖報稱今却不安職分希求升授於理不可論法難容欲將本官拏送法司究問以警將來緣奉欽依該部看了來說事理及係京官未敢擅便𢎞治五年二月初九日具題次日奉聖㫖王玉免送問升俸二級以後再有奏擾的送問不饒欽此臣等竊惟賞罰者天下之公所以勸善而懲惡也是賞罰也君主之臣輔而行之君欲賞一人罰一人合天下之公論為臣者能贊襄以成之使天下之善者以勸惡者以懲斯人也非良臣乎君欲賞一人罰一人不合天下之公論為臣者不救正而阿徇以成之使天下之善者不勸惡者不懲斯人也非佞臣乎今陛下以堯舜之德居堯舜之位故臣等欲效良臣而不願為佞臣也且御醫王玉粗通醫術行不過人由𫝊奉而升院判人多不平陛下嗣大位之初降為御醫物議稍息茲者謀復院判臣等論之如前陛下若依臣等所言將本官拏送法司問罪是為懲有罪乃法之正也免其送問是為宥有罪猶之可也今既免其送問又升俸二級是為賞有罪奚可乎哉若臣等不言後來如王玉者臣等又行送問其何以服彼之心其何以服天下人之心欲天下不謂臣等為佞臣得乎然佞臣固非臣等所願為亦非陛下所以望臣等也伏望聖明俯察芻蕘之言收回升俸之命令王玉仍照今職辦事庶可以服天下人之心且使後來如王玉者不待參問而自不來奏擾矣臣等惓惓為國之心不自知其言之狂也罪該萬死伏惟聖慈俯賜矜察幸甚𢎞治五年二月十二日具題次日奉聖㫖你每既這等說王玉著仍照舊辦事欽此論嚴考課以定黜陟奏狀考功清吏司案呈照得在外有司官三年六年考滿赴部給由考核不分稱職不稱職俱引奏復職候九年通考方定黜陟九年之內二考稱職一考平常從稱職二考稱職一考不稱職或二考平常一考稱職或稱職平常不稱職各一考各俱從平常二考平常一考不稱職從不稱職繁而稱職無過升二等繁而平常無過升一等簡而稱職與繁而平常同簡而平常無過本等用不稱職初考繁處降二等簡處降三等若有過又各有降等之例此我朝祖宗以來考課之成法即唐虞三載考績三考黜陟之盛典也又查得本部奏行事例除邊方軍馬錢糧緊急所係官員考滿申請定奪外其餘不係邊方大小官員務要依例給由雖有専差責占三年六年之間亦要一次赴部考核不許托故違者究問又該南京吏部尚書王㒜等奏該本部議擬題准除雲南等處地方窵逺有司大小官員照舊赴本布政司給由其餘去處三年六年考滿官員俱要依例赴部給由考核不許仍前一概令其申請已經通行遵守外近該福建閩縣知縣周天民福建延平衛經歷司知事方杲四川平夷長官司吏目劉海河南布政司理問所提控案牘馬成三年六年俱不給由九年方才赴部給由公文內雖開有本管上司衙門存留管事緣不係軍馬錢糧緊要事情故違奏准雖有専差責占三年六年亦要一次赴部考核事例雲南富民縣知縣文茂三年六年不依例赴本布政司給由亦屬有違除將案牘馬成先巳呈堂送問外所據周天民等呈堂送問間遇䝉𢎞治五年三月初八日大赦宥免切緣近年以來九年考滿官員到部中間有稱三年六年遇例納米者有稱本管上司存留管事者輒憑九年一考考核詞語定擬該升該降品級殊乖前項二考一考從稱職從平常從不稱職定擬升降之法案呈到部參照知縣等官周天民等三年六年違例不行赴部給由罪名雖經恩宥緣各官止是給由一次若與給由二次三次一體升用不無勤怠不分何以警戒將來合無將知縣等官周天民等數內繁稱者止升一級簡稱者本等用繁平常者本等用簡平常者降一級仍通行浙江等十三布政司并南北直𨽻府州等衙門有司大小官員知㑹今後務遵前例三年六年俱要赴部給由雖有専差責占三年六年亦要一次赴部給由違者送問仍照周天民等事例定其該升該降品級若有例前納米曽經繳報牌冊到部者不在此限其雲南所屬官三年六年不行赴本布政司給由不繳牌冊到部亦照此例發落如此則黜陟有所分别而選法均勤怠知所警懼而治功成矣緣係定奪考績黜陟事理未敢擅便𢎞治五年三月十三日具題十五日奉聖㫖是欽此定奪兩廣朝覲官奏狀考功清吏司案呈奉本部送吏科抄出欽差總督兩廣軍務兼理巡撫都察院右都御史閔圭題云云等因具題奉聖㫖吏部知道欽此欽遵抄出送司照得𢎞治六年正月初一日天下諸司衙門官員例該朝覲本部巳經題准通行遵守去後今該前因案呈到部撿照諸司職掌內開凡在外官員三年遍行朝覲其各布政司按察司鹽運使府州縣及土官衙門流官等衙門官員帶首領官吏各一員名理問所官員照依到任須知依式對欵攢造文冊及將原領敕諭諸司職掌內事蹟文簿具本親齎奏繳以憑考核此祖宗以來之舊制也成化十七年朝覲該總督兩廣軍務兼理巡撫都察院右都御史朱英咨稱兩廣地方廣濶賊情難料要將府州縣官吏存留管事本部依擬題准行令廣東廣西二布政司各令堂上掌印官各帶首領官一員來朝其所屬府州縣并土官衙門俱留在任撫治將須知文冊送布按二司來朝官齎繳𢎞治三年朝覲該總督兩廣軍務兼理巡撫都察院右都御史屠滽題要免兩廣府州縣官來朝本部題准行令兩廣布按二司掌印官并首領官及各府正官各帶該吏來朝止免州縣官來朝訖今總督兩廣都御史閔圭又照前具題若不分地方有無賊情一概存留府州縣官吏在任管事則以後朝覲之年焉知各處不照此具奏若依所奏就行准理則朝覲之典不幾於廢乎且有道之世太平之時豈可廢朝覲之禮使上下之情不通庶官賢否無所旌别功過無所考核可乎合無行移都御史閔圭再查所奏前項地方如廣西栁慶桂林等府見今用兵廣東翁源河源等縣接連湖廣福建俱有賊情并有災傷去處府州縣官員俱各存留在任管事將該進須知文冊申送布按二司堂上掌印并首領來朝官吏帶來齎繳其餘無賊情無災傷去處府州縣官吏俱要隨同布按二司官依期來朝緣係存留朝覲官員及奉欽依吏部知道事理未敢擅便𢎞治五年三月十七日具題次日奉聖㫖是欽此乞休致奏狀臣先任太子少保南京兵部尚書參贊機務成化二十二年致仕二十三年皇上嗣登寶位之初遣使齎敕召臣至京升吏部尚書加太子太保臣自知菲材不能勝任巳嘗再三乞恩辭免不䝉俞允不得巳然後就職至今五年之間請老之章又十有八上矣俱䝉皇上溫詔慰留不從其請但臣今年七十有七筋力衰憊精神昏耗雖勉强盡職焉能保其無虞況銓選人物尤為難事使明哲之士居此地位尚不能得人人歡心如臣之愚焉能使人人而悅之又況臣賦性戇直不能周旋人事平居無事人尚訾議少有間隙則羣起而排擠之遂成過愆此臣之所以日夜恐懼不敢久居於此也伏望聖恩憐臣衰老容臣歸田俾得無事蓋棺斯為萬幸臣無任惶怖之至等因𢎞治五年四月二十二日具奏次日奉聖㫖卿朝廷老臣當勉副任用不允休致吏部知道欽此激勸賢勞官奏狀考功清吏司案呈奉本部送准戶部咨云云案呈到部臣等切惟國家之大計莫重於稅糧稅糧之先務莫重於京邊今山東布政司𢎞治四年分起運京邊稅糧動以數十萬計而草束布花農桑其多稱是才及次年四月初旬俱已完獲通關若非參政熊繡聞望素能服人才能足以濟事安能致部屬官民趨事如此之速耶比之其他布政司怠事官員稅糧拖缺五七年久者優劣勤惰相去逺甚况聞本官徵催之際不疾不徐靡苛靡刻而事自集此尤見其為良有司也且本官非止一事之優及訪知本官操履清白志行真純似此賢勞官員理當旌擢如䝉乞敕吏部再為查審本官如果平昔履歷與臣等所保相符量為照例旌擢庶使賢能者知所勸而怠惰者知所勉矣緣係激勸賢能官員事理未敢擅便𢎞治五年四月二十八日本部尚書葉淇等具題次日奉聖㫖是欽此欽遵擬合通行除外備由移咨貴部煩照本部題奉欽依內事理欽遵施行等因到部送司查得熊繡年五十二嵗湖廣都司寧逺衛軍籍原籍江西南昌府豐城縣人由進士厯升知府於𢎞治三年九月內升授前職十二月二十五日到任厯俸年半不曽赴部給由案呈到部竊惟唐虞之世考績於三載之後黜陟於三考之餘故鯀之治水九載績用弗成然後治其罪禹之治水九州攸同四隩既宅然後賞其功逮至我朝考績黜陟亦用此道雖近來舉行旌擢之典亦必待其所舉之官歷任三年之後曽經考稱無過覆勘果有卓異政蹟然後施行未嘗有厯任未及三年就行旌異者今熊繡以知府而升參政甫及年半雖完前項糧草是乃職分當為似難輒便旌擢合無待候本官三年考滿考稱任內著有卓異政蹟覆勘是實然後量與旌擢如此則朝無濫及之恩官無茍且之政人知所勸而治功成矣緣係旌擢方面官員事理未敢擅便𢎞治五年五月初十日具題當日奉聖㫖是欽此議大學士丘濬建言奏狀文選清吏司案呈奉本部送准禮部咨禮科抄出太子太保禮部尚書兼文淵閣大學士丘濬奏云云等因具奏奉聖㫖這本所言止印經節賞賜停織造杜塞希求升官等項皆切中時弊該衙門看了來說欽此欽遵抄出移咨送司除止印經節賞賜等項𨽻别部掌行外內杜塞希求升官四事係本部掌行案呈到部查得先該內官監官奏言修築蘆溝河隄岸要將文思院等衙門副使潘俊把總曲興等量加升職本部以為朝廷置文思院官并把總人匠無非為營造計也今副使潘俊等修築蘆溝河隄岸工完雖曽效勞是乃職分之所當為非分外事也只可量加賞賚以酬其勞恐不可升官以開弊端等因具題奉聖㫖是潘俊等不准升都加與賞賜欽此續又該內官監題稱修築正陽門等城垣河橋工完要將冠帶掌作把總并天文生醫士及催工官尚禮等量加俸級等因本部為照蘆溝橋工完官匠人等既奉欽依不准升都加與賞賜所據修築城垣河橋把總尚禮等似難量加俸級合無照依前例量加賞賜以酬其勞等因具題節該奉聖㫖冠帶把總尚禮王友道王猪兒杜鑑羅祥與做軍器局副使王福董瓉耿福汪寬朱顯都與冠帶欽此本部又言前者修蘆溝河隄岸管工副使潘俊等既有聖㫖不准升都加與賞賜今修城垣冠帶官尚禮等却降前項升職之㫖是功同而賞異也伏望收回前㫖將尚禮等亦量加賞賜等因題奉聖㫖尚禮等既升職冠帶了罷欽此本部又題若以為巳升了不可改亦望聖明留意今後內外官員但有似此為人奏討升官有壞名器者許科道官參奏拏問等因題奉聖㫖這以後事朕自有處置欽此又該本部議得今後一應人員不許營求內外權要之人奏乞升職其內外權要之人遇有書辦等項官員有缺聽本部於資格相應人員內擬奏除授不許坐名奏討其書辦等官三年六年考滿務令照例赴部給由考核以憑黜陟不許奏乞量升職事違者並聽本部參奏就將所舉之人拏送法司問罪不分原有官無官俱發回原籍為民當差舉主一體治罪等因具題奉聖㫖是今後一應人員不許營求內外權要冒濫升職違了的治罪不饒欽此今太子太保禮部尚書兼文淵閣大學士丘濬所言前四事誠為國為民之至計實兼法語巽與之雅言孔子曰法語之言能無從乎改之為貴巽與之言能無說乎繹之為貴陛下一覽前言輒降俞㫖可謂從且說矣矧人多頌陛下好問好察如帝舜改過不吝如成湯烏有不改且繹乎今後內外臣鄰如有為人求官升職如丘濬所云者請以丘濬之言而諭之止之則官不及私眤祿不至濫費國不受其弊民不受其害萬萬年太平之基業可悠久而不拔矣萬一聖情重違其請而許之臣等則當謹執前項㫖意與夫丘濬之言陳奏陛下俯賜優容而矜允之則恩在陛下而怨在臣等矣臣等居其位食其祿任其事死且不避而怨敢辭乎伏惟聖明留意宗社幸甚天下幸甚緣係節奉欽依該衙門看了來說事理未敢擅便𢎞治五年五月十二日具題次日奉聖㫖是欽此議經歷髙祿升官奏狀今日早朝退錦衣衛官召吏部堂上官臣恕偶有微恙不能朝參臣悅臣經趨至左順門有司禮監太監覃昌說稱皇上欲著通政司經歷髙祿升本司參議臣悅等回說無缺又無憑據難以奉行臣悅等回至部中與臣恕備說前情臣等仰惟皇上寬仁厚德為天下國家之心無以加矣眷顧親戚之恩亦無以加矣髙祿乃皇親壽寧侯之妹夫欲為通政司參議也非一日矣然而持久而不與者蓋恐來天下之物議纍莫大之聖政故爾今日欲與之者恐非陛下之本心且髙祿由舉人出身使其安於其職歷年深養望久遇有缺然後升人自服彼亦安今本官歷任未及三年驟升是職何以服天下之心杜天下之口是欲臺舉本官反纍本官也有何益哉伏望皇上以天下之官待天下之士若為親戚而妨公議使天下後世得以窺其淺深非陛下之所願亦非臣等之所願也臣等待罪銓司忠誠為國不自知其言之狂妄而激切也死罪死罪惟聖明優容而矜察之幸甚𢎞治五年五月二十三日謹具題知議御史徐璘簡賢能以養人材奏狀文選清吏司案呈奉本部送准禮部咨禮科抄出南京雲南道監察御史徐璘奏云云等因具奏奉聖㫖該衙門知道欽此欽遵抄出送司案呈看得御史徐璘所奏除防奸弊以杜奔競本部另行外所據簡賢能以養人材係𨽻吏部掌行抄單移咨送司案呈到部看得監察御史徐璘奏稱簡賢能以養人材一節固為有理但除授州縣正官除進士外其餘聽選監生不分舉人嵗貢與夫乞恩遇例出身者一體考選在於前列者然後除授正官間有一二不稱之人難以一概將嵗貢乞恩遇例者棄而不用且如吳寬曽彥其始也俱由嵗貢入監其後俱中狀元豈可謂嵗貢監生中間全無人乎且人之才性不同有優於學問而劣於政事者亦有長於政事而短於學問者亦有有學問而不能提調學校者有寡學問而能提調學校者世無全才故人之於事有能有不能且各處嵗貢生員俱係在學年深有科舉五七次不得中式者提學官考試見其頗通文理又不可黜退有五十以上方得應貢者亦有六十以上貢來者如此之人使其坐監十無一二得官所以多願就教職今欲止用未及五十者為教職則前項五十以上嵗貢生員多無路出身况未及五十者數少又多不願就教職且每科副榜舉人亦多不願教職此教官缺多所以不得不於願就教職嵗貢生員考選本官前項處置若科目出身并嵗貢生員未及五十者數多固可行之今科目出身并嵗貢生員未及五十者數少雖欲行而自不能其言提調學校官今後務要遍歷考試不許提取㑹考越境迎接等項合無行移都察院轉行南北直𨽻提調學校監察御史并浙江等處提調學校副使僉事務要遍歷府州縣學考試生員不許任意提取數學生員㑹於一處考試按臨地方務要預先移文禁止迎送不許出郭若有自謂生徒樂從不行禁止縱令迎送百里之外以致下情不堪士風向薄許巡撫都御史巡按御史劾奏究治緣係陳言及奉欽依該衙門知道事理未敢擅便𢎞治五年六月初二日具題次日奉聖㫖是欽此議進士石存禮除官奏狀照得目今六月本部大選官員取到三甲進士內一員石存禮年二十二嵗山東青州府益都縣人照依甲第次序本官該選知縣臣等竊惟知縣乃一縣之主百責所萃生民休戚係焉非年少力弱者所能勝任查得舊例中副榜舉人俱除教職中間有年未及二十五嵗告願不就教職者准送國子監讀書二十五嵗以上不願就教職者不准仍除教職蓋以未及二十五嵗者年少未可為人師範故准令不就教職况知縣比之教職責任尤重今石存禮年方二十二嵗氣質清秀形體孱弱若除授知縣使之宰百里之地居羣僚之上督率衆職分理庶務加以送往迎來承上接下勞苦百端恐不能堪看得行人司行人亦係三甲進士該除官員其職最簡而無勞事欲將石存禮仍送該衙門辦事候有行人員缺另行除授行人使本官讀書進學日省月修待其老成然後授以任事之職斯可責其成績緣係處置選用年幼進士事理未敢擅便𢎞治五年六月初八日具題次日奉聖㫖是欽此議御史馮玘圖治奏狀驗封清吏司案呈准兵部武選清吏司手本奉本部連送該本司案呈准職方清吏司手本奉本部送兵科抄出巡按貴州監察御史馮玘題云云等因具本奏奉聖㫖該部看了來說欽此欽遵抄出送司案呈到部看得所奏四事內處置邊患等三事本部徑自查奏外其馴服土官一事內宣撫宣慰長官把事等官本部議奏其知府知州巡檢文職等官係𨽻吏部掌行連送該司仰行吏部該司呈堂徑自查照施行等因到司查得土官赴京襲職固自舊例亦有鎮守總兵等官保勘明白具奏就彼冠帶承襲者又有赴京具奏有人爭襲發回保勘者又有到京為無保勘公文發回病故者又有到京查無㑹奏緣由發回候㑹奏至日另行本人奏稱情願在京聽候者天順八年三月初二日節該欽奉詔書內開雲南貴州廣西湖廣四川土官今後有告襲者委官務要從公體勘定名㑹奏該部行令就彼冠帶襲職不必參駁中間如有徇私不公許巡按御史糾舉罪坐原勘官員欽此欽遵外今該前因案呈到部看得監察御史馮玘奏要令土官子孫循舊例赴京襲替亦可馴服其心一節其意固善但土官衙門設在極邊地方襲替往回動經萬里中間貧富不一盤費艱難及至京師承襲有保勘不明㑹奏未到又有被人爭襲駁回保勘纍年不得承襲如前所云者亦有被無藉之徒指稱官府使用誆騙財物靡所不為以致逺人受其陷害衙門被其玷汚是以朝廷洞察斯弊特開恩例免其來京委官從公體勘定名㑹奏該部行令就彼冠帶承襲是乃懷柔逺夷革弊省事之良法若依監察御史馮玘所奏令其赴京承襲俾知朝廷之盛自足以消其邪心恐邪心未消而前項於彼不便之事有所不免不如仍照詔書事例令其保勘明白奏來就彼冠帶承襲為便合通行貴州等布政司今後土官子孫襲替保勘明白仍照詔書恩例行令就彼冠帶承襲到任之後如遇總鎮巡撫巡按三司分巡分守及一應上司官員到彼俱要與同流官參見其總領等官亦要諭以朝廷恩威使之各懷忠順之心撫治夷民辦納糧差如或生事擾害地方國法具存决不輕宥緣奉欽依該部看了來說事理未敢擅便𢎞治五年六月二十日具題次日奉聖㫖是欽此王端毅奏議卷十四
